{y:-1900,r:"Prophets & Revelation",t:"📜 The Suhuf of Ibrahim AS & Musa AS — First Divine Scriptures",s:"Mesopotamia / Sinai",type:"holy-book",endY:-1600,
d:`THE SUHUF (DIVINE SCROLLS) — The earliest revealed scriptures in Islam.

QURAN (87:18-19): 'Indeed, this is in the former scriptures — the scriptures of Ibrahim and Musa.'

THE SUHUF OF IBRAHIM AS (~1900 BCE):
Given to Prophet Ibrahim AS — exact number disputed. Some hadith traditions mention 10 scrolls to Ibrahim AS. Content: pure monotheism (tawhid), moral and ethical guidance. These were the first divine scriptures revealed after the era of oral prophethood.

THE SUHUF OF MUSA AS (pre-Torah, ~1600 BCE):
Distinct from the Tawrat — separate scrolls given in addition to the Torah. The Prophet Muhammad ﷺ described their content to Abu Dharr al-Ghifari RA in a famous hadith: they included wisdom such as 'The truly strong man is not the one who defeats others in wrestling — but the one who controls himself when angered.' And: 'O son of Adam, you do not have a right to wealth beyond what feeds you, clothes you, and gives you shelter — everything beyond this is for which you will be held accountable.'

CURRENT STATUS: The original Suhuf are not preserved. Their content is only known through Quranic references and authentic hadith.`,
tags:["suhuf","scrolls","ibrahim","musa","holy book","first scripture","quran 87:18","tawhid","divine"]},

{y:-1600,r:"Prophets & Revelation",t:"📖 THE TAWRAT (Torah) — Revealed to Musa AS",s:"Mount Sinai, Arabia",type:"holy-book",endY:-1600,
d:`THE TAWRAT — Second of the four major divine books in Islam.

REVELATION: Revealed to Prophet Musa (Moses) AS on Mount Sinai (~1600–1550 BCE). Quran confirms: 'Indeed, We sent down the Torah, in which was guidance and light. The prophets who submitted [to Allah] judged by it for the Jews.' (5:44)

OCCASION: After the Exodus from Egypt and the crossing of the Red Sea. Musa AS spent 40 nights on Mount Sinai (Quran 7:142) receiving the Torah. The Ten Commandments (al-Alwah — the Tablets) were part of this revelation, written by Allah directly.

CONTENT (as described in Quran):
• Guidance and light for Bani Israel (5:44)
• Laws of halal and haram
• Stories and lessons of previous prophets
• Signs and glad tidings of later prophets

JEWISH BIBLE (Torah today): The first five books of Moses (Genesis, Exodus, Leviticus, Numbers, Deuteronomy) in the Hebrew Bible are called the Torah. Islamic scholars hold that the original Tawrat has been altered (tahrif) over millennia — translations, additions, and human edits changed it from the pure divine word. The original Tawrat as given to Musa AS is no longer preserved in pure form.

QURANIC STATUS: The Quran confirms the original Tawrat was a divine scripture but that Muslims follow the Quran as the final, preserved scripture.`,
tags:["tawrat","torah","musa","moses","sinai","holy book","five books","divine","tablets","quran 5:44","1600 BCE"]},

{y:-1000,r:"Prophets & Revelation",t:"📖 THE ZABUR (Psalms) — Revealed to Dawud AS",s:"Jerusalem, Israel",type:"holy-book",endY:-970,
d:`THE ZABUR — Third of the four major divine books in Islam.

REVELATION: Revealed to Prophet Dawud (David) AS (~1000–970 BCE) during his reign as King of Israel and prophet of Allah. Quran: 'And your Lord is most knowing of whoever is in the heavens and the earth. And We have made some of the prophets exceed others [in various ways], and to Dawud We gave the Zabur.' (17:55)

NATURE OF REVELATION: The Zabur was not a law-giving scripture (shari'ah was already given in the Tawrat of Musa AS). The Zabur consisted of:
• Hymns of praise and glorification of Allah
• Wisdom and spiritual poetry
• The beauty of Dawud AS's voice was miraculous — mountains echoed the Tasbih (glorification) with him, birds gathered and praised Allah alongside him (Quran 34:10)
• Prayers and supplications

BIBLICAL PSALMS: The Book of Psalms (Tehillim) in the Hebrew Bible is associated with Dawud AS. 150 Psalms — many attributed to David. Islamic scholars hold the original pure Zabur, like the Tawrat, has been subject to human alteration over time.

DAWUD AS: Prophet and king simultaneously. He wept so much in prayer that grass grew from his tears (hadith tradition). His voice was so beautiful that when he recited, animals, jinn, and humans would stop to listen. He was given the Zabur as both a spiritual gift and a divine trust.`,
tags:["zabur","psalms","dawud","david","holy book","jerusalem","hymns","divine","quran 17:55","1000 BCE"]},

{y:-4,r:"Prophets & Revelation",t:"📖 THE INJEEL (Gospel) — Revealed to Isa AS",s:"Palestine / Galilee",type:"holy-book",endY:30,
d:`THE INJEEL — Fourth of the four major divine books revealed before the Quran.

REVELATION: Revealed to Prophet Isa (Jesus) AS during his prophethood in Palestine (~4 BCE – 30 CE approximately). Quran: 'And We sent, following in their footsteps, Isa the son of Maryam, confirming that which came before him in the Torah; and We gave him the Injeel, in which was guidance and light and confirming what preceded it of the Torah as guidance and instruction for the righteous.' (5:46)

NATURE: The Injeel was a fresh revelation to Isa AS personally — not written by his disciples but received directly from Allah. It:
• Confirmed the Tawrat of Musa AS while clarifying certain laws
• Brought new guidance, mercy, and light
• Gave glad tidings of the final prophet: 'And [mention] when Isa, the son of Maryam, said: O children of Israel, indeed I am the messenger of Allah to you confirming what came before me of the Torah and bringing good tidings of a messenger to come after me, whose name is Ahmad.' (61:6)

THE NEW TESTAMENT vs THE INJEEL: The Gospels of the New Testament (Matthew, Mark, Luke, John — written 40–100 CE, decades after Isa AS) are biographical accounts by followers, NOT the original Injeel. Islamic belief holds that the original pure Injeel as directly revealed to Isa AS has not been preserved — the New Testament contains elements of the original message mixed with later human additions.

CONFIRMATION: The Quran itself is the final confirmation of all previous scriptures — 'a Book We have revealed to you so that you may bring mankind out of the darkness into the light.' (14:1)`,
tags:["injeel","gospel","isa","jesus","holy book","palestine","new testament","quran 5:46","quran 61:6","divine","ahmad"]},

{y:610,r:"Prophets & Revelation",t:"📖 THE HOLY QURAN — Final Divine Revelation",s:"Mecca → Medina, Arabian Peninsula",type:"holy-book",endY:632,
d:`THE HOLY QURAN — The final, preserved, and complete Word of Allah. Revealed to Prophet Muhammad ﷺ over 23 years (610–632 CE / 13 BH – 11 AH).

REVELATION PERIOD:
• 13 years in MECCA (610–622 CE / 13 BH – 1 AH): 86 Makki Surahs — focus on tawhid (oneness of Allah), Hereafter, stories of prophets, moral character
• 10 years in MEDINA (622–632 CE / 1–11 AH): 28 Madani Surahs — focus on law, governance, social justice, family law, jihad, community

FIRST REVELATION: 17 Ramadan, 13 BH (610 CE) — Surah Al-Alaq (96:1-5) in Cave Hira.
LAST VERSE REVEALED: Quran 5:3 — 'Today I have perfected your religion for you, completed My favour upon you, and chosen Islam as your religion.' Revealed at Arafat during the Farewell Pilgrimage (10 AH / 632 CE).

STRUCTURE:
• 114 Surahs (chapters) • 6,236 verses (ayat) • 77,430 words • 323,671 letters
• Arranged not in order of revelation but by divine instruction
• Longest Surah: Al-Baqarah (286 verses) • Shortest: Al-Kawthar (3 verses)

PRESERVATION:
• Memorized by thousands of companions during the Prophet's lifetime
• Written on palm leaves, flat stones, bones, and leather
• Abu Bakr RA compiled into one mushaf (12 AH / 633 CE) after Yamama battle
• Uthman RA standardized into single authoritative text with 4–7 copies sent to major cities (35 AH / 656 CE)
• The Uthmanic mushaf is the Quran read by 1.8 billion Muslims today — unchanged in 1,400 years
• Memorized completely (Hifz) by millions of Muslims across every generation — the only book in history memorized in its entirety by millions

UNIQUE POSITION: 'Indeed, it is We who sent down the Quran and indeed, We will be its guardian.' (15:9) — Allah personally guaranteed its preservation. The only divine scripture preserved in its original language (Arabic) without alteration.

THE MIRACLE (I'JAZ AL-QURAN): Literary inimitability — Arabs of the 7th century (masters of poetry and rhetoric) were challenged to produce even one surah like it — they could not (2:23). Scientific miracles, numerical patterns, and prophecies fulfilled continue to be studied.`,
tags:["quran","holy quran","final scripture","610","632","mecca","medina","revelation","23 years","114 surahs","preserved","miracle","arabic","1.8 billion","hifz","15:9"]},

{y:-624,r:"Science, Philosophy & Discovery",t:"Thales of Miletus — First Philosopher",s:"Miletus, Ionia (Turkey)",type:"science",
d:`THALES OF MILETUS (~624–546 BCE): Considered the first philosopher in Western tradition — the man who first asked 'What is everything made of?' without answering with mythology.

SCHOOL: Pre-Socratic / Milesian School. Born in Miletus (modern Turkey, then Greek colony).

PHILOSOPHY: First principle (arché) is WATER — everything is made of water in different forms. Wrong answer, revolutionary question. He removed the gods from explanations of natural phenomena for the first time in Greek thought.

MATHEMATICS: Thales' Theorem — any angle inscribed in a semicircle is a right angle. First to introduce deductive proof. Calculated height of Egyptian pyramids using shadow ratios.

ASTRONOMY: Predicted the solar eclipse of 585 BCE (May 28) — first recorded eclipse prediction. This event was so startling it stopped a battle between the Lydians and the Medes.

LEGACY: His most important contribution was not his answer (water) but his METHOD — using observation and reason rather than myth to explain natural phenomena. He is the intellectual grandfather of all science.`,
tags:["thales","miletus","pre-socratic","philosophy","water","first philosopher","eclipse","greece","624 BCE"]},

{y:-610,r:"Science, Philosophy & Discovery",t:"Anaximander & Anaximenes — Milesian School",s:"Miletus, Ionia (Turkey)",type:"science",
d:`THE MILESIAN SCHOOL — Three consecutive philosophers from Miletus, the first philosophical school in history:

ANAXIMANDER (~610–546 BCE): Student of Thales. First principle is the APEIRON (the Boundless/Infinite) — an undefined, limitless substance. First to draw a world map. First to propose that Earth floats freely in space (correct!). First evolutionary idea: humans evolved from fish-like creatures (crude but conceptually remarkable). First to use geometrical models to explain celestial mechanics.

ANAXIMENES (~586–526 BCE): Student of Anaximander. First principle is AIR — through condensation and rarefaction it becomes everything. Wrong answer, but advanced the METHOD: quantitative change (density) explains qualitative change (different substances). Introduced the idea that the universe operates by a single mechanism.

SIGNIFICANCE OF THE MILESIAN SCHOOL:
These three men, working in the same city across three generations (~624–526 BCE), established the framework that all subsequent science and philosophy would follow: seek a single underlying principle to explain all natural phenomena using reason and observation.

Their work was later transmitted to the Islamic Golden Age through Greek→Arabic translations at the House of Wisdom in Baghdad, then back to medieval Europe. The chain: Miletus → Athens → Alexandria → Baghdad → Toledo (Spain) → European universities.`,
tags:["anaximander","anaximenes","milesian","pre-socratic","philosophy","miletus","apeiron","air","evolution","610 BCE"]},

{y:-582,r:"Science, Philosophy & Discovery",t:"Pythagoras — Mathematics, Music & the Soul",s:"Samos → Croton (Italy)",type:"science",
d:`PYTHAGORAS OF SAMOS (~582–496 BCE): Mathematician, philosopher, mystic. Born on the island of Samos (Greece), emigrated to Croton (southern Italy) where he founded a religious-philosophical community.

THE PYTHAGOREAN SCHOOL / BROTHERHOOD: A secretive community with strict rules — vegetarianism, communal living, mathematical study, belief in the transmigration of souls (metempsychosis). Members sworn to secrecy. Political influence in Croton until violently dissolved.

MATHEMATICS:
• Pythagorean Theorem: a² + b² = c² (known to Babylonians earlier, but Pythagoras provided the first PROOF)
• Discovery that musical harmony is mathematical — strings in ratio 2:1 produce an octave, 3:2 a perfect fifth. First link between mathematics and music.
• Irrational numbers discovered (reluctantly) — √2 cannot be expressed as a ratio of integers. A student (Hippasus) drowned, according to legend, for revealing this to outsiders.

PHILOSOPHY: 'Everything is number.' Reality is fundamentally mathematical — radical idea that directly inspired Plato and, 2,400 years later, modern physics ('the universe is written in the language of mathematics' — Galileo).

ASTRONOMY: First to suggest Earth is a sphere. First to propose that the Earth moves rather than being stationary. Morning Star and Evening Star are the same object (Venus). The 'music of the spheres' — celestial bodies moving in mathematical ratios producing a cosmic harmony.`,
tags:["pythagoras","samos","croton","mathematics","theorem","music","philosophy","soul","greece","582 BCE","irrational numbers"]},

{y:-535,r:"Science, Philosophy & Discovery",t:"Heraclitus & Parmenides — Change vs Permanence",s:"Ephesus & Elea (Greece/Italy)",type:"science",
d:`THE GREAT PHILOSOPHICAL DEBATE: Change vs Permanence — one of the most fundamental questions in philosophy.

HERACLITUS OF EPHESUS (~535–475 BCE): 'The Obscure.' 
• LOGOS: A universal rational principle governing all change.
• 'Everything flows' (Panta Rhei) — reality is constant change and flux. 'You cannot step into the same river twice.'
• Unity of opposites: hot and cold, day and night, war and peace are all aspects of one unified reality.
• FIRE as first principle: the universe is an 'ever-living fire.'
• Known for cryptic, oracular writing style. Aristotle complained he was incomprehensible.

PARMENIDES OF ELEA (~515–450 BCE): Founder of the Eleatic School.
• Opposite of Heraclitus: Change is an ILLUSION. True reality (Being) is eternal, unchanging, single.
• Two paths: 'Way of Truth' (reason) and 'Way of Opinion' (senses). Senses deceive — only reason reaches truth.
• Logical argument: 'What is, is. What is not, cannot be.' Change requires something coming from nothing — impossible.
• Direct influence on Plato's Theory of Forms (unchanging eternal Forms vs changing appearances).

ZENO OF ELEA (student of Parmenides, ~490–430 BCE): Famous paradoxes proving motion is impossible:
• Achilles and the Tortoise: Achilles can never overtake a tortoise with a head start.
• The Arrow: A moving arrow is actually at rest at each instant.
These paradoxes tormented mathematicians for 2,000 years — resolved only by calculus and the mathematics of infinite series.`,
tags:["heraclitus","parmenides","zeno","logos","change","permanence","eleatic","philosophy","greece","paradox","535 BCE"]},

{y:-470,r:"Science, Philosophy & Discovery",t:"Socrates — The Examined Life",s:"Athens, Greece",type:"science",
d:`SOCRATES (470–399 BCE): The most influential philosopher in Western history — and one who wrote nothing. We know him entirely through others' accounts (primarily Plato and Xenophon).

LIFE: Born in Athens to a stonemason and midwife. Served in the Athenian military (distinguished service at Potidaea, Amphipolis, Delium). Spent his life in the streets, gymnasia, and workshops of Athens — questioning everyone.

THE SOCRATIC METHOD (Elenchus): Dialogical method of questioning — not teaching doctrine but exposing ignorance. 'I know that I know nothing.' Through question-and-answer, assumptions are examined, contradictions exposed, and understanding deepened. Still the primary method in law school education today.

THE ORACLE: The Oracle of Delphi declared no one wiser than Socrates. His response: 'If I am the wisest, it is because I alone know that I know nothing.'

PHILOSOPHY: Ethics as the central concern of philosophy. 'The unexamined life is not worth living.' Virtue (arete) is knowledge — wrongdoing stems from ignorance, not evil will. The soul is immortal and improved by virtue.

TRIAL AND DEATH (399 BCE): Charged with impiety (not honoring the city's gods) and corrupting the youth. True motive: his questioning embarrassed Athenian democracy's leaders. Refused to stop philosophizing. Found guilty (280–220 votes). Death by hemlock. 

His death haunted Western philosophy forever — a just man killed by democracy for speaking truth. Plato wrote the Apology, Crito, and Phaedo about his final days.`,
tags:["socrates","athens","socratic method","elenchus","philosophy","examined life","hemlock","470 BCE","virtue","ethics"]},

{y:-428,r:"Science, Philosophy & Discovery",t:"Plato — The Academy & Theory of Forms",s:"Athens, Greece",type:"science",
d:`PLATO (428–348 BCE): Student of Socrates, teacher of Aristotle. Arguably the most influential philosopher in Western history. Alfred North Whitehead: 'The safest general characterization of the European philosophical tradition is that it consists of a series of footnotes to Plato.'

THE ACADEMY: Founded ~387 BCE in Athens — considered the first university in the Western world. Located in a grove sacred to the hero Academus (hence 'Academy'). Operated for 900 years until closed by Emperor Justinian in 529 CE. Taught mathematics, philosophy, astronomy, biology.

THEORY OF FORMS (Ideas): The most important philosophical doctrine in Western philosophy.
• The world of senses is imperfect, changing, illusory.
• True reality consists of eternal, unchanging, perfect FORMS (Ideas) — the form of Beauty, Justice, Equality, the Good.
• Physical objects are imperfect copies of these Forms.
• ALLEGORY OF THE CAVE (Republic, Book VII): Prisoners in a cave see only shadows on a wall — they mistake shadows for reality. The philosopher escapes the cave and sees the sun (the Form of the Good). Returns to free the others but they resist truth.

POLITICAL PHILOSOPHY: The Republic — his most famous work. Ideal state: three classes (philosopher-kings, warriors, producers). Philosopher-kings rule by knowledge of the Forms. Democracy is rule by ignorance. Famous five political regimes: aristocracy, timocracy, oligarchy, democracy, tyranny (descending order).

EPISTEMOLOGY: Knowledge vs. opinion. Only knowledge of eternal Forms is true knowledge. Mathematics as the training ground for philosophical reasoning.`,
tags:["plato","academy","forms","republic","cave allegory","athens","philosophy","428 BCE","philosopher king","knowledge","western philosophy"]},

{y:-384,r:"Science, Philosophy & Discovery",t:"Aristotle — The First Scientist",s:"Stagira → Athens → Macedon",type:"science",
d:`ARISTOTLE (384–322 BCE): Student of Plato, tutor of Alexander the Great. The man who classified everything. Called 'The Philosopher' for 2,000 years (no further identification needed).

LIFE: Born in Stagira (northern Greece). Entered Plato's Academy at 17 — stayed 20 years. Left after Plato's death (348 BCE). Tutored Alexander the Great (343–335 BCE). Founded his own school, the LYCEUM (~335 BCE) in Athens. Taught while walking (Peripatetics = walkers). Fled Athens after Alexander's death: 'I will not allow Athens to sin twice against philosophy' (recalling Socrates' execution). Died 322 BCE.

THE LYCEUM: Vast research institution — library, natural history museum, students collecting data from across Alexander's empire. First systematic natural history research program.

WORKS (surviving, ~1/3 of his output):
• LOGIC: Organon — invented formal logic (syllogism). Used as the basis of reasoning until the 19th century.
• SCIENCE: Physics, On the Heavens, Meteorology, On the Soul
• BIOLOGY: History of Animals, Parts of Animals — first systematic zoology (500+ species described)
• METAPHYSICS: First Cause / Unmoved Mover — the philosophical concept of God that influenced Aquinas, Al-Ghazali, and Ibn Rushd.
• ETHICS: Nicomachean Ethics — happiness (eudaimonia) as the goal of life, virtue as the mean between extremes.
• POLITICS: Politics — man is a 'political animal'; classified 158 constitutions.
• RHETORIC & POETICS: Art of persuasion; catharsis in tragedy.

ARISTOTLE'S ERRORS: geocentrism, spontaneous generation, women as 'defective males.' These also dominated for centuries. His authority became an obstacle to progress — Galileo fighting 'the Aristotelians.'`,
tags:["aristotle","lyceum","stagira","athens","alexander","philosophy","logic","biology","ethics","384 BCE","peripatetic","unmoved mover"]},

{y:-341,r:"Science, Philosophy & Discovery",t:"Epicurus & Stoics — Schools on How to Live",s:"Athens, Greece",type:"science",
d:`HELLENISTIC PHILOSOPHY (~323–30 BCE): After Alexander the Great's death, philosophy turned from cosmic questions to personal ethics — how should I live my life?

EPICURUS (341–270 BCE): Founded the GARDEN school (~306 BCE) in Athens — open to women and slaves (revolutionary). 
• EPICUREANISM: The goal of life is pleasure (hedone) — but not wild pleasure. True pleasure = ataraxia (tranquility, absence of mental anguish) + aponia (absence of physical pain).
• Atomic theory (from Democritus): Universe = atoms and void. The gods exist but don't interfere with humans. No afterlife — 'Death is nothing to us, for when we exist, death is not present; when death is present, we no longer exist.'
• Friendship as the greatest pleasure. Live quietly, avoid politics.
• Misunderstood for 2,000 years as hedonistic excess — actually advocated moderate, serene living.

ZENO OF CITIUM (~334–262 BCE): Founded STOICISM (~301 BCE) — taught in the Stoa Poikile (Painted Porch), hence 'Stoic.'
• THE STOIC PHILOSOPHY: Live according to nature (reason/logos). Virtue is the only true good. External things (wealth, health, reputation) are 'indifferent' — neither good nor bad.
• Dichotomy of Control: Some things are 'up to us' (judgments, desires, aversions) — some are not (body, reputation, wealth). Focus only on what is up to you.
• Universal brotherhood of humanity — Stoics were the first to articulate cosmopolitanism.
• Later Roman Stoics: Seneca (~4 BCE–65 CE), Epictetus (50–135 CE), Emperor Marcus Aurelius (121–180 CE) — Meditations, the most personal philosophical work surviving from antiquity.`,
tags:["epicurus","stoicism","zeno","garden","hellenistic","philosophy","ataraxia","marcus aurelius","seneca","epictetus","341 BCE","greek philosophy"]},

{y:-305,r:"Science, Philosophy & Discovery",t:"Euclid & Alexandrian Mathematics",s:"Alexandria, Egypt",type:"science",
d:`EUCLID OF ALEXANDRIA (~325–265 BCE): 'Father of Geometry.' Worked at the Library of Alexandria under the patronage of Ptolemy I.

ELEMENTS (Stoicheia): 13 books, written ~300 BCE. Most successful mathematics textbook in history — used in schools for 2,300 years (last used in British schools in the 1970s). Contains 465 propositions in geometry, number theory, and algebra, all derived from 5 postulates through rigorous deductive proof.

THE 5 POSTULATES: The famous 5th postulate (parallel lines never meet) was controversial from the start. In the 19th century, Lobachevsky and Riemann showed that denying it produces consistent non-Euclidean geometries — used in Einstein's General Relativity.

ANECDOTE: When Ptolemy I asked if there was a shorter road to mastering geometry, Euclid replied: 'There is no royal road to geometry.'

HYPATIA OF ALEXANDRIA (~360–415 CE): First known female mathematician and philosopher. Daughter of mathematician Theon of Alexandria. Taught Neoplatonist philosophy and mathematics at the Library of Alexandria. Murdered by a Christian mob in 415 CE — dragged from her chariot, flesh scraped from her bones with oyster shells. Her death is often taken as symbolizing the end of classical learning in Alexandria.

APOLLONIUS OF PERGA (~262–190 BCE): Conic Sections — the ellipse, parabola, and hyperbola. These shapes were used 1,800 years later by Kepler to describe planetary orbits.`,
tags:["euclid","elements","geometry","alexandria","hypatia","apollonius","305 BCE","mathematics","postulates","library of alexandria"]},

{y:-300,r:"Science, Philosophy & Discovery",t:"Democritus & the Atomic Theory",s:"Abdera, Greece",type:"science",
d:`DEMOCRITUS OF ABDERA (~460–370 BCE): The Laughing Philosopher.

ATOMIC THEORY (developed with his teacher Leucippus):
• Everything consists of indivisible particles (atomos = uncuttable) moving in infinite void.
• Atoms differ in shape, size, and arrangement — these differences cause different substances.
• The soul is made of round, smooth atoms (the finest kind).
• Knowledge is imperfect because our senses only perceive the effects of atoms on our sense organs — not atoms themselves.

THIS IS ESSENTIALLY CORRECT. Developed purely through reasoning with no experimental equipment, Democritus arrived at the foundational insight of modern chemistry and physics ~2,400 years before it was proven.

WHY IT WAS IGNORED: Aristotle rejected atomism (he believed in continuous matter, no void). Since Aristotle's authority dominated for 1,500 years, atomic theory was suppressed until:
• Lucretius (Roman, 99–55 BCE): De Rerum Natura — preserved and spread Epicurean atomism
• Pierre Gassendi (1592–1655): Revived atomism as corpuscular theory
• John Dalton (1766–1844): Modern atomic theory from chemistry
• Ernest Rutherford (1911): Nuclear model of atom

DEMOCRITUS also: Proposed the Milky Way is made of billions of distant stars (correct!). Proposed that other worlds exist — some inhabited (prescient!). Wrote on ethics, language, mathematics. Called the 'Laughing Philosopher' because he laughed at human folly.`,
tags:["democritus","atomic theory","abdera","atoms","leucippus","philosophy","300 BCE","materialism","void","modern physics"]},

{y:-350,r:"Science, Philosophy & Discovery",t:"Astronomy — Ancient to Classical: Aristarchus to Hipparchus",s:"Greece / Alexandria",type:"science",
d:`THE ANCIENT ASTRONOMERS:

ARISTARCHUS OF SAMOS (~310–230 BCE): The ancient Copernicus. First astronomer to propose that the Earth orbits the Sun (heliocentric model) — 1,800 years before Copernicus. Estimated:
• Sun is 18–20× farther from Earth than the Moon (actual: ~390×; his method was correct, just hard to measure precisely)
• Earth's diameter in terms of Moon's orbit
• Earth rotates on its axis daily
His heliocentric model was rejected by contemporaries in favor of Aristotle's geocentrism. Cleanthes (Stoic) called for him to be tried for impiety for moving the 'Hearth of the Universe' (Earth).

HIPPARCHUS OF NICAEA (~190–120 BCE): Greatest astronomer of antiquity.
• Discovered the precession of the equinoxes (Earth's axis wobbles over ~26,000 year cycle) — one of the most subtle astronomical discoveries in history.
• First star catalog: 850+ stars with coordinates and magnitudes.
• Calculated the length of the year to within 6 minutes.
• Calculated the distance and size of the Moon.
• Invented trigonometry (chord tables) to solve astronomical calculations.

CLAUDIUS PTOLEMY (~100–170 CE): Almagest — 13-book mathematical astronomy compendium. Geocentric model with epicycles (circles on circles) that accurately predicted planetary positions. Dominated for 1,400 years until Copernicus.

ERATOSTHENES (276–194 BCE): Measured Earth's circumference within 2% accuracy using shadow angles. Also calculated Earth's axial tilt (23.5°) and the distance to the Sun and Moon.`,
tags:["aristarchus","heliocentric","hipparchus","precession","star catalog","ptolemy","almagest","eratosthenes","astronomy","ancient","350 BCE"]},

{y:-50,r:"Science, Philosophy & Discovery",t:"Roman Philosophy — Cicero, Lucretius & Marcus Aurelius",s:"Rome",type:"science",
d:`ROMAN PHILOSOPHY (~100 BCE – 180 CE): Rome produced no original philosophical schools but transmitted, refined, and applied Greek philosophy to practical ethics and governance.

CICERO (~106–43 BCE): Orator, statesman, philosopher. Most important transmitter of Greek philosophy to Latin. Introduced philosophical vocabulary in Latin (still in English today: quality, morality, definition, comprehension). Works: De Republica (On the Republic), De Natura Deorum (On the Nature of the Gods), Tusculan Disputations. Assassinated by Mark Antony's soldiers — his severed hands nailed to the Senate's podium.

LUCRETIUS (~99–55 BCE): De Rerum Natura (On the Nature of Things) — 7,400-verse Epicurean atomic poem. Preserved Democritus's atomic theory through the Middle Ages. Rediscovered in 1417 CE by Poggio Bracciolini in a German monastery — its rediscovery is credited with sparking the Scientific Revolution (Stephen Greenblatt, The Swerve).

MARCUS AURELIUS (121–180 CE): Stoic philosopher-emperor. Meditations — written as private journal, never intended for publication. Most intimate surviving text from antiquity: reflections on duty, mortality, reason, and dealing with difficult people. Still a bestseller, 1,900 years later.

SENECA (~4 BCE – 65 CE): Stoic. Letters to Lucilius — 124 letters on living well. Tutor to Emperor Nero. Ordered to commit suicide by Nero. His death: calm, philosophical — bled from multiple cuts while dictating to scribes.

EPICTETUS (50–135 CE): Former slave. Enchiridion (Handbook) — Stoic practical manual. 'Men are disturbed not by events but by their opinions about events.' Foundation of modern Cognitive Behavioral Therapy.`,
tags:["cicero","lucretius","marcus aurelius","seneca","epictetus","roman","stoic","philosophy","50 BCE","atomic","meditations","CBT"]},

{y:200,r:"Science, Philosophy & Discovery",t:"Neoplatonism — Plotinus & the Last Ancient School",s:"Alexandria → Rome",type:"science",
d:`NEOPLATONISM (~250–550 CE): The last great philosophical school of antiquity. Synthesis of Plato, Aristotle, Stoicism, and Eastern mysticism.

PLOTINUS (204–270 CE): Founder of Neoplatonism. Born in Egypt, studied in Alexandria, taught in Rome. The Enneads (six groups of nine treatises) — his collected works edited by his student Porphyry.

THE NEOPLATONIC SYSTEM:
• THE ONE: Ultimate reality — beyond being, beyond thought, beyond description. Source of everything. (Similar to: Sufi concept of Allah beyond all attributes; Hindu Brahman)
• NOUS (Intellect): First emanation from the One — pure thought thinking itself.
• WORLD SOUL: Second emanation — animates the cosmos.
• MATTER: The lowest level — furthest from the One.
• RETURN: The soul's journey is to ascend back toward the One through philosophy and spiritual practice. Mystical union (henosis) possible through contemplation.

INFLUENCE:
• Augustine of Hippo (354–430 CE): Converted from Manichaeism to Christianity via Neoplatonism — shaped Christian theology profoundly.
• Pseudo-Dionysius the Areopagite: Neoplatonic Christian mysticism — influenced all medieval Christian mysticism.
• ISLAMIC PHILOSOPHY: Neoplatonism deeply influenced Al-Farabi, Ibn Sina, and Suhrawardi (founder of Ishraqiyya / Illuminationist philosophy in Islam).
• Jewish Kabbalah and the Zohar also show Neoplatonic influence.`,
tags:["neoplatonism","plotinus","enneads","the one","emanation","alexandria","rome","200 CE","augustine","ibn sina","mysticism","philosophy"]},

{y:800,r:"Science, Philosophy & Discovery",t:"Islamic Philosophy — Al-Kindi to Ibn Khaldun",s:"Baghdad → Andalus → North Africa",type:"science",
d:`ISLAMIC PHILOSOPHICAL TRADITION (9th–14th century / 3rd–8th century AH):

AL-KINDI (801–873 CE / 186–259 AH): 'First Arab Philosopher.' Reconciled Greek philosophy with Islamic theology. 260+ works. Introduced Indian numerals to Islamic world. First systematic theory of cryptography. On First Philosophy — argued that philosophy and revelation cannot contradict, as both seek truth.

AL-FARABI (872–950 CE / 259–339 AH): 'The Second Teacher' (Aristotle = First). Perfect City theory — philosopher-ruler as ideal leader. Theory of prophecy: prophets access the Active Intellect directly. Music theory: Kitab al-Musiqa. Influenced: Ibn Sina, Maimonides, Thomas Aquinas.

IBN SINA / AVICENNA (980–1037 CE / 370–428 AH): Canon of Medicine (used in European universities until 1700). Floating Man thought experiment (precursor to Descartes' cogito). Proof of God from contingency (Necessary Being). Influenced: Duns Scotus, Thomas Aquinas.

IBN RUSHD / AVERROES (1126–1198 CE / 520–595 AH): Greatest commentator on Aristotle. Latin translations sparked European Scholasticism. 'The Commentator' — Dante places him in Limbo with the great pagan philosophers.

AL-GHAZALI (1058–1111 CE / 450–505 AH): Incoherence of the Philosophers — refuted Aristotelian philosophy's claim to certainty. Ihya Ulum al-Din — reconciled fiqh, ethics, and Sufism. Most widely read Islamic scholar after the Prophet's era.

IBN KHALDUN (1332–1406 CE / 732–808 AH): Muqaddimah — first scientific theory of history and sociology. Asabiyyah (social cohesion), cyclical rise and fall of civilizations, economic multiplier effect. 600 years ahead of his time.`,
tags:["al-kindi","al-farabi","ibn sina","ibn rushd","al-ghazali","ibn khaldun","islamic philosophy","baghdad","andalus","800 CE","3rd AH","averroes","avicenna"]},

{y:1200,r:"Science, Philosophy & Discovery",t:"Medieval Philosophy — Scholasticism & Thomas Aquinas",s:"Paris / Oxford / Cologne",type:"science",
d:`MEDIEVAL EUROPEAN PHILOSOPHY (~1100–1450 CE): Dominated by Scholasticism — the attempt to reconcile faith (Christian theology) and reason (Aristotelian philosophy).

ANSELM OF CANTERBURY (1033–1109 CE): Ontological Argument for God's existence — God is 'that than which nothing greater can be conceived.' If God exists only in the mind, something greater (also existing in reality) can be conceived — contradiction. Therefore God must exist in reality. Still debated today.

PETER ABELARD (1079–1142 CE): 'I must understand in order to believe' (vs Augustine's 'I believe in order to understand'). Sic et Non (Yes and No) — juxtaposed conflicting theological authorities to force critical thinking. His romance with Héloïse — one of history's great tragic love stories.

THOMAS AQUINAS (1225–1274 CE): The greatest Scholastic philosopher. 'The Angelic Doctor.' Summa Theologica — synthesis of Aristotle and Christianity. Five Ways (proofs of God's existence): unmoved mover, first cause, contingency, degrees of perfection, teleological. Natural Law ethics. His synthesis of Aristotle (via Arabic translations — Ibn Rushd was his primary Aristotelian source) with Christian theology is the foundation of Catholic intellectual tradition to this day.

WILLIAM OF OCKHAM (~1287–1347 CE): 'Ockham's Razor' — 'entities should not be multiplied beyond necessity.' Simplest explanation preferred. Nominalism: universal concepts are just names (nomina), not real entities. Undermined Scholastic synthesis. Contributed to the separation of faith and reason that enabled the Scientific Revolution.

DUNS SCOTUS (1266–1308 CE): 'The Subtle Doctor.' Refined Aquinas. Influence on Franciscan theology. 'Dunce cap' — from his followers (Dunsmen) who were mocked for refusing Renaissance humanism.`,
tags:["scholasticism","aquinas","anselm","abelard","ockham","medieval","philosophy","paris","1200 CE","summa theologica","five ways","ockham's razor"]},

{y:1400,r:"Science, Philosophy & Discovery",t:"Renaissance Humanism — Erasmus, More & Machiavelli",s:"Italy / Netherlands / England",type:"science",
d:`RENAISSANCE PHILOSOPHY & HUMANISM (~1400–1600 CE): A turn from theology to the human being as the center of inquiry.

GIOVANNI PICO DELLA MIRANDOLA (1463–1494 CE): Oration on the Dignity of Man — 'Renaissance Manifesto.' God gave humans no fixed nature — uniquely, humans can choose their own nature. 900 Theses — challenged by the Pope. First philosopher to attempt synthesis of Greek, Islamic, Jewish, and Christian thought.

DESIDERIUS ERASMUS (1466–1536 CE): 'Prince of the Humanists.' In Praise of Folly — satirized corrupt clergy and superstition. Edited the New Testament in Greek (showed the Latin Vulgate had translation errors). Rejected both Luther's extremism and Catholic corruption. Advocated reason, education, tolerance.

NICCOLÒ MACHIAVELLI (1469–1527 CE): The Prince — political philosophy based on power, not morality. 'It is better to be feared than loved.' 'The end justifies the means.' 'Machiavellian' = cynically calculating. Discourses on Livy — preferred republics. First modern political scientist — described politics as it IS, not as it SHOULD BE.

THOMAS MORE (1478–1535 CE): Utopia — the first use of this word. Imagined an ideal communist island society. Humanist, but deeply Catholic — refused to support Henry VIII's divorce. Executed. Canonized as a saint. 'A Man for All Seasons.'

MICHEL DE MONTAIGNE (1533–1592 CE): Invented the essay. Essays — the first major work of introspective personal writing. 'What do I know?' — radical skepticism about one's own certainty. Introduced relativism: 'Every man carries the whole form of the human condition within him.'`,
tags:["renaissance","humanism","machiavelli","erasmus","thomas more","pico","montaigne","1400 CE","philosophy","prince","utopia","essays","italy"]},

{y:1596,r:"Science, Philosophy & Discovery",t:"Descartes, Spinoza & Leibniz — Rationalism",s:"France / Netherlands / Germany",type:"science",
d:`RATIONALISM (~1600–1750 CE): Knowledge comes primarily from REASON, not the senses.

RENÉ DESCARTES (1596–1650 CE): 'Father of Modern Philosophy.' Meditations on First Philosophy (1641).
• METHOD OF DOUBT: Strip away everything that can be doubted. What remains?
• COGITO ERGO SUM: 'I think, therefore I am' — the indubitable foundation of knowledge.
• Mind-body DUALISM: Res cogitans (thinking substance / mind) vs Res extensa (extended substance / matter). The mind-body problem is still unsolved.
• Coordinate geometry (Cartesian coordinates) — unifying algebra and geometry.
• Vortex theory of the universe. Mechanistic physics.

BARUCH SPINOZA (1632–1677 CE): Ethics — most rigorous philosophical system ever written. Presented in geometric form (definitions, axioms, theorems, proofs).
• GOD = NATURE (Deus sive Natura): God is not a separate being but the single infinite substance of which everything is a mode. Called an atheist, pantheist, and heretic. Excommunicated from the Amsterdam Jewish community at 23.
• No free will — determinism. Everything follows necessarily from the nature of God/Nature.
• Political philosophy: democracy as most rational form of government.

GOTTFRIED LEIBNIZ (1646–1716 CE): See also Science section.
• MONADOLOGY: Reality consists of simple, indivisible, non-spatial substances (monads). Each monad reflects the whole universe from its own perspective.
• Pre-established harmony: God programmed all monads to harmonize.
• 'Best of all possible worlds' — satirized by Voltaire in Candide.`,
tags:["descartes","spinoza","leibniz","rationalism","cogito","mind-body","monadology","1596 CE","philosophy","god nature","cartesian"]},

{y:1632,r:"Science, Philosophy & Discovery",t:"Empiricism — Locke, Berkeley & Hume",s:"England / Ireland / Scotland",type:"science",
d:`BRITISH EMPIRICISM (~1632–1780 CE): Knowledge comes primarily from SENSORY EXPERIENCE, not innate reason.

JOHN LOCKE (1632–1704 CE): Essay Concerning Human Understanding.
• TABULA RASA: The mind at birth is a 'blank slate' — all knowledge comes from experience.
• PRIMARY vs SECONDARY QUALITIES: Primary (shape, size, motion) are in objects; secondary (color, taste, smell) are in the perceiver.
• Political philosophy: Two Treatises of Government — natural rights, consent of the governed, right of revolution. Jefferson's Declaration of Independence is directly derived from Locke.

GEORGE BERKELEY (1685–1753 CE): 'To be is to be perceived' (Esse est percipi).
• IDEALISM: Material objects don't exist independently — they exist only as ideas in minds. 'Is there a tree in the forest if nobody perceives it?' For Berkeley: God continuously perceives everything, so the world persists.

DAVID HUME (1711–1776 CE): The most radical and rigorous of the empiricists.
• Problem of INDUCTION: No amount of past observation can logically guarantee future events will follow the same pattern. ('The sun has risen every day' doesn't PROVE it will rise tomorrow.) This is the central problem of scientific reasoning — still unsolved.
• No persistent SELF: Experience reveals only a 'bundle of perceptions,' no continuous self.
• CAUSATION is a habit of mind, not observed in nature — we see A followed by B but never 'the cause itself.'
• Woke Kant from his 'dogmatic slumber.'
• Problem of Evil: Most famous philosophical challenge to the existence of God.`,
tags:["locke","berkeley","hume","empiricism","tabula rasa","induction","causation","1632 CE","philosophy","british","epistemology","problem of induction"]},

{y:1724,r:"Science, Philosophy & Discovery",t:"Kant — The Copernican Revolution in Philosophy",s:"Königsberg, Prussia (Kaliningrad, Russia)",type:"science",
d:`IMMANUEL KANT (1724–1804 CE): The greatest philosopher of the modern era. Never traveled more than 40 miles from Königsberg his entire life.

THE CRITICAL PHILOSOPHY:
• Critique of Pure Reason (1781): 'The Copernican Revolution in Philosophy.' Instead of asking how the mind conforms to objects, ask how objects conform to the mind. Space, time, and the categories of understanding (causality, substance, etc.) are imposed BY the mind ON experience — they are not 'out there' in the world.
• Critique of Practical Reason (1788): Ethics based entirely on reason.
• CATEGORICAL IMPERATIVE: 'Act only according to that maxim by which you can at the same time will that it become a universal law.' Secular, rational foundation for morality without God.
• Critique of Judgment (1790): Aesthetics and teleology.

SYNTHESIS: Reconciled rationalism (Descartes/Leibniz) with empiricism (Hume). We have a priori knowledge (space, time, causality) imposed by the mind, but all content of knowledge comes from experience. Things-in-themselves (noumena) are unknowable.

LEGACY: All subsequent philosophy is a response to Kant — German Idealism (Fichte, Schelling, Hegel), Utilitarianism (Mill's response), Existentialism, Phenomenology, Analytic philosophy. He defined the terms of the debate.

FAMOUS ROUTINES: So punctual that neighbors set their clocks by his daily walk. His walk was disrupted only twice — once reading Rousseau's Emile, once hearing of the French Revolution.`,
tags:["kant","königsberg","critique","categorical imperative","1724 CE","philosophy","copernican revolution","epistemology","ethics","noumena","german idealism"]},

{y:1770,r:"Science, Philosophy & Discovery",t:"Hegel, Marx & 19th Century Philosophy",s:"Germany",type:"science",
d:`19TH CENTURY PHILOSOPHY — GERMAN IDEALISM TO MARXISM:

GEORG HEGEL (1770–1831 CE): Most complex philosopher in history.
• DIALECTIC: Historical process unfolds through Thesis → Antithesis → Synthesis. Spirit (Geist) realizes itself through history.
• The Phenomenology of Spirit (1807) — consciousness's journey to absolute knowledge.
• 'The real is rational, the rational is real.'
• History has a direction and purpose — the progressive realization of freedom.
• Influenced: Marx, Kierkegaard, Existentialism, 20th century theology.

KARL MARX (1818–1883 CE): Applied Hegel's dialectic to material conditions (historical materialism).
• COMMUNIST MANIFESTO (1848, with Engels): 'Workers of the world, unite! You have nothing to lose but your chains.'
• Das Kapital (1867): Critique of capitalism — surplus value, alienation of labor, class struggle.
• 'Religion is the opium of the people.' 'Philosophers have interpreted the world; the point is to change it.'
• Created Communism — ideology that governed 1/3 of the world population in the 20th century.

SØREN KIERKEGAARD (1813–1855 CE): Father of Existentialism. Reaction against Hegel's system. The individual, not the system, is primary. Three stages of existence: aesthetic, ethical, religious. 'Leap of faith.' Subjective truth: 'Truth is subjectivity.'

FRIEDRICH NIETZSCHE (1844–1900 CE): 'God is dead.' Will to Power. Übermensch (Overman). Eternal Recurrence. Beyond Good and Evil. Genealogy of Morals — slave morality vs master morality. Influenced: existentialism, Nazism (misappropriated), postmodernism.`,
tags:["hegel","marx","kierkegaard","nietzsche","1770 CE","german idealism","dialectic","capitalism","communism","existentialism","philosophy","19th century"]},

{y:1859,r:"Science, Philosophy & Discovery",t:"Utilitarianism — Bentham, Mill & Modern Ethics",s:"England",type:"science",
d:`UTILITARIAN PHILOSOPHY (~1780–1900 CE): The correct action is the one that produces the greatest happiness for the greatest number.

JEREMY BENTHAM (1748–1832 CE): Founded Utilitarianism. Felicific Calculus: pleasure and pain can be measured and calculated. All legislation should maximize happiness and minimize suffering. Prison reform, animal rights ('The question is not, Can they reason? Nor, Can they talk? But, Can they suffer?'), opposition to slavery and capital punishment. Auto-icon: body preserved and displayed at University College London — still there today.

JOHN STUART MILL (1806–1873 CE): On Liberty (1859) — the most important work of liberal political philosophy. Harm Principle: the only justification for society limiting individual liberty is to prevent harm to others. Utilitarianism (1863): quality of pleasure matters, not just quantity. 'Better to be Socrates dissatisfied than a fool satisfied.' Pioneering feminist: The Subjection of Women (1869).

JOHN RAWLS (1921–2002 CE): A Theory of Justice (1971) — most influential political philosophy of the 20th century. VEIL OF IGNORANCE: Design a just society not knowing your own position in it (race, class, sex, talents). Two Principles: equal basic liberties; inequalities only justified if they benefit the least advantaged (Difference Principle).

PETER SINGER (1946–): Practical Ethics. Utilitarian animal rights — suffering of any sentient being morally equivalent. Effective Altruism movement. His work has influenced billions of dollars in charitable giving.`,
tags:["utilitarianism","bentham","mill","rawls","singer","philosophy","harm principle","1859 CE","liberty","justice","veil of ignorance","ethics"]},

{y:1880,r:"Science, Philosophy & Discovery",t:"Existentialism — Sartre, Camus & Heidegger",s:"France / Germany",type:"science",
d:`EXISTENTIALISM (~1840–1970 CE): Existence precedes essence. Humans first exist, then define themselves through choices. No predetermined human nature or divine purpose.

MARTIN HEIDEGGER (1889–1976 CE): Being and Time (1927). The question of Being — what does it mean TO BE? Dasein (Being-there): human existence as always already in the world, temporal, oriented toward death. Authenticity vs inauthenticity (das Man — 'the They'). Nazi party member (NSDAP) 1933 — his most controversial aspect. Influence: enormous on Continental philosophy, literary theory, AI researchers.

JEAN-PAUL SARTRE (1905–1980 CE): Being and Nothingness (1943). 'Existence precedes essence.' 'Man is condemned to be free.' 'Hell is other people' (No Exit). Bad faith (mauvaise foi): self-deception about one's freedom. Engagement: the intellectual has a responsibility to engage with political reality. Refused the Nobel Prize in Literature (1964) — 'A writer should not become an institution.'

SIMONE DE BEAUVOIR (1908–1986 CE): The Second Sex (1949) — foundational text of feminist philosophy. 'One is not born a woman, but rather becomes one.' Gender as social construction. Long-term partner of Sartre (open relationship).

ALBERT CAMUS (1913–1960 CE): The Myth of Sisyphus — 'There is but one truly serious philosophical problem, and that is suicide.' The Absurd: tension between humans' need for meaning and the universe's silence. Response: revolt, freedom, passion. 'One must imagine Sisyphus happy.' The Stranger, The Plague. Nobel Prize 1957.`,
tags:["existentialism","sartre","heidegger","camus","beauvoir","1880 CE","philosophy","absurd","being and time","second sex","freedom","20th century"]},

{y:130,r:"Science, Philosophy & Discovery",t:"Islamic & Medieval Astronomy — Al-Battani to Ulugh Beg",s:"Baghdad → Samarkand",type:"science",
d:`ISLAMIC GOLDEN AGE ASTRONOMY (9th–15th century / 3rd–9th century AH):

AL-BATTANI / ALBATEGNIUS (858–929 CE / 244–317 AH): 'The Ptolemy of the Arabs.'
• Calculated solar year as 365 days, 5 hours, 46 minutes, 24 seconds (actual: 365 days, 5 hours, 48 min, 46 sec — off by only 2 min 22 sec)
• Corrected Ptolemy's measurements of the Sun and Moon
• Discovered that the direction of the Sun's elliptical orbit changes over time (solar apogee motion)
• First to use trigonometry for astronomy (introduced sine and tangent functions)
• His work translated into Latin — cited by Copernicus, Kepler, Galileo, Tycho Brahe

AL-BIRUNI (973–1048 CE / 362–440 AH): Determined Earth's radius by measuring the dip of the horizon from a mountain top — calculated 6,339.9 km (actual: 6,356.7 km — off by 0.27%). First person to discuss the Earth's rotation and to suggest that the universe is much larger than thought.

IBN AL-HAYTHAM (965–1040 CE / 354–430 AH): Explained why the sky is blue (atmospheric scattering). First to explain why the Moon appears larger at the horizon than at zenith (the Moon illusion — psychological, not physical).

NASIR AL-DIN AL-TUSI (1201–1274 CE / 598–672 AH): Built the Maragha Observatory (1259) in Iran — first purpose-built research observatory. Invented the Tusi Couple — mathematical device that converts circular motion to linear motion. Copernicus used this device in his heliocentric model (from Arabic manuscripts).

ULUGH BEG (1394–1449 CE / 796–853 AH): Samarkand Observatory (built ~1420 CE). Star catalog of 1,018 stars — more accurate than Hipparchus's. Calculated sidereal year to within 58 seconds. The 11m-high sextant's arc carved directly into bedrock — still partially standing today.`,
tags:["al-battani","al-biruni","ibn al-haytham","al-tusi","ulugh beg","islamic astronomy","baghdad","samarkand","observatory","golden age","1 AH","astronomy"]},

{y:1560,r:"Science, Philosophy & Discovery",t:"Tycho Brahe — Master of Naked-Eye Astronomy",s:"Denmark / Prague",type:"science",
d:`TYCHO BRAHE (1546–1601 CE): Last and greatest naked-eye astronomer — worked before the telescope was invented.

BIOGRAPHY: Danish nobleman. Lost his nose in a duel over a mathematical argument — wore a metal prosthetic (copper or silver). Had a pet moose which fell down stairs and died after drinking too much beer. Built Uraniborg ('Castle of the Sky') on the Danish island of Hven — the world's first purpose-built astronomical research institute.

ASTRONOMICAL ACHIEVEMENTS:
• Most precise naked-eye star catalog ever made: 777 stars with unprecedented accuracy (to 1 arcminute)
• Observed the supernova of 1572 (now called Tycho's Supernova) — proved the stars are not unchanging, as Aristotle claimed
• Observed the comet of 1577 — calculated it was farther than the Moon, disproving the crystalline spheres model
• Measured Mars's orbit with extraordinary precision

THE TYCHONIC SYSTEM: Compromise between Ptolemy and Copernicus — Earth at center, Sun orbiting Earth, planets orbiting the Sun. Wrong but mathematically equivalent to Copernicus at the time.

KEPLER'S DEBT: Brahe's precise observations of Mars were used by his assistant Kepler to discover that planetary orbits are ellipses, not circles. Brahe's data made Kepler's work possible. Brahe died before accepting Kepler's conclusions. Their relationship was famously turbulent.`,
tags:["tycho brahe","astronomy","denmark","uraniborg","supernova","1572","kepler","1546 CE","naked eye","star catalog","prague"]},

{y:1571,r:"Science, Philosophy & Discovery",t:"Johannes Kepler — Laws of Planetary Motion",s:"Württemberg, Germany",type:"science",
d:`JOHANNES KEPLER (1571–1630 CE): The first theoretical astrophysicist.

THREE LAWS OF PLANETARY MOTION:
1. FIRST LAW (1609): Planets move in ELLIPSES with the Sun at one focus. (Not circles — overturned 2,000 years of circular orbit assumption from Plato through Copernicus)
2. SECOND LAW (1609): A line from the Sun to a planet sweeps EQUAL AREAS in equal times. (Planets move faster when closer to the Sun)
3. THIRD LAW (1619): The SQUARE of a planet's orbital period is proportional to the CUBE of its average distance from the Sun. (P² ∝ a³)

Newton derived his Law of Universal Gravitation from Kepler's Third Law. Kepler's Laws remain perfectly accurate for describing planetary motion.

PERSONAL LIFE: Born premature, nearly died of smallpox at 4, had perpetually poor health. His mother was accused of witchcraft and he spent 6 years defending her. Fought poverty throughout his life. His first wife died; his second marriage described in letters as 'more rational than romantic.' Used Tycho Brahe's data — obtained after years of a difficult professional relationship.

OTHER WORKS: Astronomia Nova (1609), Harmonices Mundi (1619 — planetary harmony and music), Somnium (1634) — arguably the first science fiction story (a dream journey to the Moon).

OPTICS: Explained how the eye and telescope work. First to suggest tidal forces. First to understand stellar parallax.`,
tags:["kepler","laws of motion","ellipse","astronomy","1571 CE","planetary","newton","tycho","harmonics","optics","germany"]},

{y:1642,r:"Science, Philosophy & Discovery",t:"Galileo Galilei — Father of Observational Astronomy",s:"Pisa → Florence → Padua",type:"science",
d:`GALILEO GALILEI (1564–1642 CE): 'Father of Modern Science.' Born same year as Shakespeare died.

TELESCOPE: Improved Lippershey's invention (1608) to 20× magnification. Turned it on the sky for the first time with systematic intent (1609).

DISCOVERIES (1609–1610):
• Four moons of Jupiter (Io, Europa, Ganymede, Callisto) — named 'Galilean moons.' Proved not everything orbits Earth.
• Phases of Venus — proved Venus orbits the Sun.
• Mountains and craters on the Moon — not a perfect sphere (contra Aristotle).
• Sunspots — the Sun is not perfect and unchanging (contra Aristotle).
• Stars in the Milky Way — far too many to count.

PHYSICS:
• Uniform acceleration: all objects fall at the same rate regardless of mass (Leaning Tower of Pisa demonstration — probably legendary but the finding is correct).
• Pendulum isochronism.
• Law of inertia (precursor to Newton's First Law).
• Projectile motion as parabola.

THE INQUISITION (1633): Summoned to Rome for defending heliocentrism in Dialogue Concerning the Two Chief World Systems (1632). Forced to recant. Placed under house arrest for life. Reportedly muttered 'Eppur si muove' (And yet it moves) — probably legendary. Newton was born the year Galileo died.

SCIENTIFIC METHOD: Galileo insisted on mathematical description and experimental verification — the foundation of modern science.`,
tags:["galileo","telescope","1564","moons of jupiter","phases venus","inquisition","pisa","physics","astronomy","scientific method","italy"]},

{y:1838,r:"Science, Philosophy & Discovery",t:"19th–20th Century Astronomy — Stars, Galaxies & Relativity",s:"Global",type:"science",
d:`THE SCALE OF THE UNIVERSE REVEALED:

STELLAR DISTANCES (1838): Friedrich Bessel measures first stellar parallax — distance to 61 Cygni: 10.3 light-years (actual: 11.4). First direct measurement of a star's distance beyond the Solar System.

SPECTROSCOPY (1814–1850s): Joseph von Fraunhofer discovers dark lines in solar spectrum. Gustav Kirchhoff and Robert Bunsen (1859): each element produces a unique spectral 'fingerprint.' We can determine the chemical composition of stars across the universe from their light alone.

HENRIETTA SWAN LEAVITT (1868–1921): Discovered the Period-Luminosity relationship of Cepheid variable stars (1908) — the 'Standard Candle' for measuring cosmic distances. This discovery allowed Edwin Hubble to measure the distance to other galaxies. One of the most important astronomical discoveries ever made, by a woman who worked as a 'computer' (human calculator) at Harvard for 25 cents/hour.

EDWIN HUBBLE (1889–1953): Proved (1923–24) that the Andromeda 'nebula' is actually a separate galaxy — 2.5 million light-years away. The universe is vastly larger than the Milky Way. Hubble's Law (1929): galaxies are receding — their speed proportional to distance. This is the observational foundation of the Big Bang theory.

GEORGES LEMAÎTRE (1894–1966): Catholic priest and physicist. Proposed the expanding universe (1927) and the 'primeval atom' (Big Bang, 1931) — the universe began as a single point of infinite density.

BIG BANG (1948 theoretical, confirmed): George Gamow predicted the Cosmic Microwave Background (CMB). Discovered by Penzias and Wilson (1965) — Nobel Prize 1978.`,
tags:["hubble","leavitt","lemaitre","big bang","spectroscopy","stellar parallax","1838 CE","astronomy","galaxies","expanding universe","CMB","standard candle"]},

{y:1915,r:"Science, Philosophy & Discovery",t:"Modern Cosmology — Black Holes, Dark Matter & Webb",s:"Global",type:"science",
d:`THE UNIVERSE IN THE 20TH–21ST CENTURY:

BLACK HOLES: Karl Schwarzschild (1916) — solved Einstein's equations from the WWI trenches, predicted the 'Schwarzschild radius' (event horizon). John Wheeler coined 'black hole' (1967). First black hole image: Event Horizon Telescope, M87 galaxy (April 10, 2019) — a black hole 6.5 billion solar masses, 55 million light-years away. First image of Milky Way's central black hole (Sagittarius A*): May 12, 2022.

DARK MATTER (1933): Fritz Zwicky observed galaxy clusters moving too fast for their visible mass to hold them together — proposed invisible 'dark matter.' Vera Rubin (1970s) confirmed it from galaxy rotation curves. Dark matter = ~27% of the universe. Still unidentified.

DARK ENERGY (1998): Saul Perlmutter, Brian Schmidt, Adam Riess — Nobel Prize 2011. Discovered the universe's expansion is ACCELERATING, not slowing down. The unknown force causing this = dark energy (~68% of the universe). Normal matter = only ~5%.

GRAVITATIONAL WAVES (2015): LIGO detects waves from two black holes merging 1.3 billion light-years away — confirmed Einstein's 1916 prediction. Sound of the collision: a 'chirp' lasting 0.2 seconds.

JAMES WEBB SPACE TELESCOPE (2022–present): Infrared telescope in orbit. Images galaxies from 13.6 billion years ago — 400 million years after the Big Bang. Analyzing atmospheres of exoplanets for biosignatures (signs of life).

EXOPLANETS: Michel Mayor and Didier Queloz (Nobel 2019) — first confirmed exoplanet orbiting a sun-like star (51 Pegasi b, 1995). Now: 5,500+ confirmed exoplanets.`,
tags:["black holes","dark matter","dark energy","gravitational waves","webb telescope","1915 CE","cosmology","big bang","LIGO","event horizon","exoplanets","vera rubin"]},

{y:-1447,r:"Prophets & Revelation",
t:"THE TAWRAT (Torah) — Revealed to Prophet Musa AS",
s:"Mount Sinai, Sinai Peninsula",type:"holy-book",endY:-1407,
d:`THE TAWRAT — The Scripture of Prophet Musa AS (Moses)

DATE OF REVELATION: ~1447 BCE (40 years before entering the Promised Land). The scholarly range is 1446–1400 BCE depending on the Exodus chronology used.

REVEALED TO: Prophet Musa AS (Moses) on Mount Sinai (Jabal Musa / Jabal at-Tur).

DURATION: The Tawrat was not revealed in one sitting but over the 40-year period of Musa AS's prophethood in the Sinai, with the core commandments and law given in concentrated form at Sinai. The complete Torah as described includes the law received over the full period of his mission.

WHAT IS THE TAWRAT?
In Islamic theology: A divine scripture (Kitab) sent by Allah directly to Musa AS, containing guidance, light, and law for Bani Israel (the Children of Israel). It is one of the four major divine scriptures.

Quran on the Tawrat:
• 'Indeed, We sent down the Torah, in which was guidance and light.' (5:44)
• 'And We gave Musa the Scripture, after We had destroyed the former generations, as enlightenment for the people.' (28:43)
• 'And We wrote for him on the Tablets the lesson to be drawn from all things.' (7:145)

KEY CONTENTS OF THE ORIGINAL TAWRAT (as understood in Islamic tradition):
— The Ten Commandments (Al-Wasa'il al-Ashr): monotheism, prohibition of idolatry, Sabbath observance, honour of parents, prohibition of murder, theft, adultery, false testimony
— Dietary laws (Halal/Haram for Bani Israel — stricter than Islamic law)
— Civil and criminal laws for the Israelite community
— Glad tidings of Prophet Isa AS and Prophet Muhammad ﷺ — the Quran explicitly states the Prophet ﷺ was described in the Tawrat and Injeel (7:157)

CURRENT STATUS — ISLAMIC POSITION:
The original Tawrat revealed to Musa AS has been altered, interpolated, and mixed with human commentary over centuries. What is called the Torah (Old Testament Pentateuch) today contains elements of the original divine revelation but is NOT the original Tawrat in its pure form. The Quran supersedes and corrects it.

LANGUAGE: Original: Hebrew (Ivrit). Translated to Greek (Septuagint, ~285 BCE), Aramaic (Targums), and later all major world languages.`,
tags:["tawrat","torah","holy book","musa","sinai","1447 BCE","revelation","scripture","bani israel","quran 5:44"]},

{y:-900,r:"Prophets & Revelation",
t:"THE ZABUR (Psalms) — Revealed to Prophet Dawud AS",
s:"Jerusalem, Kingdom of Israel",type:"holy-book",
d:`THE ZABUR — The Scripture of Prophet Dawud AS (David)

DATE: ~1000–970 BCE (during the reign of Dawud AS as King of Israel, traditionally dated to ~1010–970 BCE).

REVEALED TO: Prophet Dawud AS (David ibn Jesse).

DURATION OF REVELATION: Revealed over the period of his reign and prophethood. Dawud AS composed 150 psalms (according to tradition) throughout his lifetime.

WHAT IS THE ZABUR?
Zabur means 'inscriptions' or 'writings' in Arabic. In Islamic theology it is the divine scripture sent to Dawud AS.

Quran on the Zabur:
• 'And your Lord is most knowing of whoever is in the heavens and the earth. And We have made some of the prophets exceed others [in various ways], and to Dawud We gave the Zabur.' (17:55)
• 'And We have already written in the Zabur after the [previous] mention that the land [of Paradise] is inherited by My righteous servants.' (21:105)

MIRACULOUS NATURE:
When Dawud AS recited the Zabur, mountains echoed his praise of Allah and birds gathered to glorify Allah with him (Quran 34:10). His voice was of extraordinary beauty — the most beautiful voice given to any human. Iron became soft in his hands like wax.

KEY THEMES (as understood from Islamic and historical sources):
— Praise and glorification of Allah
— Laments during trials and hardship
— Prophetic descriptions of future events
— Wisdom and justice
— Glad tidings of a final prophet

CURRENT STATUS — ISLAMIC POSITION:
The Book of Psalms in the current Bible contains elements derived from the Zabur, but the original pure revelation of Allah to Dawud AS has not been preserved in its original form. Much of the current Psalms is attributed to various authors beyond Dawud.

HISTORICAL NOTE: The Hebrew word 'Mizmor' (psalm) appears in 57 of the 150 psalms. The Arabic 'Zabur' and Hebrew 'Zimra' (song/psalm) share the same Semitic root Z-B-R.`,
tags:["zabur","psalms","holy book","dawud","david","900 BCE","revelation","scripture","jerusalem","quran 17:55"]},

{y:-4,r:"Prophets & Revelation",
t:"THE INJEEL (Gospel) — Revealed to Prophet Isa AS",
s:"Galilee & Judea, Roman Palestine",type:"holy-book",endY:33,
d:`THE INJEEL — The Scripture of Prophet Isa AS (Jesus)

DATE: ~4 BCE – 33 CE. Isa AS began his prophetic mission at approximately age 30. His active ministry lasted ~3 years.

REVEALED TO: Prophet Isa ibn Maryam AS.

WHAT IS THE INJEEL?
In Islamic theology: A divine book (Kitab) revealed by Allah directly to Isa AS, containing guidance, light, and confirmation of the Tawrat while abrogating some of its laws.

Quran on the Injeel:
• 'And We sent, following in their footsteps, Isa, the son of Mary, confirming that which came before him in the Torah; and We gave him the Gospel (Injeel), in which was guidance and light.' (5:46)
• 'And let the People of the Gospel judge by what Allah has revealed therein.' (5:47)

KEY CONTENTS OF THE ORIGINAL INJEEL (Islamic understanding):
— Pure monotheism: 'O Children of Israel, worship Allah, my Lord and your Lord.' (5:72)
— Confirmation and partial abrogation of the Tawrat
— Glad tidings of Prophet Muhammad ﷺ by name ('Ahmad'): 'And when Isa, the son of Mary, said: O children of Israel! Lo! I am the messenger of Allah unto you, confirming that which was before me in the Torah, and bringing good tidings of a messenger who will come after me, whose name is Ahmad (the Praised One).' (61:6)
— Healing of the sick, raising of the dead — recorded in the Injeel
— Ethical and spiritual teachings: mercy, compassion, humility

CURRENT STATUS — ISLAMIC POSITION:
The four Gospels of the New Testament (Matthew, Mark, Luke, John) are NOT the original Injeel. They are accounts ABOUT Isa AS, written by different authors 40–100 years after his time, in Greek (Isa AS spoke Aramaic). The original Injeel as revealed to Isa AS is not preserved. What remains contains elements of truth mixed with later human additions and theological interpretations.

KEY DIFFERENCE FROM CHRISTIANITY:
Islam holds Isa AS as a mighty prophet and messenger, born of a virgin, but NOT the Son of God. 'It is not [befitting] for Allah to take a son; exalted is He!' (19:35). The Trinity is rejected: 'Say not three; cease!' (4:171).`,
tags:["injeel","gospel","holy book","isa","jesus","4 BCE","33 CE","revelation","scripture","maryam","ahmad","quran 5:46","quran 61:6"]},

{y:610,r:"Prophets & Revelation",
t:"THE QURAN — Revealed to Prophet Muhammad ﷺ",
s:"Mecca & Madinah, Arabian Peninsula",type:"holy-book",endY:632,
d:`THE QURAN — The Final and Preserved Word of Allah

DATE OF REVELATION: 610 CE – 632 CE. A period of 22 years, 2 months, and 22 days (approximately).
• Meccan period (610–622 CE): 86 Surahs, 12 years — themes of monotheism, afterlife, prophethood, stories of earlier prophets
• Medinan period (622–632 CE): 28 Surahs, 10 years — themes of law, governance, family, worship, relations between communities

FIRST REVELATION: Ramadan 610 CE. Cave Hira, Jabal al-Nour, Mecca. 'Iqra bismi Rabbika alladhi khalaq.' (Read in the name of your Lord who created.) — First 5 verses of Surah Al-Alaq (96:1-5).

LAST REVELATION: ~9 Dhul Hijjah 10 AH / March 632 CE on the plain of Arafat (according to the most accepted scholarly opinion): 'Today I have perfected your religion for you, completed My favour upon you, and chosen Islam as your religion.' (5:3)

WHAT MAKES THE QURAN UNIQUE AMONG ALL SCRIPTURES:

1. ONLY SCRIPTURE PRESERVED IN ORIGINAL LANGUAGE:
The Quran is the only divine scripture still existing in the exact language in which it was revealed — classical Arabic. Not translated, not paraphrased.

2. MEMORISATION (HIFZ):
From the moment of revelation, companions memorised it completely. The Prophet ﷺ had multiple kuttab al-wahy (scribes of revelation). Hundreds of Huffaz (memorisers) existed in his lifetime. Today: estimated 10+ million people have memorised every word of the 604-page Quran in its original Arabic.

3. COMPILATION:
— Abu Bakr RA (11–13 AH): First written compilation — all pieces gathered, verified by two witnesses each
— Uthman RA (23–35 AH): Standardised single authoritative mushaf — exact copy we have today
— The mushaf has not changed by a single letter in 1,400 years. The same text in every mosque in every country.

STRUCTURE:
• 114 Surahs (chapters)
• 6,236 verses (ayat)
• 77,430+ words
• 323,671 letters
• Arranged roughly by length (longest to shortest), not chronologically
• Every Surah begins with Bismillah ar-Rahman ar-Rahim except Surah 9 (Al-Tawbah)

INIMITABILITY (IJAZ):
Quran challenges all of humanity: 'Say: If mankind and jinn gathered together to produce the like of this Quran, they could not produce the like of it, even if they supported one another.' (17:88). And: 'Produce then a surah like it.' (10:38) — This challenge stands for 1,400 years, unanswered.

ISLAMIC AH CALENDAR: First revelation: Ramadan, 13 BH (Before Hijra). Final revelation: ~10 AH. Islamic calendar begins from 1 AH (622 CE — the Hijra). The Quran was revealed across both BH and AH periods.`,
tags:["quran","holy book","muhammad","610 CE","632 CE","1 AH","10 AH","revelation","final scripture","arabic","preserved","hifz","compilation","ijaz","mecca","madinah"]},
