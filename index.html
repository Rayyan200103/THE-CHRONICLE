{y:-624,r:"Science, Philosophy & Discovery",
t:"Pre-Socratic Philosophers — The First Rational Thinkers",
s:"Miletus, Ephesus, Elea — Ionia (modern Turkey)",type:"science",
d:`THE PRE-SOCRATICS (~624–400 BCE) — Humanity's First Rational Cosmologists

These thinkers were the first in recorded history to ask 'What is the universe made of?' and attempt to answer using reason rather than mythology. All dates are BCE (Before Common Era).

THALES OF MILETUS (~624–546 BCE):
• Born: Miletus, Ionia (modern Turkey) ~624 BCE
• The first philosopher in the Western tradition — Aristotle called him the originator of philosophy
• Predicted the solar eclipse of May 28, 585 BCE — verified by modern astronomers
• Proposed that water (hydor) is the fundamental substance of all things
• First to attempt geometrical proofs — calculated height of Egyptian pyramids using shadow measurement
• Said to have fallen into a well while looking at stars (first 'absent-minded professor' anecdote)

ANAXIMANDER (~610–546 BCE):
• Student of Thales. Introduced the concept of the 'apeiron' (the Boundless/Infinite) as the source of all things
• First known person to draw a map of the world
• Proposed that life originated in moisture and that humans evolved from fish-like creatures — an early proto-evolutionary idea

ANAXIMENES (~585–525 BCE): Proposed air (aer) as the primary substance

HERACLITUS (~535–475 BCE): Born Ephesus. 'You cannot step into the same river twice.' Everything is in constant flux (panta rhei — everything flows). Fire as the fundamental element. The Logos (rational principle underlying all change). Influenced Stoicism.

PARMENIDES (~515–450 BCE): Born Elea (southern Italy). Founder of the Eleatic school. Reality is One, eternal, unchanging — change and multiplicity are illusions. Deeply influenced Plato.

PYTHAGORAS (~570–495 BCE): Born Samos island (~570 BCE). Migrated to Croton (southern Italy).
• Pythagorean theorem (a² + b² = c²) — though known in Babylon/Egypt earlier, he provided the first proof
• First to propose that Earth is a sphere (6th century BCE)
• Numerical harmony underlying music and cosmos
• Founded a philosophical brotherhood/commune. Believed in transmigration of souls (metempsychosis)
• Said to have coined the word 'philosopher' (lover of wisdom) and 'mathematics'

DEMOCRITUS (~460–370 BCE): Born Abdera, Thrace. The Atomic Theory — all matter consists of indivisible units called 'atoms' (atomos = uncuttable). Atoms move in void. This idea, proposed 2,400 years ago, is essentially modern atomic theory. Also: 'Nothing exists except atoms and empty space; everything else is opinion.'

EMPEDOCLES (~494–434 BCE): Born Akragas, Sicily. Four elements: earth, water, fire, air — combined and separated by Love and Strife. First to describe light as having a finite (though very fast) travel speed.`,
tags:["pre-socratic","thales","anaximander","pythagoras","heraclitus","parmenides","democritus","philosophy","miletus","ionia","624 BCE","ancient","atoms","sphere"]},

{y:-470,r:"Science, Philosophy & Discovery",
t:"Socrates — Father of Western Philosophy",
s:"Athens, Greece",type:"science",
d:`SOCRATES (~470–399 BCE)
Born: Athens, Greece, ~470/469 BCE
Died: Athens, 399 BCE (executed by hemlock, age ~71)
School: No formal school — taught in the agora (marketplace), gymnasium, symposia

LIFE:
Son of Sophroniscus (sculptor) and Phaenarete (midwife). His mother's profession inspired his metaphor of 'intellectual midwifery' — helping others give birth to ideas.
Served as a hoplite (infantry soldier) in the Peloponnesian War — fought at Potidaea (432 BCE), Delium (424 BCE), and Amphipolis (422 BCE). Known for remarkable physical endurance.

Married Xanthippe (legendary for being difficult). Three sons. Lived in poverty by choice.

THE SOCRATIC METHOD (Elenchus):
Systematic questioning to expose contradictions and arrive at truth. Feigned ignorance ('Socratic irony') to draw out interlocutors' hidden assumptions. Said: 'I know that I know nothing' — the beginning of wisdom is acknowledging ignorance.

BELIEFS:
• 'The unexamined life is not worth living'
• The soul (psyche) is immortal and the most important thing a person has
• Virtue (arete) is knowledge — no one does evil willingly; wrongdoing comes from ignorance
• Justice, piety, courage, temperance are virtues to be pursued
• Cared nothing for material wealth: 'I am not an Athenian or a Greek but a citizen of the world'

TRIAL AND DEATH (399 BCE):
Charged with: (1) impiety — not honouring Athenian gods, introducing new divinities (his 'daimon' — inner voice); (2) corrupting the youth of Athens.
Jury of 501 Athenians. Found guilty by 280–221 votes.
Refused to flee (could have). Drank hemlock calmly while discussing the immortality of the soul with friends.
His death is recorded in Plato's 'Phaedo' — one of the most moving scenes in all literature.

LEGACY: Wrote nothing himself. Known through his students — primarily PLATO. His questioning method is still used in law schools (Socratic method). Philosophy, ethics, epistemology, and Western moral reasoning all trace back to him.`,
tags:["socrates","philosophy","athens","470 BCE","399 BCE","socratic method","ethics","hemlock","agora","plato","ancient greece"]},

{y:-428,r:"Science, Philosophy & Discovery",
t:"Plato — Theory of Forms & The Academy",
s:"Athens, Greece",type:"science",
d:`PLATO (~428/427 BCE – 348/347 BCE)
Born: Athens, Greece, ~428/427 BCE (some modern scholars argue 424/423 BCE)
Died: Athens, ~348/347 BCE (age ~80)
School: The ACADEMY — founded ~387 BCE in Athens. The world's first institution of higher learning. Operated for 916 years until 529 CE (when Emperor Justinian closed it as 'pagan'). Motto on the door: 'Let no one ignorant of geometry enter here.'

LIFE:
Born into an aristocratic Athenian family. Original name: Aristocles — 'Plato' was a nickname ('broad' — possibly referring to his broad shoulders or forehead). Student of Socrates from ~407 BCE until Socrates' death in 399 BCE. Socrates' execution traumatised him.
Travelled extensively: Megara, Egypt, Cyrene (North Africa), southern Italy (Pythagorean communities), Sicily.
Made three trips to Syracuse (Sicily) attempting to create the ideal philosopher-king state under Dionysius I and II — all failed.

WORKS (the most complete surviving corpus from any ancient philosopher):
Early dialogues: Apology, Crito, Euthyphro, Phaedo
Middle dialogues: Meno, Symposium, Phaedrus, Republic
Late dialogues: Parmenides, Theaetetus, Timaeus, Laws

THE THEORY OF FORMS:
The physical world is a shadow/imitation of a higher realm of perfect eternal Forms (Ideas). The Form of the Good is the supreme Form — the source of all being and truth. 'The Allegory of the Cave' (Republic Book VII): prisoners in a cave mistake shadows for reality — philosophy is the process of turning toward the light.

THE REPUBLIC (Politeia):
• The ideal city-state governed by philosopher-kings (those who know the Form of the Good)
• Three-part soul: rational (logos), spirited (thymos), appetitive (eros) — corresponding to rulers, soldiers, producers
• Five types of government: aristocracy → timocracy → oligarchy → democracy → tyranny
• Theory of Justice: each part of the soul (and city) performing its proper function

COSMOLOGY (Timaeus): The universe created by a divine craftsman (Demiurge) based on eternal Forms. The Timaeus directly influenced Islamic, Jewish, and Christian theology of creation.

A.N. Whitehead: 'The safest general characterisation of the European philosophical tradition is that it consists of a series of footnotes to Plato.'`,
tags:["plato","philosophy","athens","428 BCE","academy","theory of forms","republic","allegory of cave","philosopher king","socrates","aristotle","ancient greece"]},

{y:-384,r:"Science, Philosophy & Discovery",
t:"Aristotle — The First Scientist, Student of Plato",
s:"Stagira → Athens → Macedonia → Alexandria",type:"science",
d:`ARISTOTLE (384 BCE – 322 BCE)
Born: Stagira, a small city-state in northeastern Greece, in the region of Chalcidice near Macedonia, 384 BCE
Died: Chalcis, Euboea, 322 BCE (age 62)
School: The LYCEUM — founded ~335 BCE in Athens. Peripatetic school (from 'peripatos' = covered walkway — Aristotle walked while lecturing).

LIFE:
Father: Nicomachus — personal physician to King Amyntas III of Macedon (grandfather of Alexander the Great). This medical background gave Aristotle early exposure to biological observation.
Joined Plato's Academy at age 17 (~367 BCE). Remained 20 years until Plato's death (347 BCE).
When Plato died, Aristotle was not chosen to lead the Academy (possibly due to philosophical differences). Left for Assos (Turkey), then Lesbos island (where he conducted his famous marine biology research).

TUTORED ALEXANDER THE GREAT (343–340 BCE): At invitation of King Philip II of Macedon. Taught the 13-year-old Alexander rhetoric, philosophy, medicine, and science. Alexander reportedly said: 'I am indebted to my father for living, but to my teacher for living well.'

RETURNED TO ATHENS (~335 BCE): Founded the Lyceum. Wrote prolifically — 200+ works. Only ~31 survive (lecture notes, not polished writings). His lost works were said to be more elegant than his surviving ones.

SCOPE OF HIS WORK (the greatest single intellectual output in history):
LOGIC: Organon — invented formal logic (syllogisms). 'If all A are B, and all B are C, then all A are C.' Dominated logical thinking for 2,000 years.
BIOLOGY: History of Animals, Parts of Animals, Generation of Animals — described 540+ animal species. Identified dolphins as mammals. The most systematic naturalist until Darwin. Darwin said: 'Linnaeus and Cuvier have been my two gods, though in very different ways, but they were mere schoolboys compared to old Aristotle.'
PHYSICS: Proposed four causes (material, formal, efficient, final). Described motion, space, time.
METAPHYSICS: 'Being qua being.' The Prime Mover (Unmoved Mover) — eternal, pure intellect that is the cause of all motion without being moved itself (influenced Islamic theology of Allah greatly, especially via Ibn Rushd).
ETHICS: Nicomachean Ethics — eudaimonia (happiness/flourishing) as the highest good. Virtue ethics: courage is the mean between cowardice and rashness.
POLITICS: Analysed 158 constitutions. 'Man is by nature a political animal.' Three good governments (monarchy, aristocracy, polity) vs three corrupt forms (tyranny, oligarchy, democracy).
POETICS: Defined tragedy, catharsis, mimesis.
RHETORIC: Three modes of persuasion: ethos (character), pathos (emotion), logos (logic).

LEGACY: His works were translated into Arabic by Islamic scholars (especially Hunayn ibn Ishaq and Al-Farabi) — preserving them through Europe's Dark Ages. Ibn Rushd's (Averroes) commentaries on Aristotle directly sparked the European Renaissance. Thomas Aquinas synthesised Aristotle with Christian theology. He is simply called 'The Philosopher' in medieval scholarship.`,
tags:["aristotle","philosophy","384 BCE","stagira","lyceum","logic","biology","metaphysics","ethics","politics","alexander the great","plato","ancient greece","peripatetic"]},

{y:-341,r:"Science, Philosophy & Discovery",
t:"Epicurus, Zeno of Citium & the Hellenistic Schools",
s:"Athens, Greece",type:"science",
d:`THE HELLENISTIC PHILOSOPHICAL SCHOOLS (~341–264 BCE onward)

EPICURUS (341–270 BCE):
Born: Samos island, 341 BCE. Moved to Athens, founded the GARDEN (Kepos) school ~307 BCE.
Philosophy: Epicureanism — the highest good is ataraxia (tranquillity) and aponia (absence of pain). Pleasure (hedone) is the beginning and end of the blessed life — but not excess. The greatest pleasures are friendship, philosophical discussion, and simple living.
Atomic theory: followed Democritus. Atoms move by swerve (clinamen) — introducing free will into a deterministic universe.
On death: 'Death is nothing to us — when we exist, death is not; when death exists, we do not.' Enormously influential on Lucretius (De Rerum Natura) and later Enlightenment thinkers.

ZENO OF CITIUM (~334–262 BCE):
Born: Citium (Kition), Cyprus, ~334 BCE. Moved to Athens ~311 BCE. Founded STOICISM (~301 BCE) in the Stoa Poikile (Painted Porch).
Core doctrine: Virtue (arete) is the only good. Live 'according to nature.' Reason (logos) governs the cosmos. What we cannot control is indifferent (adiaphora) — accept it with equanimity.
Emotions (passions) are failures of reason — the wise man controls them through rational understanding.
Major Stoics: Cleanthes, Chrysippus (who systematised it), later Seneca, Epictetus, Marcus Aurelius (Roman period).
LEGACY: Stoicism is arguably the most influential philosophical school in Western history — influenced Christianity, Islamic philosophy, modern Cognitive Behavioral Therapy (CBT directly draws on Stoic techniques), and leadership philosophy.

PYRRHON OF ELIS (~360–270 BCE):
Founder of Pyrrhonism/Scepticism. Accompanied Alexander's campaigns to India — encountered Indian Gymnosophists (naked philosophers). Concluded: we cannot know anything with certainty. Suspended judgement on all questions (epoche) leads to tranquillity (ataraxia).`,
tags:["epicurus","zeno","stoicism","epicureanism","scepticism","garden","stoa","341 BCE","hellenistic","philosophy","athens","greece","CBT"]},

{y:-300,r:"Science, Philosophy & Discovery",
t:"Euclid — Foundations of Geometry",
s:"Alexandria, Egypt",type:"science",
d:`EUCLID (~325–265 BCE)
Born: ~325 BCE (birthplace unknown — possibly Tyre, Megara, or Alexandria)
Active in: Alexandria, Egypt, under Ptolemy I Soter (~300 BCE)
Died: ~265 BCE

ELEMENTS (Stoicheia) — Published ~300 BCE:
13 books of geometry and number theory — the most successful and influential mathematics textbook in history. Used in schools for over 2,000 years (into the 20th century).

CONTENTS:
• Books 1–4: Plane geometry (the famous 5 postulates including the parallel postulate)
• Books 5–6: Proportion theory (attributed to Eudoxus)
• Books 7–9: Number theory (prime numbers, greatest common divisor, infinite primes)
• Books 10: Irrational numbers
• Books 11–13: Solid geometry (platonic solids — tetrahedron, cube, octahedron, dodecahedron, icosahedron)

EUCLID'S FIVE POSTULATES:
1. A straight line can be drawn between any two points
2. A line can be extended infinitely
3. A circle can be drawn with any centre and radius
4. All right angles are equal
5. The parallel postulate (only one line through a point parallel to another line)
The 5th postulate being 'different' led to Non-Euclidean geometry in the 19th century (Lobachevsky, Riemann) — which Einstein used for General Relativity.

ANECDOTE: When Ptolemy I asked if there was a shorter road to geometry, Euclid replied: 'There is no royal road to geometry.'

WHEN ASKED the use of geometry, Euclid told a student who asked 'What do I gain by learning this?' to give him a coin 'since he must make profit from what he learns.'`,
tags:["euclid","geometry","elements","300 BCE","alexandria","mathematics","postulates","axioms","primes","ancient"]},

{y:-287,r:"Science, Philosophy & Discovery",
t:"Archimedes — Greatest Mathematician of Antiquity",
s:"Syracuse, Sicily",type:"science",
d:`ARCHIMEDES (~287–212 BCE)
Born: Syracuse, Sicily (Greek colony), ~287 BCE
Died: Syracuse, 212 BCE (killed by Roman soldier during siege — age ~75)
Studied in: Alexandria, Egypt (under successors of Euclid)

DISCOVERIES:
ARCHIMEDES PRINCIPLE (Buoyancy, ~250 BCE): 'Eureka!' (I have found it!) — ran naked through the streets of Syracuse. An object immersed in fluid experiences an upward force equal to the weight of the fluid it displaces. Used to expose that King Hiero's crown was not pure gold (silver had been mixed in).

MATHEMATICAL WORK:
• Calculated π (pi) as between 3 10/71 and 3 1/7 (3.1408 and 3.1429) — more accurate than any previous estimate. Modern value: 3.14159265...
• Method of Exhaustion — used to calculate areas and volumes of curved shapes (precursor to integral calculus). Newton and Leibniz rediscovered the same principles 1,900 years later.
• Proved that the volume of a sphere is 2/3 of the cylinder circumscribing it. He asked for this theorem to be engraved on his tomb.
• Sand Reckoner: estimated the number of sand grains to fill the universe — inventing a system of large number notation in the process.

ENGINEERING INVENTIONS:
• Archimedean Screw: still used for irrigation worldwide
• Compound pulleys: 'Give me a place to stand and a lever long enough and I will move the world'
• War machines defending Syracuse against Rome: heat rays (disputed), claws that capsized ships, catapults

DEATH: The Roman general Marcellus ordered that Archimedes not be harmed. A Roman soldier found him drawing circles in the sand and demanded he come. Archimedes: 'Do not disturb my circles.' Soldier killed him. Marcellus mourned him.`,
tags:["archimedes","287 BCE","syracuse","mathematics","physics","eureka","pi","lever","buoyancy","geometry","calculus precursor","ancient"]},

{y:-276,r:"Science, Philosophy & Discovery",
t:"Eratosthenes — Measures Earth's Circumference",
s:"Cyrene (Libya) → Alexandria, Egypt",type:"science",
d:`ERATOSTHENES (~276–194 BCE)
Born: Cyrene, Libya (Greek colony), ~276 BCE
Died: Alexandria, Egypt, ~194 BCE (went blind in old age, died by voluntary starvation — preferred death to blindness)
Position: Chief Librarian of the Library of Alexandria

MEASUREMENT OF EARTH'S CIRCUMFERENCE (~240 BCE):
The most impressive scientific measurement of the ancient world.

METHOD:
At Syene (modern Aswan, Egypt) on the summer solstice, the sun shines directly down a well — it is directly overhead (0° angle). At Alexandria (800 km north) on the same day, a gnomon (vertical pole) casts a shadow of 7.2° (1/50th of a full circle).

CALCULATION: If 1/50th of a circle = 800 km, then full circle = 50 × 800 = 40,000 km.
ACTUAL VALUE: 40,075 km at the equator.
ERROR: Less than 2%. This is one of the most accurate scientific measurements before modern instrumentation.

OTHER ACHIEVEMENTS:
• Calculated Earth's axial tilt as 23.5° (correct to within 0.3°)
• Estimated the distance from Earth to the Sun as ~149 million km (modern value: 149.6 million km) — remarkably accurate
• Mapped the Nile's source (in Africa, correctly)
• Created the Sieve of Eratosthenes — algorithm for finding prime numbers, still used today
• Coined the word 'geography' (ge = earth, graphia = writing/mapping)
• Created the first systematic world map with latitude and longitude lines`,
tags:["eratosthenes","276 BCE","circumference","earth","alexandria","geography","prime sieve","astronomy","library","cyrene","measurement"]},

{y:-310,r:"Science, Philosophy & Discovery",
t:"Aristarchus of Samos — First Heliocentric Model",
s:"Samos island → Alexandria, Egypt",type:"science",
d:`ARISTARCHUS OF SAMOS (~310–230 BCE)
Born: Samos island, Greece, ~310 BCE
Active in: Alexandria, Egypt (~280–260 BCE)
Died: ~230 BCE

THE FIRST HELIOCENTRIC MODEL (c.270 BCE):
Aristarchus proposed — 1,800 years before Copernicus — that the Sun (not the Earth) is at the centre of the cosmos, and that the Earth and all planets revolve around it.

He also proposed that the Earth rotates on its own axis (causing day and night) — correct.

Archimedes mentions this in 'The Sand Reckoner': 'Aristarchus of Samos brought out a book consisting of certain hypotheses, wherein it appears... that the fixed stars and the sun remain unmoved, that the earth revolves about the sun in the circumference of a circle, the sun lying in the middle of the orbit.'

He was accused of impiety by the Stoic philosopher Cleanthes for 'moving the hearth of the universe.'

OTHER MEASUREMENTS:
• Calculated the relative distances of the Sun and Moon from Earth using lunar phases — first scientific attempt. His method was correct; his measurements were limited by naked-eye precision. He estimated the Sun is ~19 times farther than the Moon (actual: ~389 times). The method was right; the instruments were inadequate.
• Estimated the Sun is 18–20 times larger than the Moon in diameter — significantly underestimated but directionally correct.
• Correctly deduced the Sun is much larger than the Earth — which he gave as a REASON why it makes more sense for Earth to orbit the Sun, not vice versa.

WHY IGNORED? Aristotelian physics required the Earth to be at the centre. Hipparchus (~190–120 BCE) rejected Aristarchus's model and championed geocentrism — which was then adopted by Ptolemy (~100–170 CE) and dominated for 1,800 years.`,
tags:["aristarchus","310 BCE","heliocentric","samos","alexandria","sun","earth","orbit","astronomy","copernicus precursor","ancient"]},

{y:-190,r:"Science, Philosophy & Discovery",
t:"Hipparchus — Father of Astronomy",
s:"Nicaea (Turkey) → Rhodes, Greece",type:"science",
d:`HIPPARCHUS (~190–120 BCE)
Born: Nicaea, Bithynia (modern Turkey), ~190 BCE
Died: Rhodes (Greek island), after 127 BCE
Worked primarily at: Rhodes, Greece

THE GREATEST OBSERVATIONAL ASTRONOMER OF ANTIQUITY:

STELLAR CATALOGUE (~129 BCE):
First systematic star catalogue in history. Catalogued ~850 stars with positions and brightness (magnitude). His magnitude scale — 1 (brightest) to 6 (faintest to naked eye) — is still used today (with extensions).

DISCOVERY OF PRECESSION (~127 BCE):
By comparing his observations with those of Timocharis (~280 BCE), he discovered the precession of the equinoxes — the slow wobble of Earth's axis that takes ~26,000 years to complete one cycle. This is one of the greatest astronomical discoveries of antiquity.

TRIGONOMETRY:
Created the first known trigonometric table (chord function). Invented spherical trigonometry for astronomical calculations. The foundation of all subsequent trigonometry.

ASTRONOMICAL ACHIEVEMENTS:
• Measured the length of the solar year to within 6.5 minutes of the modern value
• Distance to the Moon: ~63 Earth radii (modern: 60.27) — remarkably accurate
• Predicted solar and lunar eclipses
• Discovered the irregular motion of the Moon

WHY FAMOUS: Hipparchus essentially created mathematical astronomy. Ptolemy (3 centuries later) built his Almagest primarily on Hipparchus's work, acknowledging him throughout.`,
tags:["hipparchus","190 BCE","astronomy","star catalogue","precession","trigonometry","rhodes","nicaea","magnitude","ancient","observation"]},

{y:-106,r:"Science, Philosophy & Discovery",
t:"Cicero — Roman Philosophy & Rhetoric",
s:"Arpinum → Rome, Italy",type:"science",
d:`MARCUS TULLIUS CICERO (106–43 BCE)
Born: Arpinum (modern Arpino), Latium, Italy, January 3, 106 BCE
Died: Formiae (modern Gaeta), December 7, 43 BCE (executed by Mark Antony's soldiers)

THE GREATEST LATIN PROSE WRITER AND ROME'S FOREMOST PHILOSOPHER:

PHILOSOPHICAL WORKS:
• De Re Publica (On the Republic, 54 BCE): Roman political philosophy — the ideal state
• De Legibus (On the Laws, 52 BCE): Natural law, justice
• De Finibus (On Ends, 45 BCE): Survey of Hellenistic ethics (Epicurean, Stoic, Platonic)
• Tusculan Disputations (45 BCE): Philosophy of death, pain, emotion, virtue
• De Officiis (On Duties, 44 BCE): How to live an ethical life — most read philosophical work in the Renaissance. Written for his son.
• De Natura Deorum (On the Nature of the Gods): Epicurean, Stoic, and Academic views on divinity

RHETORIC & ORATORY:
• De Oratore — greatest treatise on rhetoric in Latin
• Defended: Roscius Amerinus (his debut), Catilinarians (four speeches exposing the Catilinarian conspiracy that saved Rome) — earned him the title 'Father of the Fatherland' (Pater Patriae)

LATIN LANGUAGE:
Cicero invented or adapted ~25% of philosophical Latin vocabulary — translating Greek concepts. Without him, Latin philosophy would barely exist. Latin as a scholarly language owes its precision to him.

POLITICAL CAREER & DEATH:
Consul (63 BCE). Executed at age 63 — his hands cut off (which had written against Mark Antony in the Philippics) and his tongue nailed to the Rostra (public speaking platform). 

His works preserved Latin through the Middle Ages. Petrarch, Erasmus, and the Renaissance humanists worshipped him. Jefferson called the Tusculan Disputations among the finest books ever written.`,
tags:["cicero","106 BCE","rome","philosophy","rhetoric","latin","stoicism","republic","laws","offices","orator","ancient rome"]},

{y:4,r:"Science, Philosophy & Discovery",
t:"Seneca the Younger — Stoic Philosophy & Science",
s:"Córdoba (Spain) → Rome",type:"science",
d:`LUCIUS ANNAEUS SENECA (c. 4 BCE – 65 CE)
Born: Córdoba, Hispania (modern Córdoba, Spain), c. 4 BCE
Died: Rome, 65 CE (forced to commit suicide by Emperor Nero)
Roman: Senator, Dramatist, Stoic Philosopher

THE GREAT ROMAN STOIC:

PHILOSOPHICAL WORKS:
• Letters to Lucilius (Epistulae Morales, 65 CE): 124 letters on Stoic ethics, daily life, death, friendship. The most personal and approachable philosophical letters in antiquity.
• On the Brevity of Life (De Brevitate Vitae): 'It is not that we have a short time to live, but that we waste much of it. Life is long enough... if we deploy it properly.'
• On Anger: 'Anger is a brief madness.' Techniques for controlling the passions.
• On Tranquillity of Mind, On the Happy Life, On Providence

NATURAL PHILOSOPHY:
Natural Questions (Naturales Quaestiones): Systematic inquiry into natural phenomena — winds, clouds, earthquakes, comets, floods. First person to discuss the possibility of other inhabited worlds.

POLITICAL ROLE:
Tutor and advisor to Emperor Nero (54–62 CE). Attempted to moderate Nero's increasingly tyrannical behaviour. Nero's deterioration made Seneca's position untenable. Accused (possibly falsely) of involvement in the Pisonian Conspiracy. Required to end his own life. Died with Stoic composure — cut his veins, then took hemlock when bleeding was too slow.

MODERN RELEVANCE:
His Letters to Lucilius are among the most widely read philosophical texts today — regularly appearing in modern self-help and leadership literature. Tim Ferriss, Ryan Holiday, and others have brought Senecan Stoicism to millions.`,
tags:["seneca","4 BCE","stoicism","rome","philosophy","letters","brevity of life","nero","spain","ancient rome","natural philosophy"]},

{y:50,r:"Science, Philosophy & Discovery",
t:"Epictetus & Marcus Aurelius — Late Stoicism",
s:"Hierapolis (Turkey) → Rome",type:"science",
d:`EPICTETUS (~50–135 CE)
Born: Hierapolis, Phrygia (modern Pamukkale, Turkey), ~50 CE
Died: Nicopolis, Epirus (modern Greece), ~135 CE
Status: Born a SLAVE. Owned by Epaphroditus (a freedman of Emperor Nero).

THE MOST INFLUENTIAL STOIC AFTER THE ANCIENT MASTERS:

THE DICHOTOMY OF CONTROL:
'Some things are in our control and others not. Things in our control are opinion, pursuit, desire, aversion, and in a word, whatever are our own actions. Things not in our control are body, reputation, command, and in one word, whatever are not our own actions.' — Enchiridion (The Handbook), Chapter 1

This single idea — distinguishing what is 'up to us' from what is not — is the foundation of modern Cognitive Behavioral Therapy (CBT), Acceptance and Commitment Therapy (ACT), and much of modern resilience psychology.

TEACHING METHOD: Never wrote himself — his student Arrian took notes → Discourses (4 books) and Enchiridion.
'Seek not that the things which happen should happen as you wish; but wish the things which happen to be as they are, and you will have a tranquil flow of life.'

MARCUS AURELIUS (121–180 CE):
Born: Rome, April 26, 121 CE. Roman Emperor 161–180 CE.
THE PHILOSOPHER-KING — the closest reality ever came to Plato's ideal.
Meditations (written ~170–180 CE): Personal journal of Stoic self-reflection, never intended for publication. 12 books.
'You have power over your mind, not outside events. Realize this, and you will find strength.'
'The object of life is not to be on the side of the majority, but to escape finding oneself in the ranks of the insane.'
Fought the Germanic wars on the Danube frontier. Died at his military camp. The Antonine Dynasty's last great emperor.`,
tags:["epictetus","marcus aurelius","stoicism","50 CE","121 CE","meditations","enchiridion","slave","philosophy","CBT","rome","turkey"]},

{y:205,r:"Science, Philosophy & Discovery",
t:"Plotinus & Neo-Platonism — Philosophy Meets Mysticism",
s:"Alexandria (Egypt) → Rome",type:"science",
d:`PLOTINUS (205–270 CE)
Born: Lycopolis (Asyut), Egypt, 205 CE
Died: Campania, Italy, 270 CE
Studied under: Ammonius Saccas in Alexandria (11 years)

FOUNDER OF NEOPLATONISM — the most important philosophical development between Aristotle and the Islamic Golden Age:

THE ENNEADS (compiled by his student Porphyry after his death):
Six groups of nine treatises (Enneads = nines). The most systematic development of Platonic thought.

THE THREE HYPOSTASES (levels of reality):
1. THE ONE (To Hen): The ultimate principle — beyond all description, beyond being, beyond thought. The source of everything. Not God in a personal sense but the absolute unity from which all existence flows.
2. INTELLECT (Nous): The first emanation from the One. Contains the Platonic Forms. Divine Mind.
3. SOUL (Psyche): The second emanation. Generates the material world.

EMANATION THEORY: Reality flows from the One like light from the sun — without diminishing the source. The soul seeks to return to the One through contemplation (theoria) and ultimately mystical union.

INFLUENCE:
• Augustine of Hippo read Plotinus before converting to Christianity — deeply shaped Christian theology
• Directly influenced Islamic Sufism (especially the concept of fana — annihilation of the ego in divine union)
• Al-Farabi and Ibn Sina synthesised Neoplatonism with Islamic theology
• The 'Theology of Aristotle' (actually paraphrased Plotinus) was hugely influential on Islamic philosophy
• Influenced: Meister Eckhart, Giordano Bruno, Hegel, Bergson, and modern process theology`,
tags:["plotinus","205 CE","neoplatonism","enneads","one","intellect","soul","alexandria","philosophy","mysticism","augustine","sufism influence"]},

{y:780,r:"Science, Philosophy & Discovery",
t:"Al-Khwarizmi — Algebra, Algorithms & Indian Numerals",
s:"Khwarezm (Uzbekistan) → Baghdad",type:"science",
d:`MUHAMMAD IBN MUSA AL-KHWARIZMI (~780–850 CE / ~164–235 AH)
Born: Khwarezm, Central Asia (modern Uzbekistan/Turkmenistan border), ~780 CE
Died: Baghdad, ~850 CE
Position: Chief scholar at Bayt al-Hikmah (House of Wisdom), Baghdad, under Caliph Al-Ma'mun

THE MAN WHOSE NAME BECAME A WORD IN EVERY LANGUAGE:

ALGEBRA (Al-Kitab al-Mukhtasar fi Hisab al-Jabr wal-Muqabala, ~820 CE/~205 AH):
'The Compendious Book on Calculation by Completion and Balancing'
• The word ALGEBRA comes directly from 'al-jabr' in his title
• First systematic treatment of linear and quadratic equations
• Introduced the concept of solving equations by performing operations on both sides
• Before this: equations were solved case-by-case. Al-Khwarizmi provided general methods.

ALGORITHM:
• The word ALGORITHM is a Latinisation of his name: 'Algoritmi' (Latin transliteration of Al-Khwarizmi)
• His procedural, step-by-step method of solving problems IS what we now call an algorithm
• Every computer program — every piece of software in existence — is built on the algorithmic concept he established

INDIAN NUMERALS (Hindu-Arabic Numbers):
• Kitab al-Jam wal-Tafriq bi-Hisab al-Hind (On the Calculation with Hindu Numerals)
• Introduced the Hindu numeral system (0-9) to the Islamic world and through Latin translations to Europe
• Replaced Roman numerals (impossible to do arithmetic with)
• Without 0 and the positional number system: no calculus, no computers, no modern science

ASTRONOMY: Revised Ptolemy's Almagest using Indian mathematical methods. Astronomical tables (Zij) used by navigators and astronomers for centuries.`,
tags:["al-khwarizmi","780 CE","164 AH","algebra","algorithm","indian numerals","baghdad","house of wisdom","mathematics","abbasid","central asia"]},

{y:354,r:"Science, Philosophy & Discovery",
t:"Augustine of Hippo — Christian Philosophy & Theology",
s:"Thagaste (Algeria) → Carthage → Milan → Hippo",type:"science",
d:`AUGUSTINE OF HIPPO (354–430 CE)
Born: Thagaste, Numidia (modern Souk Ahras, Algeria), November 13, 354 CE
Died: Hippo Regius (modern Annaba, Algeria), August 28, 430 CE (as Vandals besieged the city)
Bishop of Hippo from 396 CE

THE MOST INFLUENTIAL CHRISTIAN THEOLOGIAN AFTER ST. PAUL:

CONFESSIONS (397–400 CE): First Western autobiography. Personal narrative of his spiritual journey from sinfulness to conversion. 'Our heart is restless until it rests in You.' Opens with reflections on God and time that anticipate modern phenomenology.

CITY OF GOD (De Civitate Dei, 413–426 CE): Written after Rome's sack by Visigoths (410 CE). Defends Christianity. The 'City of God' (eternal, spiritual) vs 'City of Man' (temporal, earthly). Philosophy of history. The first Christian philosophy of history.

NEOPLATONISM → CHRISTIANITY: Augustine was deeply influenced by Plotinus before his conversion — he synthesised Neoplatonic metaphysics with Christian revelation. His intellectual framework shaped Western Christianity's intellectual tradition for 1,000 years.

KEY DOCTRINES (hugely influenced Catholic theology):
• Original Sin: Adam's fall corrupted all humanity
• Grace: Salvation comes entirely from God's grace, not human merit
• Predestination: God foreknows who will be saved (his more extreme formulation)
• Just War Theory: War is sometimes morally permissible under strict conditions

INFLUENCE: Thomas Aquinas, the Protestant Reformers (Luther, Calvin both read him intensively), Descartes, Pascal, Kierkegaard, Wittgenstein.`,
tags:["augustine","354 CE","philosophy","theology","confessions","city of god","north africa","algeria","christianity","neoplatonism","bishop"]},

{y:980,r:"Science, Philosophy & Discovery",
t:"Ibn Sina (Avicenna) — Medicine, Philosophy & The Floating Man",
s:"Bukhara (Uzbekistan) → Isfahan (Iran)",type:"science",
d:`IBN SINA / AVICENNA (370–428 AH / 980–1037 CE)
Born: Afshana, near Bukhara (Uzbekistan), 370 AH / 980 CE
Died: Hamadan, Iran, 428 AH / 1037 CE (age 57 — overwork and illness)
Full name: Abu Ali al-Husayn ibn Abd Allah ibn Sina

THE MOST INFLUENTIAL PHYSICIAN AND PHILOSOPHER IN MEDIEVAL HISTORY:

CANON OF MEDICINE (Al-Qanun fi al-Tibb, ~1025 CE / ~415 AH):
5-volume medical encyclopedia. Standard medical textbook in European universities for 600 years (12th–17th century). Described:
• Contagious diseases (spread via soil, water, air) — germ theory concept 800 years before Pasteur
• Quarantine as a medical procedure (described 'hadh al-marid' — isolation of the sick)
• 760 drugs with clinical observations
• Clinical trials concept: test new drugs on simple cases before complex ones
• Psychology as a medical field: distinguished physical and mental illness

THE FLOATING MAN (Al-Rajul al-Ta'ir, ~1020 CE):
Thought experiment predating Descartes' Cogito by 600 years:
Imagine a man created in perfect condition, suspended in air, with no sensory input — no sight, no touch, no sound. He cannot perceive his body. But he would still know that he EXISTS — he is aware of his own existence without any sensory data.
This proves the soul's existence independently of the body — a direct argument for the immaterial, self-aware soul. Descartes' 'I think, therefore I am' (1637) is a simplified version of this 600-year-old argument.

PHILOSOPHY:
Commentary on Aristotle and Al-Farabi. Wrote 'Kitab al-Shifa' (Book of Healing) — a complete philosophical encyclopedia covering logic, natural sciences, mathematics, metaphysics.
Distinguished: necessary existence (wajib al-wujud — Allah, who must exist) vs contingent existence (mumkin al-wujud — everything else, which may or may not exist). This distinction is the core of all Islamic philosophical theology.`,
tags:["ibn sina","avicenna","980 CE","370 AH","medicine","philosophy","canon","floating man","bukhara","isfahan","uzbekistan","iran","abbasid","islamic golden age"]},

{y:1033,r:"Science, Philosophy & Discovery",
t:"Anselm & Scholasticism — Faith and Reason",
s:"Aosta (Italy) → Canterbury (England)",type:"science",
d:`ANSELM OF CANTERBURY (1033–1109 CE)
Born: Aosta, Piedmont (modern Italy), 1033 CE
Died: Canterbury, England, 1109 CE
Archbishop of Canterbury from 1093 CE

FATHER OF SCHOLASTICISM — the synthesis of Christian theology with Aristotelian logic:

ONTOLOGICAL ARGUMENT FOR GOD'S EXISTENCE (Proslogion, 1078 CE):
'God is that than which nothing greater can be conceived. If God existed only in the mind and not in reality, we could conceive of something greater (a being that also exists in reality). Therefore, God must exist in reality.'
— The most debated philosophical argument in history. Kant refuted it (existence is not a predicate). Descartes, Leibniz reformulated it. Modal logic versions (Alvin Plantinga, 20th century) are still debated.

MOTTO: 'Fides quaerens intellectum' (Faith seeking understanding). Faith and reason are not opposed — reason clarifies what faith believes.

SCHOLASTIC METHOD: Systematic application of Aristotelian logic to theological questions. Later perfected by Thomas Aquinas (~1225–1274 CE) — Summa Theologica: the grandest synthesis of Aristotelian philosophy and Christian theology. Five Proofs for God's existence (Cosmological, Teleological arguments).

WIDER SCHOLASTIC FIGURES:
• Peter Abelard (~1079–1142 CE): Sic et Non (Yes and No) — systematic collection of contradictions between Church Fathers, to be resolved by logic
• Roger Bacon (~1214–1292 CE): Oxford. Called for empirical observation and experimentation as the basis of knowledge — proto-scientific method
• William of Ockham (~1287–1347 CE): Ockham's Razor — 'Entities should not be multiplied beyond necessity.' The simplest explanation is preferred.`,
tags:["anselm","1033 CE","scholasticism","ontological argument","aquinas","abelard","ockham","reason","faith","philosophy","medieval","england","italy"]},

{y:1126,r:"Science, Philosophy & Discovery",
t:"Ibn Rushd (Averroes) — Aristotle's Commentator",
s:"Córdoba, Spain → Marrakesh, Morocco",type:"science",
d:`IBN RUSHD / AVERROES (520–595 AH / 1126–1198 CE)
Born: Córdoba, Al-Andalus (modern Córdoba, Spain), 520 AH / 1126 CE
Died: Marrakesh, Morocco, 595 AH / 1198 CE (age 72)
Full name: Abu al-Walid Muhammad ibn Ahmad ibn Rushd

'THE COMMENTATOR' — so named by European scholastics because no qualifier was needed: there was only one commentator worth naming on Aristotle.

ARISTOTLE COMMENTARIES:
Ibn Rushd wrote three types of commentary on nearly every Aristotelian work:
• Long commentaries (Tafsir): Entire text with detailed analysis
• Middle commentaries (Talkhis): Paraphrase with annotation  
• Short commentaries (Jawami): Summary
These Latin translations (by Michael Scot, Herman the German) arrived in Europe and directly caused the Aristotelian revolution in European universities (~1200–1270 CE), sparking the Renaissance intellectual foundations.

THE INCOHERENCE OF THE INCOHERENCE (Tahafut al-Tahafut, ~1180 CE / 575 AH):
Response to Al-Ghazali's 'Incoherence of the Philosophers.' Defended the harmony of philosophy and religion. Argued that philosophy and revelation are two roads to the same truth — for the intellectual elite (philosophy); for the masses (religion).

AVERROISM: His Latin followers (Siger of Brabant, Boethius of Dacia) caused a crisis in European universities — his interpretation of Aristotle seemed to deny personal immortality and individual divine providence. Condemned in 1277 CE by Bishop Tempier of Paris. Thomas Aquinas wrote specifically against 'the Averroists.'

LEGACY: Dante placed him in Limbo (the highest honour a medieval Christian could give a non-Christian). Thomas Aquinas quotes him hundreds of times despite disagreeing. The European Renaissance owes its Aristotelian foundation to him.`,
tags:["ibn rushd","averroes","1126 CE","520 AH","aristotle","cordoba","spain","morocco","philosophy","commentaries","averroism","scholasticism","renaissance"]},

{y:1561,r:"Science, Philosophy & Discovery",
t:"Francis Bacon — Father of the Scientific Method",
s:"London, England",type:"science",
d:`FRANCIS BACON (1561–1626 CE)
Born: London, England, January 22, 1561
Died: London, April 9, 1626 (reportedly died from pneumonia contracted while experimenting with snow to preserve meat)

NOVUM ORGANUM (1620 CE):
'New Instrument' — a replacement for Aristotle's Organon (logical method). The foundation of modern empirical science.

THE INDUCTIVE METHOD:
Where Aristotle deduced specific cases from general principles, Bacon argued for INDUCTION — moving from specific observations to general principles. Science proceeds by:
1. Systematic observation and experiment
2. Collection and organisation of data (Tables of Presence, Absence, Degrees)
3. Gradual induction of general laws
4. Testing and verification

THE FOUR IDOLS (sources of human error in reasoning):
• Idols of the Tribe: Errors common to all humans (tendency to see order where none exists)
• Idols of the Cave: Individual biases and personal errors
• Idols of the Marketplace: Errors from imprecise language and communication
• Idols of the Theatre: Errors from philosophical systems and dogmas

INSTAURATIO MAGNA (The Great Renewal):
His unfinished masterwork — a complete reorganisation of all human knowledge on empirical foundations.

'Knowledge is power' (Scientia est potestas) — his most famous phrase.

POLITICAL CAREER: Lord Chancellor of England. Convicted of bribery (1621), briefly imprisoned, never held public office again. Spent final years on his scientific writings.

NOTE: Ibn al-Haytham (Alhazen, 354–430 AH / 965–1040 CE) had already developed the empirical, experimental scientific method 600 years earlier — Bacon was unaware of him.`,
tags:["francis bacon","1561 CE","scientific method","induction","novum organum","empiricism","england","idols","knowledge power","renaissance","modern science"]},

{y:1596,r:"Science, Philosophy & Discovery",
t:"René Descartes — Cogito & Analytical Geometry",
s:"La Haye en Touraine (France) → Netherlands",type:"science",
d:`RENÉ DESCARTES (1596–1650 CE)
Born: La Haye en Touraine (now Descartes), France, March 31, 1596
Died: Stockholm, Sweden, February 11, 1650 (pneumonia, age 53 — died in Swedish winter)

'THE FATHER OF MODERN PHILOSOPHY' and 'THE FATHER OF ANALYTICAL GEOMETRY'

MEDITATIONS ON FIRST PHILOSOPHY (1641 CE):
Method of systematic doubt — strip away everything that can be doubted until reaching bedrock certainty.
Can I doubt the external world? Yes (illusion). My body? Yes (dream). Mathematics? Yes (evil demon hypothesis). But:
'COGITO ERGO SUM' — 'I think, therefore I am' (Discourse on Method, 1637).
The one thing that cannot be doubted is the act of doubting itself. The thinking subject is certain.
NOTE: Ibn Sina's Floating Man (~1020 CE) had made the same argument 600 years earlier.

MIND-BODY DUALISM:
Mind (res cogitans — thinking substance) and Body (res extensa — extended substance) are fundamentally different kinds of thing. The 'mind-body problem' Descartes created is still debated: How do mind and matter interact? The pineal gland (he proposed) as the seat of the soul.

ANALYTICAL GEOMETRY:
Invented the Cartesian coordinate system — x and y axes. Allowed algebraic equations to be represented geometrically and geometric shapes to be represented algebraically. Made Newton's and Leibniz's calculus possible.

RULE FOR THE DIRECTION OF THE MIND, DISCOURSE ON METHOD:
Four rules of reasoning: (1) Accept only what is clearly and distinctly perceived as true; (2) Divide problems into smallest parts; (3) Proceed from simple to complex; (4) Review completely.

Einstein on Descartes: 'Pure logical thinking cannot yield us any knowledge of the empirical world; all knowledge of reality starts from experience and ends in it. Propositions arrived at by purely logical means are completely empty as regards reality.'`,
tags:["descartes","1596 CE","cogito","mind body dualism","analytical geometry","coordinates","method","doubt","philosophy","france","netherlands","modern philosophy"]},

{y:1632,r:"Science, Philosophy & Discovery",
t:"Spinoza & Leibniz — Rationalist Philosophy",
s:"Amsterdam (Netherlands) → Hanover (Germany)",type:"science",
d:`BARUCH SPINOZA (1632–1677 CE)
Born: Amsterdam, Netherlands, November 24, 1632 (of Portuguese-Jewish descent)
Died: The Hague, Netherlands, February 21, 1677 (age 44 — tuberculosis, from grinding glass lenses)
Excommunicated from the Amsterdam Jewish community (1656) — one of the most severe excommunications on record.

ETHICS (Ethica, published 1677 CE, posthumously):
Written in geometric form — definitions, axioms, propositions, proofs — like Euclid's Elements, but about God, mind, and happiness.

SUBSTANCE MONISM: There is only ONE substance — God/Nature (Deus sive Natura). Everything that exists is a mode or expression of this one infinite substance. Therefore: God is not a personal deity but the infinite totality of existence. This was called atheism by contemporaries; he called it the deepest form of piety.

'The human mind is part of the infinite intellect of God.' 
'The highest activity a human being can attain is learning for understanding, because to understand is to be free.'

POLITICS: Theologico-Political Treatise (1670) — argued for freedom of thought and speech, separation of religion and politics. The intellectual foundation of modern liberal democracy.

GOTTFRIED LEIBNIZ (1646–1716 CE):
Born: Leipzig, Germany, July 1, 1646.
MONADOLOGY: The world consists of indivisible, non-spatial 'monads' — soul-like units. 'This is the best of all possible worlds' (because God, being perfect, created the best possible creation). Voltaire satirised this in Candide.
CO-INVENTOR OF CALCULUS (1675–1676 CE, published 1684) — simultaneously with Newton. Priority dispute lasted decades. Leibniz's notation (dy/dx, ∫) is what we use today.
BINARY ARITHMETIC: Invented the binary number system (0 and 1) — the foundation of all digital computing.
FORMAL LOGIC: Dreamed of a universal logical calculus (calculus ratiocinator) that could settle all disputes. Predated modern mathematical logic by 200 years.`,
tags:["spinoza","leibniz","1632 CE","1646 CE","rationalism","ethics","binary","calculus","monads","god nature","amsterdam","germany","philosophy","modern"]},

{y:1711,r:"Science, Philosophy & Discovery",
t:"David Hume & Immanuel Kant — Epistemology & Pure Reason",
s:"Edinburgh (Scotland) → Königsberg (Prussia)",type:"science",
d:`DAVID HUME (1711–1776 CE)
Born: Edinburgh, Scotland, May 7, 1711
Died: Edinburgh, August 25, 1776 (age 65)

THE GREATEST SCEPTIC AND MOST RADICAL EMPIRICIST:

A TREATISE OF HUMAN NATURE (1739–40 CE): 'A complete system of the sciences, built on a foundation almost entirely new.' Written aged 26.

KEY ARGUMENTS:
PROBLEM OF INDUCTION: Just because the sun has risen every day in the past gives us NO logical guarantee it will rise tomorrow. All science is based on inductive reasoning — but induction cannot be logically justified. This is one of the most fundamental unsolved problems in philosophy of science.

CAUSATION: We never actually see causation — only constant conjunction (A always followed by B). Causation is a habit of the mind, not a feature of the world.

PROBLEM OF THE SELF: There is no continuous 'self' — only a bundle of perceptions ('bundle theory'). Buddhist philosophy had reached the same conclusion 2,000 years earlier.

IS-OUGHT GAP: 'You cannot derive an ought from an is' — moral values cannot be derived from factual claims about the world. This distinction is fundamental to modern ethics.

IMMANUEL KANT (1724–1804 CE):
Born: Königsberg, Prussia (modern Kaliningrad, Russia), April 22, 1724.
'Hume woke me from my dogmatic slumber' — Kant.

CRITIQUE OF PURE REASON (1781 CE): Synthesised rationalism (Descartes, Leibniz) with empiricism (Locke, Hume). Argued that the mind actively structures experience using a priori concepts (space, time, causality). We can never know 'things in themselves' (noumena) — only phenomena as shaped by our cognitive faculties.

CATEGORICAL IMPERATIVE: Act only according to maxims you could universalise for all rational beings. 'Act as if the maxim of your action were to become universal law.'`,
tags:["hume","kant","1711 CE","1724 CE","epistemology","empiricism","critique of pure reason","scepticism","causation","induction","edinburgh","königsberg","enlightenment","philosophy"]},

{y:-270,r:"Science, Philosophy & Discovery",
t:"Hellenistic Astronomy — Apollonius, Seleucus & the Cosmos",
s:"Perga (Turkey) → Alexandria, Egypt",type:"science",
d:`HELLENISTIC ASTRONOMY (270–100 BCE) — Precision Without Telescopes

APOLLONIUS OF PERGA (~262–190 BCE):
Born: Perga, Pamphylia (modern Antalya area, Turkey), ~262 BCE
Died: Alexandria, ~190 BCE
'The Great Geometer' — wrote Conics (8 books): systematic treatment of the ellipse, parabola, and hyperbola. Named these curves. These conic sections are what Kepler (1,800 years later) used to describe planetary orbits — ellipses. Kepler solved the mystery of planetary motion using Apollonius's mathematics.

Also invented the epicycle and eccentric circle models for planetary motion — later used by Ptolemy.

SELEUCUS OF SELEUCIA (~190–150 BCE):
Born: Seleucia on the Tigris (modern Iraq), ~190 BCE
The only ancient astronomer known to have PROVED the heliocentric theory (rather than just proposing it like Aristarchus). He explained ocean tides as caused by the Moon's interaction with Earth — correct in principle. His proof of heliocentrism: using tidal behaviour which made no sense in a geocentric model. Unfortunately, only fragments of his work survive.

HIPPARCHUS VS ARISTARCHUS:
Around ~130 BCE, Hipparchus (see separate entry) decisively rejected heliocentrism and championed geocentrism with mathematical precision — his star catalogue and predictive models were so accurate that geocentrism was adopted as the consensus for 1,800 years. It worked — for prediction purposes, even the wrong model can give accurate results (as the Ptolemaic system did).`,
tags:["apollonius","seleucus","270 BCE","hellenistic","astronomy","conic sections","ellipse","parabola","heliocentric","geocentric","ancient","perga","seleucia"]},

{y:100,r:"Science, Philosophy & Discovery",
t:"Claudius Ptolemy — The Almagest & Geography",
s:"Alexandria, Egypt",type:"science",
d:`CLAUDIUS PTOLEMY (~100–170 CE)
Born: Ptolemais Hermiou, Egypt, ~100 CE
Died: Alexandria, Egypt, ~170 CE
Active: Alexandria, under Roman rule

THE MOST INFLUENTIAL ASTRONOMER OF THE ANCIENT AND MEDIEVAL WORLDS:

THE ALMAGEST (Mathematike Syntaxis, ~150 CE):
13-volume mathematical astronomy. Synthesised all Greek astronomical knowledge. The geocentric (Earth-centred) model with epicycles — described planetary motion with enough mathematical precision to make accurate predictions.

USED BY ASTRONOMERS FOR 1,400 YEARS (until Copernicus, 1543 CE).

THE GEOCENTRIC MODEL — WHY IT WORKED:
The Earth is at the centre. Planets move in circles (epicycles) on larger circles (deferents) around Earth. The epicycle system was mathematically equivalent to the heliocentric elliptical model for prediction purposes — both give the same observable results to naked-eye precision.

GEOGRAPHY:
Geographia (8 volumes, ~150 CE): Systematic atlas and cartographic theory. Described how to project a sphere onto a flat map. Introduced the concepts of latitude and longitude with coordinates for 8,000+ locations. Used by Columbus (who underestimated Earth's size based on Ptolemy's errors — leading him to think he'd reached Asia when he reached the Americas).

TETRABIBLOS: Systematic astrology based on astronomical observation. Astrology and astronomy were not yet separated.

OPTICS: Described refraction of light through water and glass — calculated angles (not quite correctly, but systematically).`,
tags:["ptolemy","100 CE","almagest","geocentric","geography","astronomy","alexandria","epicycle","coordinates","latitude","longitude","rome","medieval"]},

{y:1030,r:"Science, Philosophy & Discovery",
t:"Al-Biruni — The Universal Scholar",
s:"Khwarezm (Uzbekistan) → Ghazni (Afghanistan) → India",type:"science",
d:`ABU RAYHAN AL-BIRUNI (362–440 AH / 973–1048 CE)
Born: Kath (Khwarezm, modern Uzbekistan), 362 AH / 973 CE
Died: Ghazni (modern Afghanistan), 440 AH / 1048 CE
Active under: Samanid, Khwarezmian, and Ghaznavid courts (kidnapped/brought by Mahmud of Ghazni)

THE GREATEST UNIVERSAL SCHOLAR OF THE MEDIEVAL WORLD — surpassing even Ibn Sina in breadth:

GEODESY — MEASURING EARTH'S CIRCUMFERENCE (~1019 CE / 410 AH):
Al-Biruni developed a new method to measure Earth's radius WITHOUT needing two separate observations. He measured the height of a mountain (in the Salt Range, Pakistan), the angle of depression to the horizon, and calculated Earth's radius as ~6,339 km. Modern value: 6,371 km. Error: 0.5%.

KITAB AL-HIND (The Book of India, ~1030 CE / 420 AH):
After accompanying Mahmud of Ghazni's Indian campaigns, Al-Biruni spent years learning Sanskrit. Produced the most comprehensive and accurate medieval study of India:
• Indian philosophy, religion (Hinduism, Buddhism), mathematics, astronomy
• The concept of zero and decimal system
• Sanskrit literature and science
• Remains the authoritative source for medieval Indian civilisation

OTHER CONTRIBUTIONS:
• Pharmacology: Al-Saydana (Book of Pharmacy) — described ~700 drugs
• Physics: First person to determine specific gravity of 18 precious stones and metals with remarkable accuracy
• Mineralogy: Distinguished elements from compounds
• Anthropology: Studied cultures without judgement — remarkably modern methodology
• Chronology: al-Athar al-Baqiyya (Vestiges of the Past) — comparative study of calendars across cultures`,
tags:["al-biruni","973 CE","362 AH","khwarezm","uzbekistan","india","geodesy","earth circumference","kitab al-hind","pharmacy","universal scholar","ghazni","islamic golden age"]},

{y:1473,r:"Science, Philosophy & Discovery",
t:"Copernicus — Heliocentric Revolution",
s:"Torun (Poland) → Frombork (Poland)",type:"science",
d:`NICOLAUS COPERNICUS (1473–1543 CE)
Born: Torun, Royal Prussia (Poland), February 19, 1473
Died: Frombork, Poland, May 24, 1543 (age 70)
Occupations: Canon of the Catholic Church, mathematician, astronomer, economist, physician

DE REVOLUTIONIBUS ORBIUM COELESTIUM (On the Revolutions of the Celestial Spheres, 1543 CE):
Published the year of his death. Proposed: the Sun is at the centre of the solar system, and Earth and the other planets revolve around it.

HISTORICALLY IMPORTANT CONTEXT:
Aristarchus of Samos had proposed heliocentrism ~270 BCE — 1,800 years earlier. Copernicus was almost certainly unaware of Aristarchus's work (the relevant text was not widely available). Al-Tusi (13th century Islamic astronomer) had developed mathematical models that Copernicus used directly — the 'Tusi couple' appears in both works nearly identically.

THE COPERNICAN REVOLUTION:
His system still used circles (not ellipses — that required Kepler). His heliocentric model was actually slightly LESS accurate than Ptolemy's for practical predictions. But philosophically it removed Earth (and humanity) from the centre of the cosmos.

IMPACT:
• Kepler (1609–1619 CE): Elliptical orbits — solved the remaining inaccuracies
• Galileo (1610 CE): Telescope confirmed heliocentrism
• Newton (1687 CE): Gravitation explained WHY planets orbit the Sun
• The 'Copernican Principle': Earth (and humanity) is not in a special position in the universe — still the guiding principle of cosmology`,
tags:["copernicus","1473 CE","heliocentric","poland","de revolutionibus","sun","earth","orbit","revolution","astronomy","scientific revolution"]},

{y:1564,r:"Science, Philosophy & Discovery",
t:"Galileo Galilei — Telescope, Mechanics & Inquisition",
s:"Pisa → Florence → Padua → Rome — Italy",type:"science",
d:`GALILEO GALILEI (1564–1642 CE)
Born: Pisa, Duchy of Florence (Italy), February 15, 1564
Died: Arcetri (near Florence), January 8, 1642 (house arrest, age 77)

'THE FATHER OF OBSERVATIONAL ASTRONOMY' and 'THE FATHER OF MODERN PHYSICS'

TELESCOPE (~1609 CE):
Galileo improved a Dutch invention into a 20× telescope and pointed it at the sky — first systematic telescopic astronomy.
Discoveries:
• Moons of Jupiter (now called Galilean moons): Io, Europa, Ganymede, Callisto — proved not everything revolves around Earth
• Phases of Venus — proved Venus orbits the Sun
• Sunspots — the Sun is not perfect
• Craters on the Moon — the heavens are not perfect crystalline spheres
• The Milky Way is composed of individual stars
• Saturn has 'ears' (actually rings — his telescope couldn't resolve them)

MECHANICS:
• Law of falling bodies: All objects fall at the same rate regardless of mass (refuted Aristotle's claim that heavier objects fall faster). Allegedly demonstrated from the Leaning Tower of Pisa.
• Projectile motion: Parabolic trajectory. Foundation of ballistics.
• Law of inertia: A body in motion remains in motion unless acted upon — Newton's First Law. 
• Pendulum isochronism: Period of a pendulum depends only on its length (observed from a swinging lamp in Pisa Cathedral, 1583).

THE INQUISITION TRIAL (1633 CE):
The Church condemned heliocentrism (1616 CE). Galileo published Dialogue on the Two Chief World Systems (1632) — clearly favouring Copernicus. Trial by Inquisition. Under threat of torture, recanted. Placed under house arrest. Allegedly muttered: 'Eppur si muove' (And yet it moves). Died under house arrest. Pope John Paul II formally apologised (1992).`,
tags:["galileo","1564 CE","telescope","inquisition","pisa","florence","mechanics","moons of jupiter","falling bodies","pendulum","heliocentrism","italy","modern physics"]},

{y:1571,r:"Science, Philosophy & Discovery",
t:"Johannes Kepler — Laws of Planetary Motion",
s:"Weil der Stadt (Germany) → Prague → Linz",type:"science",
d:`JOHANNES KEPLER (1571–1630 CE)
Born: Weil der Stadt, Württemberg (Germany), December 27, 1571
Died: Regensburg, Bavaria, November 15, 1630 (age 58)

THE THREE LAWS OF PLANETARY MOTION — which solved the problem of WHY the Ptolemaic/Copernican models needed epicycles:

FIRST LAW (1609, Astronomia Nova):
Planets move in ELLIPSES (not circles) with the Sun at one FOCUS.
This single change — from circles to ellipses — solved 1,800 years of accumulated error. Apollonius had described ellipses in 200 BCE; Kepler realised planets moved in them.

SECOND LAW (1609):
A line connecting a planet to the Sun sweeps out EQUAL AREAS in equal times.
Planets move FASTER when closer to the Sun, slower when farther. Explains why Earth moves faster in January (closer to Sun) than July.

THIRD LAW (1619, Harmonices Mundi):
T² ∝ a³ — The square of a planet's orbital period (T) is proportional to the cube of the semi-major axis (a) of its orbit.
Earth: T=1 year, a=1 AU. Mars: T=1.88 years, a=1.52 AU. (1.88² = 3.53; 1.52³ = 3.51) ✓

Newton used Kepler's Third Law to derive his law of Universal Gravitation.

PERSONAL LIFE:
His mother Katharina was tried as a witch (1615–1621) — Kepler spent years defending her. She died six months after acquittal.
Kepler himself had poor eyesight (from childhood smallpox) — yet revolutionised astronomy through mathematics rather than observation.`,
tags:["kepler","1571 CE","laws of planetary motion","ellipse","germany","prague","astronomy","newton","copernicus","harmonics","scientific revolution"]},

  all.className='tp on';all.style.color=aTypes.size===TYPE_LIST.length?'var(--gold)':'var(--t3)';

function getEvs(){
  const era=ERAS.find(e=>e.id===aEra)||ERAS[0];
  return EV.filter(e=>{
    if(e.y<era.f||e.y>era.t)return false;
    if(!aTypes.has(e.type))return false;
    if(srchQ){
      const q=srchQ.toLowerCase();
      return(e.t+e.s+e.d+(e.tags||[]).join(' '))
        .toLowerCase().includes(q);
    }
    return true;
  });
}

  document.getElementById('sPr').textContent=evs.filter(e=>e.type==='prophet').length;
  document.getElementById('sDy').textContent=evs.filter(e=>e.type==='dynasty').length;
  document.getElementById('sSc').textContent=evs.filter(e=>e.type==='science').length;

  if(!evs.length){rows.innerHTML='<div class="no-r">No events match. Try expanding era, regions, or clearing the search.</div>';return;}

  // Fixed column width: 180px minimum. Lanes-outer handles horizontal scroll.
  const lW=180;

  visR.forEach(r=>{
    const col=RC[r];
    const lh=document.createElement('div');lh.className='lhdr';
    lh.style.color=col.rt;lh.style.borderBottom='2px solid '+col.rc;
    lh.style.minWidth=lW+'px';lh.style.maxWidth=lW+'px';lh.style.width=lW+'px';
    lh.textContent=r;
    lHdrs.appendChild(lh);
  });

  years.forEach(y=>{
    const yEvs=evs.filter(e=>e.y===y);
    const yc=document.createElement('div');yc.className='yr-cell';
    const ce=document.createElement('div');
    ce.className=y<0?'yr-bce':'yr-ce';ce.textContent=fmtY(y);yc.appendChild(ce);
    const ah=ceToAH(y);
    if(ah){const a=document.createElement('div');a.className='yr-ah';a.textContent=ah;yc.appendChild(a);}
    spine.appendChild(yc);

    const row=document.createElement('div');row.className='tl-row';
    visR.forEach(r=>{
      const col=RC[r];
      const cell=document.createElement('div');cell.className='ev-col';
      cell.style.minWidth=lW+'px';cell.style.maxWidth=lW+'px';
      const rEvs=yEvs.filter(e=>e.r===r);
      rEvs.forEach(ev=>{
        const tp=TYPES[ev.type]||{l:ev.type,c:'#C9A84C'};
        const card=document.createElement('div');
        card.className='card';
        card.style.background=col.rb;
        card.style.borderLeftColor=tp.c;
        card.style.borderTopColor=col.rc+'55';

        const ti=document.createElement('div');ti.className='c-title';ti.style.color=col.rl;ti.textContent=ev.t;card.appendChild(ti);
        const sub=document.createElement('div');sub.className='c-sub';sub.style.color=col.rt;sub.textContent=ev.s;card.appendChild(sub);
        const tDiv=document.createElement('div');tDiv.className='c-type';tDiv.style.color=tp.c;tDiv.textContent=tp.l;card.appendChild(tDiv);
        const ahS=ceToAH(ev.y);
        if(ahS){const d=document.createElement('div');d.className='c-dual';d.textContent=ahS+(ev.endY?' — '+ceToAH(ev.endY):'');card.appendChild(d);}
        // Show duration bar for empires/dynasties with endY
        if(ev.endY){
          const dur=document.createElement('div');
          dur.className='c-duration';
          dur.style.color=tp.c;
          const yrs=ev.endY-ev.y;
          dur.textContent='▬ '+fmtY(ev.y)+' → '+fmtY(ev.endY)+' ('+yrs+'yr)';
          card.appendChild(dur);
          card.style.borderBottom='1px dashed '+col.rc+'88';
        }
        card.onclick=()=>showModal(ev);
        cell.appendChild(card);
      });
      row.appendChild(cell);
    });
    rows.appendChild(row);
    setTimeout(()=>{yc.style.minHeight=row.offsetHeight+'px';},20);
  });

  setTimeout(()=>{
    const rs=rows.querySelectorAll('.tl-row');
    const ys=spine.querySelectorAll('.yr-cell');
    rs.forEach((r,i)=>{if(ys[i])ys[i].style.minHeight=r.offsetHeight+'px';});
  },120);
}

document.getElementById('mX').onclick=()=>document.getElementById('mBg').classList.remove('open');
document.getElementById('mBg').onclick=e=>{if(e.target===document.getElementById('mBg'))document.getElementById('mBg').classList.remove('open');};
document.getElementById('srch').oninput=e=>{srchQ=e.target.value;renderAll();};

// ═══ SCROLL SYNC: Year spine follows lanes-outer vertical scroll ═══
// lanes-outer now scrolls both X and Y; yr-spine must mirror Y scroll
document.getElementById('lanesOuter').addEventListener('scroll',function(){
  document.getElementById('yrSpine').scrollTop=this.scrollTop;
});

// ═══ MOBILE RENDERING ═══
let mobEra='all', mobSrch='';

function mobGetEvs(){
  const era=ERAS.find(e=>e.id===mobEra)||ERAS[0];
  return EV.filter(e=>{
    if(e.y<era.f||e.y>era.t)return false;
    if(mobSrch){
      const q=mobSrch.toLowerCase();
      return(e.t+e.s+e.d+(e.tags||[]).join(' ')).toLowerCase().includes(q);
    }
    return true;
  }).sort((a,b)=>a.y-b.y);
}

function renderMob(){
  const list=document.getElementById('mobList');
  const countEl=document.getElementById('mobN');
  if(!list)return;
  const evs=mobGetEvs();
  countEl.textContent=evs.length;
  list.innerHTML='';
  evs.forEach(ev=>{
    const col=RC[ev.r]||{rl:'#C9A84C',rt:'#B8A882',rc:'rgba(201,168,76,0.4)'};
    const tp=TYPES[ev.type]||{l:ev.type,c:'#C9A84C'};
    const ah=ceToAH(ev.y);
    const div=document.createElement('div');
    div.className='mob-card';
    div.style.borderLeftColor=tp.c;
    div.innerHTML=`
      <div class="mob-year">${fmtY(ev.y)}${ah?' · '+ah:''}</div>
      <div class="mob-title" style="color:${col.rl}">${ev.t}</div>
      <div class="mob-meta" style="color:${col.rt}">${ev.s}</div>
      <div class="mob-type" style="color:${tp.c}">${tp.l}</div>
      <div class="mob-region" style="color:${col.rc}">${ev.r}</div>
    `;
    div.onclick=()=>showModal(ev);
    list.appendChild(div);
  });
}

function buildMobEraFilters(){
  const c=document.getElementById('mobEraFilters');
  if(!c)return;
  c.innerHTML='';
  ERAS.forEach(e=>{
    const b=document.createElement('button');
    b.className='mob-fbtn'+(mobEra===e.id?' on':'');
    b.textContent=e.l;
    b.onclick=()=>{mobEra=e.id;buildMobEraFilters();renderMob();};
    c.appendChild(b);
  });
}

const mobSrchEl=document.getElementById('mobSrch');
if(mobSrchEl)mobSrchEl.oninput=e=>{mobSrch=e.target.value;renderMob();};

// Init both views
buildEras();buildTypes();renderAll();
buildMobEraFilters();renderMob();
</script>
