{y:1905,r:"Science, Philosophy & Discovery",t:"Einstein's Miraculous Year — 1323 AH",s:"Bern, Switzerland",type:"science",
d:`1323 AH / 1905 CE. Albert Einstein (1879–1955), 26-year-old patent clerk. Four papers in a single year that transform physics.

1. PHOTOELECTRIC EFFECT: Light comes in discrete quanta (photons). Won Nobel Prize 1921. Foundation of solar panels, TV cameras, digital cameras.

2. BROWNIAN MOTION: Mathematical proof that atoms exist. Ends 2,000 years of debate.

3. SPECIAL RELATIVITY: No absolute reference frame. Speed of light constant for all observers. Time dilation: a clock moving fast ticks slower. Length contraction. E = mc² — mass and energy are equivalent (from a separate paper).

4. MASS-ENERGY EQUIVALENCE: E = mc² — the most famous equation in history. A tiny mass converts to enormous energy (c = 300,000 km/s; c² = 90 billion). Foundation of nuclear weapons and nuclear energy.

1915: GENERAL RELATIVITY: Gravity is the curvature of spacetime caused by mass. Confirmed: solar eclipse 1919 (Eddington), gravitational waves (LIGO 2015), black hole image (Event Horizon Telescope 2019).

Einstein: a Jewish refugee from Nazi Germany (renounced German citizenship 1933). Settled in Princeton, USA. Warned FDR about nuclear weapons possibility (Einstein-Szilard letter, 1939). Later: 'Had I known that the Germans would not succeed in developing the atomic bomb, I would never have supported that letter.'`,
tags:["einstein","1323 AH","1905","relativity","E=mc2","quantum","photoelectric","physics","nuclear","science"]},

{y:1914,r:"Europe & Dynasties",t:"World War I — 1332 AH — The Great War",s:"Europe",type:"battle",
d:`July 28, 1914–November 11, 1918 CE (1332–1337 AH). 17 million dead, 23 million wounded. 'The war to end all wars' — it wasn't.

CAUSES (MAIN):
• Alliance system (Triple Entente vs Triple Alliance)
• Imperial competition
• Nationalism (especially Balkan)
• Trigger: Assassination of Archduke Franz Ferdinand, June 28, 1914 (by Gavrilo Princip, Serbian nationalist), Sarajevo

WESTERN FRONT: 700km of trenches from Belgium to Switzerland. Stalemate for 4 years. New weapons: poison gas (first large-scale use, Ypres 1915), tanks (British, Somme 1916), aircraft.

BATTLE OF SOMME (July 1, 1916): First day — 57,470 British casualties (19,240 dead) — worst single day in British military history. Total: 1 million+ casualties in 5 months.

VERDUN (1916): 10-month battle. 700,000 casualties. 'The Meatgrinder.'

GALLIPOLI (1915): Failed British-ANZAC attempt to knock Ottoman Empire out of war. 250,000 Allied casualties. Defining moment of Australian/New Zealand national identity.

USA ENTERS (April 6, 1917): Fresh troops break stalemate.

OUTCOMES: Ottoman Empire collapses. Austria-Hungary dissolves into 7 new nations. Germany loses, faces crushing Versailles settlement. Russian Empire collapses into Soviet Union. Balfour Declaration (1917) → Israel-Palestine conflict. Sykes-Picot (1916) → modern Middle East borders.`,
tags:["ww1","1332 AH","1914","trench warfare","somme","verdun","ottoman","gallipoli","balfour","sykes-picot","europe"]},

{y:1939,r:"Europe & Dynasties",t:"World War II — 1358 AH",s:"Europe → Global",type:"battle",
d:`September 1, 1939–September 2, 1945 CE (1358–1364 AH). 70–85 million dead. Most destructive event in human history.

CAUSES: Versailles humiliation, Great Depression, Hitler's rise, appeasement.

EUROPE THEATRE:
• Blitzkrieg (Poland 1939, France 1940) — mechanized warfare
• Battle of Britain (1940): RAF vs Luftwaffe. Britain survives.
• Operation Barbarossa (June 22, 1941): 3 million German troops invade USSR — largest military operation in history. 26 million Soviet deaths total.
• Holocaust: 6 million Jews + 5 million others systematically murdered in gas chambers. Auschwitz alone: 1.1 million.
• Stalingrad (1942–43): 800,000+ Axis casualties. Turning point. 6th Army surrenders.
• D-Day Normandy (June 6, 1944): 156,000 Allied troops in 24 hours.
• Berlin falls May 2, 1945. Germany surrenders May 8.

PACIFIC THEATRE:
• Pearl Harbor (December 7, 1941): 2,400 Americans killed. USA enters war.
• Midway (1942): Decisive naval battle — Japan loses 4 carriers.
• Iwo Jima, Okinawa (1945): Island-hopping.
• Hiroshima (August 6): 80,000 dead instantly. Nagasaki (August 9): 40,000.
• Japan surrenders September 2, 1945.

LEGACY: United Nations, Cold War, Marshall Plan, State of Israel, NATO, decolonization wave, nuclear age.`,
tags:["ww2","1358 AH","1939","holocaust","d-day","hiroshima","stalingrad","operation barbarossa","normandy","nuclear","europe"]},

{y:1950,r:"Geopolitics & Diplomacy",t:"Korean War & Cold War Conflicts",s:"Korea/Global",type:"battle",
d:`KOREAN WAR (June 25, 1950–July 27, 1953): North Korea (Soviet-supported) invades South Korea. UN (16 countries, primarily USA under MacArthur) repel invasion, push toward Chinese border. China enters (October 1950) — UN forces retreat. Armistice at 38th parallel (original border). 3–5 million dead. 'The Forgotten War.'

RESULT: Korea still divided at 38th parallel — same border as 1950. 38,000+ US troops still stationed there. North Korea develops nuclear weapons (test 2006).

COLD WAR HOT CONFLICTS (proxy wars):
• Greece (1946–49): US-supported government vs communist guerrillas
• Vietnam War (1955–75): US prevents communist unification — 58,000 Americans, 3 million Vietnamese dead
• Cuban Missile Crisis (1962): Closest to nuclear war — 13 days (see below)
• Six Day War (1967): US-USSR proxies
• Yom Kippur War (1973): Soviet vs US resupply
• Angola (1975–2002): Cuban/Soviet vs US-backed factions
• Afghanistan (1979–89): US/Saudi-backed Mujahideen vs Soviets
• Nicaragua (1980s): US-backed Contras vs Sandinistas (Iran-Contra scandal)

CUBAN MISSILE CRISIS (October 1962): Soviet nuclear missiles detected in Cuba. 13-day standoff — Kennedy and Khrushchev. Secret deal: US removes Turkey missiles; USSR removes Cuba missiles. Hot line (direct phone) established between Washington and Moscow.`,
tags:["korea","cold war","1950","vietnam","cuba","missile crisis","proxy war","usa","ussr","38th parallel"]},

{y:1948,r:"Middle East & Levant",t:"Israel Founded — Palestinian Nakba — 1367 AH",s:"Palestine",type:"geopolitics",
d:`May 14–15, 1948 CE (1367 AH). David Ben-Gurion declares State of Israel. Next day: five Arab armies attack.

NAKBA ('Catastrophe'): 700,000–900,000 Palestinians flee or are expelled. 531 villages destroyed. Deir Yassin massacre (April 9, 1948): 107 civilians killed by Irgun/Lehi paramilitaries.

Israel expands beyond UN partition lines. Jordan retains West Bank; Egypt retains Gaza. 1949 Armistice lines become the 'Green Line.'

UN RESOLUTION 194: Right of return for Palestinian refugees — never implemented.

AL-QUDS (JERUSALEM): Masjid al-Aqsa — where Prophet ﷺ led all prophets in prayer (Isra wal Miraj). East Jerusalem occupied by Israel since 1967.

SUBSEQUENT EVENTS:
• 1967: West Bank and Gaza occupied by Israel
• 1973: Yom Kippur War
• 1978: Camp David — Egypt-Israel peace
• 1987: First Intifada (Palestinian uprising)
• 1993: Oslo Accords — Palestinian Authority
• 2000: Second Intifada — 3,000+ Palestinians, 1,000+ Israelis killed
• 2007: Hamas takes Gaza; Israeli blockade begins
• October 7, 2023: Hamas attack — 1,200 Israelis killed; Israeli war on Gaza, 40,000+ Palestinians killed by mid-2024`,
tags:["israel","1948","1367 AH","nakba","palestine","jerusalem","aqsa","deir yassin","occupation","ongoing"]},

{y:1947,r:"Indian Subcontinent",t:"Pakistan Independence & History — 1366 AH",s:"Pakistan",type:"dynasty",
d:`August 14, 1366 AH / 1947 CE. PAKISTAN INDEPENDENCE. Muhammad Ali Jinnah — Quaid-e-Azam (Great Leader). Liaquat Ali Khan — first PM. Assassinated 1951.

PAKISTANI GOVERNMENTS (summarized):
• 1947–1958: Civilian era — constitutional chaos, 4 PMs in 5 years
• 1958–1969: GENERAL AYUB KHAN — first martial law. Economic growth + inequality. 1965 Indo-Pak War (stalemate). Constitution 1962.
• 1969–1971: GENERAL YAHYA KHAN — elections won by Awami League (East Pakistan, Mujibur Rahman). Power transfer refused. Operation Searchlight (1971): military crackdown. Bangladesh Liberation War. India intervenes. 93,000 Pakistani troops surrender — largest since WWII. East Pakistan becomes Bangladesh.
• 1971–1977: ZULFIKAR ALI BHUTTO — 1973 Constitution. Nationalization. Nuclear program launched. 1977 election controversy.
• 1977–1988: GENERAL ZIA UL-HAQ — Islamization. Afghan Jihad. US/Saudi alliance. Bhutto executed 1979. Zia killed in plane crash 1988.
• 1988–1999: Democracy decade — Benazir Bhutto (2 terms), Nawaz Sharif (2 terms) — all dismissed before completing terms.
• 1999–2008: GENERAL MUSHARRAF — 9/11 pivot. Economic growth. Kargil 1999.
• 2008–2024: PPP, PML-N, PTI (Imran Khan, removed 2022, jailed 2023).
• February 2024: Elections — PTI wins most seats but coalition of PML-N + PPP governs. Shehbaz Sharif PM.`,
tags:["pakistan","1947","1366 AH","jinnah","ayub","zia","bhutto","musharraf","imran khan","dynasties","military","independence"]},

{y:1526,r:"Indian Subcontinent",t:"Mughal Empire — All Emperors",s:"Delhi/Agra/Lahore",type:"dynasty",
d:`THE MUGHAL DYNASTY (932–1273 AH / 1526–1857 CE): 331 years, 21 emperors.

1. BABUR (932–936 AH / 1526–30): First Battle of Panipat. Poet-emperor. Baburnama — first autobiography in Turkic.
2. HUMAYUN (936–946 AH then 962–963 AH): Lost empire to Sher Shah Suri (Sur Empire 1540–55), regained with Persian help.
3. AKBAR THE GREAT (963–1014 AH / 1556–1605): Greatest Mughal. Abolished jizya. Din-i-Ilahi. Mansabdari system. Rajput alliance. Second Battle of Panipat (1556) — defeats Hemu.
4. JAHANGIR (1014–1037 AH / 1605–27): Patron of arts. Wife Nur Jahan effectively co-ruled.
5. SHAH JAHAN (1037–1069 AH / 1628–58): TAJ MAHAL (1043–1053 AH / 1632–43) — 20,000 workers, 22 years. Red Fort. Jama Masjid Delhi. Imprisoned by son Aurangzeb in Agra Fort — could see Taj Mahal from window until his death.
6. AURANGZEB 'ALAMGIR' (1069–1118 AH / 1658–1707): Most territory (Deccan), most pious (copied Quran by hand for income), most controversial (reimposed jizya, banned music). Empire became overextended. His death triggers decline.
7–21: Rapid succession. Marathas, Durrani Afghans, British East India Company all erode Mughal power. Final emperor Bahadur Shah Zafar (Urdu poet) exiled to Burma 1857.`,
tags:["mughal","1526","932 AH","dynasty","india","akbar","shah jahan","taj mahal","aurangzeb","babur","humayun"]},

{y:800,r:"Indian Subcontinent",t:"Indian Dynasties — Ancient to Medieval",s:"India",type:"dynasty",
d:`MAJOR INDIAN DYNASTIES:

GUPTA EMPIRE (320–550 CE): 'Golden Age of India.' Chandragupta I → Samudragupta (warrior-king, 'Indian Napoleon') → Chandragupta II 'Vikramaditya.' Mathematics (zero, decimal system), literature (Kalidasa), astronomy (Aryabhata). Falls to White Huns.

CHOLA DYNASTY (3rd BCE–13th CE): South India. Naval empire — controlled sea trade from India to China. Templed cities. Kulottunga I — greatest ruler. Brihadeeswara Temple (Thanjavur, 1010 CE) — UNESCO World Heritage.

PALLAVA DYNASTY (275–897 CE): South India. Shore Temple, Mahabalipuram. Spread Indian culture to Southeast Asia (Khmer, Java).

RASHTRAKUTA DYNASTY (753–982 CE): Deccan. Kailasa Temple at Ellora — carved from single rock, 80,000 tons removed.

PALA DYNASTY (750–1174 CE): Bengal/Bihar. Buddhist. Founded Nalanda and Vikramasila universities — world's greatest medieval universities. Nalanda: 10,000 students, 2,000 teachers, 9 million books (burned by Bakhtiyar Khilji 1193 CE).

DELHI SULTANATE (1206–1526 CE): Five dynasties:
• Mamluk (Slave) Dynasty 1206–1290
• Khilji Dynasty 1290–1320: Alauddin Khilji repels Mongols (4 times!), price controls
• Tughlaq Dynasty 1320–1413: Muhammad bin Tughlaq — moved capital to Daulatabad (disaster)
• Sayyid Dynasty 1414–1451
• Lodi Dynasty 1451–1526: Ibrahim Lodi defeated by Babur at Panipat`,
tags:["india","dynasty","gupta","chola","pallava","delhi sultanate","pala","nalanda","ancient","medieval"]},

{y:960,r:"East Asia & China",t:"Song, Yuan, Ming, Qing — Full Chinese Dynasty History",s:"China",type:"dynasty",
d:`TANG DYNASTY (618–907 CE): 'Cosmopolitan Golden Age.' Capital Chang'an (1 million people) — world's largest city. Female Emperor Wu Zetian (690–705 CE) — only woman to rule China as Emperor. Poetry: Li Bai, Du Fu. Buddhism flourishes. Silk Road peak.

SONG DYNASTY (960–1279 CE): Paper money, movable type printing (Bi Sheng, 1040 CE — 400 years before Gutenberg), gunpowder weapons. China's GDP: ~30% of world total. Compass first used for navigation. Northern Song falls to Jurchen Jin; Southern Song survives until Mongols.

YUAN DYNASTY (1271–1368 CE): Kublai Khan's Mongol dynasty. Marco Polo visits. China traumatized but connected to world trade.

MING DYNASTY (1368–1644 CE): Rebuilds China. Great Wall (current form). Zheng He's voyages (1405–33). Forbidden City built (1406–20). Population: 65 million → 200 million. China turns inward; discontinues exploration. Falls to Manchu invasions.

QING DYNASTY (1644–1912 CE): Manchu rulers. Peak under Qianlong Emperor (1735–96) — greatest territorial extent. Opium Wars (1839–42, 1856–60): Britain forces opium trade; Hong Kong ceded. 'Century of Humiliation.' Taiping Rebellion (1850–64): 20–30 million dead — deadliest civil war in history. Boxer Rebellion 1900. Last Emperor Puyi abdicates 1912.

REPUBLIC (1912–1949): Sun Yat-sen, warlords, Chiang Kai-shek, Communist Party (1921), Long March (1934–35, Mao). Japanese invasion (1937–45): 20 million Chinese dead. Civil War → People's Republic (1949).`,
tags:["china","dynasty","tang","song","yuan","ming","qing","dynasty","wu zetian","mongol","gunpowder","printing"]},

{y:1854,r:"East Asia & China",t:"Japan — Meiji Restoration & Rise of Japan",s:"Japan",type:"dynasty",
d:`JAPANESE DYNASTIES: Imperial line unbroken since 660 BCE (world's oldest hereditary monarchy). Emperor as divine figure.

FEUDAL JAPAN: Shogunate system. Kamakura (1185–1333), Muromachi (1336–1573), Sengoku (Warring States 1467–1615), Azuchi-Momoyama (1568–1600).

TOKUGAWA SHOGUNATE (1603–1868): Edo period. 250 years of stability and isolation (sakoku policy). Population 30 million. Samurai culture, Noh theatre, haiku, woodblock prints.

'BLACK SHIPS' OF PERRY (1853): US Commodore Matthew Perry's 4 steam warships in Edo Bay — forces Japan to open to trade (Convention of Kanagawa, 1854). Japan faces the same choice that China faced — submission or modernization.

MEIJI RESTORATION (1868): Emperor Meiji restored to power. Shogunate abolished. Japan decides: modernize completely or be colonized. In 40 years: adopts Western technology, law, military, education. Sends students to Germany (medicine, law), Britain (navy), France (army), USA (business). Built railways, steel mills, constitution (1889, modeled on Prussia).

RESULTS: Defeated China (1894–95), defeated Russia (1904–05 — first Asian defeat of European power in modern era — shocks the world). Annexed Korea (1910). Became a great power. Then: militarism, imperialism, Pearl Harbor, atomic bomb, defeat.

MODERN JAPAN (post-1945): Constitutional pacifism. Economic miracle — 2nd largest economy by 1968. Technology, automotive, electronics leader.`,
tags:["japan","meiji","shogunate","tokugawa","perry","modernization","asia","dynasty","sino-japanese","russo-japanese"]},

{y:1900,r:"Science, Philosophy & Discovery",t:"Aviation, Radio & Early 20th Century Inventions",s:"Global",type:"science",
d:`FLIGHT:
• Orville and Wilbur Wright (December 17, 1903, Kitty Hawk): First powered, controlled airplane flight. 12 seconds, 37 meters. By 1905: 39-minute flights.
• Louis Blériot: Crosses English Channel (1909).
• Charles Lindbergh: New York to Paris non-stop (1927) — 33.5 hours. $25,000 prize.
• Amelia Earhart: First woman to fly Atlantic solo (1932). Disappeared attempting circumnavigation (1937).
• Jet aircraft (1939). Chuck Yeager breaks sound barrier (1947). Commercial jet travel (Boeing 707, 1958). Concorde (1969–2003).

RADIO AND COMMUNICATION:
• Marconi (1901): Transatlantic radio signal (S in Morse code, from Cornwall to Newfoundland)
• Radio broadcasting: KDKA Pittsburgh (1920) — first commercial station
• Television: John Logie Baird demonstrates (1926); BBC broadcasts (1936)
• Telephone: Alexander Graham Bell (1876)

ELECTRICITY GRID:
• Tesla vs Edison ('War of Currents'): AC (Tesla/Westinghouse) vs DC (Edison). AC wins — enables long-distance transmission.
• Edison's Pearl Street Station (1882): First commercial electrical power system, New York.

AUTOMOBILE:
• Karl Benz (1886): Patent Motorwagen — first true automobile.
• Henry Ford (1908): Model T; Assembly line (1913) — revolutionizes manufacturing.
• 1920s: Mass automobile ownership transforms cities, culture, oil demand.`,
tags:["aviation","wright brothers","1903","radio","electricity","automobile","ford","tesla","edison","invention","science"]},

{y:1989,r:"Geopolitics & Diplomacy",t:"Post-Cold War Order — 1990s to 2001",s:"Global",type:"geopolitics",
d:`1989–2001: The 'Unipolar Moment' — USA as sole superpower.

GERMAN REUNIFICATION (October 3, 1990): First major consequence of Cold War's end.

GULF WAR (1990–91): First post-Cold War test of UN collective security. Succeeded — broad coalition, limited objectives.

YUGOSLAVIA DISSOLUTION (1991–2001): 6 new nations. Bosnian War (1992–95): 100,000+ killed; Srebrenica massacre (July 1995, 8,000 Bosniaks killed by Serb forces — UN 'safe area'). NATO intervention 1995 (Dayton Accords). Kosovo War 1998–99: NATO bombs Serbia without UN Security Council authorization. Kosovo declares independence 2008 — recognized by 117 countries.

NAFTA (1994): North American Free Trade Agreement — USA, Canada, Mexico. $1 trillion annual trade. Controversial: US manufacturing jobs move to Mexico; Mexican farmers displaced by subsidized US corn. Renegotiated as USMCA (2020).

WTO (1995): World Trade Organization replaces GATT. Rules-based international trade. China joins 2001.

RWANDA GENOCIDE (1994): 800,000 Tutsis and moderate Hutus killed in 100 days. UN had troops on the ground — ordered not to intervene. Bill Clinton: 'My greatest regret as president.'

NATO EXPANSION: Poland, Hungary, Czech Republic (1999). Baltic states, Bulgaria, Romania, Slovakia, Slovenia (2004). Russia's protest ignored — setting stage for 2022 Ukraine war.`,
tags:["post-cold war","1990","unipolar","yugoslavia","bosnia","srebrenica","rwanda","nafta","wto","nato expansion","geopolitics"]},

{y:2001,r:"Geopolitics & Diplomacy",t:"September 11 & War on Terror — 1422 AH",s:"USA/Afghanistan/Iraq",type:"geopolitics",
d:`September 11, 2001 / 23 Jumada al-Awwal 1422 AH. Al-Qaeda attacks: Twin Towers, Pentagon, United 93. 2,977 killed; 92 nationalities.

IMMEDIATE RESPONSE: President Bush declares 'War on Terror.' NATO invokes Article 5 (first ever).

AFGHANISTAN (October 7, 2001 / Rajab 1422 AH): Operation Enduring Freedom. Taliban government falls within weeks. Bin Laden escapes Tora Bora. Afghanistan War: 20 years, $2.3 trillion US expenditure, 240,000 total dead. Taliban retake power August 15, 2021 — exact same day as before US intervention.

IRAQ WAR (March 20, 2003): No UN authorization. Claims: WMDs (none found), Saddam-Al Qaeda link (false). Saddam Hussein captured December 2003, executed December 30, 2006. 500,000–600,000+ Iraqis dead. $2 trillion US cost. Power vacuum → Al-Qaeda in Iraq → ISIS/ISIL/Daesh.

ISIS (2013–present): Declared 'Caliphate' June 29, 2014 / 1 Ramadan 1435 AH. Territory: Iraq + Syria. Atrocities: beheadings, Yazidi genocide, destruction of Mosul Museum. Defeated militarily 2019. 'Caliphate' ended. But ideology persists globally.

OBL KILLED: May 2, 2011 / 28 Jumada al-Awwal 1432 AH. Abbottabad, Pakistan. US Navy SEALs. JSOC Operation Neptune Spear.

'DRONE WARFARE': US targeted killings in 7+ countries. 14,000+ drone strikes by US. 910+ civilian deaths (conservative estimates — actual much higher).`,
tags:["9/11","1422 AH","2001","war on terror","afghanistan","iraq","ISIS","bin laden","drone","USA","islam"]},

{y:2003,r:"Science, Philosophy & Discovery",t:"Human Genome, Mars & Space Age",s:"Global",type:"science",
d:`HUMAN GENOME PROJECT (2003): After 13 years, all 3.2 billion base pairs of human DNA mapped. Cost: $3 billion. Now done for $600 in 48 hours. 99.9% of DNA is identical in all humans. 20,000–25,000 genes (less than corn). 8% of human genome is from ancient viruses. Foundation of personalized medicine.

MARS EXPLORATION:
• Mars Pathfinder (1997): Sojourner rover — first mobile Mars surface mission
• Spirit and Opportunity (2004): Golf cart-sized rovers. Opportunity operates 15 years (planned 90 days)
• Curiosity (2012): Car-sized rover — confirms ancient Mars had liquid water
• Perseverance (2021): Collects samples for return to Earth. Ingenuity helicopter — first powered flight on another planet

CERN & HIGGS BOSON (2012): Large Hadron Collider discovers Higgs Boson ('God Particle') — confirms the Standard Model of particle physics. 27km tunnel under France-Switzerland border.

GRAVITATIONAL WAVES (2015): LIGO detects gravitational waves from two black holes merging 1.3 billion light-years away — confirms Einstein's 100-year-old prediction.

BLACK HOLE IMAGE (2019): Event Horizon Telescope captures first image of a black hole — Messier 87, 6.5 billion solar masses, 55 million light-years away.

WEBB TELESCOPE (2022): Infrared images of galaxies formed 13.6 billion years ago — 400 million years after Big Bang.`,
tags:["genome","mars","higgs boson","CERN","gravitational waves","black hole","webb telescope","space","science","21st century"]},

{y:2023,r:"Middle East & Levant",t:"Gaza War — October 7, 2023 — 1445 AH",s:"Gaza, Palestine",type:"battle",
d:`7 October 2023 / 21 Rabi al-Awwal 1445 AH. OPERATION AL-AQSA FLOOD: Hamas launches attack from Gaza — 1,200 Israelis killed at Nova music festival and kibbutzim; ~250 taken hostage.

Israel declares war. OPERATION SWORDS OF IRON begins.

BLOCKADE: Gaza (2.3 million people) — total blockade of food, water, fuel, medicine. Northern Gaza ordered evacuated.

GROUND INVASION (October 27, 2023): Israeli forces enter northern Gaza. Systematic destruction.

SCALE OF DESTRUCTION (as of mid-2024):
• 40,000+ Palestinians killed (60% women and children per UN)
• 90% of Gaza's 2.3 million population displaced
• 70% of housing destroyed
• All major hospitals damaged or destroyed
• Al-Shifa Hospital (largest) — raided by Israeli forces
• Food/famine — northern Gaza declared Phase 5 (Catastrophic) famine

INTERNATIONAL COURT OF JUSTICE: South Africa's genocide case. January 26, 2024 / 15 Rajab 1445 AH: ICJ orders Israel to prevent genocidal acts. Order not implemented.

REGIONAL ESCALATION:
• Hezbollah (Lebanon): Cross-border rockets daily
• Houthis (Yemen): Missile attacks on Red Sea shipping
• Iran attacks Israel directly (April 13–14, 2024)
• Israel attacks Iranian consulate in Damascus (April 1, 2024)

Masjid al-Aqsa — the first qibla of Islam, site of the Prophet's ﷺ Night Journey — at the center of the conflict.`,

{y:767,r:"Islamic Scholarship",t:"Imam Jafar al-Sadiq — Teacher of Imams",s:"Medina",type:"madhab",
d:`Jafar ibn Muhammad al-Sadiq (83–148 AH / 702–765 CE). Sixth Imam in Shia tradition. Great-grandson of Ali RA and great-grandson of Abu Bakr RA through his mother. Taught both Imam Abu Hanifa RA and Imam Malik RA — making him the intellectual grandfather of all four madhabs.

His school in Medina attracted 4,000 students from across the Muslim world. Subjects: fiqh, hadith, theology, chemistry (his student Jabir ibn Hayyan — 'father of chemistry' — attributed many works to him), astronomy.

Known for: extraordinary piety, refusal to engage in political conflicts, vast encyclopedic knowledge. His legal opinions form the basis of Ja'fari (Shia) fiqh — the fifth major school of Islamic law, dominant in Iran, Iraq (Shia majority), Bahrain, and parts of Lebanon.

Quote: 'The scholar who does not act on his knowledge is like a lamp that gives light to others but burns itself.'`,
tags:["jafar sadiq","83 AH","medina","scholar","shia","madhab","chemistry","teacher","islam"]},

{y:855,r:"Islamic Scholarship",t:"Ibn Taymiyya — Reformist Scholar — 661 AH Born",s:"Harran → Damascus",type:"madhab",
d:`Taqi al-Din Ahmad ibn Taymiyya (661–728 AH / 1263–1328 CE). Born in Harran (modern Turkey/Syria border), family fled Mongol invasion to Damascus.

CONTEXT: Post-Mongol Islamic world in crisis. Many scholars retreating into blind imitation (taqlid). Ibn Taymiyya calls for return to Quran and Sunnah directly — ijtihad over taqlid.

KEY POSITIONS: Strict Hanbali. Criticised certain Sufi practices (grave worship). Fatwa that Mongol rulers who nominally converted to Islam were still to be fought (they maintained pre-Islamic Mongol law — Yasa — alongside sharia). This fatwa justified resistance to unjust Muslim rulers — later misused by radical groups.

IMPRISONMENT: Imprisoned 6 times by Mamluk authorities for controversial fatwas. Died in prison (Damascus Citadel, 728 AH). Reportedly writing until his last days — pen and paper taken away as punishment; he continued writing with charcoal on the prison walls.

INFLUENCE: Enormous on later Islamic reform movements. Muhammad ibn Abd al-Wahhab (18th century) heavily influenced by him. Sayyid Qutb (20th century) references him. BOTH mainstream Islamic scholarship AND Salafi-Wahhabi movements claim his legacy — the former emphasizing his nuance, the latter his anti-innovation stance.

His student Ibn al-Qayyim al-Jawziyya (691–751 AH) systematized his thought into accessible books.`,
tags:["ibn taymiyya","661 AH","1263","damascus","reform","hanbali","salafi","madhab","mongol","scholarship"]},

{y:1200,r:"Islamic Scholarship",t:"Al-Ghazali — Reviver of Islamic Sciences",s:"Khorasan → Baghdad → Jerusalem",type:"madhab",
d:`Abu Hamid Muhammad al-Ghazali (450–505 AH / 1058–1111 CE). Born Tus, Khorasan (Iran). Called 'Hujjat al-Islam' (Proof of Islam).

CAREER: Brilliant legal scholar, becomes Professor at Nizamiyya University in Baghdad (world's most prestigious post) at age 33. At peak of fame — suffers a spiritual crisis. Cannot speak for months. Resigns position. Travels for 11 years: Syria, Palestine, Mecca, Medina — spiritual seeking.

IHYA ULUM AL-DIN (Revival of the Religious Sciences): His masterwork. 40 books organized in four quarters: Acts of Worship, Social Customs, Destructive Vices, Saving Virtues. Integrates Islamic law, ethics, spirituality, and psychology. Still one of the most widely read Islamic books.

THE INCOHERENCE OF THE PHILOSOPHERS (Tahafut al-Falasifa): Critiques Aristotelian philosophy as used by al-Farabi and Ibn Sina — particularly their claims that the world is eternal (uncreated), God does not know particulars, bodily resurrection is false. Ibn Rushd (Averroes) responds with 'Incoherence of the Incoherence.'

CONTRIBUTION: He reconciled Islamic law (fiqh) with spirituality (tasawwuf) — showing they are not opposites but complements. Without his work, Sufism and Sharia scholarship might have become completely separate traditions.

Napoleon Bonaparte reportedly carried a French translation of Ihya Ulum al-Din in his campaigns.`,
tags:["ghazali","450 AH","1058","ihya","philosophy","spirituality","fiqh","khorasan","baghdad","islam","revival"]},

{y:1165,r:"Islamic Scholarship",t:"Ibn Rushd (Averroes) & Ibn Arabi — Andalusian Giants",s:"Córdoba, Spain",type:"madhab",
d:`IBN RUSHD / AVERROES (520–595 AH / 1126–1198 CE): Born Córdoba. Greatest Islamic commentator on Aristotle. His Latin translations and commentaries directly sparked European Scholasticism and the Renaissance. Dante placed him in Limbo (alongside Aristotle) — the highest honor a medieval Christian could give a Muslim.

Wrote: 'The Incoherence of the Incoherence' — defending philosophy against al-Ghazali. Medicine: 'Kulliyyat' (Colliget in Latin) — general principles of medicine. Dominated European medical education alongside Ibn Sina.

Thomas Aquinas calls him simply 'The Commentator' (as Aristotle is 'The Philosopher') — meaning no other commentator needed naming. His work enabled the synthesis of faith and reason in Catholic theology.

IBN ARABI (560–638 AH / 1165–1240 CE): Born Murcia, Spain. The 'Greatest Master' (Al-Shaykh al-Akbar). Most complex metaphysical thinker in Islamic history. 

Key works: 'Fusus al-Hikam' (Bezels of Wisdom), 'Al-Futuhat al-Makkiyya' (Meccan Illuminations — 37 volumes). 

Doctrine of Wahdat al-Wujud (Unity of Existence): reality is ultimately one, and all existence is a manifestation of the Divine Being. Controversial — critics call it pantheism; supporters call it the deepest mystical theology.

Died in Damascus. His shrine is still visited.`,
tags:["ibn rushd","averroes","ibn arabi","520 AH","andalus","spain","philosophy","aristotle","scholasticism","sufism","mysticism"]},

{y:1400,r:"Islamic Scholarship",t:"Ottoman & Mamluk Scholarship — Islamic Law Institutionalized",s:"Cairo/Istanbul",type:"madhab",
d:`POST-MONGOL INSTITUTIONAL SCHOLARSHIP:

MAMLUK SULTANATE ULEMA (1250–1517 CE): Cairo becomes the new intellectual center after Baghdad's destruction. Al-Azhar University (founded 970 CE by Fatimid Caliph al-Muizz) grows into the world's preeminent Islamic university — still operating today, ~40,000 students.

IBN KHALDUN (732–808 AH / 1332–1406 CE): Greatest historian and sociologist in the medieval world. 'Muqaddimah' (Introduction to History) — first scientific theory of history. Concepts: Asabiyya (social cohesion/group feeling) explains rise and fall of dynasties. Cyclical theory of civilizations. Economic cycle (lower taxes → prosperity → higher taxes → decline). Predicted colonial exploitation of Africa 150 years before it happened. Toynbee called him 'undoubtedly the greatest work of its kind that has ever been created by any mind in any time or place.'

OTTOMAN SHAYKH AL-ISLAM: The Mufti of Istanbul — highest religious authority in the Ottoman Empire. His fatwas had the force of law. Could theoretically depose the Sultan for violating sharia (theoretical — rarely exercised). Abu al-Suud Efendi (1490–1574 CE) was the greatest — reconciled Ottoman administrative law (kanun) with sharia.

SUYUTI (849–911 AH / 1445–1505 CE): Egyptian polymath. 600+ works including Al-Itqan (sciences of the Quran), Tafsir al-Jalalayn (completed), comprehensive hadith works. Last scholar to claim title of Mujaddid (Renewer).`,
tags:["al-azhar","ibn khaldun","ottoman","mamluk","cairo","fiqh","scholarship","muqaddimah","1400","islam"]},

// ═══ ADDITIONAL CENTRAL ASIA ═══
{y:1370,r:"Central Asia & Steppes",t:"Timur (Tamerlane) — Conqueror of Empires",s:"Samarkand, Uzbekistan",type:"empire",
d:`Timur ibn Taraghay Barlas (736–807 AH / 1336–1405 CE). Born near Samarkand. Claimed descent from Genghis Khan through his mother. Limped due to battle wounds — 'Timur-e-Lang' (Timur the Lame) → Tamerlane.

CAMPAIGNS (35 years of conquest, never defeated):
• Persia: Conquered and reconquered repeatedly. Isfahan massacre (1387): 70,000 killed, tower of skulls built.
• Golden Horde Russia: Defeated Khan Tokhtamysh at Battle of the Terek (1395). Destroyed Astrakhan and Sarai.
• India: Sacked Delhi (1398). 100,000 Hindu prisoners massacred before battle — 'lest they cause trouble.' Delhi depopulated for years.
• Ottoman Empire: Battle of Ankara (1402). Captured Sultan Bayezid I — kept in a cage (disputed by some historians). Restored Anatolian beyliks.
• Syria: Sacked Damascus (1401), killed thousands, took artisans to Samarkand.
• Egypt: Planned invasion — death prevented it.

SAMARKAND under TIMUR: Transformed into world's most beautiful city. Registan Square. Shah-i-Zinda necropolis. Bibi-Khanym Mosque. Brought master craftsmen from every conquered city. Patronized poets, astronomers, historians.

GRANDSON ULUGH BEG (850–853 AH / 1447–1449 CE): Astronomer-Sultan. Built the largest sextant in history. Star catalog of 1,018 stars — accurate to 1 arcminute. Calculated length of the sidereal year to within 58 seconds. Assassinated by his own son.

Death toll of Timur's campaigns: estimated 17 million (5% of then world population).`,
tags:["timur","tamerlane","736 AH","1336","samarkand","conquest","delhi","ottoman","ankara","ulugh beg","central asia"]},

{y:1240,r:"Central Asia & Steppes",t:"Mongol Successor States",s:"Eurasia",type:"empire",
d:`After Genghis Khan's death (1227) and Kublai Khan's consolidation, the Mongol Empire split into four major Khanates:

YUAN DYNASTY (1271–1368 CE): Kublai Khan rules China. Marco Polo serves as official. World's most sophisticated administration. First paper currency at scale. Religious tolerance — Nestorian Christians, Buddhists, Muslims all protected.

ILKHANATE (1256–1335 CE): Hulagu Khan rules Persia/Iraq. Destroyed Abbasid Caliphate (1258). Hulagu's successors convert to Islam — Mahmud Ghazan (694 AH / 1295 CE) converts and makes Islam state religion. Rashid al-Din writes 'Jami al-Tawarikh' — world's first illustrated universal history.

GOLDEN HORDE (1242–1502 CE): Batu Khan rules Russia, Kazakhstan, Ukraine. Moscow, Vladimir, Kiev all tributaries. Berke Khan (first Mongol ruler to convert to Islam, 1252) — ally of Mamluk Baybars. Golden Horde eventually absorbed into Russian Empire.

CHAGATAI KHANATE (1226–1347 CE): Central Asia. Eventually splits — eastern part becomes Moghulistan, western becomes Transoxiana. Timur arises from this context.

SIGNIFICANCE: Mongol destruction created a geopolitical vacuum that Timur, the Ottomans, Mamluks, and Safavids filled. The 'Pax Mongolica' (Mongol Peace) — despite catastrophic violence — enabled East-West trade on unprecedented scale.`,
tags:["mongol","khanate","yuan","ilkhanate","golden horde","chagatai","kublai","hulagu","berke","central asia"]},

{y:1500,r:"Central Asia & Steppes",t:"Kazakh Khanate & Steppe Nomads",s:"Kazakhstan/Central Asia",type:"dynasty",
d:`THE KAZAKH KHANATE (1456–1847 CE): Founded by Kerey Khan and Janybek Khan after breaking from the Uzbek Khanate. Dominated the vast Kazakh steppe.

THREE ZHUZ (hordes): Great Zhuz (south), Middle Zhuz (center/east), Little Zhuz (west). Each semi-autonomous but unified under a Khan.

KAZAKHS and RUSSIA: Russian Empire gradually encroaches from the 18th century. Little Zhuz submits to Russia (1731) for protection against Dzungar Kalmyks. Russia uses divide-and-conquer. By 1847 all three Zhuz under Russian control.

UZBEK KHANATES: After Timur's death — Shaybanids control Uzbekistan. Three khanates dominate 16th–19th centuries: Khanate of Bukhara (capital: Bukhara), Khanate of Khiva (Khwarezm), Khanate of Kokand. All fall to Russian Empire (1865–1876).

DZUNGAR KHANATE (1634–1758): Last great nomadic empire. Buddhist Oirat Mongols. Devastated Kazakh population (1723–25: 'Great Catastrophe' — up to 40% of Kazakhs killed). Wiped out by Qing China (1755–57) — genocide: 600,000–800,000 Dzungars killed. Near-complete ethnic destruction.

CENTRAL ASIA under RUSSIA: 1865: Tashkent captured. 1868: Bukhara becomes protectorate. 1873: Khiva. 1876: Kokand annexed. 1885: Merv (completing subjugation of Turkmenistan). Cotton monoculture imposed — Aral Sea disaster begins.`,
tags:["kazakh","uzbek","central asia","khanate","russia","steppe","dzungar","bukhara","khiva","nomad","dynasty"]},

// ═══ MORE INDIA ═══
{y:1600,r:"Indian Subcontinent",t:"Maratha Empire — Shivaji Bhonsle",s:"Deccan, India",type:"dynasty",
d:`CHHATRAPATI SHIVAJI MAHARAJ (1630–1680 CE): Founded the Maratha Empire. Born to a Marathi nobleman. Carved out independent kingdom from Mughal and Bijapur Sultanate territory through guerrilla warfare in the Western Ghats (Sahyadri mountains).

CORONATION: June 6, 1674 CE — crowned Chhatrapati (Paramount Sovereign). First Hindu king in the Deccan in generations.

INNOVATIONS: Introduced concept of Swaraj (self-rule) and Hindu political identity. Created a professional navy — 'Father of the Indian Navy.' Built 300+ forts. Forbade mistreatment of women and non-combatants in conquered territories (revolutionary for the era). Protected mosques and Muslim civilians.

MUGHAL CONFRONTATION: Captured Fort Shaista Khan's fingers in a midnight raid. Escaped Aurangzeb's custody in Agra in a fruit basket (1666). 

MARATHA EXPANSION: After Shivaji's death, the Peshwa (Prime Ministers from Chitpavan Brahmin family) dominated. PEAK: 1760 — Marathas controlled most of India from Pune.

THIRD BATTLE OF PANIPAT (January 14, 1761): Ahmad Shah Durrani (Afghan) defeats Marathas — 100,000+ Maratha casualties. Ended Maratha dominance but not the empire. Marathas revive under Mahadji Shinde, Holkars, Gaekwads. Eventually fall to British (1818).

Maratha legacy: shaped modern Maharashtra, the concept of Swaraj (later adopted by Gandhi), and Indian Hindu political identity.`,
tags:["shivaji","maratha","1630","deccan","india","peshwa","panipat","swaraj","mughal","dynasty"]},

{y:1740,r:"Indian Subcontinent",t:"Hyderabad, Mysore & Sikh Empire",s:"India",type:"dynasty",
d:`NIZAMS OF HYDERABAD (1724–1948 CE): Mir Qamar ud-Din Khan Siddiqi (Nizam-ul-Mulk) founds the most powerful princely state in India. 6 Nizams over 224 years. Richest ruler in the world in the 1930s (Mir Osman Ali Khan — estimated $230 billion in today's value). Hyderabad annexed by India by military force ('Police Action') September 17, 1948.

KINGDOM OF MYSORE: Hyder Ali (1761–1782) and Tipu Sultan (1782–1799). Tipu Sultan — 'Tiger of Mysore.' Innovated: rocket artillery (iron-cased rockets — inspired Congreve rockets used in Napoleonic Wars). Sought alliance with Napoleon and Ottoman Turks against British. Died defending his capital Srirangapatna against British forces (May 4, 1799). British regarded him as their most dangerous Indian opponent.

SIKH EMPIRE (1799–1849 CE): Maharaja Ranjit Singh (1780–1839) — 'Lion of Punjab.' United Sikh misls into single empire. Capital: Lahore. Controlled Punjab, Kashmir, Khyber Pakhtunkhwa. Multicultural court: Sikh, Hindu, Muslim officials. French and Italian generals in his army (post-Napoleonic wars veterans). 

After his death: British-Sikh Wars. Second Anglo-Sikh War (1849): Punjab annexed. Koh-i-Noor diamond taken by British — now in Crown Jewels. Sikh soldiers become the most valued in British Indian Army.`,
tags:["hyderabad","mysore","tipu sultan","sikh empire","ranjit singh","india","dynasty","1740","nizam","punjab"]},

{y:1885,r:"Indian Subcontinent",t:"Indian National Congress & Independence Movement",s:"India",type:"geopolitics",
d:`INDIAN NATIONAL CONGRESS (INC): Founded December 28, 1885 in Bombay by A.O. Hume (British civil servant), Dadabhai Naoroji, Dinshaw Wacha. Initially a moderate reform organization. Transformed into mass independence movement.

KEY FIGURES:
• BAL GANGADHAR TILAK (1856–1920): 'Swaraj is my birthright and I shall have it!' First mass agitation.
• GOKHALE (1866–1915): Moderate. Mentor of both Gandhi and Jinnah.
• MOHANDAS GANDHI (1869–1948): Returns from South Africa 1915. Non-cooperation movement (1920–22). Civil Disobedience/Salt March (March 12–April 6, 1930) — 388 km walk to Dandi to make salt illegally. Quit India Movement (1942): 'Do or Die.' Assassinated January 30, 1948 by Hindu nationalist Nathuram Godse.
• JAWAHARLAL NEHRU (1889–1964): First PM of India. Socialism + secularism. Non-aligned Movement.
• SUBHAS CHANDRA BOSE (1897–1945): 'Netaji.' Indian National Army (INA) with Japanese support. 'Give me blood, I will give you freedom.'
• MUHAMMAD ALI JINNAH (1876–1948): Lahore Resolution 1940 — Pakistan demand. Pakistan created August 14, 1947.

AMRITSAR MASSACRE (April 13, 1919): General Dyer orders troops to fire on unarmed crowd in Jallianwala Bagh — 379–1,000 killed. Radicalizes entire independence movement. Udham Singh assassinates Dyer's superior (Michael O'Dwyer) in London, 1940.`,
tags:["congress","gandhi","nehru","1885","independence","india","salt march","jinnah","bose","amritsar","colonial"]},

// ═══ MORE EAST ASIA ═══
{y:645,r:"East Asia & China",t:"Japan's Taika Reform & Nara Period",s:"Japan",type:"dynasty",
d:`TAIKA REFORM (645 CE): Prince Naka no Ōe (later Emperor Tenji) and Nakatomi no Kamatari overthrow the Soga clan. 'Taika' (Great Change). Model Chinese Tang Dynasty administration. Land nationalized; tax system based on Tang China.

NARA PERIOD (710–794 CE): First permanent capital at Nara. Buddhism becomes state religion. Tōdai-ji Temple built (752 CE) — houses world's largest bronze Buddha (15m tall, 500 tons of bronze). Kojiki (712 CE) and Nihon Shoki (720 CE) — Japan's foundational historical chronicles. Manyoshu — first great poetry anthology (4,500 poems).

HEIAN PERIOD (794–1185 CE): Capital moved to Kyoto. Aristocratic culture. Lady Murasaki Shikibu writes 'The Tale of Genji' (~1010 CE) — widely considered the world's first novel. Kana syllabary developed. Buddhism + Shinto synthesis. Court culture reaches peak refinement.

KAMAKURA PERIOD (1185–1333 CE): Minamoto Yoritomo becomes first Shogun (1192). Military feudalism replaces court aristocracy. Samurai class dominant. ZEN Buddhism introduced from China. Mongol invasions (1274, 1281): Typhoons ('Kamikaze' — Divine Wind) destroy Mongol fleets both times.

MUROMACHI/ASHIKAGA (1336–1573): Civil wars. Ōnin War (1467–77). Noh theatre, tea ceremony, ikebana (flower arranging), Zen rock gardens.`,
tags:["japan","nara","heian","kamakura","taika","shogun","buddhism","genji","samurai","kamikaze","dynasty"]},

{y:1850,r:"East Asia & China",t:"Meiji Japan to Pacific War",s:"Japan",type:"dynasty",
d:`MEIJI RESTORATION (1868): Emperor Meiji restored; Shogunate abolished. Japan adopts Western technology while maintaining Japanese identity. Sent 100+ missions to Europe and USA. German-style military, British-style navy, French-style legal code, American-style public education.

SINO-JAPANESE WAR (1894–95): China defeated. Taiwan and Pescadores ceded to Japan. Korea becomes Japanese sphere. World shocked — China, the ancient civilization, defeated by 'upstart' Japan.

RUSSO-JAPANESE WAR (1904–05): Japan defeats Russia at Mukden (land) and Tsushima (sea). First Asian defeat of European great power in modern era. Inspires anti-colonial movements across Asia and Africa. Theodore Roosevelt mediates Treaty of Portsmouth (Nobel Peace Prize).

TAISHO DEMOCRACY (1912–26): Liberal period. Universal male suffrage (1925).

MANCHURIA INVASION (1931): Japan creates puppet state Manchukuo. Nanjing Massacre (December 1937–January 1938): 200,000–300,000 Chinese civilians and POWs killed. Imperial Army's most notorious atrocity.

WORLD WAR II PACIFIC: Pearl Harbor (December 7, 1941). Japan conquers Southeast Asia in months (British Singapore falls February 1942 — 'worst British defeat in history'). Battle of Midway (June 1942): turning point. Island-hopping campaign. Hiroshima (August 6, 1945), Nagasaki (August 9). Emperor Hirohito surrenders September 2, 1945.

POSTWAR CONSTITUTION (1947): Article 9 — Japan renounces war. US occupation under MacArthur. Economic miracle.`,
tags:["meiji","japan","1868","sino-japanese","russo-japanese","manchuria","nanjing","pearl harbor","hiroshima","postwar","dynasty"]},

{y:1950,r:"East Asia & China",t:"Mao's China — People's Republic",s:"China",type:"dynasty",
d:`October 1, 1949: Mao Zedong proclaims People's Republic of China. Chiang Kai-shek retreats to Taiwan (Republic of China — still claims to be the legitimate Chinese government).

KOREAN WAR (1950–53): China enters after US/UN forces approach the Yalu River. 'Human wave' tactics. 180,000 Chinese casualties. Stalemate at 38th parallel.

GREAT LEAP FORWARD (1958–62): Mao's plan to rapidly industrialize China. Backyard steel furnaces (melted down farm tools). Agricultural collectivization. FAMINE: 15–55 million die (most scholarly estimates: 30–45 million) — worst famine in human history. Cause: impossible quotas, falsified reports, natural disasters.

CULTURAL REVOLUTION (1966–76): Red Guards (youth militia). 'Destroy the Four Olds': old customs, culture, habits, ideas. Universities closed 4 years. Intellectuals, teachers, doctors sent to countryside for 're-education.' 500,000–2 million killed; millions imprisoned or exiled internally.

DENG XIAOPING (1978–1992): 'Reform and Opening Up.' Market economy within Communist Party framework. GDP grows 9.5% annually for 40 years — greatest economic transformation in human history. Tiananmen Square massacre (June 4, 1989): hundreds to thousands of pro-democracy protesters killed. 

XI JINPING (2013–present): 'China Dream.' Belt and Road Initiative. Xinjiang (Uyghur) crackdown. Hong Kong autonomy ended (2020). Taiwan tensions. 'Wolf Warrior' diplomacy.`,
tags:["mao","PRC","1949","great leap forward","cultural revolution","deng","xi jinping","china","dynasty","tiananmen"]},

// ═══ MORE AMERICAS ═══
{y:1750,r:"Americas & Pacific",t:"Aztec & Inca — Pre-Columbian Empires",s:"Mexico/Peru",type:"empire",
d:`AZTEC EMPIRE / TRIPLE ALLIANCE (1428–1521 CE):
Capital: Tenochtitlan (modern Mexico City) — island city on Lake Texcoco. Population: 200,000–300,000 (larger than any European city at the time). Floating gardens (chinampas). Causeways 8km long. Aqueducts.

RELIGION: Sun god Huitzilopochtli required human blood to keep the sun moving. Flowery Wars (Xochiyaoyotl) — ritual wars specifically for captives for sacrifice. Scale debated: 20,000 per year at Templo Mayor (Spanish accounts, possibly exaggerated) to several thousand.

FALL: Hernán Cortés arrives with 508 Spaniards + horses + dogs + smallpox. Alliance with Tlaxcalans (enemies of Aztec). Emperor Moctezuma II captured (June 1520). 'Noche Triste' (Sad Night) — Spanish flee, 600 killed. Battle of Otumba. Final siege of Tenochtitlan (May–August 1521): 240,000 Tlaxcalan allies. Cuauhtémoc (last Aztec emperor) captured. City razed.

INCA EMPIRE / TAWANTINSUYU (1438–1533 CE):
Four regions, capital: Cusco (navel of the world). 12 million people. 40,000 km of roads (surpassing Roman roads). Quipu (knotted string records). Mita (labor tax). Relay runners: messages traveled 2,400 km in 5 days.

FALL: Francisco Pizarro with 168 men captures Emperor Atahualpa at Cajamarca (November 16, 1532). Ransom: room filled with gold and silver — paid, then Atahualpa strangled anyway. Smallpox had already killed Emperor Huayna Capac and triggered civil war — Pizarro exploited this.`,
tags:["aztec","inca","tenochtitlan","moctezuma","cortés","pizarro","1428","1438","americas","pre-columbian","empire"]},

{y:1800,r:"Americas & Pacific",t:"US Civil War to Gilded Age",s:"USA",type:"dynasty",
d:`GILDED AGE (1870s–1900): Mark Twain's term. Rapid industrialization, immigration, urbanization — and extreme inequality.

ROBBER BARONS: John D. Rockefeller (Standard Oil — 90% of US oil by 1882), Andrew Carnegie (steel), J.P. Morgan (banking), Cornelius Vanderbilt (railroads). First US billionaires.

TRANSCONTINENTAL RAILROAD (1869): Golden Spike at Promontory Summit, Utah. Central Pacific (Chinese laborers from west) meets Union Pacific (Irish laborers from east). Transformed the continent.

NATIVE AMERICAN GENOCIDE: Indian Removal Act (1830) → Trail of Tears (1838: 4,000 Cherokee die). Plains Wars (1865–90). Battle of Little Bighorn (1876): Custer's Last Stand — Lakota/Cheyenne victory. Wounded Knee Massacre (1890): 250–300 Lakota killed. Buffalo exterminated: 30 million → 300 by 1889.

SPANISH-AMERICAN WAR (1898): 'Splendid Little War.' Cuba, Puerto Rico, Philippines, Guam acquired. USA becomes Pacific power. Beginning of American imperialism.

PROGRESSIVE ERA (1900–1920): Trust-busting (Theodore Roosevelt). Pure Food and Drug Act. Women's suffrage: 19th Amendment (1920). Federal Reserve created (1913). Income tax (1913, 16th Amendment).

GREAT DEPRESSION (1929–39): Wall Street Crash October 24, 1929. Unemployment: 25%. FDR's New Deal — Social Security, FDIC, SEC. Keynesian economics mainstreamed.`,
tags:["gilded age","usa","rockefeller","carnegie","railroad","native american","wounded knee","1870","progressive","new deal","dynasty"]},

{y:1959,r:"Americas & Pacific",t:"Cuban Revolution & Latin American Cold War",s:"Latin America",type:"geopolitics",
d:`CUBAN REVOLUTION (1959): Fidel Castro, Che Guevara, Raul Castro — guerrilla campaign from Sierra Maestra. Batista flees January 1, 1959. Cuba becomes communist. US breaks diplomatic relations (1961).

BAY OF PIGS (April 17–19, 1961): CIA-trained Cuban exiles invade. Catastrophic failure — complete defeat in 3 days. Kennedy humiliated. Castro's position strengthened.

CUBAN MISSILE CRISIS (October 1962): See Geopolitics section.

CIA COLD WAR INTERVENTIONS IN LATIN AMERICA:
• Guatemala (1954): Operation PBSUCCESS — overthrows democratically elected Jacobo Árbenz (nationalized United Fruit Company land). Installs dictatorship.
• Chile (September 11, 1973): Operation CONDOR. General Pinochet overthrows Salvador Allende (elected socialist president). Allende dies in the coup (suicide or murder — disputed). Pinochet regime: 3,000+ killed, 30,000+ tortured, 200,000+ exiled.
• Nicaragua (1980s): Contras (US-backed) vs Sandinistas. Iran-Contra Affair.
• Panama (1989): Operation Just Cause — USA invades, removes Noriega.

CHE GUEVARA (1928–1967): Argentine revolutionary. Key in Cuban Revolution. Attempted revolutions in Congo and Bolivia. Captured and executed by Bolivian army (CIA assistance) October 9, 1967. His image (by Korda) becomes most reproduced photograph in history.`,
tags:["cuba","castro","che guevara","bay of pigs","1959","latin america","CIA","chile","pinochet","cold war","revolution"]},

{y:1957,r:"Americas & Pacific",t:"Oceania & Pacific — Australia, New Zealand, Pacific Nations",s:"Pacific/Oceania",type:"dynasty",
d:`AUSTRALIA: Aboriginal Australians have lived on the continent for 65,000+ years — among the oldest continuous cultures on Earth. Captain James Cook claims eastern Australia for Britain (1770). First Fleet arrives at Sydney Cove (January 26, 1788 — Australia Day/Invasion Day). 6 colonies federated as Commonwealth of Australia (January 1, 1901). White Australia Policy (1901–1973) excluded non-white immigration. Stolen Generations: Aboriginal children removed from families (1910–1970). Apology: Prime Minister Kevin Rudd formally apologizes (February 13, 2008).

NEW ZEALAND: Maori arrived from East Polynesia ~1280 CE. Abel Tasman sights it (1642). Cook maps it (1769–70). Treaty of Waitangi (February 6, 1840): Maori chiefs cede sovereignty to British Crown in exchange for guaranteed rights — two versions (English vs Maori) interpreted differently. First country to grant women the vote (September 19, 1893).

PACIFIC ISLAND NATIONS:
• Hawaii: Kingdom of Hawaii (1795–1893). US businessmen overthrow Queen Liliuokalani (1893). Annexed by USA (1898). 50th US state (1959).
• Papua New Guinea: Independent 1975 (from Australian mandate).
• Fiji: Independent 1970. Four coups (1987, 1987, 2000, 2006).
• Samoa, Tonga, Vanuatu, Solomon Islands — all gain independence 1960s–1980s.
• French Polynesia, New Caledonia: French territories — ongoing independence debates.`,
tags:["australia","new zealand","pacific","oceania","aboriginal","maori","waitangi","1788","1901","indigenous","dynasty"]},

// ═══ MORE AFRICA ═══
{y:1250,r:"Africa & Egypt",t:"Swahili Coast, Great Zimbabwe & East Africa",s:"East Africa",type:"civilization",
d:`SWAHILI COAST (800–1700 CE): Series of city-states along East African coast — Kilwa, Mombasa, Zanzibar, Malindi, Lamu, Sofala. Hybrid Bantu-Arab-Islamic culture. Swahili language = Bantu grammar + Arabic vocabulary.

Kilwa Kisiwani (Island of Kilwa): Peak 13th–15th centuries. Controlled gold trade from Zimbabwe interior. Ibn Battuta visits (1331): 'One of the most beautiful and well-constructed towns in the world.' Great Mosque of Kilwa — largest mosque in sub-Saharan Africa.

GREAT ZIMBABWE (1100–1450 CE): Capital of Kingdom of Zimbabwe (Rozvi/Shona people). Dry-stone walls 9m high, 5m wide — 900,000 granite blocks fitted without mortar. Palace complex, tower, enclosures. Population: 18,000. Controls gold and ivory trade to Swahili Coast. Zimbabwean dollar and flag feature the Zimbabwe Bird (soapstone figure found there).

PORTUGUESE ARRIVAL (1498): Vasco da Gama reaches India via Cape of Good Hope. Portuguese establish trading posts on Swahili Coast — violence disrupts existing trade networks. Fort Jesus, Mombasa (1593) — fighting between Portuguese and Omani Arabs for control.

OMANI EMPIRE OF EAST AFRICA (1698–1856): Zanzibar as base. Cloves introduced. Slave trade from interior — up to 50,000 slaves/year through Zanzibar market. Sultan Seyyid Said moves capital from Muscat to Zanzibar (1840).`,
tags:["swahili","kilwa","great zimbabwe","east africa","1100","bantu","ibn battuta","portuguese","omani","gold","trade"]},

{y:1804,r:"Africa & Egypt",t:"19th Century Africa — Ethiopia, Zulu, Boers",s:"Africa",type:"dynasty",
d:`ETHIOPIA — ONLY AFRICAN COUNTRY TO DEFEAT A EUROPEAN COLONIAL POWER:
Battle of Adwa (March 1–2, 1896): Emperor Menelik II (with Empress Taytu) defeats Italian colonial army. 7,000 Italians killed or wounded. Italy recognizes Ethiopian independence (Treaty of Addis Ababa). Inspires anti-colonial movements worldwide. Marcus Garvey, Pan-Africanism, Rastafarianism all cite Adwa.

HAILE SELASSIE (1930–1974): Last emperor. League of Nations speech (1936) after Italian invasion: 'It is us today. It will be you tomorrow.' Deposed by Marxist Derg coup 1974. Died 1975 (murdered, probably).

ZULU KINGDOM: Shaka Zulu (1816–1828) transforms Zulu into regional power through military innovation: Shorter stabbing spear (iklwa), chest-and-horns formation. 500,000 km² at peak. Anglo-Zulu War (1879): Battle of Isandlwana (January 22) — British suffer worst defeat in Africa (1,300 killed). Battle of Rorke's Drift: 150 British defend against 4,000 Zulus — 11 Victoria Crosses awarded.

BOER REPUBLICS: Dutch-descended farmers (Boers) establish Transvaal (South African Republic) and Orange Free State to escape British rule. SECOND BOER WAR (1899–1902): British vs Boers. Britain invents modern concentration camps — 26,000 Boer civilians and 20,000 Black Africans die. Britain wins; Union of South Africa (1910).

APARTHEID (1948–1994): National Party institutionalizes racial segregation. ANC founded 1912. Sharpeville Massacre (1960): 69 protesters killed. Nelson Mandela imprisoned 1964–1990. International sanctions. F.W. de Klerk releases Mandela; first democratic elections April 27, 1994.`,
tags:["ethiopia","adwa","menelik","zulu","shaka","boer","apartheid","mandela","1896","africa","south africa","dynasty"]},

// ═══ MORE EUROPE ═══
{y:800,r:"Europe & Dynasties",t:"Scandinavia — Viking Age & Norse Empires",s:"Scandinavia/North Atlantic",type:"dynasty",
d:`VIKING AGE (793–1066 CE): Norse seafarers from Scandinavia — traders, raiders, settlers.

RAIDS BEGIN: June 8, 793 CE — sack of Lindisfarne monastery (Holy Island, England). Vikings terrorize monasteries across Ireland, Scotland, England, France.

SETTLEMENTS: Iceland (874 CE), Greenland (985 CE, Erik the Red), NORTH AMERICA (Leif Eriksson reaches 'Vinland' ~1000 CE — L'Anse aux Meadows, Newfoundland confirms Viking presence 500 years before Columbus).

VARANGIANS IN RUSSIA: Swedish Vikings (Varangians) establish trading routes down Dnieper and Volga. Rurik founds Novgorod (862 CE). Oleg captures Kiev (882 CE) — Kievan Rus. Founding dynasty of Russia.

NORMANDY: Rollo (Norse leader) granted Normandy by French King Charles III (911 CE) — his descendants = Normans who conquer England (1066 CE), Sicily, and crusader states.

KINGDOMS:
• Denmark: Harald Bluetooth unifies (958 CE). Bluetooth technology named after him.
• Norway: Harald Fairhair unifies (872 CE). Leif Eriksson explores Americas.
• Sweden: Varangian trade routes. Uppsala as religious center.

RELIGION: Norse paganism (Odin, Thor, Freya) → Christianity adopted: Denmark (960), Norway (1000), Sweden (1100).

END OF VIKING AGE: Battle of Stamford Bridge (1066, Harald Hardrada killed) and Norman Conquest (1066). Norse kingdoms settle into medieval Christian states.`,
tags:["viking","norway","denmark","sweden","norse","1066","leif eriksson","varangian","scandinavia","dynasty","russia"]},

{y:1000,r:"Europe & Dynasties",t:"Byzantine Empire — Constantinople's Long Story",s:"Constantinople",type:"dynasty",
d:`BYZANTINE EMPIRE (330–1453 CE): 1,123 years — the longest-lived Christian empire. Eastern continuation of Rome.

JUSTINIAN I (527–565 CE): Reconquers North Africa, Italy. Corpus Juris Civilis (529–565 CE) — comprehensive Roman law codification. Foundation of European civil law systems. Hagia Sophia (537 CE) — largest building in world for nearly 1,000 years.

HERACLIUS (610–641 CE): Defeats Sassanid Persia after 26-year war (611–628 CE). Islamic armies then conquer Persia and Byzantine's eastern provinces within 20 years — Heraclius describes this as divine punishment.

MACEDONIAN DYNASTY (867–1056 CE): Byzantine golden age. Reconquers Anatolia, parts of Syria. Emperor Basil II 'Bulgaroktonos' (Bulgar-Slayer, 976–1025 CE) — blinds 15,000 Bulgarian prisoners (left 1 eye per 100 men so they could be led home). Peak Byzantine power.

CRUSADERS SACK CONSTANTINOPLE (1204 CE): Fourth Crusade — instead of reaching Holy Land, attacks Constantinople (allied with Venetian commercial interests). Latin Empire (1204–1261). Byzantine Empire fragments into successor states.

PALAEOLOGAN DYNASTY (1261–1453 CE): Last dynasty. Gradual Ottoman encirclement. Desperate appeals to Western Europe for help — offered Church Union (Council of Florence 1439) — no meaningful military aid came. Constantine XI Palaiologos — last emperor, dies fighting on the walls. May 29, 1453.`,
tags:["byzantine","justinian","hagia sophia","1453","constantine","crusades","1204","dynasty","europe","eastern rome"]},

{y:1800,r:"Europe & Dynasties",t:"Habsburg, Romanov & Hohenzollern — Great Dynasties",s:"Vienna/St Petersburg/Berlin",type:"dynasty",
d:`HABSBURG DYNASTY (1273–1918): Austria and Spain. Charles V (1519–1556) rules Holy Roman Empire + Spain + New World simultaneously. Philip II of Spain — Armada against England (1588), fails. Austrian Habsburgs control: Austria, Hungary, Bohemia, Netherlands, parts of Italy. Franz Joseph I (1848–1916) — longest-reigning Habsburg. Empire dissolves 1918 into Austria, Hungary, Czechoslovakia, Yugoslavia.

ROMANOV DYNASTY (1613–1917): Russia. Peter the Great (1682–1725): Westernizes Russia, builds St. Petersburg ('Window to the West'). Catherine the Great (1762–1796): Expands to Crimea, Poland, Black Sea. Nicholas I — 'Gendarme of Europe.' Alexander II — emancipates serfs (1861). Nicholas II — Revolution 1917, executed 1918 with entire family at Yekaterinburg. DNA analysis confirmed remains 1998.

HOHENZOLLERN (Brandenburg-Prussia, 1415–1918 → Germany 1871–1918): Frederick the Great (1740–1786): Makes Prussia a great power. Brilliant general (Seven Years War). Flautist, philosopher, friend of Voltaire. German unification 1871 under Wilhelm I. Wilhelm II — dismisses Bismarck, aggressive foreign policy → WWI. Abdicates November 9, 1918.

HOUSE OF WINDSOR (né Saxe-Coburg and Gotha): George V renames dynasty Windsor during WWI (1917 — anti-German sentiment). George VI (wartime king, Queen Elizabeth II's father). Elizabeth II (1952–2022) — 70-year reign, longest in British history. Charles III (2022–present).`,
tags:["habsburg","romanov","hohenzollern","dynasty","austria","russia","prussia","peter great","catherine","1800","europe","windsor"]},

{y:1945,r:"Europe & Dynasties",t:"Post-WWII Europe — NATO, EU & Recovery",s:"Western Europe",type:"geopolitics",
d:`EUROPE REBUILT:
Marshall Plan (1948–52): $13.3 billion. Germany's economy restored. 'Economic Miracle' (Wirtschaftswunder).

IRON CURTAIN: Churchill's phrase. Eastern Europe under Soviet control. Germany divided (Berlin Wall 1961–89).

DECOLONIZATION: Britain, France, Belgium surrender empires. Suez Crisis (1956) ends Britain's great-power illusions.

EUROPEAN INTEGRATION:
• ECSC (1951): European Coal and Steel Community — France, West Germany, Italy, Benelux
• Treaty of Rome (1957): European Economic Community (EEC) — Common Market
• European Community (1967): Merger
• Maastricht Treaty (1992): European Union. Single market, EU citizenship, path to single currency
• EURO (1999 electronic, 2002 physical): 20 countries share currency
• EU ENLARGEMENT: 15 → 28 members (2013). Brexit: UK votes to leave June 23, 2016. Officially leaves January 31, 2020.
• COVID RECOVERY FUND (2020): €750 billion — first EU joint debt issuance. Fiscal union step.

CURRENT EU: 27 member states, 450 million people, largest single market in the world. Nobel Peace Prize (2012).

GERMANY: Reunification 1990. Economic powerhouse — largest European economy. Angela Merkel (Chancellor 2005–2021) — most influential European leader of her era.`,
tags:["EU","europe","marshall plan","NATO","1945","EEC","euro","brexit","germany","reunification","integration","dynasty"]},

// ═══ MORE SCIENCE ═══
{y:1800,r:"Science, Philosophy & Discovery",t:"Industrial Revolution — Steam, Steel & Factories",s:"Britain → World",type:"science",
d:`THE INDUSTRIAL REVOLUTION (c.1760–1840): Began in Britain. Why Britain first? Institutions (property rights, rule of law), coal geography, colonial raw materials, agricultural revolution freeing labor.

KEY INVENTIONS:
• JAMES WATT (1736–1819): Improved steam engine with separate condenser (1769). Invented horsepower unit. Partnership with Matthew Boulton — commercialized steam.
• RICHARD ARKWRIGHT (1732–1792): Water Frame (1769) — mechanized cotton spinning. First industrial factories (factory system).
• GEORGE STEPHENSON (1781–1848): Steam locomotive. Rocket (1829) — Rainhill Trials. First public railway: Liverpool-Manchester (1830).
• HENRY BESSEMER (1813–1898): Bessemer process (1856) — mass-produce steel from pig iron cheaply. Enables: railways, bridges, skyscrapers.

SPREAD:
• Belgium (1820s): First continental country to industrialize
• France (1830s–50s)
• Germany (1850s–70s): Surpasses Britain in steel by 1910
• USA (1840s–1900): Surpasses all by 1890s
• Japan (1870s–1900): Meiji industrialization

SOCIAL CONSEQUENCES: Urbanization (10% → 80% urban in Britain in 100 years). Child labor (children in coal mines, age 5+). Trade unions. Communist Manifesto (Marx & Engels, 1848). Chartism. Reform Acts.`,
tags:["industrial revolution","steam","watt","factory","britain","1760","railway","steel","bessemer","marx","science"]},

{y:1500,r:"Science, Philosophy & Discovery",t:"Age of Exploration — Navigation & Cartography",s:"Portugal/Spain",type:"science",
d:`THE AGE OF EXPLORATION (1415–1600 CE):

PORTUGAL (under Henry the Navigator, 1394–1460): Systematic exploration of West African coast. 1487: Bartolomeu Dias rounds Cape of Good Hope. 1498: VASCO DA GAMA reaches India via Cape — sea route to Spices bypasses Muslim/Venetian trade monopoly. 1500: Pedro Cabral 'discovers' Brazil (accidentally blown off course).

SPAIN: Columbus (1492). Magellan-Elcano CIRCUMNAVIGATION (1519–1522): 3 years, 265 of 270 crew die, Magellan killed in Philippines (April 27, 1521). Elcano completes first circumnavigation. Proves Earth is spherical and much larger than Columbus thought.

NAVIGATION TECHNOLOGY:
• Portolan charts: Detailed coastal maps
• Astrolabe: Measures altitude of stars (latitude)
• Magnetic compass (from China via Islamic world)
• Caravel: Lateen (triangular) sails allowing sailing into the wind. Portuguese innovation.

TREATY OF TORDESILLAS (1494): Pope Alexander VI divides 'New World' between Spain (west) and Portugal (east). Brazil → Portugal. Americas + Philippines → Spain.

IMPACT: Global trade routes established. Silver from Potosí (Bolivia) — 85% of world's silver supply — flows to Europe and then to China (purchasing Chinese goods). First global economy. Also: slave trade, smallpox, colonialism.`,
tags:["exploration","vasco da gama","columbus","magellan","1492","circumnavigation","portugal","spain","caravel","navigation","science"]},

{y:1750,r:"Science, Philosophy & Discovery",t:"Enlightenment — Age of Reason",s:"France/Europe",type:"science",
d:`THE ENLIGHTENMENT (c.1687–1789): Intellectual movement applying reason to all human questions — politics, religion, ethics, economics.

KEY FIGURES:
• JOHN LOCKE (1632–1704): Two Treatises of Government. Natural rights (life, liberty, property). Government by consent. Right to revolution. Directly influenced Jefferson.
• VOLTAIRE (1694–1778): Satire against religious intolerance and tyranny. 'If God did not exist, it would be necessary to invent him.' 27 years' correspondence with Frederick the Great.
• MONTESQUIEU (1689–1755): The Spirit of the Laws (1748). Separation of powers (executive, legislative, judicial). Madison and the US Constitution heavily influenced.
• ROUSSEAU (1712–1778): Social Contract. 'Man is born free, and everywhere he is in chains.' General will. Influenced French Revolution.
• ADAM SMITH (1723–1790): Wealth of Nations (1776). Invisible hand. Division of labor. Free markets. Foundation of modern economics.
• IMMANUEL KANT (1724–1804): 'Dare to know!' (Sapere Aude). Categorical imperative. Pure Reason. Perpetual Peace (1795) — proposed league of nations.
• ENCYCLOPEDIA (Diderot & d'Alembert, 1751–72): 28 volumes, 71,818 articles — first attempt to compile all human knowledge. Includes articles on atheism, religious tolerance, political freedom — banned by French government.

IMPACT: American and French Revolutions. Abolition movement. Democratic theory. Secular governance.`,
tags:["enlightenment","locke","voltaire","rousseau","kant","adam smith","1750","reason","france","europe","science","philosophy"]},

// ═══ MORE GEOPOLITICS ═══
{y:1960,r:"Geopolitics & Diplomacy",t:"United Nations Key Resolutions & Milestones",s:"New York/Global",type:"institution",
d:`KEY UN RESOLUTIONS AND MILESTONES:

RESOLUTION 181 (1947): Partition Plan for Palestine — Jewish and Arab states. Arabs reject it; Israel declares independence; war begins.

RESOLUTION 242 (1967): After Six Day War — 'Land for Peace' formula. Israel must withdraw from occupied territories; Arab states must recognize Israel. Neither side fully implemented it.

KOREAN WAR AUTHORIZATION (1950): First Chapter VII enforcement action. Only possible because USSR was boycotting the Security Council at the time.

SUEZ CRISIS (1956): First UN Emergency Force (UNEF) established. Peacekeeping as a concept invented by Lester Pearson (Canada) — Nobel Peace Prize.

DECOLONIZATION: Resolution 1514 (1960) — Declaration on the Granting of Independence to Colonial Countries. Accelerated decolonization wave.

NUCLEAR NON-PROLIFERATION TREATY (1968): 191 signatories. 5 recognized nuclear states (US, UK, France, Russia, China). India, Pakistan, Israel never signed. North Korea withdrew (2003).

KYOTO PROTOCOL (1997): First binding emissions targets. USA never ratified. Russia ratified 2004.

RESPONSIBILITY TO PROTECT (R2P, 2005 World Summit): State's responsibility to protect its own citizens; international community's responsibility if it fails. Applied: Libya 2011, debated for Syria.

SUSTAINABLE DEVELOPMENT GOALS (2015): 17 goals, 169 targets. Replace MDGs.

UN MEMBERSHIP: 51 founding members (1945) → 193 members (2024). Palestine: observer state. Taiwan: not a member (China blocks).`,
tags:["UN","resolution","peacekeeping","NPT","R2P","decolonization","1967","242","suez","institution","international law"]},

{y:1990,r:"Geopolitics & Diplomacy",t:"Major International Accords 1990s–2026",s:"Global",type:"treaty",
d:`OSLO ACCORDS (1993): Israel-PLO mutual recognition. Palestinian Authority. 'Land for peace.' Rabin assassinated 1995. Never fully implemented. Two-state solution effectively frozen by Israeli settlements expansion.

GOOD FRIDAY AGREEMENT (1998): Ends 'The Troubles' in Northern Ireland (3,500 killed over 30 years). Power-sharing between unionists and nationalists. Irish and British governments co-guarantors. Decommissioning of paramilitary weapons. Model for peace agreements globally.

DAYTON ACCORDS (1995): Ends Bosnian War. Bosnia divided into two entities (Federation and Republika Srpska). International peacekeeping force (IFOR/SFOR). Slobodan Milosevic indicted for war crimes (dies in custody 2006).

WTO (1995): 164 members. Dispute settlement mechanism — binding arbitration. China joins 2001.

ICBL (1997 Ottawa Treaty): International Campaign to Ban Landmines. Princess Diana's involvement. 164 state parties. Nobel Peace Prize to ICBL and Jody Williams.

CHEMICAL WEAPONS CONVENTION (1993): 193 parties. Syria acceded under duress 2013. Russia used Novichok in UK (2018 Salisbury). Assad regime used sarin in Syria.

ABRAHAM ACCORDS (2020): UAE, Bahrain, Sudan, Morocco normalize relations with Israel. Brokered by Trump administration. Palestinian cause sidelined.

AUKUS (2021): Australia-UK-USA submarine technology partnership. Angered France (canceled French submarine contract, €56 billion).

G20 (since 1999): Replaced G7/G8 as main global economic forum. India hosts G20 (2023).`,
tags:["oslo","dayton","good friday","WTO","1993","1998","chemical weapons","AUKUS","Abraham accords","G20","treaty","accord"]},

{y:2014,r:"Geopolitics & Diplomacy",t:"China's Rise — Belt and Road — 1435 AH",s:"China/Global",type:"geopolitics",
d:`XI JINPING's VISION (2013–present): 'China Dream' (Zhongguo Meng) — 'great rejuvenation of the Chinese nation' by 2049 (centenary of PRC). Two Centennial Goals: moderately prosperous society (achieved 2021); fully developed nation (2049).

BELT AND ROAD INITIATIVE (BRI, 2013): $1 trillion+ pledged infrastructure investment. 150+ countries. Silk Road Economic Belt (land) and Maritime Silk Road (sea). CPEC (Pakistan) — $62 billion. Railway through East Africa, ports in Sri Lanka, Greece (Piraeus), Indonesia.

CRITICISM: 'Debt-trap diplomacy' — Hambantota Port, Sri Lanka ceded to China (99-year lease) after debt default. Though some economists dispute the 'debt trap' characterization as oversimplified.

SOUTH CHINA SEA: China claims 90% via 'nine-dash line' — rejected by International Tribunal for the Law of the Sea (2016). Artificial islands built on reefs — militarized. Confrontations with Philippines, Vietnam, Malaysia, Indonesia.

TAIWAN: China's 'core interest.' US policy: 'strategic ambiguity' (defend Taiwan? unclear). Nancy Pelosi visit (August 2022) — China's largest military exercises around Taiwan in decades.

XINJIANG: 1 million+ Uyghur Muslims in 're-education camps.' UN (2022): may constitute crimes against humanity. China denies.

HONG KONG: National Security Law (June 2020): effectively ends 'one country, two systems.' Dozens of pro-democracy leaders arrested. Jimmy Lai charged under NSL.`,
tags:["china","xi jinping","belt and road","BRI","1435 AH","taiwan","south china sea","xinjiang","CPEC","geopolitics","2013"]},

{y:2024,r:"Geopolitics & Diplomacy",t:"2024–2026 — Current World Order",s:"Global",type:"geopolitics",
d:`THE WORLD IN 2024–2026:

WARS: Russia-Ukraine War continues. Gaza War enters 2nd year — 45,000+ Palestinians killed by end of 2024. Sudan Civil War (April 2023–): worst humanitarian crisis on Earth — 9 million displaced. Yemen War (ongoing). Myanmar Civil War (ongoing).

US ELECTIONS (November 2024): Donald Trump defeats Kamala Harris. Returns to presidency January 20, 2025. Policy shifts: NATO, Ukraine, Middle East, tariffs.

ISRAEL-IRAN ESCALATION CYCLE (2024): Israel bombs Iranian consulate in Damascus (April 1). Iran direct missile/drone attack on Israel (April 13–14 — mostly intercepted). Israel retaliates. October 1: Iran fires 200 ballistic missiles at Israel. Israel strikes Iranian air defenses (October 26, 2024).

GLOBAL SOUTH RISE: India overtakes UK as 5th largest economy (2022). Indonesia, Brazil, Nigeria growing. BRICS expansion (2024 — Saudi Arabia, UAE, Ethiopia, Egypt, Iran, Argentina invited). Russia-China partnership deepens.

AI REVOLUTION: ChatGPT (November 2022) → mass AI adoption. Claude, Gemini, GPT-4, Llama. Regulatory responses: EU AI Act (2024 — world's first comprehensive AI regulation). US Executive Order on AI Safety (October 2023). China AI regulations.

CLIMATE: 2023 — Earth's hottest year in recorded history. 2024 — breaks 2023 record. 1.5°C threshold breached for sustained periods. Loss and damage fund established at COP28 Dubai (2023).`,

// ═══ MIDDLE EAST ADDITIONAL ═══
{y:600,r:"Middle East & Levant",t:"Pre-Islamic Arabia — Context Before Islam",s:"Arabian Peninsula",type:"civilization",
d:`ARABIAN PENINSULA before Islam (5th–6th century CE):

GEOGRAPHY: Divided into Hijaz (west coast — Mecca, Medina), Yemen (south — most fertile), Najd (central plateau), and vast deserts. The caravan route between Yemen and Syria passed through Mecca — economic lifeline.

MECCA (Umm al-Qura — Mother of Cities): Controlled by the Quraysh tribe (from ~400 CE under Qusayy ibn Kilab). The Kaaba (originally built by Ibrahim AS and Ismail AS) housed 360 idols — one for each Arab tribe — making Mecca the religious center of Arabia. Annual Hajj pilgrimage pre-dated Islam (in corrupted form). Economic benefit of religious center = Quraysh's wealth and influence.

SOCIAL STRUCTURE: Tribal (qabaliyya). Warlord culture — blood feuds (tha'r) could last generations. Slave trade. Female infanticide (wa'd) practiced by some. Women had limited rights. Poetry was the highest cultural achievement — the Muallaqat (Seven Hanging Odes) preserved orally.

NEIGHBORING POWERS: Byzantine Empire (northwest), Sassanid Persia (northeast). Both had exhausted each other in 26 years of war (602–628 CE) just as Islam emerged — providential timing.

HIMYARITE KINGDOM (Yemen): Jewish King Dhu Nuwas (Yusuf Asar Yathar) persecutes Christians (523 CE) — Dhul Nuwas's atrocities prompt Christian Abyssinia (Aksum) to invade Yemen. Abyssinian Viceroy Abraha then marches on Mecca with elephants (Year of the Elephant, ~570 CE) — destroyed by Allah (Surah Al-Fil).`,
tags:["arabia","pre-islamic","mecca","quraysh","kaaba","tribal","hijaz","byzantine","sassanid","context","570 CE"]},

{y:1960,r:"Middle East & Levant",t:"Arab Nationalism, Ba'athism & Nasserism",s:"Egypt/Iraq/Syria",type:"geopolitics",
d:`ARAB NATIONALISM: Intellectual movement (19th–20th century) — Arab people share language, culture, history and should form united political entity.

GAMAL ABDEL NASSER (1918–1970): Egyptian President 1956–70. Nationalized Suez Canal (1956) — became hero across Arab world. United Arab Republic (1958–61) — short-lived union of Egypt and Syria. Pan-Arabism at its peak. Non-Aligned Movement founder. Died of heart attack 1970 — 5 million people attended his funeral.

Six Day War (1967) = death of Nasserism. Arab armies humiliated. 'Al-Naksa' (setback). Islam began replacing Arab nationalism as the dominant political ideology.

BA'ATH PARTY: 'Renaissance/Resurrection.' Founded 1940s by Michel Aflaq (Christian) and Salah al-Din al-Bitar. 'One Arab nation with an eternal mission.' Took power in Syria (1963, Assad family from 1970) and Iraq (1968, culminating in Saddam Hussein 1979).

SADDAM HUSSEIN (1979–2003): Brutal modernizer. Ba'ath socialism. Gassed Kurdish Halabja (March 16–17, 1988): 3,200–5,000 killed instantly. Invaded Iran (1980), Kuwait (1990). Captured December 2003 in a spider hole. Executed December 30, 2006 (filmed on mobile phone — seen globally).

HAFEZ AL-ASSAD (1970–2000) + BASHAR AL-ASSAD (2000–2024): Syria under Alawite minority rule over Sunni majority. Hama massacre (1982): 10,000–40,000 killed suppressing Muslim Brotherhood. Syrian Civil War (2011–present): 500,000+ dead. Bashar flees December 8, 2024 — Assad regime falls after 54 years.`,
tags:["nasser","arab nationalism","ba'ath","saddam","syria","1956","nasserism","pan-arabism","middle east","assad","iraq"]},

// ═══ MORE INDIAN SUBCONTINENT ═══
{y:1192,r:"Indian Subcontinent",t:"Delhi Sultanate — Five Dynasties in Detail",s:"Delhi, India",type:"dynasty",
d:`THE DELHI SULTANATE (1206–1526 CE): 320 years, five dynasties, first Muslim empire to control most of India.

1. MAMLUK / SLAVE DYNASTY (1206–1290): Founded by Qutb ud-Din Aibak (Muhammad Ghori's slave-general). Qutb Minar (72.5m, 1193–1220 CE) — tallest brick minaret in the world. Iltutmish (1211–1236) — consolidated power, repelled Mongols. Razia Sultana (1236–1240) — first female Muslim ruler of Delhi, rode elephants unveiled, dismissed wearing the veil. Overthrown by male nobles.

2. KHILJI DYNASTY (1290–1320): Alauddin Khilji (1296–1316) — greatest Delhi Sultan. Repelled Mongol invasions 4 times (armies of 120,000–200,000). Market reforms: fixed prices for all commodities. Conquered Deccan (via Malik Kafur). Built Alai Darwaza, Siri Fort.

3. TUGHLAQ DYNASTY (1320–1414): Ghiyath al-Din Tughlaq. Muhammad bin Tughlaq (1325–51) — brilliant but erratic. Moved capital from Delhi to Daulatabad (Deccan) — 1,500 km, hundreds die. Introduced token currency (failed). Ibn Battuta serves as his Qadi. Firuz Shah Tughlaq — canals, hospitals, public works.

4. SAYYID DYNASTY (1414–1451): Weak rulers, Timur's aftermath.

5. LODI DYNASTY (1451–1526): Afghan Pashtun rulers. Ibrahim Lodi killed at First Panipat — Delhi Sultanate ends. Babur establishes Mughal Empire.

IBN BATTUTA in INDIA (1334–1341 CE): Serves as Qadi under Muhammad bin Tughlaq. Records extraordinary detail of Delhi Sultanate administration, culture, and chaos.`,
