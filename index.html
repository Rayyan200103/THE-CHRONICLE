function ceToAH(ce){
  if(ce<622)return null;
  // Correct Islamic calendar conversion (Wikipedia/IslamicFinder standard)
  // Hijri year is ~11 days shorter than Gregorian; cycles through seasons every ~33 solar years
  // Formula: AH = floor((CE - 621.5643) × 1.030684)
  // Verified: 622->1AH, 750->132AH, 1947->1366AH, 2026->1447AH
  const ah=Math.max(1,Math.floor((ce-621.5643)*1.030684));
  return ah+" AH";
}

d:`Adam AS, the first human and first prophet of Allah. Created from clay, given life by divine breath, taught the names of all things (Quran 2:31). Placed in Jannah with Hawwa (Eve). After the trial with Iblis (who refused to prostrate out of arrogance), both descended to Earth.

{y:-1900,r:"Prophets & Revelation",t:"Prophet Ibrahim AS — Father of Monotheism",s:"Ur → Canaan → Mecca",type:"prophet",
d:`Born in Ur (modern Iraq). Father Azar made and sold idols. Ibrahim AS from childhood questioned idol worship — 'This does not set or rise, so it cannot be God' — reasoning from stars, moon, sun to the One Creator.

Smashed his people's idols, leaving the largest. When questioned: 'Ask the big one.' People: 'You know they cannot speak!' Ibrahim AS: 'Then why do you worship what cannot help or harm?' — Cast into Nimrod's fire by royal decree; Allah made it 'cool and peaceful' (Quran 21:69).

Migrated with wife Sarah to Canaan. At very old age, son Ishaq (Isaac) AS born. Earlier, with Hajar (Hagar), son Ismail AS born — left in barren valley of Mecca by divine command. The Zamzam Well springs for baby Ismail. Father and son together rebuild the Kaaba. Ibrahim AS makes the call to Hajj — Allah: 'All humanity will hear it.'

His trial: commanded to sacrifice Ismail AS. Both submit fully. Allah ransom with a great sacrifice — commemorated in Eid al-Adha. Called Khalilullah (Friend of Allah). Given the Suhuf (divine scrolls).`,
tags:["ibrahim","prophet","kaaba","monotheism","mecca","idol","fire","quran"]},

{y:-1750,r:"Prophets & Revelation",t:"Prophet Yusuf AS — Most Beautiful Story",s:"Canaan → Egypt",type:"prophet",
d:`Son of Yaqub (Jacob) AS, great-grandson of Ibrahim AS. His beauty and prophetic gift made his brothers jealous — sold to a caravan for a few silver coins. Bought by Aziz of Egypt (Potiphar). His master's wife attempted seduction — he fled, was falsely accused, imprisoned.

In prison: interprets dreams correctly. When the Pharaoh dreams of 7 fat and 7 lean cows, Yusuf AS is summoned: 7 years abundance followed by 7 years famine. Made Aziz of Egypt (Vizier).

During famine, his brothers come to buy grain. Recognition and tearful reunion. His father Yaqub AS, who had wept for years until blind with grief, regains his sight when Yusuf's AS shirt is placed on his face. Entire family of 70 comes to Egypt.

'He who trusts in Allah — Allah is sufficient for him.' The Quran calls his story 'Ahsan al-Qasas' — the most beautiful of stories (Surah 12, entirely devoted to Yusuf AS).`,
tags:["yusuf","prophet","egypt","quran","patience","beautiful story"]},

{y:-1600,r:"Prophets & Revelation",t:"Prophet Musa AS — Tawrat Revealed",s:"Egypt & Sinai",type:"prophet",d:`Born under Pharaoh's decree to kill all male Israelite newborns. Mother places him in a basket on the Nile — found by Pharaoh's family, raised in the palace. As young man, accidentally kills an Egyptian, flees to Madyan. Marries daughter of Prophet Shuayb AS.

Receives prophethood at burning bush on Mount Sinai: 'I am Allah, Lord of all worlds. Remove your shoes — you are in the sacred valley Tuwa.' (Quran 20:11-12).

Nine miracles given: white luminous hand, staff that becomes a serpent, and the Ten Plagues. Confronts Pharaoh Ramesses II: 'Let Bani Israel go.' Pharaoh refuses repeatedly.

PARTING OF THE SEA: 'Strike the sea with your staff' — it parts into 12 pathways (one per tribe). Exodus of ~600,000 Bani Israel. Pharaoh pursues — sea closes. 'Today We will preserve you in your body as a sign.' (10:92) — Pharaoh's mummy discovered in 19th century CE.

TAWRAT revealed on Mount Sinai over 40 nights. Golden Calf incident during his absence. 40 years in the Sinai. Musa AS is mentioned 136 times in the Quran — more than any other prophet.`,
tags:["musa","prophet","tawrat","pharaoh","exodus","red sea","bani israel","quran"]},

{y:-1100,r:"Prophets & Revelation",t:"Prophet Dawud AS & Sulaiman AS",s:"Jerusalem/Israel",type:"prophet",
d:`DAWUD AS: Killed Jalut (Goliath) with a sling as a young shepherd. Became King of Israel. Given the ZABUR (Psalms) — mountains and birds glorified Allah with his voice. Renowned for justice. Quran: 'O Dawud, We have made you a successor on Earth, so judge between people with truth.' (38:26)

SULAIMAN AS (Solomon): Son of Dawud AS. Given power over wind, jinn, birds, and animals. Jinn built for him temples, statues, basins like reservoirs, and cauldrons. Queen of Sheba (Bilqis) visits upon reports of his kingdom — submits to Allah. His kingdom stretched from Egypt to Euphrates.

The hoopoe bird served as messenger. His throne could transport instantly. Asked Allah for a kingdom none after him would possess — granted, and also: 'This is Our gift, so give or withhold without account.' (38:39)

Both are models: Dawud AS of justice and worship; Sulaiman AS of wisdom and governance combined with faith.`,
tags:["dawud","sulaiman","prophet","zabur","jerusalem","kingdom","jinn","quran"]},

{y:-4,r:"Prophets & Revelation",t:"Prophet Isa (Jesus) AS — Injeel Revealed",s:"Bethlehem, Judea",type:"prophet",
d:`Born of the virgin Maryam AS — miracle confirmed in Quran (Surah Maryam 19, Surah Al-Imran 3). Spoke as an infant in the cradle: 'I am the servant of Allah. He has given me the Scripture and made me a prophet.' (19:30)

Given the INJEEL (Gospel). Miracles by Allah's permission: healed blind, healed lepers, raised Lazarus from death, created living birds from clay. Never claimed divinity — consistently directed worship to Allah alone.

ISLAMIC POSITION: Not crucified. 'They did not kill him, nor did they crucify him, but it was made to appear so to them.' (4:157) Allah raised him alive to heaven. He is alive with Allah and will DESCEND before the Day of Judgment: will break the cross, kill the swine, establish justice, marry, have children, die naturally, be buried in Medina.

Title: Ruhullah (Spirit of Allah — because of his miraculous creation), Al-Masih (The Messiah), Ibn Maryam (Son of Mary). He gave glad tidings of the final prophet by name: 'Ahmad' (Quran 61:6).

Christians believe: Son of God, crucified, resurrected. This is rejected in Islam as a later corruption of the original monotheistic message of Isa AS.`,
tags:["isa","jesus","prophet","injeel","maryam","cradle","quran","return","ahmad"]},

// ═══ ANCIENT CIVILIZATIONS ═══
{y:-3200,r:"Africa & Egypt",t:"Unification of Egypt — Narmer/Menes",s:"Egypt",type:"dynasty",
d:`Pharaoh Narmer (also called Menes) unifies Upper and Lower Egypt c.3100 BCE — creating the world's longest-lasting civilization. The Narmer Palette (slate palette) depicts this unification and is the world's earliest historical document showing a named ruler.

The Double Crown (Pschent) combining Red Crown of Lower Egypt and White Crown of Upper Egypt. Memphis established as capital. Hieroglyphic writing develops simultaneously. The pharaoh was considered a living god — son of Ra, embodiment of Horus.

TIMELINE OF EGYPTIAN DYNASTIES:
• Early Dynastic (3100–2686 BCE): Dynasties 1–2, Memphis capital
• Old Kingdom (2686–2181 BCE): Dynasties 3–6, Pyramid Age
• Middle Kingdom (2055–1650 BCE): Dynasties 11–12, classical literature
• New Kingdom (1550–1069 BCE): Dynasties 18–20, imperial Egypt
• Late Period (664–332 BCE): Foreign dominations
• Ptolemaic (332–30 BCE): Greek rulers after Alexander
• Roman Egypt (30 BCE–641 CE): Until Islamic conquest

Total: ~3,100 years of pharaonic civilization — the longest-lasting political-cultural tradition in human history.`,
tags:["egypt","narmer","dynasty","pharaoh","unification","hieroglyphic","africa"]},

{y:-2700,r:"Africa & Egypt",t:"Old Kingdom — Pyramids of Giza",s:"Giza, Egypt",type:"civilization",
d:`The Great Pyramid of Khufu (Cheops, c.2560 BCE): 146.5m tall, 2.3 million blocks (each 2.5–15 tons), aligned to true north within 3/60 of a degree. Khafre's pyramid + the Great Sphinx. Menkaure's pyramid. These three form the pyramid complex at Giza.

Construction: organized paid labor (not slaves — workers' villages found nearby with beer rations, bakeries, medical care). 20,000–30,000 workers. Built using copper tools, wooden sledges, water lubrication, and ramps. Granite blocks from 800 km away (Aswan).

PYRAMID TEXTS (2400–2300 BCE): Oldest religious texts in the world, carved inside pyramids — spells to help the pharaoh navigate the afterlife.

The 7 Wonders of the Ancient World: Great Pyramid is the only one still standing, after 4,500 years.`,
tags:["pyramid","giza","khufu","egypt","wonder","old kingdom"]},

{y:-3000,r:"Indian Subcontinent",t:"Indus Valley Civilization — Harappa & Mohenjo-daro",s:"Pakistan/Northwest India",type:"civilization",
d:`One of the world's four earliest civilizations, emerging c.3300 BCE and flourishing 2600–1900 BCE. Covered 1.25 million sq km — larger than Egypt and Mesopotamia combined. Population: ~5 million.

URBAN PLANNING: Grid street layout, standardized fired brick sizes, sophisticated covered drainage and sewage systems predating Rome by 2,000 years. Public granaries and bathhouses. Mohenjo-daro's 'Great Bath' — earliest public water tank.

TRADE: Harappan seals found in Mesopotamia, Persian Gulf, and Afghanistan — evidence of extensive long-distance trade networks. Standardized weights and measures.

SCRIPT: ~400 signs, undeciphered to this day — one of archaeology's great mysteries.

DECLINE: c.1900 BCE — possibly from: Sarasvati River drying up (confirmed by satellite), climate shift, or migration pressure from the northwest. Cities gradually abandoned — remarkably little evidence of warfare.`,
tags:["harappa","mohenjo-daro","indus","civilization","pakistan","india","ancient"]},

{y:-2600,r:"Central Asia & Steppes",t:"Akkadian Empire — World's First Empire",s:"Mesopotamia",type:"empire",
d:`Sargon of Akkad (ruled ~2334–2279 BCE) creates the world's first true empire — unified political control over multiple previously independent city-states extending from the Persian Gulf to the Mediterranean.

Defeated Lugalzagesi of Umma who had first unified the Sumerian city-states. 'The Land of Sumer and Akkad' — bilingual empire (Sumerian + Akkadian). Created: first postal system, first standing army (~5,400 men eating before Sargon daily), first provincial administration.

His daughter ENHEDUANNA was history's first named author — composed hymns to Inanna. Akkadian language became the international lingua franca of the Middle East for 2,000 years.

Grandson Naram-Sin declared himself 'King of the Four Quarters of the Universe' — first ruler to claim divine status. The Akkadian Empire lasted ~180 years, collapsing around 2154 BCE.`,
tags:["akkad","sargon","empire","first","mesopotamia","sumerian"]},

{y:-1800,r:"Middle East & Levant",t:"Code of Hammurabi — Babylonian Empire",s:"Babylon, Iraq",type:"dynasty",
d:`Hammurabi (ruled 1792–1750 BCE) — sixth king of the First Babylonian Dynasty. Conquered all of Mesopotamia to create the Old Babylonian Empire. His most lasting achievement: the Code of Hammurabi.

CODE: 282 laws carved on a 2.25m black diorite stele (now in the Louvre). Covers: commerce, property rights, family law, wages, medical practice, criminal justice. Famous principle: lex talionis ('an eye for an eye') — but this was actually a LIMITATION on punishment (proportionality), not a call for vengeance.

CLASS-BASED JUSTICE: Different punishments for free citizens vs slaves. Despite this: the Code represents a remarkable attempt at standardizing law across a diverse empire.

Babylon: World's largest city ~1770–1670 BCE. The Ishtar Gate (glazed blue tiles with bulls and dragons). The Hanging Gardens (one of the Seven Wonders — possibly mythical). The Tower of Babel: likely the ziggurat Etemenanki.`,
tags:["hammurabi","babylon","code","law","empire","mesopotamia"]},

{y:-1550,r:"Africa & Egypt",t:"New Kingdom Egypt — Thutmose III & Ramesses II",s:"Egypt",type:"dynasty",
d:`Egypt's greatest imperial period. The 18th Dynasty (1550–1295 BCE) and 19th Dynasty (1295–1186 BCE).

THUTMOSE III (1479–1425 BCE): Called the 'Napoleon of Egypt.' 17 military campaigns. Battle of Megiddo (1457 BCE) — first battle described in detail in history. Conquered Canaan, Syria, Nubia. Egypt's empire at maximum extent.

AKHENATEN (1353–1336 BCE): Revolutionary pharaoh who attempted monotheism — worshipped Aten (sun disk) alone, closed other temples. Wife: the beautiful Nefertiti. Son: Tutankhamun (restored old religion). Akhenaten's revolution reversed after his death.

RAMESSES II (1279–1213 BCE): 66-year reign. Battle of Kadesh (1274 BCE) vs Hittites — world's first recorded battle AND first recorded peace treaty (Treaty of Kadesh). Abu Simbel temples carved. Built more statues and monuments than any other pharaoh. 96 children. His mummy is in Cairo — passport lists occupation as 'King (deceased).'`,
tags:["egypt","thutmose","ramesses","new kingdom","dynasty","battle","kadesh"]},

{y:-1000,r:"Europe & Dynasties",t:"Ancient Greece — City-States & Democracy",s:"Greece",type:"civilization",
d:`The Greek polis (city-state) system: ~1,500 city-states across Greece, Aegean, and Mediterranean colonies. Each politically independent. Major poleis:

ATHENS: Birthplace of democracy. Solon (594 BCE) — first constitution. Cleisthenes (508 BCE) — democratic reforms. Pericles (461–429 BCE) — classical Athens peak. Parthenon built 447–432 BCE. Population: 300,000 (100,000 citizens; rest slaves/foreigners).

SPARTA: Militaristic oligarchy. Boys taken for military training (agoge) at age 7. Two kings, Council of Elders, 5 Ephors. Women had more rights than in Athens. Helots (enslaved people) did agricultural work. Thermopylae (480 BCE): 300 Spartans + 700 Thespians hold pass against ~100,000 Persians.

CORINTH: Commercial power, crossroads of Greece.
THEBES: Temporarily dominant under Epaminondas (371–362 BCE) — defeated Sparta.

Persian Wars (490–479 BCE): Marathon, Thermopylae, Salamis, Plataea — Greek independence preserved.
Peloponnesian War (431–404 BCE): Athens vs Sparta — Sparta wins but both exhausted.`,
tags:["greece","athens","sparta","democracy","polis","pericles","ancient"]},

{y:-559,r:"Central Asia & Steppes",t:"Achaemenid Persian Empire — Cyrus the Great",s:"Persia (Iran)",type:"empire",
d:`Cyrus II 'the Great' (559–530 BCE): Founded the largest empire the world had yet seen. Conquered: Medes, Lydia (King Croesus), Babylonia. Freed the Jews from Babylonian Captivity (538 BCE) — the 'Cyrus Cylinder' is often cited as the world's first declaration of human rights.

Darius I (522–486 BCE): Extended to India (Punjab) and Thrace (Europe). Royal Road (2,700 km, Susa to Sardis). Satrapy administrative system — 20 provinces, each with satrap (governor). Postal system ('Angarium'). Census. Standardized gold coinage (daric).

Xerxes I (486–465 BCE): Invaded Greece — Thermopylae, Salamis, Plataea. First Suez Canal attempt. Persepolis — the ceremonial capital, destroyed by Alexander.

ZOROASTRIANISM: State religion. Ahura Mazda (good) vs Angra Mainyu (evil). Concepts of heaven, hell, final judgment, resurrection, angels, and demons — influenced Judaism, Christianity, and Islam.

Fell to Alexander the Great 334–330 BCE.`,
tags:["persia","cyrus","darius","achaemenid","empire","zoroastrian","cyrus cylinder"]},

{y:-509,r:"Europe & Dynasties",t:"Roman Republic — Foundation to Empire",s:"Rome, Italy",type:"dynasty",
d:`509 BCE: Romans expel King Tarquinius Superbus — Republic established. Senate (300 senators), two Consuls (elected annually), Tribunes of the Plebs.

KEY REPUBLICAN DEVELOPMENTS:
• Twelve Tables (450 BCE): First written Roman law
• Punic Wars vs Carthage (264–146 BCE): Rome becomes Mediterranean hegemon
• Hannibal's crossing of Alps (218 BCE): Battle of Cannae (216 BCE) — 50,000 Romans killed in one day
• Scipio Africanus defeats Hannibal at Zama (202 BCE)
• Gracchi Brothers (133–121 BCE): Land reform attempts — both murdered
• Marius reforms the army (107 BCE): Professional soldiers loyal to general, not state
• Julius Caesar crosses Rubicon (49 BCE): Civil war → dictatorship → assassination (44 BCE, Ides of March)
• Augustus Caesar (27 BCE–14 CE): First Emperor. Pax Romana begins.

ROMAN EMPIRE DYNASTIES:
• Julio-Claudians (27 BCE–68 CE): Augustus, Tiberius, Caligula, Claudius, Nero
• Flavians (69–96 CE): Vespasian, Titus, Domitian
• Nerva-Antonines (96–192 CE): Trajan, Hadrian, Marcus Aurelius, Commodus
• Severans (193–235 CE): Septimius Severus
• Crisis of the Third Century (235–284 CE)
• Tetrarchy/Late Empire: Diocletian, Constantine, Theodosius`,
tags:["rome","republic","empire","senate","caesar","augustus","dynasty","europe"]},

{y:-356,r:"Europe & Dynasties",t:"Alexander the Great — Macedonian Empire",s:"Macedon → Persia → India",type:"empire",
d:`Alexander III of Macedon (356–323 BCE): tutored by Aristotle from age 13. Became king at 20 after Philip II's assassination.

CAMPAIGNS (13 years, never defeated):
• 334 BCE: Crosses Hellespont. Battle of Granicus — defeats Persian satraps
• 333 BCE: Battle of Issus — defeats Darius III personally
• 332 BCE: Conquers Egypt — founds Alexandria
• 331 BCE: Battle of Gaugamela — decisive defeat of Darius III, Persian Empire ends
• 330 BCE: Burns Persepolis (reportedly on suggestion of Athenian courtesan Thaïs)
• 329–327 BCE: Bactria and Sogdia (Afghanistan/Uzbekistan) — marries Roxana
• 326 BCE: Battle of Hydaspes — defeats King Porus in India; army refuses to go further

HELLENISTIC LEGACY: Greek language (Koine) becomes international language for 500 years — language of the New Testament and early Islamic philosophy translations. Alexandria Library. Greek-Eastern cultural fusion. 70+ cities named Alexandria.

Dies June 323 BCE in Babylon, age 32. Cause: typhoid + alcohol. Empire divided among Diadochi (successors).`,
tags:["alexander","macedon","empire","gaugamela","hellenism","aristotle","india","persia"]},

{y:-321,r:"Indian Subcontinent",t:"Maurya Empire — Chandragupta & Ashoka",s:"Magadha/India",type:"empire",
d:`CHANDRAGUPTA MAURYA (321–297 BCE): Advised by Chanakya (Kautilya), the brilliant political strategist who wrote Arthashastra — India's masterwork on statecraft, economics, and military strategy. Defeated the Nanda Dynasty. First to unify most of the Indian subcontinent. Defeated Seleucus Nicator (Alexander's successor) — received Afghanistan in return. Abdicated for Jainism.

BINDUSARA (297–268 BCE): Extended empire south.

ASHOKA THE GREAT (268–232 BCE): After the brutal Battle of Kalinga (~260 BCE, 100,000+ killed), Ashoka converted to Buddhism — the most consequential royal conversion in history. Rock Edicts: promoted ahimsa (non-violence), religious tolerance, animal welfare, medical care for humans and animals, road construction, tree planting, diplomacy over war.

Sent Buddhist missionaries across Asia: son Mahinda to Sri Lanka, Sanghamitta brought Bodhi tree cutting. Buddhism reaches Southeast Asia, Central Asia, China. The Dharma Chakra (24-spoke wheel) on India's flag today comes from Ashoka's pillars.

The Arthashastra was 'lost' for 2,000 years — rediscovered 1904 CE by R. Shamasastry.`,
tags:["maurya","chandragupta","ashoka","india","buddhism","arthashastra","chanakya","empire"]},

{y:-221,r:"East Asia & China",t:"Qin Dynasty — China's First Unification",s:"China",type:"dynasty",
d:`Qin Shi Huang (First August Emperor, 259–210 BCE): Unifies China after 250 years of Warring States period. Creates the template for Chinese civilization that endures 2,200+ years.

STANDARDIZATIONS: Writing system (one script for all China), weights and measures, currency (round coin with square hole), axle widths (so all carts fit same ruts in roads).

GREAT WALL: Connects and extends existing walls — 21,196 km total. Built on 10–50m high ridges. Hundreds of thousands died in construction — buried within the wall.

TERRACOTTA ARMY: 8,000+ life-size soldiers, 130 chariots, 520 horses, guarding the Emperor's tomb. Each soldier's face is unique.

LEGALISM: Governing philosophy — strict laws, collective punishment, absolute obedience. Burned books (460 Confucian scholars buried alive) to suppress opposition.

Dynasty lasts only 15 years after his death — the ultimate irony for an emperor who sought immortality. But the name 'Qin' becomes: Sin (Sanskrit), Serica (Latin), Chin → China.`,
tags:["qin","china","emperor","great wall","terracotta","unification","legalism","dynasty"]},

{y:-202,r:"East Asia & China",t:"Han Dynasty — China's Golden Age",s:"China",type:"dynasty",
d:`Han Dynasty (202 BCE–220 CE, with brief interruption): Founded by Liu Bang (Han Gaozu), a former peasant who defeated Xiang Yu in the Chu-Han Contention.

CONFUCIANISM: Made state ideology — Civil Service Examinations begin. Officials must pass exams on Confucian classics rather than inherit positions. Revolutionary meritocracy.

SILK ROAD: Formalized by Zhang Qian's missions (138 BCE) to Central Asia. China trades with Parthia (Persia), Rome, India. Silk, porcelain, spices flow west; gold, glass, horses flow east. The Ferghana 'Heavenly Horses' — Han Emperor sent 60,000 soldiers 3,000 miles to get them.

PAPER: Invented by Cai Lun (105 CE) — papermaking using bark, hemp, rags, fishnets.
CAST IRON: Han China mastered cast iron 1,000 years before Europe.

POPULATION: 60 million. GDP: ~26% of world's total. 'Han Chinese' (漢族 Hànzú) — 92% of China's modern population identifies as Han.

Falls 220 CE → Three Kingdoms period (Wei, Shu Han, Wu).`,
tags:["han","china","dynasty","silk road","confucianism","paper","golden age"]},

{y:-200,r:"Americas & Pacific",t:"Maya & Olmec — Mesoamerican Civilizations",s:"Mexico/Central America",type:"civilization",
d:`OLMEC (1500–400 BCE): 'Mother culture' of Mesoamerica. San Lorenzo, La Venta as centers. Colossal stone heads (weighing 40+ tons, carved from basalt 150 km away). First writing system in Americas. Ceremonial ball game (life-and-death). Were-jaguar deity. Trade network across Mesoamerica.

MAYA (2000 BCE–1500 CE): Greatest pre-Columbian civilization.
• MATHEMATICS: Independent invention of zero (simultaneously with India). Vigesimal (base-20) number system.
• ASTRONOMY: Calculated Venus's synodic period as 584 days (accurate to within 2 hours). Predicted solar eclipses. Dresden Codex.
• CALENDAR: 365-day Haab (solar), 260-day Tzolkin (ritual) — combination creates 52-year cycle. More accurate than Julian calendar of Europe.
• WRITING: ~800 hieroglyphs (mostly deciphered by 1990s due to work of Yuri Knorozov).
• CITIES: Tikal (population 100,000+), Palenque, Copan, Chichen Itza.
• COLLAPSE: Classic Maya collapse ~900 CE — drought, warfare, environmental degradation.`,
tags:["maya","olmec","americas","zero","calendar","astronomy","civilization"]},

{y:-200,r:"Americas & Pacific",t:"Andean Civilizations — Chavin to Inca",s:"South America",type:"civilization",
d:`CHAVIN CULTURE (900–200 BCE): Chavin de Huantar (Peru) — religious center. Jaguar cult. Bronze metallurgy. Influenced later Andean civilizations.

NAZCA CULTURE (100 BCE–800 CE): Famous Nazca Lines — geoglyphs only fully visible from the air. A hummingbird (93m wingspan), spider (46m), and hundreds more. Created by removing reddish surface stones to reveal lighter ground. Purpose: possibly astronomical calendar, ritual paths, or water offerings.

TIWANAKU (300–1000 CE): Ceremonial center at 3,850m altitude near Lake Titicaca. Gateway of the Sun carved from single stone block.

WARI EMPIRE (600–1000 CE): First Andean empire with roads, administrative centers.

CHIMU KINGDOM (900–1470 CE): Chan Chan — largest adobe city in the world. Fell to Inca.

INCA EMPIRE (1438–1533 CE): Largest pre-Columbian empire. 12 million people. 40,000 km of roads (surpassing Roman roads). Quipu (knotted string records). Machu Picchu (1450 CE). Fell to Pizarro's 168 men with guns, horses, and smallpox.`,
tags:["inca","nazca","andes","americas","chavin","tiwanaku","machu picchu","empire"]},

{y:-146,r:"Africa & Egypt",t:"Carthage — Punic Wars & Destruction",s:"North Africa (Tunisia)",type:"empire",
d:`CARTHAGE: Founded ~814 BCE by Phoenician colonists from Tyre (Lebanon) — Queen Dido (Elissa). Grew into the dominant power of the Western Mediterranean. Sea trade: Spain, Sardinia, Sicily, North Africa. Population: 700,000.

PUNIC WARS vs Rome:
• First (264–241 BCE): Sicily lost to Rome
• Second (218–201 BCE): HANNIBAL BARCA crosses Alps with 37 war elephants and 50,000 soldiers (only 26 elephants survive the crossing). Battle of Cannae (216 BCE) — 50,000 Romans killed in single day using double envelopment. Despite tactical genius, no support from Carthage. Scipio Africanus defeats him at Battle of Zama (202 BCE). Hannibal: 'I came not to fight Romans in Africa but Romans in Italy.'
• Third (149–146 BCE): Cato the Elder — 'Carthago delenda est!' (Carthage must be destroyed!) — said at the end of every Senate speech. Rome destroys Carthage utterly — sold survivors into slavery, salted the earth (legend).

Carthaginian culture: Baal Hammon worship. Child sacrifice (tophet) — debated by historians. Purple dye production. Invented the trireme's ram.`,
tags:["carthage","hannibal","punic wars","rome","africa","north africa","empire"]},

// ═══ EUROPEAN DYNASTIES ═══
{y:27,r:"Europe & Dynasties",t:"Roman Imperial Dynasties — Full Succession",s:"Rome",type:"dynasty",
d:`JULIO-CLAUDIAN DYNASTY (27 BCE–68 CE):
• Augustus (27 BCE–14 CE): Pax Romana begins. Principate (disguised monarchy). Census (context: birth of Isa AS). Builds: Forum of Augustus, Ara Pacis. Population: 45–60 million.
• Tiberius (14–37 CE): Reclusive, effective administrator.
• Caligula (37–41 CE): 'Little boot.' Megalomania. Assassinated by Praetorian Guard.
• Claudius (41–54 CE): Conquered Britain (43 CE). Efficient administrator.
• Nero (54–68 CE): Great Fire of Rome (64 CE) — Christians blamed. First systematic persecution. Suicide.

FLAVIANS (69–96 CE): Vespasian; Titus — destroyed Jerusalem Temple (70 CE); Domitian.

FIVE GOOD EMPERORS / ANTONINES (96–180 CE): Nerva, Trajan (maximum empire extent), Hadrian (Hadrian's Wall, Scotland), Antoninus Pius, MARCUS AURELIUS — Stoic philosopher-emperor, wrote 'Meditations.' Commodus ends this period.

SEVERAN DYNASTY (193–235 CE): Septimius Severus (African-born emperor). Caracalla — granted citizenship to all free inhabitants (212 CE).

LATE EMPIRE: Diocletian splits empire (286 CE). Constantine I — Christianity legalized. Theodosius I — Christianity made state religion (380 CE). WESTERN EMPIRE FALLS 476 CE (Romulus Augustulus deposed by Odoacer).`,
tags:["rome","dynasty","augustus","caesar","julio-claudian","antonine","empire","europe"]},

{y:476,r:"Europe & Dynasties",t:"Germanic Kingdoms — Post-Roman Europe",s:"Western Europe",type:"dynasty",
d:`After Western Rome's fall (476 CE), Germanic kingdoms divide the territory:

VISIGOTHS: Spain and southern France. Capital Toledo. King Alaric sacked Rome 410 CE. Converted to Christianity. Defeated by Moors (711 CE) — King Roderic dies at Guadalete.

OSTROGOTHS: Italy. Theodoric the Great (493–526 CE) — most sophisticated Germanic ruler, preserved Roman institutions. 'King of the Romans and Goths.'

FRANKS: Northern France/Germany. Clovis I (481–511 CE) converted to Christianity — alliance with Church. Merovingian Dynasty → Carolingian Dynasty.

VANDALS: North Africa, Carthage base. Sacked Rome 455 CE (hence 'vandalism'). Defeated by Justinian 534 CE.

ANGLES, SAXONS, JUTES: Britain (from 440 CE). Seven Anglo-Saxon kingdoms (Heptarchy): Northumbria, Mercia, East Anglia, Essex, Kent, Sussex, Wessex.

BURGUNDIANS: Eastern France/Switzerland.
LOMBARDS: Northern Italy (from 568 CE).`,
tags:["visigoths","franks","ostrogoths","germanic","post-roman","europe","dynasty","clovis"]},

{y:768,r:"Europe & Dynasties",t:"Carolingian Dynasty — Charlemagne & Holy Roman Empire",s:"France/Germany",type:"dynasty",
d:`CHARLEMAGNE (768–814 CE / 152–199 AH): King of the Franks from 768, crowned 'Emperor of the Romans' by Pope Leo III on Christmas Day 800 CE. His realm: modern France, Germany, Netherlands, Belgium, Luxembourg, Switzerland, Austria, northern Italy.

CAROLINGIAN RENAISSANCE: Promoted literacy, standardized Latin, established palace schools, copied manuscripts. Invited scholars from across Europe and the Islamic world.

ADMINISTRATIVE SYSTEM: Counts as regional governors, missi dominici (royal inspectors). Capitularies (written laws).

Exchanged gifts with Caliph Harun al-Rashid — including a white elephant named Abul Abbas.

After his death: Treaty of Verdun (843 CE) divided empire among 3 grandsons — created the precursors of modern France (West Francia), Germany (East Francia), and the middle kingdom (Lotharingia/Lorraine).

HOLY ROMAN EMPIRE: Otto I crowned by Pope John XII (962 CE). Technically lasted until Napoleon dissolved it in 1806 — 844 years. 'Neither Holy, nor Roman, nor an Empire' — Voltaire.`,
tags:["charlemagne","carolingian","holy roman empire","france","germany","europe","dynasty","800 CE"]},

{y:1066,r:"Europe & Dynasties",t:"Norman Conquest of England — 1066 CE",s:"England",type:"dynasty",
d:`September 25, 1066: King Harold II defeats Viking King Harald Hardrada at Battle of Stamford Bridge. Three days later, William the Conqueror (Duke of Normandy) lands at Pevensey with 7,000 Norman troops.

BATTLE OF HASTINGS (October 14, 1066): Harold killed (arrow through eye, according to tradition). William wins. 

NORMAN ENGLAND: The Domesday Book (1086) — comprehensive survey of England's land and people. Feudal system imposed. Norman French becomes language of the court — French words in English: beef (boeuf), pork (porc), government (gouvernement). English becomes the language of peasants temporarily.

ENGLISH DYNASTIES:
• House of Normandy (1066–1135)
• House of Blois (1135–1154)
• House of Plantagenet (1154–1399): Henry II, Richard I (Crusades), King John (Magna Carta 1215), Edward III (100 Years War)
• House of Lancaster (1399–1461)
• House of York (1461–1485)
• House of Tudor (1485–1603): Henry VII, Henry VIII (break with Rome, 6 wives), Elizabeth I ('Virgin Queen')
• House of Stuart (1603–1714): James I, Charles I (executed), Charles II, James II
• House of Hanover (1714–1917)
• House of Windsor (1917–present)`,
tags:["norman","england","1066","william","hastings","domesday","tudor","plantagenet","dynasty","europe"]},

{y:1337,r:"Europe & Dynasties",t:"Hundred Years War — France vs England",s:"France/England",type:"battle",
d:`1337–1453 CE (116 years). England claims French throne. Intermittent warfare between English Plantagenet/Lancastrian kings and French Valois kings.

KEY BATTLES:
• Crécy (1346): English longbowmen devastate French cavalry — 2,000 French knights killed. Longbow range: 400m, rate: 12 arrows/minute.
• Poitiers (1356): Black Prince (Edward of Woodstock) captures French King John II.
• Agincourt (1415): Henry V defeats 6:1 odds. Shakespeare's 'we few, we happy few, we band of brothers.'
• Siege of Orléans (1428–29): JOAN OF ARC leads French relief. 17-year-old peasant girl claims divine visions, leads armies. Captured 1430, burned as heretic 1431. Canonized 1920.

CONCLUSION: France expels English from all territory except Calais (retained until 1558). French national identity solidified. Joan of Arc becomes France's patron saint.

IMPACT: Development of national identity in both France and England. End of medieval chivalric warfare. The English longbow gives way to gunpowder.`,
tags:["hundred years war","france","england","joan of arc","agincourt","crécy","europe","medieval"]},

{y:1347,r:"Europe & Dynasties",t:"Black Death — Plague Destroys Medieval Europe",s:"Europe",type:"civilization",
d:`1347–1353 CE. Yersinia pestis bacterium (confirmed by DNA analysis from medieval graves). Arrived via Mongol trade routes — siege of Caffa (Crimea) 1346: Mongols catapulted infected corpses over city walls.

SPREAD: Sicily 1347 → Italy, France, Spain, England 1348 → Central Europe, Scandinavia 1349–1350.

MORTALITY: 30–60% of Europe's population dead. France: 50%. England: 30–45%. Florence: 60–70% (100,000 → 45,000). Total global deaths: 75–200 million.

SOCIAL REVOLUTION:
• Feudalism collapses — surviving peasants can demand higher wages (labor scarcity)
• Church authority questioned — prayers and indulgences didn't stop it
• Flagellant movements (public self-flagellation) — seeking divine mercy
• Jewish pogroms — blamed for poisoning wells (false). Massacres in Strasbourg, Basel, Frankfurt.
• Dance of Death (Danse Macabre) art motif — death takes king and peasant equally
• Quarantine (from Italian 'quarantina' — 40 days) — first used in Ragusa/Dubrovnik 1377

MEDICAL LEGACY: Establishment of public health institutions. Understanding that disease can spread from person to person. Early germ theory.`,
tags:["black death","plague","1347","europe","medieval","social change","feudalism","church"]},

{y:1400,r:"Europe & Dynasties",t:"Italian Renaissance — Medici Florence",s:"Italy",type:"civilization",
d:`14th–17th centuries. 'Rebirth' of classical Greek-Roman learning, fused with Christian humanism and revolutionary artistic technique.

MEDICI FAMILY: Bankers of Florence — Cosimo de' Medici (1434–1464), Lorenzo 'the Magnificent' (1469–1492). Patronized artists, philosophers, architects. Platonic Academy in Florence.

DANTE ALIGHIERI (1265–1321): Divine Comedy — basis of Italian language. 'In the middle of the journey of life I came to myself within a dark wood.'

GIOTTO (1267–1337): First painter to depict realistic depth and emotion.

BRUNELLESCHI (1377–1446): Dome of Florence Cathedral (dome 42m diameter, no scaffolding).

DONATELLO (1386–1466): First free-standing nude sculpture since antiquity.

BOTTICELLI (1445–1510): Birth of Venus, Primavera.

LEONARDO DA VINCI (1452–1519): Mona Lisa, Last Supper, Vitruvian Man. Notebooks: helicopter design, solar energy, calculator, tank, 30,000 words on anatomy.

MICHELANGELO (1475–1564): David (marble, 17 feet), Sistine Chapel ceiling, Pietà.

RAPHAEL (1483–1520): School of Athens (featuring Aristotle, Plato, and 59 others).

KEY INNOVATION: Linear perspective (Brunelleschi) — representing 3D space on 2D surface.`,
tags:["renaissance","florence","medici","leonardo","michelangelo","italy","europe","art"]},

{y:1517,r:"Europe & Dynasties",t:"Protestant Reformation — Luther, Calvin, Henry VIII",s:"Germany/Europe",type:"civilization",
d:`October 31, 1517: Martin Luther nails 95 Theses to Wittenberg church door. The printing press (Gutenberg, 1440) spreads his ideas across Europe in weeks — the first 'viral' media event.

LUTHER'S CORE ARGUMENTS: Salvation by faith alone (sola fide), Scripture alone (sola scriptura), not by works or indulgences. Translates Bible into German — making it accessible to literate laypeople.

CALVIN (1509–1564): Predestination doctrine. Geneva theocracy. Calvinist churches: Netherlands, Scotland (Knox), France (Huguenots), New England.

HENRY VIII (1509–1547): Breaks with Rome over divorce from Catherine of Aragon (1534). English Reformation less doctrinal — mainly political. Dissolved 800+ monasteries, seized their wealth. 'Defender of the Faith' — he had received this title from the Pope for defending Catholicism against Luther.

ANABAPTISTS: Radical reformation — adult baptism, pacifism, separation of church and state.

WARS: French Wars of Religion (1562–1598), Dutch Revolt (1568–1648), THIRTY YEARS WAR (1618–1648) — 8 million dead. Peace of Westphalia (1648) — state sovereignty principle, foundation of modern international law.

COUNCIL OF TRENT (1545–1563): Catholic Counter-Reformation. Jesuit Order (Ignatius of Loyola, 1540).`,
tags:["reformation","luther","calvin","henry VIII","protestantism","printing","europe","religious war"]},

{y:1618,r:"Europe & Dynasties",t:"Thirty Years War & Peace of Westphalia",s:"Holy Roman Empire/Europe",type:"battle",
d:`1618–1648. Europe's most destructive pre-modern war. Began as religious conflict (Protestant vs Catholic within the Holy Roman Empire) but became dynastic/political.

PHASES:
• Bohemian (1618–1625): Bohemian Protestant revolt — Defenestration of Prague (two imperial governors thrown from window — landed in horse manure, survived).
• Danish (1625–1629): Denmark intervenes for Protestants — defeated by Catholic League under Wallenstein.
• Swedish (1630–1635): Gustavus Adolphus of Sweden — 'Lion of the North' — transforms war. Killed at Lützen (1632).
• French (1635–1648): Catholic France allies with Protestant powers against Habsburgs — pure power politics.

CASUALTIES: 8 million dead (military + famine + plague). Germany lost 25–40% of its population. Some regions lost 50–60%.

PEACE OF WESTPHALIA (October 24, 1648): THE FOUNDATION OF THE MODERN INTERNATIONAL ORDER:
• State sovereignty: no ruler can interfere in another's internal affairs
• Religious freedom (within limits) recognized
• Balance of power principle established
• Diplomacy between equal sovereign states
This treaty is still cited in international law and the UN Charter.`,
tags:["thirty years war","westphalia","sovereignty","international law","europe","religious war","1648"]},

{y:1688,r:"Europe & Dynasties",t:"Glorious Revolution — Constitutional Monarchy",s:"England",type:"dynasty",
d:`1688: The 'Glorious Revolution' (bloodless in England, not Ireland). William of Orange (Netherlands) invited by Parliament to replace Catholic King James II. James II flees to France. William III and Mary II crowned jointly.

BILL OF RIGHTS (1689): Parliament supreme over monarch. No standing army in peacetime without Parliament's consent. Free elections. Freedom of speech in Parliament. Habeas corpus (1679 — already secured). Foundation of British constitutional monarchy.

IMPACT: England never again had absolute monarchy. Parliament's supremacy established. Enabled: stable government, rule of law, property rights → favorable environment for the Industrial Revolution (the 'why Britain first' explanation).

John Locke's 'Two Treatises of Government' (1689): Government derives authority from consent of the governed. Natural rights: life, liberty, property. If government violates these — revolution is justified. Directly influenced Thomas Jefferson and the US Declaration of Independence.

Act of Settlement (1701): Protestant succession guaranteed.
Act of Union (1707): England + Scotland = Great Britain.`,
tags:["glorious revolution","england","bill of rights","parliament","locke","constitutional monarchy","1688","europe"]},

{y:1789,r:"Europe & Dynasties",t:"French Revolution & Napoleon — 1789–1815",s:"France",type:"dynasty",
d:`FRENCH REVOLUTION (1789–1799):
• Estates-General (May 1789) → National Assembly → Bastille stormed July 14
• Declaration of Rights of Man (August 1789): Liberty, Equality, Property, Security, Resistance to Oppression
• Constitution (1791): Constitutional monarchy
• First Republic (1792): Louis XVI and Marie Antoinette guillotined (1793)
• Reign of Terror (1793–94): Robespierre — 16,000+ officially guillotined, 40,000 total
• Directory (1795–99): Corruption and instability

NAPOLEON BONAPARTE (1769–1821):
• Coup of 18 Brumaire (Nov 9, 1799): First Consul → Emperor (1804)
• NAPOLEONIC CODE (1804): Equality before law, property rights, religious freedom. Used in 70+ countries today (France, Spain, Italy, Louisiana, Quebec, Latin America).
• CAMPAIGNS: Austerlitz (1805, greatest tactical victory), Jena, Wagram. Masters continental Europe by 1810.
• PENINSULA WAR (1808–14): Spain becomes quagmire. Wellington defeats French.
• RUSSIAN CAMPAIGN (1812): 685,000 men enter Russia; ~100,000 return. Moscow burns.
• ELBA exile (1814) → Hundred Days → WATERLOO (June 18, 1815): Wellington + Prussians defeat Napoleon. Final exile to St. Helena.

CONGRESS OF VIENNA (1815): Metternich, Castlereagh, Talleyrand redraw Europe. Balance of power. 40 years of European stability (Concert of Europe).`,
tags:["french revolution","napoleon","1789","bastille","code napoleon","waterloo","europe","dynasty"]},

{y:1837,r:"Europe & Dynasties",t:"Victorian Britain — Industrial Power",s:"Britain",type:"dynasty",
d:`HOUSE OF HANOVER / VICTORIA (1837–1901): Queen Victoria's 63-year reign — longest until Elizabeth II. The British Empire at its apex.

BRITISH EMPIRE AT PEAK (1922): 35.5 million sq km — 25% of Earth's land area. 412 million people — 23% of world population. 'The sun never sets on the British Empire.'

KEY COLONIES: India (Crown Jewel), Canada, Australia, New Zealand, South Africa, Nigeria, Ghana (Gold Coast), Kenya, Egypt, Sudan, Malaya, Burma, Hong Kong.

INDUSTRIAL REVOLUTION (from c.1760–1840): Steam engine (Watt), railways, iron and steel, cotton mills, coal mining. Britain produces 50% of world's iron and coal by 1850. GDP: 20% of world total.

GREAT REFORM ACT (1832): Extended voting rights. Abolition of Slavery (1833) in British Empire — 800,000 enslaved people freed. Chartism. Factory Acts limiting child labor.

CRIMEAN WAR (1853–56): Britain/France vs Russia — Florence Nightingale establishes modern nursing. INDIAN REBELLION (1857): Crown rule replaces Company. BOER WAR (1899–1902): South Africa — concentration camps, 26,000 Boer civilians die.`,
tags:["victoria","britain","british empire","industrial","dynasty","victoria","19th century","europe"]},

{y:1871,r:"Europe & Dynasties",t:"German & Italian Unification",s:"Germany/Italy",type:"dynasty",
d:`GERMAN UNIFICATION: Otto von Bismarck ('Iron Chancellor') — Prussian PM. Uses 'blood and iron' policy: 3 wars to unify German states.
• Austrian-Prussian War (1866): Prussia defeats Austria at Sadowa/Königgrätz — Austria excluded from Germany.
• Franco-Prussian War (1870–71): Prussia defeats France. Louis Napoleon captured at Sedan.
• January 18, 1871: German Empire proclaimed in Hall of Mirrors, Versailles. Wilhelm I as Kaiser.

IMPERIAL GERMANY: Second Reich. Industrial powerhouse. Steel production surpasses Britain by 1910. Naval rivalry with Britain. Wilhelm II dismisses Bismarck (1890) — more aggressive foreign policy leads to WWI.

ITALIAN UNIFICATION (Risorgimento): Cavour (statesman), Garibaldi (revolutionary). Battle of Magenta, Solferino (1859). Garibaldi's 'Expedition of the Thousand' captures Sicily and Naples (1860). Victor Emmanuel II — first King of unified Italy (1861). Rome annexed 1870 (Pope loses temporal power — Vatican remains independent pocket state).

AUSTRO-HUNGARIAN EMPIRE (1867–1918): Dual monarchy — Habsburg Emperor of Austria also King of Hungary. 11 nationalities, 12 languages. Sarajevo assassination (1914) ends it.`,
tags:["bismarck","german unification","italy","1871","risorgimento","garibaldi","habsburg","dynasty","europe"]},

{y:570,r:"Islamic Caliphates & Battles",t:"Birth of Prophet Muhammad ﷺ — Year of the Elephant",s:"Mecca, Arabia",type:"prophet",
d:`Born 12 Rabi ul-Awwal, ~570 CE (53 BH — Before Hijra). Named 'Muhammad' (The Praised One) by grandfather Abdul Muttalib — a name no Arab had before.

THE YEAR OF THE ELEPHANT: Same year Abraha al-Ashram, Christian Abyssinian viceroy of Yemen, marches on Mecca to destroy the Kaaba with an army including war elephants. Allah sends birds ('Ababil') carrying clay stones — entire army destroyed. Quran: Surah Al-Fil (105). The elephant Mahmud reportedly kneeled and refused to advance toward Mecca.

LINEAGE: Muhammad ibn Abdullah ibn Abdul Muttalib ibn Hashim ibn Abd Manaf — of the noble Quraysh tribe, direct descendants of Ibrahim AS through Ismail AS.

EARLY LIFE: Father Abdullah died before birth. Mother Aminah dies when he is 6. Raised by grandfather Abdul Muttalib (dies when Muhammad is 8), then uncle Abu Talib. Twice accompanied trade caravans to Syria. On first trip (age 9) met Christian monk Bahira who saw signs of prophethood — urged Abu Talib to protect him. On second trip (age 25) as Khadijah's RA agent — doubled expected profit.

KNOWN AS: Al-Amin (Trustworthy) and Al-Sadiq (Truthful) — recognized by all Meccans.`,
tags:["muhammad","prophet","birth","570 CE","mecca","year of elephant","quraysh","islam","seal of prophets"]},

{y:610,r:"Islamic Caliphates & Battles",t:"First Revelation — Cave Hira — Beginning of Islam",s:"Cave Hira, Mecca",type:"revelation",
d:`Ramadan, 610 CE (13 BH). The Prophet ﷺ in seclusion in Cave Hira on Jabal al-Nour. Age: 40.

Angel Jibreel AS appears suddenly. Three embraces, each tighter: 'Iqra!' (Read/Recite!) — 'I cannot read.' Third embrace: first 5 verses of Surah Al-Alaq (96:1-5) revealed:
'Read in the name of your Lord who created — created man from a clinging substance. Read, and your Lord is the most Generous — who taught by the pen — taught man that which he knew not.'

The Prophet ﷺ trembles, returns to Khadijah RA: 'Zammiluni, Zammiluni!' (Cover me, cover me!) She comforts: 'By Allah, Allah will never disgrace you — you maintain ties, bear others' burdens, serve guests.'

Takes him to Waraqah ibn Nawfal (elderly Christian scholar): 'This is the same Namus (Jibreel) who came to Musa. Would that I were young! Would that I live when your people drive you out!'

PERIOD OF REVELATION: Quran revealed over 23 years — 13 years in Mecca, 10 in Medina. Total: 114 Surahs, 6,236 verses. Memorized by thousands of companions. Written on palm leaves, stones, and bones. Compiled into one book under Abu Bakr RA. Standardized by Uthman RA. The Quran we read today is identical to what was revealed.`,
tags:["revelation","quran","jibreel","hira","610","islam","khadijah","waraqah","first revelation"]},

{y:622,r:"Islamic Caliphates & Battles",t:"THE HIJRA — Islamic Calendar Begins — 1 AH",s:"Mecca → Medina",type:"caliphate",
d:`622 CE = 1 AH (Anno Hegirae). The Prophet ﷺ and Muslims migrate from Mecca to Medina — the event so significant that Umar RA later established it as the beginning of the Islamic calendar.

ASSASSINATION PLOT: Quraysh plan one man from each tribe simultaneously strike — collective guilt, no retaliation possible. Angel Jibreel reveals the plot. Ali RA sleeps in the Prophet's ﷺ bed as decoy.

CAVE THAWR: 3 days hiding. Search party reaches cave — spiders weave web, pigeons nest at entrance overnight (miracles). Quraysh tracker Suraqa ibn Malik pursues then sees his horse's legs sink repeatedly — submits and is given a letter of safety. Quran 9:40: 'Allah has already helped him when the disbelievers drove him out, the second of two, when they were in the cave, and he said to his companion, "Do not grieve; indeed Allah is with us."'

RECEPTION IN MEDINA: People line the streets singing 'Tala'a al-Badru Alayna' (The Full Moon Has Risen Upon Us) — still sung at weddings today. Each Muhajir (migrant) paired with an Ansar (helper) in brotherhood.

CONSTITUTION OF MEDINA: First written constitution establishing a multi-religious political community.`,
tags:["hijra","1 AH","622","medina","cave thawr","abu bakr","constitution","islamic calendar","migration"]},

{y:624,r:"Islamic Caliphates & Battles",t:"Battle of Badr — 17 Ramadan, 2 AH",s:"Badr, Hejaz",type:"battle",
d:`March 13, 624 CE / 17 Ramadan, 2 AH. Islam's first major battle — 313–317 Muslims vs ~950–1,000 Quraysh.

MUSLIM ARMY: 86 Muhajiroon, 231 Ansar. 2 horses, 70 camels. Arms: 60 coats of mail, 60 helmets. Commanders: Prophet ﷺ (overall), Hamza RA (right), Ali RA (left), Abu Ubayda RA.

QURAYSH: 100 horses, 700 camels. Full armour. 3:1 advantage. Led by Abu Jahl ibn Hisham.

THE BATTLE: Prophet ﷺ throws a handful of Badr sand toward Quraysh: 'May faces be disfigured!' Quran (8:17): 'You did not throw when you threw, but Allah threw.' Angels fight alongside Muslims.

INDIVIDUAL COMBATS: Three champions from each side. Ubaydah ibn al-Harith RA, Hamza RA, Ali RA vs three Quraysh champions. Hamza and Ali kill their opponents; Ubaydah mortally wounded, Hamza and Ali finish the third.

RESULT: 70 Quraysh killed (including Abu Jahl — found dying by Abdullah ibn Masud RA, head cut off). 70 prisoners. Muslim casualties: 14 martyrs.

PRISONERS: Treated with unprecedented humanity. Literate prisoners: teach 10 Muslims to read in exchange for freedom — world's first education-for-freedom exchange program.

Surah Al-Anfal (Chapter 8) entirely about Badr.`,
tags:["badr","battle","2 AH","624","ramadan","313","angels","quraysh","islam","first battle"]},

{y:625,r:"Islamic Caliphates & Battles",t:"Battle of Uhud — 3 AH / 625 CE",s:"Uhud, Medina",type:"battle",
d:`7 Shawwal, 3 AH (March 23, 625 CE). Quraysh return with 3,000 troops (revenge for Badr). Muslims: ~700 (Abdullah ibn Ubayy withdrew with 300 hypocrites last minute, leaving 700).

STRATEGY: 50 archers positioned on Jabal al-Ruma ('Archers' Hill') under Abdullah ibn Jubayr RA. Prophet's explicit command: 'Do NOT leave, whether we win or lose, until I call you.'

INITIAL VICTORY: Muslims routing Quraysh. Quraysh begin to flee.

THE FATAL MISTAKE: ~40 of 50 archers see Muslims collecting spoils, assume victory — descend against their commander's order. Khalid ibn Walid (not yet Muslim) sees the gap — cavalry flanks the Muslim army from behind. Chaos and rout.

THE PROPHET ﷺ WOUNDED: Tooth broken. Cheek pierced by arrow. Helmet rings driven into his face (companions extracted them with their teeth). Covered in blood. Rumor spreads he is dead — some companions flee. But Anas ibn Nadr RA says: 'The Prophet is dead? Then what are we fighting for? He is fighting his Lord's enemies — die for what the Prophet died for.'

HAMZA RA: The Prophet's ﷺ beloved uncle martyred. Liver eaten by Hind bint Utbah (Abu Sufyan's wife). The Prophet ﷺ grieved deeply.

LESSON (Quran 3:152): Obedience over greed; discipline above personal judgment.`,
tags:["uhud","battle","3 AH","625","hamza","archers","khalid","lesson","disobedience","quraysh"]},

{y:627,r:"Islamic Caliphates & Battles",t:"Battle of Khandaq (Trench) — 5 AH",s:"Medina",type:"battle",
d:`Shawwal, 5 AH (627 CE). 'Ghazwat al-Ahzab' (Battle of the Confederates). 10,000 fighters from multiple tribes — the largest force yet assembled against Muslims.

SALMAN AL-FARISI RA: Persian companion suggests digging a trench (khandaq) on the vulnerable northern side. Unprecedented in Arabian warfare. Prophet ﷺ personally digs. Companions compete to be close to him. He breaks a rock three times: flash 1 = conquest of Yemen; flash 2 = conquest of Persia (companions seeing sparks from 1,500 km away — divine showing); flash 3 = conquest of Rome/Syria.

SIEGE: 27 days. Quraysh cavalry charges repeatedly — trench holds completely. Amr ibn Abd Wudd (famed as 'worth 1,000 warriors') leaps the trench with a few men. Ali RA challenges him: 'O lion, why do you dismount?' Single combat — Ali RA kills him. The army's morale breaks.

DIVINE ASSISTANCE: Cold wind, supply failures, tribal dissension in Confederate camp. Quran (33:9): 'We sent against them a wind and armies they did not see.'

ABU SUFYAN withdraws the entire coalition. Greatest strategic Islamic victory without a decisive engagement.

Banu Qurayza (Jewish tribe that violated Constitution of Medina) — judged by their own chosen arbiter Sa'd ibn Muadh RA according to Torah law for wartime treachery.`,
tags:["khandaq","trench","5 AH","627","salman","ahzab","confederates","medina","victory","siege"]},

{y:628,r:"Islamic Caliphates & Battles",t:"Treaty of Hudaybiyyah — 6 AH — Strategic Masterpiece",s:"Hudaybiyyah, near Mecca",type:"treaty",
d:`Dhul Qa'dah, 6 AH (March 628 CE). Muslims march for Umrah — first time in 6 years. Quraysh block entry.

Rumor: Uthman RA (sent as envoy) has been killed. Bay'at al-Ridwan: 1,400 companions pledge to fight to the death under a tree. Quran (48:18): 'Allah was pleased with the believers when they pledged allegiance to you under the tree.'

TREATY TERMS (apparently unfavorable to Muslims):
• Return without performing Umrah this year
• Any Meccan who comes to Muslims must be returned; any Muslim to Mecca need not be returned
• 10-year ceasefire
• Any tribe may join either party

Umar RA protests: 'Are we not on truth?' Prophet ﷺ: 'I am Allah's servant. I will not disobey Him.' When the Prophet ﷺ asks Ali RA to erase his title 'Messenger of Allah' from the document (Quraysh refused to write it) — Ali RA says he cannot bring himself to do it. The Prophet ﷺ erases it himself with his own hand.

RESULT: Mass conversions in the next 2 years. Khalid ibn Walid RA, Amr ibn al-As RA, Uthman ibn Talha RA, Abu Hurairah RA all convert in this period. Islam spreads freely. Allah calls it 'manifest conquest' immediately (Surah Al-Fath 48:1). When Quraysh violate treaty, Prophet ﷺ marches on Mecca with 10,000 — general amnesty.`,
tags:["hudaybiyyah","treaty","6 AH","628","strategic","fath","conquest preparation","umar","ali","islam"]},

{y:630,r:"Islamic Caliphates & Battles",t:"Conquest of Mecca — 8 AH — General Amnesty",s:"Mecca",type:"caliphate",
d:`20 Ramadan, 8 AH (January 11–12, 630 CE). Quraysh violate treaty by supporting ally Banu Bakr's attack on Banu Khuza'a (Muslim allies). Prophet ﷺ prepares in secret — even Abu Bakr's RA father doesn't know until the last moment.

10,000 Muslims in 4 divisions. Abbas ibn Abdul Muttalib RA (Prophet's uncle) escorts a frightened Abu Sufyan to witness the army: 'Abbas, this is an enormous dominion!' Abbas: 'This is prophethood, Abu Sufyan.' Shahada.

GENERAL AMNESTY declared: 'Today is the day of mercy, not revenge.' (Yawm al-Marhamah). Only 10–13 individuals initially targeted for specific crimes — most later pardoned upon request. No looting. No collective punishment. The people who tortured Muslims for 13 years, killed their companions, buried daughters alive — FORGIVEN.

THE KAABA: Prophet ﷺ enters on camel Qaswa, head bowed in humility reciting Surah Al-Fath. Removes 360 idols with a stick: 'Truth has come, and falsehood has departed' (17:81).

BILAL RA: Climbs to the top of the Kaaba to call the first Adhan in Mecca — the man tortured in Mecca's streets now calls 'Allahu Akbar' from above it.

'What do you expect I will do with you?' — 'Good, you are a noble brother, son of a noble brother.' — 'Go — you are free (Tulaqa).' 

Historically: the most magnanimous military victory in ancient history.`,
tags:["fath makkah","8 AH","630","mecca","amnesty","bilal","kaaba","10000","quraysh","forgiveness","conquest"]},

{y:632,r:"Islamic Caliphates & Battles",t:"Farewell Pilgrimage & Death of Prophet ﷺ — 11 AH",s:"Mecca & Medina",type:"prophet",
d:`Dhul Hijjah 10 AH (March 632 CE): Hajjat al-Wada (Farewell Pilgrimage). 100,000–124,000 companions present.

SERMON ON ARAFAT: 'O People! Your Lord is One, your father is one. No Arab is superior to non-Arab, no non-Arab to Arab, no white to black, no black to white — except by piety (taqwa).' 'I have left two things — hold to them: the Quran and my Sunnah.'

LAST REVELATION: 5:3 — 'Today I have perfected your religion, completed My favour upon you, and chosen Islam as your religion.' Upon hearing this, Umar RA wept — he knew it meant the Prophet's ﷺ mission was complete.

DEATH: 12 Rabi ul-Awwal, 11 AH (June 8, 632 CE). Age 63. 14-day illness. In Aisha RA's room, head on her chest. Final words: 'Al-Rafiq al-A'la' (The Highest Companion). Died while the Fajr prayer was being led by Abu Bakr RA in the mosque.

Abu Bakr RA kisses his forehead: 'You were beautiful in life and beautiful in death. O Messenger of Allah.'

Address to companions: 'Whoever worshipped Muhammad, Muhammad has died. Whoever worships Allah, Allah is Ever-Living, never dies.' (Quran 3:144)

Buried in Aisha RA's room — now the green dome, inside Masjid al-Nabawi. Will be the last to rise from his grave on the Day of Judgment, see his grave open, and lead the funeral prayer for all prophets.`,
tags:["farewell pilgrimage","death","11 AH","632","arafat","last sermon","quran sunnah","medina","burial","green dome","equality"]},

{y:632,r:"Islamic Caliphates & Battles",t:"Abu Bakr RA — 1st Caliph — Ridda Wars — 11–13 AH",s:"Medina",type:"caliphate",
d:`11–13 AH / 632–634 CE. Al-Siddiq (The Great Truthful). First adult male Muslim. Prophet's closest friend. Age ~61. Ruled 2 years, 3 months, 11 days.

RIDDA WARS (Wars of Apostasy): After the Prophet's ﷺ death, ~12 tribes revolt — claiming prophethood, refusing zakat, or renouncing Islam altogether. Abu Bakr RA: 'By Allah, if they withhold even a she-kid's tether that they used to pay to the Prophet, I will fight them for it.' All of Arabia re-unified within 1 year.

False prophets: Musaylimah al-Kadhdhab (Yamama) — Battle of Yamama (633 CE). ~700 Huffaz (Quran memorizers) martyred. Musaylimah killed by Wahshi RA (who previously killed Hamza RA — now a Muslim). Also: Tulayha, Sajah (female false prophet), Al-Aswad al-Ansi.

QURAN COMPILATION: Umar RA urges collection after Huffaz deaths. Zaid ibn Thabit RA compiles — verifying each verse by two witnesses. First complete mushaf preserved by Hafsa RA.

EXPANSION: Khalid ibn Walid RA → Iraq. Amr ibn al-As RA → Syria. 'No stagnation in Islam.'

CHARACTER: Milked his neighbors' goats daily even as Caliph. Accepted only modest state salary. Gave all his wealth to Islam. 'I will leave you what Allah left to His messenger — the Quran and Sunnah.'`,
tags:["abu bakr","1st caliph","11 AH","632","ridda","quran compilation","yamama","expansion","rashidun"]},

{y:634,r:"Islamic Caliphates & Battles",t:"Umar ibn al-Khattab RA — 2nd Caliph — 13–23 AH",s:"Medina",type:"caliphate",
d:`13–23 AH / 634–644 CE. Al-Farooq (Distinguisher of Truth from Falsehood). Greatest administrator in Islamic history.

CONQUESTS: Battle of Qadisiyyah (636 CE/15 AH) — Sassanid Persia falls. Battle of Yarmouk (636 CE/15 AH) — Byzantine Syria falls. Battle of Nahavand (642 CE) — 'Victory of Victories,' final Persian resistance crushed.

JERUSALEM SURRENDER (638 CE/17 AH): Patriarch Sophronius insists the Caliph himself come to receive surrender. Umar RA enters on foot leading his camel (servant is riding). Refuses to pray inside Church of Holy Sepulchre — sets aside his own time to pray nearby so Muslims cannot later claim it. 'Covenant of Umar' — full religious freedom for all.

ADMINISTRATION: Established Bayt al-Mal (state treasury). Diwan system (bureaucratic registry). Fixed salaries for soldiers and officials. Hijri calendar established. New cities: Basra and Kufa (Iraq), Fustat (Egypt). Appointed great governors: Muadh ibn Jabal RA (Yemen), Amr ibn al-As RA (Egypt), Saad ibn Abi Waqqas RA (Iraq).

PERSONAL: Walked Medina at night in disguise checking on citizens. Carried flour sacks on his back to feed poor families. Refused to take more than a soldier's wage. Famously said: 'If a mule trips in Iraq, I fear Allah will question me about it.'

MARTYRDOM: 26 Dhul Hijjah, 23 AH. Stabbed by Abu Lu'lu'a (Persian slave) during Fajr prayer. Died 3 days later. Named 6-person Shura council to elect next Caliph.`,
tags:["umar","farooq","2nd caliph","13 AH","634","qadisiyyah","yarmouk","jerusalem","administration","rashidun"]},

{y:636,r:"Islamic Caliphates & Battles",t:"Battles of Qadisiyyah & Yarmouk — 15 AH",s:"Iraq & Syria",type:"battle",
d:`TWO SIMULTANEOUS WORLD-CHANGING BATTLES IN 636 CE (15 AH):

BATTLE OF QADISIYYAH (November 636 CE):
Sa'd ibn Abi Waqqas RA (who was ill with boils, commanded from a tent) leads 30,000 Muslims vs Rustam Farrokhzad's 100,000–120,000 Persians + 33 war elephants.
FOUR DAYS of battle. Muslim camels (with covered heads and painted mock-eyes) terrify the Persian horses and elephants. Day 4 ('Night of Clanging'): Night assault. Rustam killed. Persian army disintegrates.
Ctesiphon (Sassanid capital, largest city in the world at the time) falls. White Palace of Chosroes captured. Sassanid Empire of 400 years — dissolved.

BATTLE OF YARMOUK (August 636 CE):
Abu Ubayda ibn al-Jarrah RA + Khalid ibn Walid RA (right wing) lead ~36,000 vs 150,000–200,000 Byzantine-Arab force under Theodore.
SIX DAYS. Multiple Byzantine penetrations of Muslim lines. Muslim women repel fleeing men with tent poles. Khalid's masterstroke: feigned retreat draws Byzantine infantry forward — cavalry envelops both flanks. Byzantine army collapses into the Yarmouk Gorge.
Byzantine Syria and Palestine pass to Islam — permanently. Heraclius: 'Farewell, Syria.'`,
tags:["qadisiyyah","yarmouk","15 AH","636","saad ibn abi waqqas","khalid","persia","byzantine","twin battles","conquest"]},

{y:644,r:"Islamic Caliphates & Battles",t:"Uthman RA — 3rd Caliph — Quran Standardized — 23 AH",s:"Medina",type:"caliphate",
d:`23–35 AH / 644–656 CE. Dhun-Nurayn (Possessor of Two Lights). Elected by 6-person Shura council. Age ~70.

UTHMANIC QURAN: Most important act of any caliph. As Islam spread, dialectal variations in Quran recitation arose (Arabic has multiple dialects). Uthman RA commissioned Zaid ibn Thabit RA with a committee to produce 4–7 authoritative copies from the master mushaf (held by Hafsa RA). Sent to: Mecca, Medina, Kufa, Basra, Syria, with one retained. All other copies ordered unified or burned to prevent variant texts.

THIS IS THE QURAN WE READ TODAY — unchanged since 35 AH / 656 CE.

NAVAL POWER: Governor Muawiya builds first Muslim fleet. Battle of the Masts (Dhat al-Sawari, 654 CE/34 AH) — defeats Byzantine fleet of 500 ships with 200 Muslim ships off the coast of Lycia (Turkey). First major naval battle in Islamic history.

EXPANSION: Libya, Cyprus, Tunisia, Azerbaijan, Armenia, Khorasan, Kabul.

MARTYRDOM: 17 Dhul Hijjah, 35 AH (June 17, 656 CE). Rebels break in while he reads Quran. Stabbed — blood falls on the page. He was fasting. Age ~82.`,
tags:["uthman","3rd caliph","23 AH","644","quran standardization","naval","rashidun","martyrdom"]},

{y:656,r:"Islamic Caliphates & Battles",t:"Ali RA — 4th Caliph — First Fitna — 35 AH",s:"Medina/Kufa",type:"caliphate",
d:`35–40 AH / 656–661 CE. Ali ibn Abi Talib RA — cousin and son-in-law of the Prophet ﷺ. 'Lion of Allah.' First child to embrace Islam. Married Fatimah RA (Prophet's daughter). Father of Hasan RA and Husain RA.

THE FIRST FITNA (Civil War):
Battle of the Camel (Jamal, 36 AH / 656 CE): Aisha RA, Talha RA, and Zubayr RA demand Uthman's RA killers be brought to justice before bay'ah. Ali RA wants to stabilize first. Battle at Basra — first time Muslims fought each other. Aisha RA in a litter on a camel at the center. Battle ended when Ali RA escorted her personally and honorably back to Medina.

Battle of Siffin (37 AH / 657 CE): Ali RA vs Muawiya RA (cousin of Uthman RA, demanding justice). 70+ days of negotiations then battle. Muawiya's troops put Qurans on spears — arbitration forced. Kharijites (extremists) condemn both sides.

Battle of Nahrawan (38 AH / 658 CE): Ali RA destroys Kharijite rebels who had been killing ordinary Muslims.

MARTYRDOM: 17 Ramadan, 40 AH (January 26, 661 CE). Kharijite Ibn Muljam strikes him with poisoned sword during Fajr prayer in Kufa mosque. Died 2 days later. Hasan RA abdicates to Muawiya RA for unity.

END OF RASHIDUN CALIPHATE — 30 years of the ideal Islamic state.`,
tags:["ali","4th caliph","35 AH","656","first fitna","jamal","siffin","kharijites","rashidun","martyrdom"]},

{y:680,r:"Islamic Caliphates & Battles",t:"Martyrdom of Husain RA — Karbala — 61 AH",s:"Karbala, Iraq",type:"battle",
d:`10 Muharram, 61 AH (October 10, 680 CE). Ashura.

Husain ibn Ali RA (Prophet's ﷺ grandson) refuses allegiance to Yazid ibn Muawiya: 'A man like me cannot pledge allegiance to a man like him.'

72 companions and family members surrounded by thousands of Umayyad soldiers. Water supply cut 3 days before. Children crying from thirst.

FINAL DAY: Abbas ibn Ali RA goes for water — both arms cut off. Returns holding waterskin in his teeth — killed before reaching the camp.

ALL COMPANIONS martyred one by one. Husain RA — last to die — prays final prayer. Multiple arrows and sword strikes. Head severed by Shimr.

ZAINAB BINT ALI RA: Witnesses everything. Taken captive to Yazid's court in Damascus. Addresses Yazid with historic speech: 'Do whatever you want — I swear by Allah, you cannot erase our memory from hearts nor kill our inspiration nor erase our mention. Your dishonor shall live forever.'

Husain RA: 'Death with dignity is better than life in humiliation.'

SIGNIFICANCE: Defines Sunni-Shia divergence. Ashura commemorated annually (10 Muharram). Karbala's message transcends Islam — resisting tyranny with principle over survival.`,
tags:["karbala","husain","61 AH","680","ashura","yazid","zainab","martyrdom","shia","tragedy"]},

{y:711,r:"Islamic Caliphates & Battles",t:"Conquest of Spain & Sindh — 93 AH",s:"Iberia & Pakistan",type:"caliphate",
d:`93 AH / 711 CE: Two simultaneous world-historical conquests.

TARIQ IBN ZIYAD (Spain/Al-Andalus):
7,000 Berber troops cross from Ceuta to Gibraltar (Jabal al-Tariq = Tariq's Mountain). Defeats Visigoth King Roderic at Battle of Guadalete (July 711 CE). Advances — most of Iberian Peninsula taken in 2 years. Reaches Pyrenees. Al-Andalus established — Islamic Spain for 781 years.

MUHAMMAD IBN QASIM (India/Sindh):
17-year-old general, nephew of Hajjaj ibn Yusuf. Sent after pirates from Raja Dahir's Sindh attacked Muslim merchant ships. Battle of Aror (712 CE): defeats and kills Raja Dahir. Conquers Sindh and southern Punjab. Islam's first permanent presence in the Indian subcontinent. Establishes equal rights for Hindus and Buddhists — temples protected, local customs respected.

Both in same year — Islam simultaneously reaches its European and South Asian frontiers. Umayyad Empire: from the Pyrenees to the Indus River.`,
tags:["tariq","spain","gibraltar","711","93 AH","muhammad ibn qasim","sindh","india","andalus","umayyad","conquest"]},

{y:750,r:"Islamic Caliphates & Battles",t:"Abbasid Caliphate — House of Wisdom — 132 AH",s:"Baghdad, Iraq",type:"caliphate",
d:`132–656 AH / 750–1258 CE. Founded by Abu al-Abbas al-Saffah. Capital: Baghdad (built 762 CE / 145 AH by al-Mansur). World's largest city by 900 CE (population: 1–1.5 million).

BAYT AL-HIKMAH (House of Wisdom, ~215 AH / 830 CE under Al-Ma'mun): Greatest intellectual institution of the medieval world. Scholars of all religions working together. Translation movement: Greek (Aristotle, Galen, Ptolemy), Persian (Sassanid science), Indian (mathematics, astronomy), Syriac, Chinese — all translated into Arabic.

KEY CALIPHS:
• Al-Mansur (136–158 AH): Founded Baghdad
• Harun al-Rashid (170–193 AH): Peak glory — Arabian Nights setting
• Al-Ma'mun (198–218 AH): Peak intellectual — rationalist theology, Bayt al-Hikmah
• Al-Mutawakkil (232–247 AH): Sunni restoration, honored Imam Ahmad

SCHOLARS: Al-Khwarizmi (algebra, algorithms), Ibn Sina (medicine), Al-Razi (chemistry), Al-Biruni (geography), Ibn al-Haytham (optics) — see Science section.

ABBASID CALIPHATE ENDS: 656 AH / 1258 CE when Mongols sack Baghdad.`,
tags:["abbasid","132 AH","750","baghdad","house of wisdom","golden age","al-mansur","harun","caliphate","islam"]},

{y:1187,r:"Islamic Caliphates & Battles",t:"Saladin Recaptures Jerusalem — 583 AH",s:"Jerusalem",type:"battle",
d:`583 AH / October 2, 1187 CE. Salah al-Din Yusuf ibn Ayyub (Kurdish, born Tikrit, Iraq, 532 AH / 1137 CE) — founder of the Ayyubid Dynasty.

BATTLE OF HATTIN (July 4, 583 AH): Crusader army (20,000) cut off from water by Lake Tiberias. 2 days in the heat — army demoralized, dying of thirst. Muslims have water and fresh reinforcements. Complete annihilation of Crusader military power. King Guy captured. Reynald of Chatillon — personally executed by Saladin for breaking treaty and attacking Mecca pilgrimage caravans.

CONQUEST OF JERUSALEM (October 2, 583 AH): CONTRAST WITH 1099: When Crusaders took Jerusalem, they massacred thousands. Saladin — complete safe passage for every Christian inhabitant. Those unable to pay ransom: Saladin's brother pays for 1,000; Saladin releases thousands more personally. Not a single church damaged.

Richard I ('Lionheart') leads Third Crusade (589–592 AH / 1189–1192 CE). Tactical military victories but can't retake Jerusalem. Compromise: Christians keep coastal cities; unarmed pilgrims may visit Jerusalem.

SALADIN'S CHARACTER: When Richard I fell ill, Saladin sent his own physician and ice from Mount Hermon. Gave away his entire personal fortune — died with 47 silver dirhams. 'He vanquished us with justice and magnanimity.'`,
tags:["saladin","jerusalem","583 AH","1187","hattin","crusades","ayyubid","chivalry","conquest"]},

{y:1258,r:"Islamic Caliphates & Battles",t:"Sack of Baghdad — End of Abbasid Caliphate — 656 AH",s:"Baghdad",type:"battle",
d:`10 Safar, 656 AH (February 13, 1258 CE). Hulagu Khan (Genghis Khan's grandson) besieges Baghdad.

ASSAULT: 17-day siege. Caliph Al-Musta'sim refuses to surrender. Walls breach. 13 days of massacre and looting.

CALIPH'S EXECUTION: Wrapped in carpet and trampled by horses — Mongol belief that royal blood cannot touch the ground.

CASUALTIES: 200,000–800,000 killed. Libraries destroyed — 'Tigris runs black with ink then red with blood.' The entire agricultural infrastructure of Mesopotamia (irrigation canals, built over 4,000 years) permanently destroyed. Iraq doesn't recover for centuries.

THE HOUSE OF WISDOM — GONE: Centuries of human knowledge lost in days. Al-Khwarizmi's originals, Ibn Sina's manuscripts, Al-Razi's complete works — ashes and mud.

ABBASID CALIPHATE (508 years, 37 caliphs) ENDS.

SILVER LINING: Battle of Ain Jalut (658 AH / 1260 CE) — Mamluk Sultan Qutuz and General Baybars defeat Mongols in Palestine. FIRST MAJOR MONGOL DEFEAT IN HISTORY. Stops Mongol advance into Africa. Later Mongol rulers (Ilkhanate, Golden Horde) convert to Islam — the conquerors conquered spiritually.`,
tags:["656 AH","1258","baghdad","mongol","abbasid end","hulagu","house of wisdom","catastrophe","ain jalut","baybars"]},

{y:1453,r:"Islamic Caliphates & Battles",t:"Conquest of Constantinople — Mehmed II — 857 AH",s:"Constantinople",type:"battle",
d:`29 Jumada al-Awwal, 857 AH (May 29, 1453 CE). Sultan Mehmed II 'al-Fatih' (The Conqueror), age 21.

THE PROPHECY FULFILLED: Prophet ﷺ said: 'Constantinople will certainly be conquered. Its commander will be an excellent commander and its army an excellent army.' (Ahmad — Sahih). Companions competed for this honor — 7 unsuccessful sieges over 800 years.

SIEGE (53 days, April 6–May 29, 1453): 80,000 Ottoman troops + 69 artillery cannons (including the 68-ton 'Basilica' cannon designed by Hungarian Urban — barrel 8m long, ball weighing 600 kg, sound heard 30 km away) vs 7,000 defenders.

MASTERSTROKE: Golden Horn harbor blocked by a chain. Mehmed transported 70 warships OVERLAND 16 km on greased logs over the Galata hill in one night (April 21–22). Byzantines woke to Ottoman ships in the harbor. Constantine XI: 'Is there no Christian who will take my head?'

FINAL ASSAULT (May 29): Constantine XI dies fighting on the walls — body identified by golden eagle boots. Mehmed II enters. Goes to Hagia Sophia — calls adhan. First salah prayed.

TRANSFORMATION: Byzantine Empire (Eastern Rome, 1,123 years) ends. Greek scholars flee to Italy with manuscripts — directly fuel the Italian Renaissance. Istanbul becomes the world's greatest city.`,
tags:["constantinople","857 AH","1453","mehmed","fatih","prophecy","hagia sophia","byzantine end","ottoman","renaissance"]},

{y:1299,r:"Islamic Caliphates & Battles",t:"Ottoman Empire — Full Dynasty — 699 AH",s:"Anatolia → Global",type:"dynasty",
d:`THE OTTOMAN DYNASTY (699–1341 AH / 1299–1922 CE): 624 years. 36 sultans. The world's longest-lasting Islamic empire.

FOUNDATIONAL SULTANS:
• OSMAN I (699–726 AH / 1299–1326 CE): Founded the beylik in Sogut, Anatolia
• ORHAN I (726–761 AH): Bursa captured 1326 — first major city
• MURAD I (761–791 AH): Crosses into Europe; Adrianople/Edirne; Battle of Kosovo 1389 — dies on battlefield
• BAYEZID I 'Thunderbolt' (791–805 AH): Battle of Nicopolis 1396 — crushes European crusade. Defeated by Timur at Ankara 1402 — captured
• MEHMED I (816–824 AH): Reunifies empire after civil war
• MURAD II (824–848/850 AH): Varna 1444, Kosovo 1448
• MEHMED II 'Fatih' (848–886 AH): Conquers Constantinople 1453
• SELIM I 'Yavuz' (918–926 AH): Defeats Safavids, Mamluks; becomes Caliph 1517
• SULEIMAN 'Kanuni/Magnificent' (926–974 AH): Peak empire. Mohács 1526, Vienna 1529, Algeria to Iraq
• SELIM II, MURAD III, MEHMED III, AHMED I...
• MUSTAFA KEMAL ATATURK abolishes Sultanate (1922) and Caliphate (1924)

PEAK TERRITORY: 5.2 million sq km. Three continents: Asia, Europe, Africa. Mecca, Medina, Jerusalem, Cairo, Istanbul, Athens, Belgrade, Algiers all under Ottoman rule.`,
tags:["ottoman","dynasty","699 AH","1299","suleiman","mehmed","selim","caliphate","empire","turkey"]},

// ═══ ISLAMIC SCHOLARSHIP (MADHABS) ═══
{y:699,r:"Islamic Scholarship",t:"Imam Abu Hanifa RA — Hanafi Madhab — 80 AH Born",s:"Kufa, Iraq",type:"madhab",
d:`BORN: 80 AH / 699 CE, Kufa, Iraq. DIED: 150 AH / 767 CE, Baghdad. Nu'man ibn Thabit. Father was Persian. Met some Companions (Tabi'i status). Studied under Imam Hammad ibn Abi Sulayman (pupil of Ibrahim al-Nakha'i, pupil of Ibn Masud RA).

AL-IMAM AL-A'ZAM (The Greatest Imam): Title given universally by Muslim scholars.

HANAFI MADHAB — Largest school of jurisprudence. ~45% of all Muslims:
Geography: Turkey, Pakistan, India, Bangladesh, Afghanistan, Central Asia (Uzbekistan, Kazakhstan, Tajikistan, Kyrgyzstan, Turkmenistan), Balkans, Syria, Iraq, Egypt (partially), Jordan, Palestine.

METHODOLOGY: Primary: Quran → Sahih Hadith → Companions' consensus → Qiyas (analogy) → Istihsan (juristic preference). Most systematic use of legal reasoning (ra'y) for novel situations.

KEY POSITIONS: A woman can contract her own marriage. Unintentional killing requires blood money, not qisas. Greater flexibility in commercial transactions.

HIS COURAGE: Refused position of Chief Judge under Abbasid Caliph Al-Mansur TWICE — imprisoned and flogged repeatedly. Died in prison (~70 years old) or shortly after release. Refused to compromise scholarly independence for political power.

STUDENTS: Imam Abu Yusuf (became first Chief Judge/Qadi al-Qudat of the Abbasid Caliphate) and Imam Muhammad al-Shaybani — spread the madhab across the empire.`,
tags:["abu hanifa","hanafi","madhab","80 AH","150 AH","kufa","fiqh","jurisprudence","turkey","pakistan","india"]},

{y:711,r:"Islamic Scholarship",t:"Imam Malik ibn Anas RA — Maliki Madhab — 93 AH Born",s:"Medina",type:"madhab",
d:`BORN: 93 AH / 711 CE, Medina. DIED: 179 AH / 795 CE, Medina. 'Imam Dar al-Hijra' (Imam of the City of the Prophet ﷺ).

MALIKI MADHAB — ~25% of Muslims:
Geography: Morocco, Algeria, Tunisia, Libya, Mauritania, Mali, Senegal, Niger, Nigeria (north), Sudan, Egypt (partially), UAE, Kuwait, Bahrain, East Africa.

AL-MUWATTA: The first systematically compiled book of Hadith (~1,720 hadiths). Imam al-Shafi'i: 'There is no book on Earth after the Quran more correct than Al-Muwatta of Malik.'

METHODOLOGY: Quran → Sunnah → 'Amal Ahl al-Madinah (Practice of Medina's people — reasoning that Medina preserves the Prophet's ﷺ actual practice) → Ijma → Qiyas → Maslaha (public interest). Madinah consensus as living sunnah.

HIS STATURE: Taught in Medina for 40+ years. Never stood up for any ruler. When Caliph Harun al-Rashid wanted Hadith lessons, Imam Malik refused to come to court: 'Knowledge is sought, not brought.' Harun al-Rashid came.

HIS FLOGGING: Fatwa that divorce given under compulsion is invalid (contradicting political interests). Flogged 70 times by Umayyad governor. His arms dislocated. He said after: 'If what I said was right — this is nothing. If wrong — it was honest ijtihad — also nothing.'

FAMOUS PHRASE: 'La adri' (I do not know) — said 48 times in a single session of questions. Humility as the foundation of true scholarship.`,
tags:["malik","maliki","madhab","93 AH","179 AH","medina","muwatta","north africa","west africa","madinah"]},

{y:767,r:"Islamic Scholarship",t:"Imam Al-Shafi'i RA — Shafi'i Madhab — 150 AH Born",s:"Gaza → Mecca → Baghdad → Egypt",type:"madhab",
d:`BORN: 150 AH / 767 CE, Gaza (Palestine) — same year Imam Abu Hanifa died. DIED: 204 AH / 820 CE, Fustat (Old Cairo), Egypt. Muhammad ibn Idris al-Shafi'i. Descended from the Quraysh, same clan as the Prophet ﷺ (Banu Muttalib).

SHAFI'I MADHAB — ~28% of Muslims:
Geography: Indonesia (world's largest Muslim country, 220 million Muslims), Malaysia, Brunei, Philippines (Muslims), Singapore, Southern Thailand, East Africa (Kenya, Tanzania, Somalia, Comoros), Yemen, Kurdistan (Iraq/Turkey/Iran/Syria), Palestine, Sri Lanka (Muslims).

AL-RISALA: The first systematic work of Usul al-Fiqh (science of jurisprudence theory). Established formal hierarchy: Quran → Sunnah → Ijma (scholarly consensus) → Qiyas. All subsequent legal theory builds on this framework.

UNIQUE POSITION: Studied under BOTH Imam Malik in Medina AND Imam Muhammad al-Shaybani (Imam Abu Hanifa's student) in Baghdad — synthesized both traditions. Developed 'old madhab' (al-Qadim, in Iraq) and 'new madhab' (al-Jadid, in Egypt).

HIS POETRY: 'Knowledge is a light that Allah places in whose heart He wills — it is not placed in a heart attached to sin.'

Imam Ahmad ibn Hanbal was his student. Said of him: 'Al-Shafi'i was like the sun for the world and like health for the body.'`,
tags:["shafi'i","madhab","150 AH","204 AH","usul al-fiqh","al-risala","indonesia","malaysia","east africa","egypt","jurisprudence"]},

{y:780,r:"Islamic Scholarship",t:"Imam Ahmad ibn Hanbal RA — Hanbali Madhab — 164 AH Born",s:"Baghdad",type:"madhab",
d:`BORN: 164 AH / 780 CE, Baghdad. DIED: 241 AH / 855 CE, Baghdad. Ahmad ibn Muhammad ibn Hanbal al-Shaybani. 'Imam Ahl al-Sunnah wal-Jama'ah.'

HANBALI MADHAB — ~5% of Muslims but immense influence:
Geography: Saudi Arabia (official state madhab), Qatar, parts of UAE, Emirates. Historically: Syria, Palestine. Ideological influence: Ibn Taymiyya (661–728 AH), Ibn al-Qayyim (691–751 AH), Muhammad ibn Abd al-Wahhab (1115–1206 AH) all follow Hanbali tradition.

AL-MUSNAD: Collection of ~40,000 hadiths — largest personal hadith collection. Memorized ~1,000,000 hadiths according to biographers.

METHODOLOGY: Strictest adherence to Quran and Sunnah. Strongest rejection of ra'y (opinion) and qiyas. Even weak hadith preferred over analogical reasoning. Most conservative on religious innovation (bid'ah).

THE MIHNA (INQUISITION) — GREATEST TEST IN ISLAMIC HISTORY:
Abbasid Caliph Al-Ma'mun (Mu'tazila rationalist theology) imposed the doctrine: the Quran is 'created' (makhluq), not eternal divine speech. All scholars forced to publicly agree. Most capitulated. Ahmad ibn Hanbal REFUSED.

28 months of imprisonment. Flogged until unconscious before Caliph Al-Mu'tasim. Chains. Never recanted: 'Show me from the Quran and Sunnah and I will agree.' His stance broke the Mu'tazila movement entirely. Caliph Al-Mutawakkil (232 AH) restored Sunnism and publicly honored Imam Ahmad.

FUNERAL (241 AH / 855 CE): 800,000–1,200,000 people attended — largest funeral in Baghdad's history. 20,000 non-Muslims converted upon witnessing his character.`,
tags:["ahmad ibn hanbal","hanbali","madhab","164 AH","241 AH","musnad","mihna","inquisition","quran created","saudi arabia","jurisprudence"]},

{y:810,r:"Islamic Scholarship",t:"Imam Al-Bukhari — Sahih al-Bukhari — 194 AH Born",s:"Bukhara (Uzbekistan)",type:"madhab",
d:`BORN: 194 AH / 810 CE, Bukhara. DIED: 256 AH / 870 CE, near Samarkand.

SAHIH AL-BUKHARI: Most authentic book after the Quran. Examined 600,000 hadiths. Accepted 7,275 (with repetitions). ~2,602 unique hadiths. Criteria: unbroken chain of narrators, each narrator reliable and of good character, each narrator provably contemporaneous with and having met the next.
