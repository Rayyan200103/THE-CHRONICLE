{y:-3500,r:"Africa & Egypt",t:"Ancient Africa — Geography & Civilizations Before Colonialism",s:"Africa",type:"civilization",
d:`GEOGRAPHY: Africa is the world's second-largest continent — 30.37 million km², covering 20% of Earth's land area. Separated from Europe by the Mediterranean Sea (14 km at its narrowest — the Strait of Gibraltar). The Sahara Desert (9.2 million km²) — the world's largest hot desert — divides the continent into North Africa (Arabic-Islamic culture) and Sub-Saharan Africa (diverse indigenous cultures).

MAJOR GEOGRAPHIC FEATURES:
• Nile River (6,650 km): World's longest river. Flows north through Sudan and Egypt. Annual floods deposited rich silt — the agricultural foundation of Egyptian civilization.
• Congo River Basin: Second-largest tropical rainforest on Earth. World's deepest river.
• Great Rift Valley: 6,000 km fault system from Ethiopia to Mozambique — created the great lakes (Victoria, Tanganyika, Malawi). Lake Victoria: Africa's largest lake, source of the White Nile.
• Atlas Mountains (Morocco/Algeria/Tunisia), Drakensberg (South Africa), Ethiopian Highlands.
• Sahel: Semi-arid belt between Sahara and tropical savanna — zone of recurring drought and famine.

PRE-COLONIAL POPULATIONS: ~100 million in 1500 CE. 3,000+ distinct ethnic groups. 2,000+ languages (25% of world's languages on 20% of world's land). Africa is the most linguistically diverse continent on Earth.

HUMANITY'S BIRTHPLACE: Oldest Homo sapiens fossils found in Morocco (Jebel Irhoud, ~315,000 years old). Earliest human tools (Oldowan) from Tanzania ~2.5 million years ago. Out of Africa migrations: 70,000 BCE to all other continents.`,
tags:["africa","geography","nile","sahara","rift valley","civilization","ancient","human origins"]},

{y:-3000,r:"Africa & Egypt",t:"Sub-Saharan Africa — Iron Age, Bantu Migrations & Early Kingdoms",s:"Sub-Saharan Africa",type:"civilization",
d:`IRON AGE IN AFRICA: Iron smelting developed independently in sub-Saharan Africa around 1400–1000 BCE — possibly before Europe. Nok Culture (Nigeria, ~500 BCE–200 CE): First sub-Saharan civilization with iron working, terracotta sculpture, and complex social organization.

BANTU MIGRATIONS (3000 BCE–1000 CE): The Bantu people (from modern Cameroon/Nigeria border area) gradually spread across sub-Saharan Africa over 4,000 years — one of the largest human migrations in history. They brought: iron tools, agriculture (yam, sorghum, millet), cattle herding, and Bantu language family (500+ languages including Swahili, Zulu, Xhosa, Yoruba-related).

By 1000 CE, Bantu-speaking peoples occupied most of sub-Saharan Africa south of the Sahara.

EARLY KINGDOMS:
• D'MT Kingdom (Eritrea/Ethiopia, 900–400 BCE): Early complex state, influenced by Sabaean (Yemen) culture
• Djenné-Djenno (Mali, 250 BCE–1400 CE): One of Africa's oldest known cities south of Sahara
• Garamantes (Libya, 500 BCE–700 CE): Desert kingdom with underground irrigation systems (foggara) — 1,000+ km of tunnels
• Luba Kingdom (Congo, 400–500 CE): Political innovations adopted by later central African states`,
tags:["africa","bantu","iron age","nok","migration","sub-saharan","ancient","civilization"]},

{y:1400,r:"Africa & Egypt",t:"Great African Empires — Complete Overview",s:"West, East & Central Africa",type:"empire",
d:`WEST AFRICAN EMPIRES:
• Ghana Empire (300–1100 CE): Controlled Trans-Saharan gold-salt trade. Capital Kumbi Saleh.
• Mali Empire (1235–1600 CE): Mansa Musa I — richest person in history. Timbuktu center of Islamic learning.
• Songhai Empire (1430–1591 CE): Largest African empire. Askia Muhammad's administration. 700,000 manuscripts in Timbuktu.
• Oyo Empire (1400–1836 CE): Yoruba state in modern Nigeria. Cavalry-based military.
• Dahomey Kingdom (1600–1894 CE): Famous female warrior corps (Agojie/'Dahomey Amazons'). Powerful slave-trading state.
• Ashanti Empire (1670–1902 CE): Modern Ghana. Gold and kente cloth. Asantehene (king). Defeated British multiple times before final British annexation.

CENTRAL AFRICAN EMPIRES:
• Kongo Kingdom (1390–1914 CE): Central Africa's greatest state. 3 million population. Converted to Catholicism 1491.
• Luba Empire (1585–1889 CE): Congo Basin. Sophisticated governance system (Bulumbu oracle network).
• Lunda Empire (1665–1887 CE): Central Africa. Federated political system.

EAST AFRICAN STATES:
• Aksum (100–940 CE): Ethiopia/Eritrea. One of four great world powers. First sub-Saharan Christianity (330 CE).
• Buganda Kingdom (1300–1966 CE): Around Lake Victoria (Uganda). Sophisticated bureaucracy.
• Mutapa Empire (1430–1760 CE): Zimbabwe/Mozambique. Successor to Great Zimbabwe. Gold trade with Swahili Coast.`,

// ═══ AMERICAS — PRE-COLUMBIAN GEOGRAPHY ═══
{y:-12000,r:"Americas & Pacific",t:"The Americas — Geography, First Peoples & Pre-Columbian World",s:"North & South America",type:"civilization",
d:`GEOGRAPHY OF THE AMERICAS:
Total area: 42.5 million km² — 28% of Earth's land surface. Two continents joined by Central America (Panama land bridge).

NORTH AMERICA: Rocky Mountains (Pacific coast), Appalachians (Atlantic coast), Great Plains (central grasslands). Mississippi-Missouri River system — 6,275 km, drains 40% of North America. Great Lakes — 21% of world's fresh surface water. Arctic Canada (2nd largest country by area), vast boreal forests, the Great Basin Desert, Mojave, Sonoran deserts.

MESOAMERICA (Central America): Where the Americas' first major civilizations arose. Volcanic mountains, tropical rainforests, Pacific and Caribbean coasts.

SOUTH AMERICA: Amazon River (greatest by discharge, 7.0 million km² basin — largest rainforest on Earth, home to 10% of all species). Andes Mountains (7,000 km, world's longest mountain range). Atacama Desert (driest non-polar desert). Patagonia. Pampas grasslands (Argentina — 'breadbasket of South America'). Angel Falls, Venezuela — world's highest waterfall (979m).

FIRST PEOPLES — MIGRATION:
Humans cross Bering Land Bridge (Beringia) ~15,000–20,000 BCE during last Ice Age — when sea levels were 120m lower than today (land bridge 1,500 km wide). Alternative: Pacific coastal route in boats ('Kelp Highway'). Reached southern tip of South America (Monte Verde, Chile) by ~14,500 BCE — within 1,000–2,000 years of arrival.

Pre-Columbian populations: 40–100 million people (estimates vary widely). 500+ distinct language families. 2,000+ distinct cultures. Greatest biodiversity of human social organization in history.

MAJOR PRE-COLUMBIAN CIVILIZATIONS:
• Olmec (1500–400 BCE): Mexico
• Maya (2000 BCE–1500 CE): Mexico/Central America
• Teotihuacan (1–700 CE): Mexico — 125,000 people
• Toltec (900–1150 CE): Mexico
• Aztec/Mexica (1345–1521 CE): Mexico City area
• Inca/Tawantinsuyu (1438–1533 CE): Andes — 12 million people
• Mississippian Culture (800–1600 CE): North America — Cahokia mound city near modern St. Louis, 15,000–20,000 people (larger than contemporary London)
• Ancestral Puebloans (100–1600 CE): American Southwest — Mesa Verde, Chaco Canyon
• Haudenosaunee/Iroquois Confederacy (1450 CE): Great Lakes — democratic confederacy that influenced US Constitution
• Plains cultures (Lakota, Cheyenne, Comanche): mobile buffalo hunters after horses arrived (post-1500s)
• Pacific Northwest: Salmon-based societies with elaborate potlatch ceremonies, totem poles`,
tags:["americas","geography","pre-columbian","bering","migration","aztec","inca","maya","first peoples","north america","south america"]},

// ═══ ANCIENT WORLD GAPS — 3500–1000 BCE ═══
{y:-3100,r:"Middle East & Levant",t:"Sumerian City-States & First Writing",s:"Mesopotamia (Iraq)",type:"civilization",
d:`SUMER (4500–2000 BCE): The world's first urban civilization. 12+ city-states in southern Mesopotamia: Ur, Uruk, Eridu, Lagash, Nippur, Kish, Girsu.

URUK PERIOD (~4000–3100 BCE): Uruk becomes the world's first true city — 50,000–80,000 people. The 'Uruk Expansion' spreads Sumerian trade colonies across the Near East.

WRITING (~3200 BCE): Cuneiform ('wedge-shaped') script invented in Uruk — initially for accounting (clay tablets recording grain, livestock). Evolves into full literary language. Epic of Gilgamesh (~2100 BCE) — world's oldest surviving written literature, predating the Iliad by 1,500 years. Themes: friendship, mortality, a great flood (Utnapishtim).

RELIGION: Pantheon of gods — Anu (sky), Enlil (wind/storm), Enki (water/wisdom), Inanna (love/war). Temple complexes (ziggurats) — stepped pyramids as homes of the gods.

TECHNOLOGY: Wheel (3500 BCE — first evidence in Mesopotamia), bronze metallurgy, irrigation canals, beer (world's first known recipe: Hymn to Ninkasi, 1800 BCE), mathematics (base-60 system: still used for time — 60 seconds, 60 minutes, 360 degrees).

LEGAL CODES: Ur-Nammu Code (~2100 BCE) — world's oldest surviving law code, predates Hammurabi by 300 years.`,
tags:["sumer","mesopotamia","writing","cuneiform","uruk","wheel","gilgamesh","ancient","3100 BCE"]},

{y:-2350,r:"Central Asia & Steppes",t:"Bronze Age Cultures — Eurasian Steppes",s:"Pontic-Caspian Steppe",type:"civilization",
d:`YAMNAYA CULTURE (~3300–2600 BCE): Proto-Indo-European people of the Pontic-Caspian Steppe (modern Ukraine/Russia/Kazakhstan). Likely homeland of all Indo-European languages (spoken today by 3.5 billion people — English, Spanish, Hindi, Russian, Persian, etc.).

KEY INNOVATIONS: Horse domestication (~3500 BCE, Ukraine), wheeled vehicles, pastoral nomadism. Bronze Age metallurgy. Kurgan (burial mound) tradition.

MIGRATIONS (~3000–1000 BCE): Massive migrations from the steppe westward into Europe and eastward into Central Asia and India (Indo-Aryan migrations). DNA evidence confirms European population largely replaced by Yamnaya-related peoples during this period.

ANDRONOVO CULTURE (~2100–1400 BCE): Indo-Iranian peoples of Central Asia. Sophisticated bronze metallurgy. Chariots. Gave rise to Indo-Aryans who entered India (~1500 BCE) and Iranians who became the Medes, Persians, and Scythians.

SINTASHTA CULTURE (~2100–1800 BCE): Southern Urals. Built the earliest known chariots (spoke-wheeled). Likely composed the early Vedic hymns. Arkaim — remarkable Bronze Age city preserved in Russia.`,
tags:["yamnaya","indo-european","steppe","bronze age","horse","chariot","migration","central asia","2350 BCE"]},

{y:-1450,r:"Middle East & Levant",t:"Hittite Empire & Battle of Kadesh",s:"Anatolia (Turkey)",type:"empire",
d:`HITTITE EMPIRE (1700–1200 BCE): Major Bronze Age superpower based in Anatolia (modern Turkey). Capital: Hattusa (near modern Bogazkoy).

ACHIEVEMENTS: First major Iron Age users (iron tools and weapons from ~1400 BCE — before Iron Age officially begins, giving them military advantage). Sophisticated legal codes. Constitutional monarchy — king could be held accountable. Multiple languages and cultures coexisted.

BATTLE OF KADESH (1274 BCE): Greatest chariot battle in ancient history. Ramesses II of Egypt vs Muttawalli II of Hatti. ~5,000–6,000 chariots engaged. Site: Kadesh (modern Syria/Lebanon border).

RESULT: Military draw. Both sides claimed victory. TREATY OF KADESH (1259 BCE): World's first recorded peace treaty and non-aggression pact. Copies in both Egyptian hieroglyphics and Akkadian cuneiform. A replica hangs in the UN Security Council chamber in New York — the oldest diplomatic document in existence.

FALL: ~1200 BCE — collapsed in the Bronze Age Collapse. Hattusa burned. No single cause — climate drought, Sea Peoples invasions, internal revolts all contributed.`,
tags:["hittite","kadesh","anatolia","treaty","chariot","iron age","ancient","1450 BCE","middle east"]},

{y:-900,r:"Middle East & Levant",t:"Phoenicians — Alphabet & Sea Power",s:"Lebanon/Mediterranean",type:"civilization",
d:`PHOENICIA (~1500–300 BCE): Coastal city-states of modern Lebanon — Tyre, Sidon, Byblos, Beirut. Greatest seafarers and traders of the ancient world.

THE ALPHABET: Phoenician alphabet (22 consonants, ~1050 BCE) — the ancestor of virtually all modern alphabets: Greek, Latin, Arabic, Hebrew, Cyrillic, and thus every European and many Asian scripts. This is arguably the most consequential invention in human history — it made literacy accessible to ordinary people, not just scribes.

TRADE EMPIRE: Mediterranean-wide trade network. Purple dye (Tyrian purple from murex snails — so expensive only royalty could afford it; 'royal purple' originates here). Glass manufacturing. Cedar timber (Lebanon cedars — used for Solomon's Temple and Egyptian ships).

COLONIES: Founded Carthage (814 BCE), Cadiz (Spain, ~1100 BCE), and 300+ other colonies across the Mediterranean and Atlantic coast.

CIRCUMNAVIGATION OF AFRICA: Herodotus records that Pharaoh Necho II commissioned Phoenician sailors to circumnavigate Africa (~600 BCE) — took 3 years. If true, this is the first recorded circumnavigation of Africa, 2,000 years before Vasco da Gama.`,
tags:["phoenician","alphabet","mediterranean","trade","carthage","tyre","sidon","ancient","900 BCE","writing"]},

{y:-550,r:"Indian Subcontinent",t:"Mahajanapadas — 16 Kingdoms of Ancient India",s:"North India",type:"dynasty",
d:`MAHAJANAPADAS (700–300 BCE): Sixteen great kingdoms (maha = great, janapada = realm) of ancient India during the Vedic-to-Classical transition.

THE SIXTEEN: Kamboja, Gandhara, Kuru, Panchala, Matsya, Surasena, Avanti, Chedi, Vatsa, Kosala, Malla, Vrijji (Vajji), Kasi (Varanasi), Anga, Magadha, and one other (lists vary).

MAGADHA: Most powerful, eventually dominating all others. Capital: Rajgriha, later Pataliputra (modern Patna). Under Bimbisara (544–492 BCE) and Ajatashatru (492–460 BCE) expands aggressively. This is the state Chandragupta Maurya eventually takes over to found the Maurya Empire.

RELIGIOUS REVOLUTION: This period sees simultaneous rise of Buddhism (Siddhartha Gautama, ~563–483 BCE), Jainism (Mahavira, ~599–527 BCE), and the philosophical Upanishads. India's Axial Age — questioning the Vedic sacrificial tradition, seeking inner spiritual liberation.

PERSIAN CONTACT: Darius I's Persian Empire extends to Gandhara (northwest Pakistan/Afghanistan) — exposing India to Persian administrative methods and coinage. Alexander the Great later reaches Punjab (326 BCE) through this same corridor.`,
tags:["mahajanapadas","india","magadha","buddha","jainism","vedic","ancient","550 BCE","dynasty"]},

// ═══ CLASSICAL WORLD GAPS — 500 BCE to 500 CE ═══
{y:-300,r:"Americas & Pacific",t:"Polynesian Navigation & Pacific Settlement",s:"Pacific Ocean",type:"civilization",
d:`THE GREATEST FEAT OF NAVIGATION IN HUMAN HISTORY:

POLYNESIAN EXPANSION (~1500 BCE–1200 CE): Starting from Taiwan (Austronesian-speaking peoples), Polynesians settled virtually every habitable island in the Pacific Ocean — across 25,000+ km of open water, using only stars, waves, birds, and clouds for navigation. No instruments.

ROUTE: Taiwan → Philippines/Indonesia → Melanesia → Micronesia → Samoa/Tonga (~1000 BCE) → Marquesas (~300 CE) → Hawaii (~400–600 CE) → Easter Island/Rapa Nui (~300–500 CE) → New Zealand (Aotearoa, ~1200–1300 CE).

NAVIGATION TECHNIQUES: 
• Star compass (memorized rising and setting points of ~150 stars)
• Wave piloting (detecting distant islands by wave refraction patterns)
• Swell patterns and current direction
• Bird behavior (frigate birds don't land on water; their direction indicates land)
• Cloud formations (islands create unique cloud shapes)
• Double-hulled voyaging canoes (wakas) carrying 40–80 people, pigs, dogs, chickens, and food plants

EASTER ISLAND (Rapa Nui): 900+ moai (stone statues, average 13 tons). A population of ~15,000 at peak. Deforestation → societal collapse → population crash to ~2,000 by European contact.

CONTACT WITH AMERICAS: DNA and sweet potato evidence confirms Polynesian contact with South America ~700–1200 CE — before Europeans.`,
tags:["polynesian","pacific","navigation","hawaii","new zealand","easter island","rapa nui","ancient","migration","americas"]},

{y:-250,r:"East Asia & China",t:"Chinese Philosophy — Confucius, Laozi, Sunzi",s:"China",type:"science",
d:`THE HUNDRED SCHOOLS OF THOUGHT (~600–221 BCE) — China's intellectual golden age during the Zhou Dynasty's chaotic Warring States period:

CONFUCIUS (孔子, 551–479 BCE): Founded Confucianism. Core concepts: Ren (benevolence/humaneness), Li (ritual propriety), Yi (righteousness), Zhi (wisdom), Xin (integrity). The Analects — collection of his conversations. Hierarchical social harmony: ruler-subject, father-son, husband-wife, elder-younger, friend-friend. Civil service exams based on his texts defined Chinese governance for 2,000 years.

LAOZI (老子, c.6th century BCE): Tao Te Ching (Classic of the Way) — 81 short chapters on the Tao (The Way). Wu Wei (non-action, effortless action). Simplicity, naturalness. Daoism. Profound influence on Chinese culture, Zen Buddhism, and modern philosophy.

MENCIUS (孟子, 372–289 BCE): Confucian successor. People's welfare as the basis of legitimate rule. 'The people are the most important element; the state comes next; the sovereign least.'

SUNZI (孫子, c. 544–496 BCE): Art of War — 13 chapters, 6,000 words. Still required reading in military academies worldwide. 'Know your enemy and know yourself — in a hundred battles you will never be defeated.' 'Supreme excellence consists in breaking the enemy's resistance without fighting.'

LEGALISM: Han Feizi — absolute law, harsh punishment, state power above morality. Adopted by Qin Dynasty → rapid unification but rapid collapse.`,
tags:["confucius","laozi","sunzi","mencius","china","philosophy","art of war","taoism","confucianism","ancient","250 BCE"]},

{y:-100,r:"Africa & Egypt",t:"Ptolemaic Egypt & Cleopatra",s:"Alexandria, Egypt",type:"dynasty",
d:`PTOLEMAIC DYNASTY (305–30 BCE): Greek rulers of Egypt after Alexander's death. Founded by Ptolemy I Soter (Alexander's general). Capital: Alexandria. Official language: Greek. Egypt's pharaonic traditions continued alongside Hellenistic culture.

LIBRARY OF ALEXANDRIA: Founded ~285 BCE under Ptolemy I. At peak: 400,000–700,000 scrolls — largest library in the ancient world. Scholars: Euclid (geometry), Eratosthenes (Earth's circumference), Aristarchus (heliocentric model), Archimedes (visited), Callimachus (catalogued 120,000 scrolls). Destruction: gradual — Julius Caesar's fire (48 BCE) damaged part; multiple incidents; Theophilus (391 CE) and Arab conquest (641 CE) contributed.

CLEOPATRA VII (69–30 BCE): Last Ptolemaic ruler. The only Ptolemaic ruler to learn Egyptian (spoke 9 languages total). Allied with Julius Caesar (son Caesarion born 47 BCE). After Caesar's assassination, allied with Mark Antony. Battle of Actium (31 BCE): Octavian (Augustus) defeats combined forces. Cleopatra and Antony commit suicide. Egypt becomes a Roman province.

SIGNIFICANCE: End of the last great independent ancient Egyptian civilization after 3,000 years of pharaonic rule.`,
tags:["cleopatra","ptolemaic","alexandria","egypt","library","caesar","antony","rome","ancient","100 BCE","africa"]},

{y:100,r:"Europe & Dynasties",t:"Pax Romana — Rome at Its Height",s:"Roman Empire",type:"empire",
d:`PAX ROMANA (27 BCE–180 CE): ~200 years of relative peace and stability under Rome.

ROMAN ENGINEERING MARVELS:
• Roads: 80,000 km of paved roads (15,000 km in Britain alone). 'All roads lead to Rome.' Still used as road foundations in parts of Europe.
• Aqueducts: 11 aqueducts supplying Rome with 1 million m³ of water daily. Pont du Gard (France) still standing.
• Concrete: Roman opus caementicium (volcanic ash + lime) — the Pantheon's dome (43m diameter, cast in unreinforced concrete, 128 CE) still standing.
• Colosseum: 80 CE — 50,000 capacity. Gladiatorial combat, animal hunts, public executions.

ROMAN LAW: Corpus Juris Civilis (Justinian, 529–534 CE) — codification that became the basis of European civil law systems (France, Spain, Italy, Latin America, Quebec).

TRADE: Roman trade reached India (Malabar Coast — spices, cotton), China (silk via Silk Road), and sub-Saharan Africa. Roman coins found in India and China.

CRISIS: 3rd Century Crisis (235–284 CE) — 50 years, 50+ emperors, plague (Plague of Cyprian — killed 5,000/day in Rome at peak), economic collapse. Diocletian's reforms stabilize. Constantine moves capital to Constantinople (330 CE). Western Empire falls 476 CE.`,
tags:["rome","pax romana","roads","aqueducts","colosseum","law","trade","empire","100 CE","europe"]},

{y:200,r:"Indian Subcontinent",t:"Kushan Empire — Silk Road & Buddhism",s:"Central Asia/India",type:"empire",
d:`KUSHAN EMPIRE (30–375 CE): Controlled key sections of the Silk Road — modern Afghanistan, Pakistan, northwest India, and Central Asia.

FOUNDER: Kujula Kadphises united the Yuezhi tribes after they displaced the Indo-Greek Bactrian Kingdom.

KANISHKA THE GREAT (~127–151 CE): Most famous Kushan ruler. Major patron of Buddhism — convened the Fourth Buddhist Council (establishes Mahayana Buddhism's canons). His coins show both Greek gods (Helios), Iranian gods (Mithra), and Buddha — remarkable religious syncretism.

SILK ROAD ROLE: Kushans controlled the critical junction between Rome, Parthia, India, and China. Taxila (modern Pakistan) — major university and Silk Road city. Luxury goods, Buddhism, and ideas flowed in all directions.

GANDHARA ART: Unique Greco-Buddhist art style developed in modern Pakistan/Afghanistan — Greek artistic techniques (realistic drapery, facial expressions) used to depict the Buddha for the first time. Previously the Buddha was only represented symbolically (footprints, empty throne). Gandharan Buddhas spread this artistic tradition across Asia.

FALL: ~375 CE — collapsed under Kidarite and Hephthalite (White Hun) invasions.`,
tags:["kushan","silk road","kanishka","buddhism","gandhara","india","central asia","200 CE","afghanistan","pakistan"]},

// ═══ MEDIEVAL GAPS ═══
{y:500,r:"Europe & Dynasties",t:"Byzantine Empire — Justinian to Heraclius",s:"Constantinople",type:"dynasty",
d:`JUSTINIAN I (527–565 CE): Greatest Byzantine Emperor. Reconquered North Africa (from Vandals), Italy (from Ostrogoths), parts of Spain — temporarily restoring the Roman Empire.

CORPUS JURIS CIVILIS (529–565 CE): The Digest, Institutes, Code, and Novellae — comprehensive Roman law codification. Foundation of European civil law. Still taught in law schools.

HAGIA SOPHIA (537 CE): 'Holy Wisdom.' Dome 55.6m high, 31.87m diameter — largest enclosed dome in the world for nearly 1,000 years. Built in just 5 years. When completed, Justinian reportedly said: 'Solomon, I have surpassed you!'

PLAGUE OF JUSTINIAN (541–549 CE): First bubonic plague pandemic in recorded history. Killed 25–50 million across the Mediterranean — nearly half the population of some regions. Weakened both Byzantium and Sassanid Persia, directly enabling the Islamic expansion of the 630s.

HERACLIUS (610–641 CE): Defeats Sassanid Persia after 26-year war (602–628 CE) at enormous cost. Within 3 years, Islamic armies take Syria, Palestine, and Egypt permanently. Heraclius, dying in 641 CE, reportedly said: 'Farewell, Syria — what an excellent country this is for the enemy.'`,
tags:["justinian","byzantine","hagia sophia","corpus juris","plague","heraclius","constantinople","500 CE","europe","dynasty"]},

{y:700,r:"Islamic Scholarship",t:"Early Islamic Philosophy — Al-Kindi to Al-Farabi",s:"Baghdad/Kufa",type:"madhab",
d:`THE FIRST WAVE OF ISLAMIC PHILOSOPHY (9th–10th century / 2nd–4th century AH):

AL-KINDI (~801–873 CE / 186–259 AH): 'First Arab Philosopher.' Reconciled Greek philosophy with Islamic theology. 260+ works on mathematics, optics, music, philosophy, pharmacology. Introduced Indian numerals (0-9) to the Islamic world.

AL-FARABI (~872–950 CE / 259–339 AH): 'The Second Teacher' (after Aristotle). Political philosophy: The Perfect City — the philosopher-king as ideal ruler (influenced by Plato). Music theory: Kitab al-Musiqa (Book of Music) — greatest medieval music treatise. Theory of the intellect that influenced Ibn Sina and medieval Christian scholastics.

MATHEMATICS: Muhammad ibn Musa al-Khwarizmi (780–850 CE) — algebra, algorithms. Al-Battani (858–929 CE) — trigonometry, calculated solar year as 365 days, 5 hours, 46 minutes, 24 seconds (modern value: 365 days, 5 hours, 48 minutes, 46 seconds — off by 2 minutes!).

MEDICINE: Hunayn ibn Ishaq (809–873 CE) — translated Galen's complete works into Arabic. His translation movement at Bayt al-Hikmah preserved almost all ancient Greek science that would otherwise have been lost.`,
tags:["al-kindi","al-farabi","al-battani","hunayn","islamic philosophy","baghdad","mathematics","medicine","700 CE","golden age"]},

{y:850,r:"East Asia & China",t:"Tang Dynasty Collapse & Five Dynasties",s:"China",type:"dynasty",
d:`LATE TANG DYNASTY (755–907 CE):

AN LUSHAN REBELLION (755–763 CE): The defining catastrophe of the Tang Dynasty. An Lushan (half-Sogdian, half-Turk general) leads rebellion of 150,000 troops. Captures Chang'an and Luoyang. Emperor Xuanzong flees. Death toll: 13–36 million (census data shows Tang population fell from 53 million to 17 million — most killed, others fled). Never fully recovered.

HUANG CHAO REBELLION (874–884 CE): Massive peasant uprising. Canton (Guangzhou) massacre (879 CE) — Arab, Jewish, Christian, and Zoroastrian merchants killed (120,000–200,000 according to Arab accounts).

TANG DYNASTY ENDS (907 CE): Last Tang emperor deposed. Begins the FIVE DYNASTIES AND TEN KINGDOMS period (907–960 CE) — 53 years of political fragmentation. Five successive dynasties in northern China. Ten separate kingdoms in the south.

CULTURE despite chaos: Tang poetry considered China's classical peak — Du Fu and Li Bai lived during the Tang. Block printing (developed 700s) spreads literacy. Chinese Buddhism peaks.

SONG DYNASTY (960 CE): Zhao Kuangyin reunifies northern China. Paper money, printing, gunpowder weapons, compass navigation — the Song is arguably the most technologically innovative civilization in the world at this time.`,
tags:["tang","an lushan","rebellion","china","five dynasties","song","850 CE","dynasty","east asia"]},

{y:900,r:"Central Asia & Steppes",t:"Samanid Dynasty — Persian Renaissance",s:"Bukhara/Khorasan",type:"dynasty",
d:`SAMANID DYNASTY (819–999 CE): The first major Persian-Muslim dynasty after the Arab conquest. Based in Bukhara (Uzbekistan) and Nishapur (Iran). Governors under the Abbasid Caliphate who gradually became independent.

PERSIAN RENAISSANCE: Under the Samanids, Persian language and culture underwent a dramatic revival after 200 years of Arabization.

FERDOWSI (~940–1020 CE): Begins writing the Shahnameh (Book of Kings) — 60,000 verses, 30+ years of work. The Persian national epic. Chronicles the history of Persia from creation to the Islamic conquest. Still recited throughout Iran, Afghanistan, and Tajikistan. Considered one of the world's greatest literary works.

RUDAKI (~860–940 CE): 'Father of Persian Poetry.' First major poet to write in classical New Persian (Dari). Very little survives but his influence on all subsequent Persian poetry is immeasurable.

PATRONAGE: Samanid court in Bukhara attracted scholars from across the Islamic world. The young Ibn Sina used the Samanid royal library extensively (he mentions this in his autobiography). Al-Biruni also worked under their patronage.

FALL: Ghaznavid Sultan Mahmud conquers their territory (999 CE). But the Persian literary tradition they revived continued for centuries.`,
tags:["samanid","bukhara","persian","ferdowsi","shahnameh","rudaki","central asia","900 CE","poetry","culture"]},

{y:1000,r:"Americas & Pacific",t:"North American Peoples — Cahokia & Great Plains",s:"North America",type:"civilization",
d:`CAHOKIA MOUNDS (~600–1400 CE): Located near modern St. Louis, Missouri. The largest pre-Columbian city north of Mexico.

PEAK (~1050–1200 CE): Population 15,000–20,000 — larger than contemporary London. 120+ earthen mounds. Monks Mound: 30.5m high, larger base area than the Great Pyramid of Giza. Woodhenge — circular solar calendar of cedar posts.

MISSISSIPPIAN CULTURE: Cahokia-influenced culture spread throughout the Mississippi Valley. Maize agriculture, copper artifacts, long-distance trade (shells from Gulf of Mexico, copper from Great Lakes).

COLLAPSE (~1300 CE): Unknown causes — drought, political fragmentation, environmental degradation. City abandoned before European contact.

ANCESTRAL PUEBLOANS (100–1600 CE): Four Corners region (Utah/Colorado/New Mexico/Arizona).
• Chaco Canyon (~850–1150 CE): Major religious and trade center. 'Great Houses' — massive multi-story structures. Roads extending 400+ miles.
• Mesa Verde: Cliff dwellings built in canyon walls for protection.
• ABANDONED ~1300 CE: 50-year drought forced migration southward — descendants are modern Pueblo peoples.

HAUDENOSAUNEE (IROQUOIS) CONFEDERACY (~1450 CE): Six nations (Mohawk, Onondaga, Cayuga, Oneida, Seneca, Tuscarora). Constitution (the Great Law of Peace) — inspired elements of the US Constitution (bicameral legislature, impeachment, federalism).`,
tags:["cahokia","north america","mississippian","ancestral puebloans","iroquois","haudenosaunee","1000 CE","civilization","mounds","americas"]},

{y:1100,r:"Africa & Egypt",t:"Great Zimbabwe, Swahili City-States & African Trade",s:"East/Southern Africa",type:"civilization",
d:`GREAT ZIMBABWE (1100–1450 CE): Capital of the Kingdom of Zimbabwe (Shona/Rozvi people). 'Zimbabwe' means 'houses of stone' in Shona.

DRY-STONE ARCHITECTURE: The Great Enclosure — 250m circumference, walls 9.7m high, 5.5m thick at base. 900,000 granite blocks fitted without mortar using only stone tools. The Conical Tower (11m tall) — solid stone, purpose unknown. Housing 18,000 people at peak.

GOLD TRADE: Controls the gold trade from Zimbabwe Plateau to the Swahili Coast. Gold, ivory, and slaves sent to Kilwa (Tanzania) and then to Arabia and India. Chinese porcelain (Ming Dynasty) and Persian pottery found at Great Zimbabwe — evidence of global trade connections.

SWAHILI CITY-STATES (800–1700 CE): Kilwa, Mombasa, Zanzibar, Malindi, Lamu. Ibn Battuta visits Kilwa (1331 CE): 'Among the most beautiful and well-constructed cities in the world.' Kilwa Kisiwani — exports gold, controls the trade network. Built mosques in coral stone — distinct Swahili Islamic architecture.

MEDIEVAL MALIAN-MOROCCAN CONTACT: When Mali Empire's Mansa Musa I performed Hajj (1324 CE) and visited Morocco and Egypt — he famously gave away so much gold he crashed regional gold markets for a decade. This demonstrated Africa's extraordinary wealth to the world.`,
tags:["great zimbabwe","swahili","kilwa","mombasa","1100 CE","africa","gold","trade","architecture","east africa"]},

{y:1300,r:"Europe & Dynasties",t:"Medieval Europe — Feudalism, Church & Kingdoms",s:"Western Europe",type:"dynasty",
d:`MEDIEVAL EUROPEAN KINGDOMS (~500–1500 CE):

FRANCE: Capetian Dynasty (987–1328). Philip II Augustus (1180–1223) — doubled royal territory. Saint Louis IX (1226–1270) — model medieval king, led two Crusades. Capetians replaced by Valois (1328) and then Bourbon dynasties.

ENGLAND: See Norman Conquest (1066). Plantagenet Dynasty (1154–1399): Henry II (common law development), Richard I (Crusades), John (Magna Carta 1215), Edward I (conquered Wales, tried Scotland — 'Hammer of the Scots'), Edward III (Hundred Years War begins).

HOLY ROMAN EMPIRE: Frederick Barbarossa (1155–1190) — powerful Holy Roman Emperor, led 3rd Crusade, drowned in river en route. Frederick II (1220–1250) — 'Wonder of the World' — spoke 6 languages, patron of science, negotiated peacefully with Saladin's nephew for Jerusalem (1229).

IBERIAN KINGDOMS: Castile, Aragon, Portugal, Navarre. Portuguese sea exploration begins under Henry the Navigator. Spain's Reconquista.

FEUDAL SYSTEM: Lords → Knights → Serfs. Church as universal institution — Pope claimed authority over kings (Investiture Controversy: Pope Gregory VII vs Holy Roman Emperor Henry IV — Henry stood barefoot in snow at Canossa for 3 days to be forgiven, 1077 CE).

MEDIEVAL UNIVERSITIES: Bologna (1088), Oxford (~1096), Paris (~1150), Cambridge (1209) — first universities in the world. Curriculum: trivium (grammar, rhetoric, logic) + quadrivium (arithmetic, geometry, music, astronomy).`,
tags:["medieval","feudalism","france","england","holy roman empire","universities","1300 CE","europe","dynasty","church"]},

// ═══ EARLY MODERN GAPS ═══
{y:1450,r:"Science, Philosophy & Discovery",t:"Gutenberg's Printing Press — Information Revolution",s:"Mainz, Germany",type:"science",
d:`1440–1450 CE: Johannes Gutenberg (1400–1468) develops the movable-type printing press in Mainz, Germany. First major book: the Gutenberg Bible (1455 CE) — 180 copies printed.

REVOLUTIONARY IMPACT:
• Before printing: A monk could copy ~4 pages/day. Gutenberg press: 3,600 pages/day.
• Cost: Books fell from the price of a farm to the price of a chicken within 50 years.
• By 1500 CE: 20 million books printed across Europe (more than all books produced in all of Europe in the previous 1,000 years).

CONSEQUENCES:
• Protestant Reformation (1517): Luther's 95 Theses spread across Germany in weeks via printing — impossible without it
• Scientific Revolution: Scientific findings could be shared precisely and rapidly across Europe
• Vernacular languages: Bible in German, English, French → literacy in ordinary people
• Standardized spelling and grammar for major European languages
• News pamphlets → newspapers → journalism

NOTE: China had movable type (Bi Sheng, 1040 CE) and Korea (Jikji, 1377 CE) before Gutenberg, but Gutenberg's metal type was more durable, and Latin alphabet (26 letters) far simpler than Chinese characters (~50,000 needed).`,
tags:["gutenberg","printing press","1450","germany","reformation","information revolution","science","books","literacy"]},

{y:1550,r:"Americas & Pacific",t:"Colonial Americas — Viceroyalties & Native Resistance",s:"Americas",type:"empire",
d:`SPANISH COLONIAL SYSTEM:
• Viceroyalty of New Spain (1535): Mexico, Central America, Caribbean, southwestern USA
• Viceroyalty of Peru (1542): South America (most of it)
• Governor-General of New Granada (1739): Colombia, Venezuela, Ecuador, Panama
• Viceroyalty of Río de la Plata (1776): Argentina, Uruguay, Paraguay, Bolivia

THE ENCOMIENDA SYSTEM: Spanish colonists given rights to extract labor from indigenous peoples. De facto slavery. Bartolomé de las Casas (Dominican friar) — witnessed atrocities, became fierce advocate for indigenous rights. 'Brief Account of the Destruction of the Indies' (1542) — documented massacres, forced labor, torture. Led to New Laws of 1542 (officially ending encomienda — rarely enforced).

POPULATION COLLAPSE: Before Columbus: ~50–100 million in the Americas. By 1600: ~8–10 million — 80–90% reduction. Smallpox, measles, typhus, influenza had no existing immunity. Largest demographic catastrophe in human history.

NATIVE RESISTANCE:
• Tupac Amaru II (1780–81): Largest indigenous uprising in colonial America. Leader: José Gabriel Condorcanqui. 100,000 rebels. Crushed by Spanish. Execution: quartered by horses (Lima, 1781).
• Pueblo Revolt (1680): 17,000 Pueblo peoples drove Spanish completely out of New Mexico for 12 years.
• Mapuche (Chile): Never fully conquered by Spain OR Incas. Maintained independence until 1880s.`,
tags:["colonial","americas","encomienda","new spain","peru","las casas","native resistance","1550","tupac amaru","spanish"]},

{y:1600,r:"Europe & Dynasties",t:"Age of Exploration — Portugal, Spain, Dutch & British Empires",s:"Global",type:"empire",
d:`PORTUGUESE EMPIRE (1415–1999): First and longest-lasting European colonial empire. 582 years.
• 1415: Ceuta (North Africa) — first conquest
• 1498: Vasco da Gama reaches India — spice trade route
• Brazil, Angola, Mozambique, Goa, Macau, East Timor
• Peak territory: ~10.4 million km² (1815)

SPANISH EMPIRE (1492–1976): Largest empire in history at one point. 
• Americas, Philippines, parts of Africa and Asia
• Peak territory: ~20 million km² (1790)
• Silver from Potosí (Bolivia) — 80% of world's silver supply for 200 years

DUTCH GOLDEN AGE (1581–1672): Netherlands becomes world's leading trade power after independence from Spain.
• Dutch East India Company (VOC, 1602): First multinational corporation, first company to issue public stock. At peak, 50,000 employees, private army of 10,000, 200 ships.
• New Amsterdam (1626) — bought Manhattan from Lenape for 60 guilders (~$1,000 today). Renamed New York 1664 when English take it.
• South Africa, Sri Lanka, Indonesia, Taiwan briefly, parts of Brazil

BRITISH EMPIRE (1583–1997): Largest empire in history (at its 1922 peak): 35.5 million km², 412 million people. Built on: Royal Navy dominance, East India Company, settler colonialism.`,
tags:["portugal","spain","dutch","british","empire","voc","east india","1600","colonialism","exploration","global"]},

{y:1650,r:"Science, Philosophy & Discovery",t:"The Enlightenment Scientists — Boyle, Hooke, Leibniz",s:"Europe",type:"science",
d:`ROBERT BOYLE (1627–1691): Boyle's Law — pressure and volume of gas are inversely proportional (1662). Defined elements as substances that cannot be broken down further. Father of modern chemistry.

ROBERT HOOKE (1635–1703): Hooke's Law of elasticity. First to use the word 'cell' — observed cork cells under microscope (Micrographia, 1665). Discovered Jupiter's Great Red Spot. Invented the spirit level, marine barometer, and universal joint.

GOTTFRIED LEIBNIZ (1646–1716): Independently invented calculus (published before Newton). Binary number system — foundation of all digital computing. Coined the terms 'function,' 'coordinate,' 'abscissa.' Philosopher: Monadology, theodicy.

Antoni VAN LEEUWENHOEK (1632–1723): Built microscopes with 270× magnification (far beyond anyone else). First to observe bacteria (1674), protozoa, blood cells, sperm cells. 'Father of Microbiology.' Saw a world invisible to all previous humans.

EDMOND HALLEY (1656–1742): Predicted the return of Halley's Comet (1758 — after his death). Mapped the southern hemisphere stars. First to link fossils to extinction. First weather map. Financed Newton's Principia.

CHRISTIAAN HUYGENS (1629–1695): Wave theory of light. Pendulum clock (most accurate timekeeper for 270 years). Discovered Titan (Saturn's moon). Invented the pocket watch mechanism.`,
tags:["boyle","hooke","leibniz","leeuwenhoek","microscope","1650","science","enlightenment","chemistry","biology","europe"]},

{y:1750,r:"Americas & Pacific",t:"American Indigenous Nations — Great Plains & Northwest",s:"North America",type:"civilization",
d:`GREAT PLAINS NATIONS: Horse culture transformed plains life after Spanish brought horses (re-introduced, as ancient horses had gone extinct in America ~10,000 BCE).

LAKOTA (SIOUX): Alliance of seven tribes (Oceti Sakowin). Extended Great Plains from Minnesota to Wyoming. Buffalo as foundation of entire civilization — food, clothing, shelter, tools, spiritual life. Before European contact: 30–60 million buffalo. 

COMANCHE: Most powerful horse culture in North American history. At peak (1750s), controlled 250,000 km² of southern plains. 'Lords of the Southern Plains.' Developed some of the finest cavalry warfare in history. Resisted US Army until 1875.

CHEROKEE: Southeastern US. Created the only indigenous script (Sequoyah's syllabary, 1821). Had written newspapers, constitution, and elected government before forced removal (Trail of Tears, 1838).

PACIFIC NORTHWEST NATIONS: Chinook, Haida, Tlingit, Kwakwaka'wakw. Salmon economy — so abundant that surplus allowed complex stratified society WITHOUT agriculture. Totem poles — carved genealogical records. Potlatch ceremony — competitive gift-giving as social currency. Haida canoes: 20m long, carved from single cedar, could carry 60 people across the open Pacific.

BEFORE CONTACT: An estimated 600+ distinct nations in North America with 300+ languages.`,
tags:["lakota","comanche","cherokee","plains","north america","indigenous","buffalo","horse","1750","americas","northwest"]},

{y:1800,r:"Africa & Egypt",t:"Resistance to Colonialism — Africa's Great Fighters",s:"Africa",type:"battle",
d:`AFRICA'S RESISTANCE TO COLONIALISM:

SAMORI TOURÉ (1830–1900): Founded the Wassoulou Empire in West Africa (Guinea/Mali). Built sophisticated military force that repeatedly defeated French colonial forces. Invented an indigenous arms manufacturing industry — repaired and made weapons. Fought French for 16 years (1882–1898). Captured 1898, exiled to Gabon, died 1900. One of Africa's greatest military leaders.

KING CETSHWAYO (1826–1884): Zulu King. Battle of Isandlwana (January 22, 1879): 1,300 British soldiers destroyed in the greatest British military defeat in Africa. 24,000 Zulu warriors, primarily armed with assegai spears, overwhelmed a British force with rifles and artillery. Britain recovered and won the war, but the battle shocked the world.

QUEEN YENNENGA (legendary, ~12th century): Founding ancestor of the Mossi kingdoms (modern Burkina Faso). Princess who became a warrior, founded the Mossi people. First woman in West African tradition to be celebrated as a military leader.

ABEBE BIKILA (1932–1973): Not military but symbolic — Ethiopian marathon runner who won the 1960 Rome Olympics gold medal BAREFOOT, running on the Appian Way — same road along which Mussolini had invaded Ethiopia 25 years before. First Black African to win an Olympic gold medal. Won again in 1964 in Tokyo, this time with shoes.

THE MAHDI (Muhammad Ahmad, 1844–1885): Sudanese Islamic leader. Declared himself the Mahdi (guided one). Besieged and captured Khartoum (January 1885) — killed British General Gordon. Created the Mahdist State which controlled Sudan until British reconquest (Battle of Omdurman, 1898, under Kitchener).`,
tags:["samori","zulu","isandlwana","africa","resistance","colonialism","1800","mahdi","sudan","queen","guerrilla"]},

{y:1850,r:"Central Asia & Steppes",t:"Russian Empire in Central Asia — The Great Game",s:"Central Asia",type:"geopolitics",
d:`THE GREAT GAME (1830–1907): Rivalry between the British Empire (India-based) and the Russian Empire for control over Central Asia.

RUSSIAN EXPANSION: Russia conquers Central Asian khanates with remarkable speed:
• Tashkent (1865) — General Chernyayev captures with 2,000 men against 30,000+ defenders
• Bukhara (1868) — becomes Russian protectorate
• Samarkand (1868)
• Khiva (1873)
• Kokand annexed (1876)
• Merv (1884) — Turkmenistan

Britain feared Russian advance would reach India (Jewel of the Empire). Sent agents into Afghanistan, Tibet, Persia. Afghanistan became a buffer state.

AFGHANISTAN: Three Anglo-Afghan Wars (1839–42, 1878–80, 1919). First: British force of 16,000 destroyed while retreating — only 1 survivor reached India (actually about 150 survived but the narrative is 'one survivor'). Britain never successfully occupied Afghanistan.

THE GREAT GAME ENDS: Anglo-Russian Convention (1907) — divides Persia, Afghanistan, Tibet into spheres of influence. Russia gets northern Persia; Britain gets southern Afghanistan as buffer zone.

LEGACY: The artificially drawn borders of this era (particularly the Durand Line dividing Afghanistan and Pakistan, 1893) still cause conflict today.`,
tags:["great game","russia","britain","central asia","afghanistan","tashkent","bukhara","1850","geopolitics","empire"]},

{y:1880,r:"Science, Philosophy & Discovery",t:"Periodic Table, Germ Theory & 19th Century Science",s:"Europe/Global",type:"science",
d:`THE 19TH CENTURY SCIENTIFIC REVOLUTION:

PERIODIC TABLE (1869): Dmitri Mendeleev (Russian) arranges 63 known elements by atomic weight and properties. Predicts existence of 3 undiscovered elements (Gallium, Scandium, Germanium) — all discovered within 15 years exactly as predicted. First classification system in chemistry.

GERM THEORY:
• Louis Pasteur (1857): Fermentation caused by microorganisms. Pasteurization invented.
• Robert Koch (1876): Isolates anthrax bacillus. 1882: identifies tuberculosis bacterium (kills 1 in 7 people in Europe). 1883: cholera bacterium. Koch's Postulates — scientific proof that specific germs cause specific diseases.
• Joseph Lister (1865): Antiseptic surgery. Uses carbolic acid. Surgical mortality falls from 45% to 15%.
• Florence Nightingale (1854): Statistical analysis proves unsanitary conditions cause most military deaths. Invents modern nursing and hospital sanitation.

ELECTROMAGNETIC REVOLUTION:
• Michael Faraday (1831): Electromagnetic induction — basis of all electrical generators.
• James Clerk Maxwell (1865): Four equations unifying electricity, magnetism, and light. Predicts electromagnetic waves.
• Heinrich Hertz (1887): Proves electromagnetic waves exist.

EVOLUTION (1859): Darwin's Origin of Species. (See existing entry.)`,
tags:["periodic table","mendeleev","germ theory","pasteur","koch","faraday","maxwell","1880","science","medicine","chemistry"]},

{y:1910,r:"Africa & Egypt",t:"African Resistance & Early Independence Movements",s:"Africa",type:"geopolitics",
d:`EARLY AFRICAN NATIONALISM (1900–1950):

AFRICAN NATIONAL CONGRESS (ANC, 1912): Founded January 8, 1912, Bloemfontein, South Africa. World's oldest liberation organization in continuous operation. Founded by educated Africans (lawyers, teachers, clergy) in response to the Union of South Africa (1910) which excluded Black Africans from political rights. Nelson Mandela joins 1944. ANC leads anti-apartheid struggle, wins power 1994.

PAN-AFRICANISM: W.E.B. Du Bois (1868–1963) — American scholar, co-founder NAACP. Pan-African Congresses (1919, 1921, 1923, 1927, 1945). Marcus Garvey (1887–1940) — Jamaican; 'Back to Africa' movement; Black Star Line shipping company; 4 million followers. Kwame Nkrumah (Ghana) deeply influenced by both.

ETHIOPIAN RESISTANCE: Italy invades Ethiopia (October 1935). Emperor Haile Selassie appeals to League of Nations (June 1936): 'It is us today. It will be you tomorrow.' League does nothing. Britain and Italy secretly agree to Italian control (Hoare-Laval Pact). Ethiopia liberated 1941 (British + Ethiopian resistance).

ALGERIAN NATIONALISM: Ferhat Abbas (1899–1985) — initially sought French citizenship for Algerians; by 1943 demands independence. FLN (Front de Libération Nationale) founded 1954 — launches armed struggle November 1, 1954. 8-year war, 1+ million killed. Independence July 5, 1962.

KENYA — MAU MAU (1952–60): Kikuyu-led armed uprising against British. 12,000–20,000 Kenyans killed; 1,090 Mau Mau hanged; 80,000+ imprisoned in harsh camps. British used torture (documented in British archives, apology issued 2013). Independence December 12, 1963.`,
tags:["ANC","pan-africanism","nkrumah","algerian","mau mau","haile selassie","1910","africa","resistance","independence"]},

{y:1930,r:"East Asia & China",t:"Imperial Japan — Asia-Pacific & Second Sino-Japanese War",s:"East Asia",type:"battle",
d:`SECOND SINO-JAPANESE WAR (1937–1945):

MARCO POLO BRIDGE INCIDENT (July 7, 1937): Minor skirmish near Beijing escalates into full-scale war. Japan invades China.

NANJING MASSACRE (December 1937–January 1938): Japanese forces capture Nanjing (then Chinese capital). 200,000–300,000 Chinese civilians and POWs killed in 6 weeks. Mass rape (20,000–80,000 women). Bayonet competitions between Japanese officers reported. Still a major source of Sino-Japanese tension.

IMPERIAL JAPANESE EMPIRE AT PEAK (1942):
• Controlled: Manchuria, Korea, Taiwan, eastern China, Vietnam, Cambodia, Laos, Malaya, Singapore, Burma, Philippines, Dutch East Indies (Indonesia), Guam, Wake Island, parts of New Guinea
• Area: ~7.4 million km² — the second-largest colonial empire of the 20th century

SINGAPORE (February 1942): British surrender 85,000 soldiers to 35,000 Japanese — Churchill calls it 'the worst disaster and largest capitulation in British history.'

BATAAN DEATH MARCH (April 1942): 75,000 Allied POWs forced to march 90 km in tropical heat without adequate food/water. 10,000+ died.

UNIT 731: Japanese biological warfare research unit. Conducted lethal experiments on prisoners. Plague bombs dropped on Chinese cities.

ATOMIC BOMBINGS AND SURRENDER: Hiroshima (August 6, 1945, 80,000+ killed), Nagasaki (August 9, 40,000+), Soviet declaration of war — Emperor Hirohito announces surrender August 15, 1945.`,
tags:["japan","nanjing","1937","sino-japanese","singapore","bataan","unit 731","hiroshima","nagasaki","ww2","east asia","china"]},

{y:1955,r:"Science, Philosophy & Discovery",t:"Nuclear Age — Manhattan Project to Cold War Arms Race",s:"Global",type:"science",
d:`MANHATTAN PROJECT (1942–1946):

TRINITY TEST (July 16, 1945, New Mexico): First nuclear detonation. J. Robert Oppenheimer (scientific director) quotes the Bhagavad Gita: 'Now I am become Death, the destroyer of worlds.'

KEY SCIENTISTS:
• Enrico Fermi (Italian-American): First nuclear chain reaction (Chicago Pile-1, December 2, 1942 — beneath squash courts at University of Chicago)
• Niels Bohr (Danish): Quantum mechanics foundation; escaped Nazi Denmark in 1943
• Lise Meitner (Austrian-Jewish): Co-discovered nuclear fission (1938) — fled Nazi Germany. Not given Nobel Prize her male colleague received. Element 109 (Meitnerium) named after her.

NUCLEAR ARMS RACE:
• USSR tests atomic bomb (1949) — 4 years after USA, shocking American intelligence
• USA tests hydrogen bomb (1952): 450x more powerful than Hiroshima bomb
• USSR tests hydrogen bomb (1953): 9 months later
• Peak arsenals (~1986): USA 31,000 warheads; USSR 45,000 warheads. Combined = 1,000,000 Hiroshimas.

NUCLEAR PROLIFERATION:
UK (1952), France (1960), China (1964), India (1974), Israel (estimated ~1960s, never confirmed), Pakistan (1998), North Korea (2006).

NUCLEAR CLOSE CALLS: Able Archer 83 (1983) — NATO war game; Soviets nearly launched. Norwegian Rocket Incident (1995) — Boris Yeltsin had 10 minutes to decide; chose not to launch.`,
tags:["manhattan project","nuclear","1955","trinity","oppenheimer","fermi","arms race","USSR","cold war","science","bomb"]},

{y:1960,r:"Americas & Pacific",t:"Civil Rights Movement & Social Revolutions",s:"USA/Global",type:"geopolitics",
d:`AMERICAN CIVIL RIGHTS MOVEMENT (1954–1968):

BROWN v. BOARD OF EDUCATION (May 17, 1954): Supreme Court unanimously rules school segregation unconstitutional. Overturns Plessy v. Ferguson (1896). Chief Justice Earl Warren.

MONTGOMERY BUS BOYCOTT (1955–56): Rosa Parks refuses to give up her seat (December 1, 1955). 381-day boycott organized by 26-year-old Reverend Martin Luther King Jr. Supreme Court rules bus segregation unconstitutional.

MLK and the SCLC: 'Letter from Birmingham Jail' (1963). March on Washington (August 28, 1963): 250,000 people. 'I Have a Dream' speech — 'I have a dream that my four little children will one day live in a nation where they will not be judged by the color of their skin but by the content of their character.'

CIVIL RIGHTS ACT (1964) + VOTING RIGHTS ACT (1965): End legal segregation. Lyndon Johnson: 'We shall overcome.'

MARTIN LUTHER KING ASSASSINATED: April 4, 1968, Memphis, Tennessee.

GLOBAL SOCIAL REVOLUTIONS (1960s):
• Student revolutions in France (May 1968), Germany, Italy, Mexico (Tlatelolco massacre: 30–300 students killed, October 2, 1968)
• Second-wave feminism: Betty Friedan's The Feminine Mystique (1963); National Organization for Women (1966)
• LGBTQ+ rights: Stonewall Riots (June 28, 1969)
• Anti-Vietnam War movement`,
tags:["civil rights","MLK","1960","montgomery","brown v board","march on washington","voting rights","usa","social revolution","feminism"]},

{y:1973,r:"Middle East & Levant",t:"Oil Shock, OPEC & Economic Geopolitics",s:"Middle East/Global",type:"geopolitics",
d:`OPEC OIL EMBARGO (October 1973–March 1974):

TRIGGER: Yom Kippur War (October 6, 1973). Arab states attack Israel. USA airlifts $2.2 billion in weapons to Israel.

OPEC RESPONSE: Arab OPEC members embargo oil to USA, Netherlands, Portugal, South Africa, Rhodesia. Non-Arab OPEC members raise prices 400%.

ECONOMIC SHOCK: Oil prices rise from $3/barrel to $12/barrel (300% increase). Global recession. US gasoline rationing — long lines at stations. Speed limits lowered (55mph to save fuel). Airlines cut flights. West Germany bans Sunday driving.

LONG-TERM CONSEQUENCES:
• North Sea oil (UK/Norway) developed to reduce dependence
• Alaska Pipeline built
• CAFE (fuel economy) standards for US cars
• Nuclear power expansion in France (75% of electricity by 1980s)
• Solar and wind energy research begins seriously
• 'Petrodollar recycling' — oil revenues reinvested in Western banks

OPEC POWER: Founded 1960 (Baghdad). Founding members: Iran, Iraq, Kuwait, Saudi Arabia, Venezuela. Now 13 members. Proven reserves: ~80% of world's oil. Saudi Arabia = swing producer.

IRAN OIL NATIONALIZATION (1951): PM Mohammad Mosaddegh nationalizes British-owned Anglo-Iranian Oil Company. UK and US orchestrate coup (Operation Ajax, August 1953) — reinstall Shah. Blueprint for later Western interventionism.`,
tags:["OPEC","oil embargo","1973","middle east","petrodollar","energy","economic","geopolitics","opec","iran","saudi"]},

{y:1980,r:"Science, Philosophy & Discovery",t:"Personal Computer Revolution & Biotechnology",s:"USA/Global",type:"science",
d:`PERSONAL COMPUTER REVOLUTION (1970s–1990s):

MICROPROCESSOR: Intel 4004 (1971) — 2,300 transistors on a chip the size of a fingernail.

APPLE I & II (1976, 1977): Steve Jobs and Steve Wozniak. Apple II first mass-market personal computer.

IBM PC (1981): Opens floodgates — industry standard. MS-DOS operating system (Microsoft's Bill Gates licenses it for $50,000 + royalties — greatest business deal in history).

MACINTOSH (1984): First mass-market computer with graphical user interface (GUI). '1984' Super Bowl commercial directed by Ridley Scott. 'Reality Distortion Field' — Steve Jobs's charisma.

LINUX (1991): Linus Torvalds releases kernel. Free, open-source operating system. Now powers 90% of the world's servers and most smartphones (Android).

BIOTECHNOLOGY:
• Recombinant DNA (Boyer & Cohen, 1973): Cut and paste genes between organisms. Foundation of genetic engineering.
• Genetically Modified Organisms (GMOs): Insulin produced by bacteria (1982) — first commercial GMO product.
• Human Genome Project (1990–2003): Mapped all ~3.2 billion base pairs.
• Dolly the Sheep (1996): First cloned mammal. Opens enormous ethical debates.
• CRISPR-Cas9 (2012): Precise gene editing. Potential to cure hereditary diseases. Nobel Prize 2020 (Jennifer Doudna, Emmanuelle Charpentier).`,
tags:["computer","apple","microsoft","IBM","linux","biotechnology","CRISPR","genome","1980","science","technology"]},

{y:1994,r:"Geopolitics & Diplomacy",t:"Post-Cold War Conflicts — Yugoslavia, Rwanda, Somalia",s:"Europe/Africa",type:"battle",
d:`THE 1990s — THE DECADE OF FAILED INTERVENTIONS:

SOMALIA (1991–present): Civil war after Siad Barre ousted. 'Black Hawk Down' (October 3–4, 1993): Battle of Mogadishu — 18 US soldiers killed, 79 wounded, 1 helicopter crew taken hostage. ~500–1,000 Somali killed. US withdraws. Al-Shabaab later emerges.

RWANDAN GENOCIDE (April–July 1994): 800,000–1,000,000 Tutsis and moderate Hutus killed in 100 days. UN force (UNAMIR, Gen. Roméo Dallaire) had 2,500 troops and requested permission to act — denied. USA avoided using the word 'genocide' to avoid legal obligation to act. Clinton: 'My greatest failure as President.' Perpetrators used Rwandan radio (RTLM) to coordinate killings — 'cockroaches.'

BOSNIAN WAR (1992–1995):
• Srebrenica Massacre (July 1995): 8,000 Bosniak men and boys systematically executed by Bosnian Serb forces (Ratko Mladić) in a UN 'safe area.' Dutch UN peacekeepers stood aside. ICJ ruled it was genocide.
• NATO intervention (1995): Operation Deliberate Force — air campaign. Dayton Accords end war.

KOSOVO WAR (1998–1999): NATO bombs Serbia for 78 days without UN Security Council authorization (Russia vetoed). Establishes 'humanitarian intervention' as precedent. Kosovo declares independence (2008) — recognized by 117 countries; Serbia/Russia dispute it.`,
tags:["somalia","rwanda","bosnia","srebrenica","kosovo","1994","genocide","NATO","intervention","post-cold war","yugoslavia"]},

{y:2015,r:"Middle East & Levant",t:"Syrian Civil War & Rise of ISIS",s:"Syria/Iraq",type:"battle",
d:`SYRIAN CIVIL WAR (2011–2024/present):

ORIGINS: Peaceful Arab Spring protests (March 2011) met with Assad regime's military force. Armed opposition emerges. Multiple factions: Free Syrian Army, Islamist groups, Kurdish forces (YPG/SDF), Al-Nusra Front (Al-Qaeda affiliate), ISIS.

ISIS/ISIL/DAESH (2013–2019):
• Abu Bakr al-Baghdadi declares 'Caliphate' June 29, 2014 / 1 Ramadan 1435 AH from Mosul's Great Mosque
• Territory at peak (2014): Area of Great Britain, 8–12 million people, oil revenues $3 million/day
• Atrocities: Yazidi genocide (2014) — 5,000 killed, 5,000–7,000 women enslaved. Destruction of Palmyra, Mosul Museum (ancient artifacts). Beheadings broadcast online.
• Defeated: Battle of Mosul (2016–17, 9 months), Battle of Raqqa (2017), Battle of Baghouz (2019) — final territory.
• Al-Baghdadi killed by US Special Forces (October 26, 2019, Barisha, Syria).

HUMAN COST OF SYRIAN CIVIL WAR (2011–2024):
• 500,000–600,000 killed
• 12 million displaced (half of Syria's pre-war population) — largest refugee crisis since WWII
• 6.5 million refugees abroad (mainly Turkey, Lebanon, Jordan)
• Assad regime used chemical weapons (sarin, chlorine) multiple times

FALL OF ASSAD (December 8, 2024): Rebel coalition (led by HTS/Hayat Tahrir al-Sham) captures Damascus. Assad flees to Russia. Ends 54 years of Assad family rule (Hafez 1970–2000; Bashar 2000–2024).`,
tags:["syria","ISIS","civil war","2015","baghdadi","yazidi","palmyra","refugees","Assad","chemical weapons","HTS","2024"]},

{y:2016,r:"Geopolitics & Diplomacy",t:"Brexit, Populism & Democratic Disruption 2016–2020",s:"Europe/USA",type:"geopolitics",
d:`THE POPULIST WAVE (2016–2020):

BREXIT (June 23, 2016): UK votes 52%–48% to leave the EU. Cameron resigns. Theresa May, Boris Johnson, Liz Truss (45 days — shortest British PM in history), Rishi Sunak (first British-Indian PM, October 2022–2024), Keir Starmer (July 2024–present) deal with consequences. UK officially leaves January 31, 2020. Trade deal December 2020. Economic impact: pound falls, City of London partially relocates, UK-EU relations strained.

TRUMP FIRST TERM (2017–2021):
• Tax Cuts and Jobs Act (2017): Cut corporate tax 35%→21%
• Withdrawal from Paris Climate Agreement, Iran Nuclear Deal (JCPOA), TPP
• COVID-19 response — disputed
• January 6, 2021: Capitol riot — supporters storm US Congress after Trump refuses to concede 2020 election to Biden
• First president impeached twice

EUROPEAN POPULISM:
• Viktor Orbán (Hungary) — 'illiberal democracy'
• Poland's PiS — judicial independence attacks
• Marine Le Pen (France) — National Rally; reached runoff against Macron (2017, 2022)

COVID-19 POLITICAL IMPACT:

• Supply chain crisis → de-globalization trend
• Vaccine nationalism`,

{y:2021,r:"Science, Philosophy & Discovery",t:"AI Revolution — From AlphaFold to ChatGPT",s:"Global",type:"science",
d:`THE ARTIFICIAL INTELLIGENCE REVOLUTION (2016–2026):

ALPHAGO (2016): DeepMind's AI defeats world Go champion Lee Sedol 4–1. Go has more possible positions than atoms in the universe — was considered impossible for AI for decades. First major demonstration of deep learning supremacy.

ALPHAFOLD 2 (2020): DeepMind solves the 50-year-old protein folding problem — predicting 3D structure of proteins from their amino acid sequence. Called 'one of the most significant scientific achievements of all time' — enables drug discovery at unprecedented scale. Database of 200 million protein structures published (2022).

GPT-3 (2020): OpenAI's language model with 175 billion parameters. Generates remarkably coherent text.

CHATGPT (November 30, 2022): OpenAI releases ChatGPT — reaches 100 million users in 2 months (fastest product adoption in history). Ignites the generative AI revolution.

GPT-4, CLAUDE, GEMINI (2023–2024): Multimodal AI — text, images, code, reasoning. Used for medicine, law, education, coding, creative work across every domain.

REGULATION:
• EU AI Act (August 2024): World's first comprehensive AI law. Risk-based framework.
• OpenAI, Anthropic, Google, Meta, Mistral as major players
• AI safety as major geopolitical concern — US-China competition for AI dominance

AUTONOMOUS WEAPONS: Drones with target recognition, killer robots — changing warfare permanently. Used extensively in Russia-Ukraine war.`,

{y:-3500,r:"Prophets & Revelation",t:"Prophet Idris (Enoch) AS — Raised to a High Station",s:"Earth (pre-Flood era)",type:"prophet",
d:`Idris AS — mentioned twice in the Quran (19:56-57, 21:85). A prophet of patience and truthfulness. Allah says: 'And mention in the Book, Idris. Indeed, he was a man of truth and a prophet. And We raised him to a high station.' (19:56-57)

ISLAMIC TRADITION: He is identified with Enoch in biblical tradition. Known as the first man to write with a pen, first to learn astronomy and mathematics, first to sew clothing. He is reported to have been taken up to the heavens while still alive — Islamic scholars differ on whether he remains alive or died there. The Prophet ﷺ met him on the 4th heaven during the Night Journey (Isra wal Miraj).

He lived in an era when corruption was spreading on Earth, and he called his people to righteousness.`,
tags:["idris","enoch","prophet","quran","19:56","heaven","raised","pre-flood"]},

{y:-2500,r:"Prophets & Revelation",t:"Prophet Nuh (Noah) AS — The Great Flood",s:"Mesopotamia region",type:"prophet",
d:`Nuh AS preached monotheism for 950 years — receiving the fewest converts of any prophet in so long a time. His own son Kan'an and his wife rejected him. QURAN (29:14): 'And We certainly sent Noah to his people, and he remained among them a thousand years minus fifty years, and the flood seized them while they were wrongdoers.'

By divine command, built the Ark (safina) and loaded pairs of every animal. The Great Flood came: 'And the sky rained in torrents and the earth gushed with springs and the waters met for a matter already predestined.' (54:11-12)

His son Kan'an: Called by Nuh AS to board — 'I will take refuge on a mountain to protect me from the water.' The wave came between them. Nuh AS asked Allah why his son (of his household) was not saved — Allah: 'Indeed, he is not of your family; indeed, he is [one whose] work was other than righteous.' (11:46)

After the flood: Ark rested on Mount Judi (Quran 11:44). He is called Nuh al-Thani (the Second Adam). Surah Nuh (71) entirely about him. Called Shakur (deeply grateful to Allah) in the Quran.`,
tags:["nuh","noah","prophet","flood","ark","quran","950 years","judi","second adam"]},

{y:-2200,r:"Prophets & Revelation",t:"Prophet Hud AS — Sent to ʿAad",s:"Southern Arabia (Hadramawt region)",type:"prophet",
d:`Hud AS was sent to the people of 'Aad — a powerful Arab nation, physically strong, great builders of monuments. They are described in the Quran as 'the people of Iram — who had lofty pillars, the like of whom had never been created in the lands.' (89:6-8)

'Aad rejected Hud AS: 'Who is stronger than us in power?' (41:15). They were arrogant, worshipped idols, and denied the resurrection. Allah sent a barren wind against them for seven nights and eight days — the nation destroyed. Quran (69:6-7): 'And as for 'Aad, they were destroyed by a screaming violent wind which He imposed upon them for seven nights and eight days in succession.'

Only the believers with Hud AS were saved. The ruins of the 'Aad civilization (Ubar/Iram) — discovered by satellite imagery in Oman's desert in the 1990s. Hud AS is buried in Hadramawt (Yemen) according to tradition.`,
tags:["hud","aad","prophet","quran","wind","iram","pillars","arabia","ancient"]},

{y:-2100,r:"Prophets & Revelation",t:"Prophet Salih AS — Sent to Thamud, The She-Camel",s:"Hijr / Al-Qura Valley (Saudi Arabia)",type:"prophet",
d:`Salih AS was sent to the people of Thamud — successors of 'Aad, who carved their homes into mountains (Mada'in Salih / Al-Hijr, in modern Saudi Arabia — an actual archaeological site still existing).

MIRACLE OF THE SHE-CAMEL: Salih AS presented the she-camel as a divine sign. Quran (7:73): 'This is the she-camel of Allah — a sign for you. So let her graze freely in the land of Allah and do not touch her with harm, lest a painful punishment seize you.'

The camel drank the well dry every other day. The people hamstrung and killed her. Salih AS: 'Enjoy yourselves in your homes for three days — then there will be a punishment that will not be denied.' On the fourth day: a thunderous blast (sayhah) destroyed the entire nation. Only Salih AS and the believers escaped.

The abandoned carved stone city of Mada'in Salih (Al-Hijr) in the Tabuk region of Saudi Arabia — the Prophet ﷺ passed by it on the way to Tabuk (9 AH) and said: 'Do not enter these dwellings of those who wronged themselves, unless you are weeping.' (Bukhari)`,
tags:["salih","thamud","prophet","camel","mada'in salih","quran","hijr","miracle","ancient"]},

{y:-1950,r:"Prophets & Revelation",t:"Prophet Ibrahim AS — Khalilullah",s:"Ur → Canaan → Mecca",type:"prophet",
d:`(See full entry under Islamic Caliphates column — this entry marks him in the Prophets column)

Ibrahim AS — Khalilullah (Friend of Allah). Father of monotheism. Given the Suhuf (divine scrolls — first scripture). Rebuilt the Kaaba with his son Ismail AS. Made the call to Hajj. 

KEY QURAN: Ibrahim AS said: 'Indeed, I have turned my face toward He who created the heavens and the earth, inclining toward truth, and I am not of those who associate others with Allah.' (6:79)

Two prophetic lines from him: 
1. Through ISMAIL AS → Arabs → Prophet Muhammad ﷺ
2. Through ISHAQ AS → Bani Israel → all the Israelite prophets including Musa AS, Dawud AS, Sulaiman AS, and Isa AS

He is called a Muslim, a Hanif (pure monotheist), and Khalilullah (Friend of Allah) in the Quran. He is the common ancestor of Islam, Judaism, and Christianity.`,
tags:["ibrahim","abraham","prophet","khalilullah","quran","hanif","kaaba","mecca","monotheism","suhuf"]},

{y:-1900,r:"Prophets & Revelation",t:"Prophet Lut (Lot) AS — People of Sodom",s:"Canaan (Dead Sea region)",type:"prophet",
d:`Lut AS was the nephew of Ibrahim AS. Sent to the people of Sodom (Sadum) — the first nation in recorded history to openly practice homosexual relations publicly, alongside robbery, transgression, and rejection of Allah.

Lut AS called them to righteousness for years. When the angels (in human form) came to Lut AS as guests, the men of the city came demanding them. The angels revealed themselves: 'Indeed, we are messengers of your Lord.'

Allah rained upon Sodom: 'And We rained upon them a rain [of stones]. Then see how was the end of the criminals.' (7:84)

The city was destroyed — turned upside down (sijjil stones = baked clay projectiles). His wife looked back against the prohibition and was destroyed with them.

Archaeological evidence: The region of the Dead Sea shows evidence of a massive destruction event around 3600 years ago (fire, sulfur, collapsed cities). Sites of Tall el-Hammam and others are proposed candidates.`,
tags:["lut","lot","prophet","sodom","quran","angels","destruction","dead sea","canaan"]},

{y:-1800,r:"Prophets & Revelation",t:"Prophet Shuayb AS — Sent to Madyan",s:"Madyan (northwestern Arabia/Jordan)",type:"prophet",
d:`Shuayb AS was sent to the people of Madyan (Midian) — traders and merchants who cheated in weights and measures, robbed on the roads, and worshipped a tree. He was known as 'the eloquent orator of the prophets' (khatib al-anbiya) for his powerful speech.

'O my people, give full measure and weight in justice and do not deprive the people of their due and do not commit abuse on the earth, spreading corruption.' (11:85)

His people mocked him: 'We do not understand much of what you say.' He responded: 'O my people, does my clan have more power over you than Allah? And you have taken Him behind your backs in neglect.' (11:91-92)

They were destroyed by the Day of Shade (Yawm al-Zulla): a cloud appeared over them providing shade from the heat — they gathered under it, then it burst into fire.

Shuayb AS is the father-in-law of Prophet Musa AS (Moses married his daughter). His tomb is in Jordan according to tradition. The city of Madyan (Magna/Tabuk region) is an actual historical site.`,
tags:["shuayb","madyan","midian","prophet","quran","weights","measures","musa","orator","trade"]},

{y:-1600,r:"Prophets & Revelation",t:"Prophet Musa AS & Harun AS — Torah Revealed",s:"Egypt & Sinai",type:"prophet",
d:`HARUN (Aaron) AS: Brother of Musa AS, appointed as his prophet-companion by Allah. Quran (20:29-32): 'And appoint for me a minister from my family — Harun, my brother. Increase through him my strength and let him share my task.'

MUSA AS — The most mentioned prophet in the Quran (136 times). Given the Tawrat (Torah) on Mount Sinai. 

KEY EVENTS: Parting of the Red Sea → 40 years in the Sinai → Golden Calf incident (Samiri leads Bani Israel to worship a golden calf while Musa AS is on Mount Sinai for 40 nights receiving revelation) → Musa AS strikes Samiri's idol → 70 men selected to witness Allah's speech → struck by lightning then revived → Manna and Salwa sent from heaven.

Musa AS dies before entering the Promised Land. Buried in a red dune near Bayt al-Maqdis (Jerusalem area) according to authentic hadith. The Prophet ﷺ met Musa AS on the 6th heaven during Isra wal Miraj — Musa AS wept saying 'more of his followers will enter Jannah than mine.'`,
tags:["musa","moses","harun","aaron","tawrat","torah","sinai","prophet","quran","golden calf"]},

{y:-1400,r:"Prophets & Revelation",t:"Prophet Yusha (Joshua) AS & Prophets of Bani Israel",s:"Palestine/Canaan",type:"prophet",
d:`YUSHA IBN NUN AS (Joshua): Prophet and military leader who led Bani Israel into the Promised Land after Musa AS died. He led the conquest of Palestine. A famous miracle: he prayed for the sun to stop so they could complete a battle before the Sabbath — and it was held back. The Prophet ﷺ mentioned this: 'The sun was never stopped for a human being except for Yusha.' (Ahmad — Sahih)

SUBSEQUENT PROPHETS OF BANI ISRAEL:
• Prophet Shamwil AS (Samuel): Appointed Talut (Saul) as king of Bani Israel after they asked for a king. The story of Jalut (Goliath) and Dawud AS (Quran 2:246-252).
• Prophet Ilyas (Elijah) AS: Sent to people of Baalbek who worshipped Baal. Raised to heaven alive (still alive according to most Islamic scholars, will return).
• Prophet Al-Yasa (Elisha) AS: Successor of Ilyas AS. Mentioned in Quran (6:86, 38:48) with praise.
• Prophet Dhul-Kifl AS: Mentioned twice in the Quran (21:85, 38:48). Patient and righteous. Some scholars identify him with Ezekiel.
• Prophet Ayyub (Job) AS: The prophet of ultimate patience. 18 years of illness. Never complained, only said: 'Harm has touched me, and You are the Most Merciful of the merciful.' (21:83)
• Prophet Yunus (Jonah) AS: Swallowed by the whale. His dua: 'La ilaha illa Anta, subhanaka, inni kuntu minaz-zalimin.' (21:87)`,
tags:["yusha","joshua","shamwil","ilyas","al-yasa","dhul-kifl","ayyub","yunus","prophets","bani israel","quran"]},

{y:-1100,r:"Prophets & Revelation",t:"Prophet Dawud AS & Sulaiman AS — Kings and Prophets",s:"Jerusalem/Israel",type:"prophet",
d:`See full entries elsewhere. In the Prophets column:

DAWUD AS: Given the Zabur (Psalms). Mountains and birds glorified Allah with him. 'O mountains, repeat Our praise along with him, and the birds.' (34:10) Iron made soft for him. Model of justice. Quran dedicates Surah Sad (38) extensively to him. His repentance is the model of how a prophet turns to Allah.

SULAIMAN AS: Son of Dawud AS. Given: speech of birds ('ullimna mantiqa-ttayr'), control over wind and jinn, understanding the language of all creatures. His army of jinn, humans, and birds. The ant story: 'O ants, enter your dwellings that you not be crushed by Solomon and his soldiers while they perceive not.' Sulaiman AS smiled and said: 'My Lord, enable me to be grateful for Your favor.' (27:18-19)

Queen of Sheba (Bilqis) brought to faith. Her throne brought from Yemen to Jerusalem in the blink of an eye — 'before your glance returns to you.' (27:40) — by 'one who had knowledge of the Scripture.'

Both are models that kingdom, power, and material blessing do not corrupt a soul that is anchored in gratitude and worship of Allah alone.`,
tags:["dawud","david","sulaiman","solomon","zabur","psalms","prophet","kingdom","quran","bilqis","ant","birds"]},

{y:-800,r:"Prophets & Revelation",t:"Prophet Zakariyya AS, Yahya AS & Maryam AS",s:"Jerusalem",type:"prophet",
d:`ZAKARIYYA AS: Guardian of Maryam bint Imran in the Jerusalem temple. An elderly man with a barren wife. Witnesses miraculous food in Maryam's chamber — fruit out of season. Makes sincere dua: 'My Lord, do not leave me alone, and You are the best of inheritors.' (21:89) — Allah grants him son Yahya AS in his old age. The angel calls him while he stands praying in the sanctuary.

YAHYA AS (John the Baptist): Born to Zakariyya AS and his barren elderly wife. 'O Yahya, take the Scripture with determination.' (19:12) He was given wisdom as a child, tender-hearted, righteous, and guarded in his chastity. First prophet given a new name never used before by anyone. Martyred by Herod Antipas at the instigation of Herodias and her daughter (according to historical sources).

MARYAM AS (Mary): Not a prophet but given the highest station of any woman. Chose to be devoted to the temple. Given miraculous provision. The Quran dedicates an entire surah (19 — Maryam) to her story. Her truthfulness and chastity (siddiqah) are praised: 'And Mary, the daughter of Imran, who guarded her chastity, so We blew into it [her garment] through Our angel, and she believed in the words of her Lord and His scriptures and was of the devoutly obedient.' (66:12)`,
tags:["zakariyya","yahya","john the baptist","maryam","mary","prophet","quran","jerusalem","miracle","temple"]},

{y:-4,r:"Prophets & Revelation",t:"Prophet Isa (Jesus) AS — Injeel Revealed, Will Return",s:"Bethlehem → Palestine",type:"prophet",
d:`Isa ibn Maryam AS — 'Ruhullah wa Kalimatuhu' (Spirit from Allah and His Word). Born of the Virgin Maryam AS without a father — like Adam AS was created without parents. 'The likeness of Jesus to Allah is as the likeness of Adam — He created him from dust, then said to him: Be! And he was.' (3:59)

MIRACLES (all by Allah's permission): Spoke as an infant in the cradle. Healed the blind and lepers. Raised the dead. Created a bird from clay and breathed life into it. Knew what people had hidden in their homes. The table spread from heaven (Ma'idah — Surah 5 named after it).

THE INJEEL: The original Gospel of Isa AS — revealed to him by Allah. The current Bible's New Testament is not the original Injeel but a compilation of accounts, letters, and records by later followers. The original pure Injeel has not survived.

CRUCIFIXION — ISLAMIC POSITION: 'And they did not kill him, nor did they crucify him; but it was made to appear so to them.' (4:157) Allah raised Isa AS alive to the heavens. He is alive with Allah now.

SECOND COMING: Isa AS will descend near the white minaret east of Damascus, Syria. Will lead Muslims in prayer (Imam al-Mahdi will lead, then offer the position to Isa AS who will pray behind al-Mahdi — respecting the Sharia of Muhammad ﷺ). Will kill the Dajjal (Antichrist). Will break the cross, kill the swine, abolish jizya. Will marry, have children. Will die after 40 years. Will be buried in Madinah next to the Prophet ﷺ.`,
tags:["isa","jesus","prophet","injeel","gospel","maryam","miracle","crucifixion","second coming","quran","ruhullah","dajjal"]},

{y:570,r:"Prophets & Revelation",t:"Prophet Muhammad ﷺ — Seal of All Prophets",s:"Mecca, Arabian Peninsula",type:"prophet",
d:`Muhammad ibn Abdullah ﷺ — Khatam al-Nabiyyin (Seal of the Prophets). The final messenger to all of humanity until the Day of Judgment. Born ~570 CE (53 BH) in Mecca in the Year of the Elephant.

TITLES: Al-Amin (The Trustworthy), Al-Sadiq (The Truthful), Rahmatan lil-Alamin (Mercy to all the worlds — Quran 21:107), Al-Mustafa (The Chosen), Habibullah (Beloved of Allah), Khatam al-Nabiyyin (Seal of Prophets — Quran 33:40).

PHYSICAL DESCRIPTION (Shamayel — authenticated traditions): Medium height, broad-shouldered. Black hair with some grey streaks. Large black eyes with long lashes. A gap between his front teeth. Skin: white with a reddish tint. Seal of Prophethood (a raised mark) between his shoulder blades. When people saw him, they could not look away. When he smiled, companions said the room lit up.

AS A PROPHET: Received revelation over 23 years. 114 Surahs, 6,236 verses. The Quran preserved perfectly in original Arabic to this day — the only divine scripture preserved in its original language without alteration.

HIS CHARACTER: The Quran itself describes him: 'And indeed, you are of a great moral character.' (68:4) Aisha RA, when asked about his character, said: 'His character was the Quran.'

DEATH: 12 Rabi al-Awwal, 11 AH / June 8, 632 CE. Age 63. In Aisha RA's arms. Final words: 'Al-Rafiq al-A'la' (The Highest Companion). Buried in Aisha RA's room — now the Green Dome, Masjid al-Nabawi, Madinah.

'And We have not sent you except as a mercy to the worlds.' (21:107)`,
tags:["muhammad","prophet","seal","khatam","quran","570","pbuh","mecca","mercy","amin","character","quran 21:107","prophets column"]},
