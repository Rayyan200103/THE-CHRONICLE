IMAM MUSLIM ibn al-Hajjaj (206–261 AH / 820–875 CE): Nishapur (Iran). Sahih Muslim — 7,563 hadiths. The 'Sahihayn' (Two Sahihs) together are the gold standard.

THE SIX CANONICAL COLLECTIONS (Kutub al-Sitta):
1. Sahih al-Bukhari (194–256 AH)
2. Sahih Muslim (206–261 AH)
3. Sunan Abu Dawud (202–275 AH)
4. Jami al-Tirmidhi (209–279 AH)
5. Sunan al-Nasa'i (215–303 AH)
6. Sunan Ibn Majah (209–273 AH)

SUFISM — MAJOR TARIQAS:
• Qadiriyya: Abd al-Qadir al-Jilani (470–561 AH) — Baghdad. Largest tariqa globally.
• Chishtiyya: Moinuddin Chishti (536–633 AH) — Ajmer, India. Dominant in South Asia.
• Naqshbandiyya: Baha ud-Din Naqshband (717–791 AH) — Central Asia.
• Shadhiliyya: Abu al-Hasan al-Shadhili (593–656 AH) — North Africa/Egypt.
• Mevleviyya: Jalal al-Din Rumi (604–672 AH) — Konya, Turkey.
• Tijaniyya: Ahmad al-Tijani (1150–1230 AH) — West Africa.`,
tags:["bukhari","muslim","hadith","194 AH","sahih","six collections","sufism","tariqa","scholarship","bukhara"]},

// ═══ SCIENCE & DISCOVERY ═══
{y:-260,r:"Science, Philosophy & Discovery",t:"Archimedes — Eureka & Mathematics",s:"Syracuse, Sicily",type:"science",
d:`Archimedes of Syracuse (287–212 BCE): Greatest mathematician of antiquity — possibly of any age until Newton.

DISCOVERIES: Archimedes Principle (buoyancy): 'Eureka!' (I have found it!) — jumped from bath, ran naked through streets. Determined the crown was fake gold by measuring water displacement.
Pi (π): calculated between 3.1408 and 3.1429. Method of exhaustion (precursor to calculus).
Lever: 'Give me a place to stand and a lever long enough and I will move the world.'
Archimedean Screw: still used for irrigation. Compound pulleys.
Hydrostatics: On Floating Bodies.
War machines: Claws, catapults defending Syracuse against Rome (212 BCE). Romans reportedly terrified of shadows on the wall fearing new Archimedean weapons.

DEATH: Killed by a Roman soldier during sack of Syracuse, despite Marcellus's orders to spare him. Reportedly said: 'Don't disturb my circles.'

His work was preserved by Islamic scholars who translated his texts — transmitted to medieval Europe.`,
tags:["archimedes","mathematics","eureka","greece","science","pi","ancient","syracuse"]},

{y:-240,r:"Science, Philosophy & Discovery",t:"Eratosthenes Measures Earth — 240 BCE",s:"Alexandria, Egypt",type:"science",
d:`Eratosthenes of Cyrene (276–194 BCE): Chief librarian of the Library of Alexandria. First person to calculate Earth's circumference — with remarkable accuracy.

METHOD: Knew that at summer solstice, sun was directly overhead in Syene (Aswan) — objects cast no shadow. At same time in Alexandria (800 km north), objects cast a 7.2° shadow.
CALCULATION: 7.2° / 360° × circumference = 800 km → circumference = 40,000 km.
ACTUAL VALUE: 40,075 km at equator. ERROR: Less than 2%.

Also: calculated Earth's axial tilt (accurately), estimated distance to Sun and Moon, created a world map with grid lines (precursor to latitude/longitude), coined the word 'geography.'

The Library of Alexandria: Founded ~285 BCE under Ptolemy I. 400,000–700,000 scrolls. Destroyed gradually — Julius Caesar's fire (48 BCE), Bishop Theophilus (391 CE), and Arab conquest — each contributed.

This knowledge of Earth's roundness was never 'lost' — medieval European scholars knew the Earth was round. Columbus's error was not thinking it was round but thinking it was SMALLER.`,
tags:["eratosthenes","earth circumference","alexandria","science","geography","ancient","egypt"]},

{y:150,r:"Science, Philosophy & Discovery",t:"Ptolemy & Galen — Ancient Science",s:"Alexandria & Rome",type:"science",
d:`CLAUDIUS PTOLEMY (100–170 CE): Almagest — mathematical astronomy. Geocentric model with epicycles. Used by astronomers for 1,400 years. Geography — first systematic atlas. His maps used longitude/latitude. Influenced Islamic cartography.

GALEN (129–216 CE): Greatest physician of antiquity after Hippocrates. Personal physician to Emperor Marcus Aurelius. 500 treatises. On Anatomy (based on dissecting Barbary apes — human dissection forbidden). His medical system dominated until the 16th century. Translated into Arabic — foundation of Islamic medicine.

HIPPOCRATES (460–370 BCE): 'Father of Medicine.' Hippocratic Oath — 'First, do no harm.' Systematic observation. Removed medicine from supernatural explanation.

These Greek scientific works were TRANSLATED INTO ARABIC by the Abbasid House of Wisdom and preserved while Europe's literacy collapsed. Islamic scholars corrected, expanded, and transmitted them back to Europe in the 12th–13th centuries.`,
tags:["ptolemy","galen","hippocrates","medicine","astronomy","science","ancient","alexandria","rome"]},

{y:820,r:"Science, Philosophy & Discovery",t:"Al-Khwarizmi — Algebra & Algorithms — 205 AH",s:"Baghdad, Iraq",type:"science",
d:`Muhammad ibn Musa al-Khwarizmi (164–232 AH / 780–847 CE). Born in Khwarezm (Uzbekistan). Chief scholar at Bayt al-Hikmah (House of Wisdom) in Baghdad.

ALGEBRA: 'Kitab al-Mukhtasar fi Hisab al-Jabr wal-Muqabala' (The Compendious Book on Calculation by Completion and Balancing). The word ALGEBRA comes from 'al-jabr' in his title. First systematic treatise on linear and quadratic equations.

ALGORITHM: The word 'algorithm' (and the name 'algorithm') comes from the Latinization of his name: 'Algoritmi.' His books introduced Hindu-Arabic numerals (0-9) to Europe through Latin translations — replacing Roman numerals. Without this: no calculus, no computers.

ASTRONOMICAL TABLES (Zij): Revised Ptolemy using Indian mathematical methods. Calculated positions of sun, moon, planets. Used by navigators for centuries.

GEOGRAPHY: Revised and corrected Ptolemy's world map.

HIS LEGACY: Al-Khwarizmi's books were the standard mathematics textbooks in Europe from 12th–16th centuries. The computer science concept of 'algorithm' — the foundation of all programming — is named after him.`,
tags:["al-khwarizmi","algebra","algorithm","205 AH","820","baghdad","mathematics","quran","house of wisdom","islamic golden age"]},

{y:965,r:"Science, Philosophy & Discovery",t:"Ibn al-Haytham — Father of Optics — 354 AH Born",s:"Basra → Cairo",type:"science",
d:`Abu Ali al-Hasan ibn al-Haytham (354–430 AH / 965–1040 CE). Born Basra, worked in Cairo. Known in the West as Alhazen.

KITAB AL-MANAZIR (Book of Optics, ~400 AH): 7 volumes. Most important book in physics between Aristotle and Newton.

REVOLUTIONARY FINDING: Eyes RECEIVE light — they don't emit it. All previous theories (including Plato's) held that eyes emit light rays. Ibn al-Haytham proved the opposite through experiment.

CAMERA OBSCURA: Described and explained the pinhole camera — light passes through a small hole and creates an inverted image. Foundation of all photography.

SCIENTIFIC METHOD: First systematic: observation → hypothesis → experiment → conclusion. 600 years before Francis Bacon 'invented' the scientific method. His method: if mathematical, logical, and experimental results conflict — repeat experiments and revise.

ALSO: explained how rainbows form, why sky is blue (atmospheric refraction), reflection and refraction laws, moon illusion (moon appears larger on horizon — psychological, not physical), binocular vision.

Wrote 200+ books. Translated into Latin in the 12th century — directly influenced Roger Bacon, Kepler, Descartes, and Newton.`,
tags:["ibn al-haytham","optics","354 AH","965","basra","cairo","camera","scientific method","light","islamic golden age"]},

{y:980,r:"Science, Philosophy & Discovery",t:"Ibn Sina (Avicenna) — Canon of Medicine — 370 AH Born",s:"Bukhara → Isfahan",type:"science",
d:`Abu Ali ibn Sina (370–428 AH / 980–1037 CE). Born near Bukhara (Uzbekistan). Memorized the Quran at 10. Mastered philosophy, medicine, mathematics, astronomy, chemistry by age 18. Treated the Samanid ruler — given access to their royal library.

AL-QANUN FI AL-TIBB (Canon of Medicine): 14-volume medical encyclopedia. Standard medical textbook in Europe from 12th to 17th centuries — 600 years. The most widely read medical book in history.

MEDICAL FIRSTS:
• Contagious diseases spread through soil and water (germ theory concept — 900 years before Pasteur)
• Described quarantine for infectious disease
• First classification of mental illnesses as separate from physical
• 760 drug descriptions
• First clinical trials concept
• Experimental pharmacology

PHILOSOPHY: Kitab al-Shifa (Book of Healing) — comprehensive philosophical encyclopedia. 'Floating Man' thought experiment — precursor to Descartes' Cogito. Proved soul's existence independent of body.

ASTRONOMY: Observed Venus (proved it lies closer to the Sun than Earth), solar observations confirming they pass in front of sun (transit).

PSYCHOLOGY: First to study psychology as a field. Described depression, anxiety, psychosomatic illness.

Composed poetry, studied music theory, wrote autobiography. He died at 57.`,
tags:["ibn sina","avicenna","370 AH","980","canon of medicine","bukhara","medicine","philosophy","islamic golden age","europe"]},

{y:1543,r:"Science, Philosophy & Discovery",t:"Copernicus & Scientific Revolution — 950 AH",s:"Poland/Europe",type:"science",
d:`THE SCIENTIFIC REVOLUTION (1543–1687 CE / 950–1098 AH):

COPERNICUS (1473–1543): De Revolutionibus (1543) — heliocentric solar system. Uses mathematical models of Islamic astronomer al-Tusi (13th century CE) directly.

TYCHO BRAHE (1546–1601): Most precise naked-eye astronomical observations. Measured planetary positions to 1 arcminute accuracy.

GALILEO GALILEI (1564–1642): Telescope (improved, 1609) confirms heliocentrism. Discovers 4 moons of Jupiter. Laws of falling bodies (all objects fall at same rate regardless of weight — tested at Leaning Tower of Pisa, allegedly). Inquisition trial 1633 — house arrest until death.

JOHANNES KEPLER (1571–1630): Three Laws of Planetary Motion:
1. Planets move in ellipses with sun at one focus
2. A line from sun to planet sweeps equal areas in equal times
3. Period² is proportional to distance³

WILLIAM HARVEY (1578–1657): Blood circulates in the body — heart pumps it. First correct description of circulatory system (1628).

ISAAC NEWTON (1643–1727): Principia Mathematica (1687). Three Laws of Motion, Universal Gravitation, Calculus. Unifies terrestrial and celestial mechanics. 'I was standing on the shoulders of giants.' (Including Islamic scholars.)`,
tags:["copernicus","galileo","kepler","newton","scientific revolution","950 AH","1543","heliocentric","europe","physics"]},

{y:1687,r:"Science, Philosophy & Discovery",t:"Newton's Principia — 1098 AH — Foundation of Physics",s:"Cambridge, England",type:"science",
d:`1098 AH / 1687 CE. PHILOSOPHIAE NATURALIS PRINCIPIA MATHEMATICA.

THREE LAWS OF MOTION:
1. Inertia: An object at rest stays at rest; in motion stays in motion — unless acted upon by force
2. F = ma: Force equals mass times acceleration
3. Action-reaction: Every force has an equal and opposite reaction

LAW OF UNIVERSAL GRAVITATION: F = Gm₁m₂/r² — every mass attracts every other mass. The apple story: 'Notion of gravitation' came to him when watching an apple fall (1666, plague year).

CALCULUS: Developed independently of Leibniz (1646–1716) — who actually published first. Priority dispute lasted decades.

IMPACT: Explains why planets orbit, tides occur, comets return, cannonballs arc. Enables: precise navigation, artillery, bridge engineering, eventually the Industrial Revolution, spaceflight.

OPTICAL DISCOVERIES: White light is made of colors (prism experiment). Reflecting telescope.

BEYOND PHYSICS: Inspired the Enlightenment — if physical law is discoverable by reason, so too moral and political law. Directly inspired Locke, Voltaire, Rousseau, Jefferson.

Albert Einstein (1905): Extends Newton at extreme velocities and scales. But Newton remains perfectly accurate for everyday engineering.`,
tags:["newton","principia","1098 AH","1687","physics","gravity","calculus","science","enlightenment","england"]},

{y:1796,r:"Science, Philosophy & Discovery",t:"Vaccination — Jenner & Smallpox",s:"England",type:"science",
d:`1796 CE. Edward Jenner (1749–1823): discovers vaccination principle. Inoculates 8-year-old James Phipps with cowpox (vaccinia) — then exposes to smallpox. No disease develops.

Smallpox had killed ~400,000 Europeans annually, scarred millions, killed 30% of those infected. Killed monarchs: Louis XV of France, Emperor Joseph I of Austria, Peter II of Russia.

The word 'vaccine' comes from vacca (Latin: cow) — in honor of cowpox.

GERM THEORY:
• Louis Pasteur (1822–1895): Pasteurization, rabies vaccine, anthrax vaccine. Proved 'spontaneous generation' wrong — microorganisms cause disease.
• Robert Koch (1843–1910): Identified bacteria causing tuberculosis (1882), cholera (1883). Koch's postulates — scientific standard for proving disease causation.
• Joseph Lister (1827–1912): Antiseptic surgery. Used carbolic acid on wounds — surgical death rates fell from 45% to 15%.

SMALLPOX: First disease eradicated by humans. WHO declared eradication in 1980. Last natural case: Ali Maow Maalin, Somalia, 1977.`,
tags:["vaccination","jenner","smallpox","1796","pasteur","germ theory","medicine","discovery","science"]},

{y:1859,r:"Science, Philosophy & Discovery",t:"Darwin — On the Origin of Species — 1276 AH",s:"England",type:"science",
d:`1276 AH / 1859 CE. Charles Darwin (1809–1882): On the Origin of Species by Means of Natural Selection.

VOYAGE OF THE BEAGLE (1831–1836): 5-year circumnavigation. Galapagos Islands — 13 species of finches, each adapted to different food source. Fossilized giant sloths and armadillos resembling living species.

NATURAL SELECTION: Variations exist in all populations. Those with advantageous variations survive and reproduce more (survival of the fittest — phrase coined by Herbert Spencer). Over geological time, this produces new species.

THE DELAY: Darwin waited 23 years to publish — fearful of religious and social reaction. Spurred to publish by Alfred Russel Wallace who independently reached the same conclusion.

RECEPTION: 1,250 copies sold on first day. Thomas Huxley ('Darwin's bulldog'): debate with Bishop Wilberforce — 'I would rather be the grandson of an ape than of a man who misuses his intelligence to suppress truth.' Darwin: 'I do not see any good reason why the views given in this volume should shock the religious feelings of anyone.'

GENETIC MECHANISM: Darwin didn't know how traits were inherited. Gregor Mendel (1822–1884) — working simultaneously — discovered genetics. Mendelian genetics + Darwinian evolution = Modern Synthesis (1940s).`,
tags:["darwin","evolution","1276 AH","1859","natural selection","species","beagle","galapagos","science","england"]},

{y:1895,r:"Science, Philosophy & Discovery",t:"X-Rays, Radio & Quantum Physics",s:"Europe",type:"science",
d:`THE LATE 19TH CENTURY REVOLUTION:

WILHELM RÖNTGEN (1845–1923): Discovers X-rays (1895). First X-ray image: his wife's hand. Nobel Prize 1901 (first ever Nobel Physics prize). Revolutionizes medicine overnight.

MARIE CURIE (1867–1934): Discovers polonium and radium (1898). First woman to win Nobel Prize. First person to win Nobel Prize in TWO different sciences (Physics 1903, Chemistry 1911). Developed mobile X-ray units ('Little Curies') in WWI. Died of aplastic anemia from radiation exposure.

HEINRICH HERTZ (1857–1894): Proves existence of electromagnetic waves (1887) — confirming Maxwell's theory. Hertz (unit of frequency) named after him.

GUGLIELMO MARCONI (1874–1937): First radio transmission across the Atlantic (1901). Nobel Prize 1909.

MAX PLANCK (1858–1947): Quantum hypothesis (1900) — energy is emitted in discrete packets ('quanta'). E = hf. This single insight launches quantum physics.

ALBERT EINSTEIN (1879–1955): Special Relativity (1905), E=mc², General Relativity (1915). Photoelectric effect (proves light comes in quanta/photons — Nobel 1921).

NIELS BOHR (1885–1962): Atomic model (1913). HEISENBERG (1901–1976): Uncertainty principle (1927) — you cannot simultaneously know exact position and momentum of a particle. God plays dice.`,
tags:["x-ray","curie","radio","quantum","einstein","planck","1895","science","physics","revolution"]},

{y:1928,r:"Science, Philosophy & Discovery",t:"Penicillin, DNA & 20th Century Medicine",s:"Britain",type:"science",
d:`ALEXANDER FLEMING (1881–1955): Discovers penicillin (1928) — Penicillium mold kills bacteria on a petri dish. Florey and Chain develop it into usable antibiotic (1940). ~200 million lives saved since.

DNA STRUCTURE:
• Rosalind Franklin: X-ray crystallography of DNA (Photo 51, 1952) — shows helical structure
• Watson & Crick (1953): Propose double helix structure of DNA (using Franklin's data, controversially). 'We have discovered the secret of life.'
• Nobel Prize 1962: Watson, Crick, Wilkins — Franklin died 1958 and was excluded.

HUMAN GENOME PROJECT (1990–2003): Mapped all ~3 billion base pairs of human DNA. 99.9% of all humans share identical DNA. Race has no biological foundation.

CRISPR-Cas9 (2012): Jennifer Doudna and Emmanuelle Charpentier — precise gene editing tool. Potential to cure hereditary diseases. Nobel Prize 2020.

mRNA VACCINES (COVID-19, 2020–21): Katalin Karikó and Drew Weissman's decades of research. Pfizer-BioNTech and Moderna vaccines developed in under a year — fastest vaccine development in history. Delivered to billions in 2021.`,
tags:["penicillin","DNA","watson crick","mRNA","CRISPR","medicine","1928","science","genetics","vaccine"]},

{y:1969,r:"Science, Philosophy & Discovery",t:"Moon Landing & Space Age",s:"USA/USSR",type:"science",
d:`SPACE RACE TIMELINE:
• October 4, 1957: Sputnik (USSR) — first artificial satellite. 83.6 kg sphere, bleeping radio signal. Americans stunned.
• November 1957: Laika (dog) first animal in orbit — dies in Sputnik 2.
• April 12, 1961: Yuri Gagarin (USSR) — first human in space. 108-minute orbit. 'The Earth is blue!'
• May 5, 1961: Alan Shepard — first American in space.
• February 20, 1962: John Glenn — first American to orbit Earth.
• June 16, 1963: Valentina Tereshkova (USSR) — first woman in space.
• March 18, 1965: Alexei Leonov — first spacewalk (12 minutes, nearly didn't get back in).
• JULY 20, 1969: APOLLO 11 — Neil Armstrong and Buzz Aldrin land on Moon. Michael Collins orbits. 'One small step for man, one giant leap for mankind.' 600 million people watch on TV.
• December 1972: Apollo 17 — last humans on Moon (so far).

VOYAGER 1 (1977): Now 24 billion km from Earth — furthest human-made object. Still transmitting.

INTERNATIONAL SPACE STATION (1998–present): Continuous human presence in space since November 2, 2000.

WEBB TELESCOPE (2021): Infrared images of galaxies 13.6 billion light-years away — near the beginning of the universe.`,
tags:["moon landing","1969","apollo","gagarin","sputnik","space race","nasa","armstrong","science"]},

{y:1990,r:"Science, Philosophy & Discovery",t:"Internet & Digital Revolution",s:"Global",type:"science",
d:`THE INTERNET:
• ARPANET (1969): US Department of Defense network connecting 4 universities.
• TCP/IP protocol (1974): Vint Cerf and Bob Kahn — the 'Fathers of the Internet.'
• World Wide Web (1991): Tim Berners-Lee at CERN — HTML, HTTP, URLs. 'I just had to take the hypertext idea and connect it to the TCP and DNS ideas.'

DIGITAL REVOLUTION TIMELINE:
• 1971: Intel 4004 — first commercial microprocessor (2,300 transistors)
• 1975: Microsoft founded (Gates & Allen)
• 1976: Apple Computer (Jobs, Wozniak, Wayne)
• 1981: IBM Personal Computer — MS-DOS
• 1984: Macintosh — graphical user interface for mass market
• 1993: Mosaic browser — first graphical web browser
• 1998: Google (Brin & Page)
• 2004: Facebook (Zuckerberg)
• 2007: iPhone — Steve Jobs: 'An iPod, a phone, and an internet communicator — in your pocket.'
• 2010: iPad — tablet computing
• 2016: AlphaGo defeats world Go champion — AI milestone
• 2022: ChatGPT — Large Language Models go mainstream
• 2023: GPT-4, Claude, Gemini — AI revolution in full swing

TRANSISTOR COUNT: Moore's Law — transistors double every ~2 years. 1971: 2,300. Today: 100 billion+ on a single chip.`,
tags:["internet","digital","1990","world wide web","berners-lee","google","apple","AI","revolution","science"]},

// ═══ GEOPOLITICS & DIPLOMACY ═══
{y:1648,r:"Geopolitics & Diplomacy",t:"Peace of Westphalia — Birth of International Order",s:"Münster & Osnabrück, Germany",type:"treaty",
d:`October 24, 1648 CE. TWO TREATIES signed simultaneously: Treaty of Münster and Treaty of Osnabrück. End of Thirty Years War and Eighty Years War.

PRINCIPLES ESTABLISHED:
1. SOVEREIGNTY: Each state has supreme authority within its own territory — no external (including papal or imperial) interference in internal affairs
2. EQUALITY OF STATES: All sovereign states legally equal regardless of size or religion
3. BALANCE OF POWER: No single power should dominate Europe (anti-hegemony principle)
4. DIPLOMATIC EQUALITY: States should send and receive ambassadors; permanent diplomatic missions
5. NON-INTERFERENCE: Internal matters (including religion) are each state's own business

TERRITORIAL CHANGES: France gains Alsace. Sweden gains northern Germany. Netherlands and Switzerland recognized as fully independent.

SIGNIFICANCE: The foundation of the modern international system. The UN Charter (1945) is built on Westphalian principles. All modern international law derives from these concepts. Every time someone says 'state sovereignty' or 'non-interference in internal affairs' — they are citing 1648.

Henry Kissinger: 'The Westphalian peace reflected a practical accommodation to reality, not a set of moral preferences.'`,
tags:["westphalia","1648","sovereignty","international law","diplomacy","peace","thirty years war","foundation"]},

{y:1814,r:"Geopolitics & Diplomacy",t:"Congress of Vienna — Redrawing Europe",s:"Vienna, Austria",type:"treaty",
d:`September 1814–June 1815 CE. Called to redraw Europe after Napoleon's defeat. The 'Concert of Europe.'

KEY PARTICIPANTS: Metternich (Austria), Castlereagh (Britain), Talleyrand (France), Tsar Alexander I (Russia), Hardenberg (Prussia).

PRINCIPLES: Legitimacy (restore pre-Napoleonic dynasties), Compensation (great powers receive territorial compensation), and Balance of Power.

OUTCOMES: 
• France restored to 1792 borders — surprisingly lenient
• Austria gains northern Italy and Dalmatia
• Prussia gains Rhineland and northern Saxony
• Russia gains most of Poland as 'Congress Poland' (under Tsar)
• Netherlands and Belgium united (until 1830)
• German Confederation created (38 states) — not united Germany

CONCERT OF EUROPE: Regular meetings of great powers (Congress System) to manage disputes peacefully. Lasted until Crimean War (1853). Created 40 years of relative European peace — the 'Long Peace' — unusual in European history.

REVOLUTIONARY GREECE: Greece gains independence 1830 — first successful nationalist secession from a major empire. Inspires nationalist movements across Europe.

IMPACT: Template for later diplomacy — Congress of Berlin (1878), Versailles (1919), UN (1945).`,
tags:["congress of vienna","1815","europe","metternich","napoleon","balance of power","diplomacy","legitimacy","concert"]},

{y:1856,r:"Geopolitics & Diplomacy",t:"Crimean War & International Humanitarian Law",s:"Crimea/Europe",type:"treaty",
d:`1853–1856 CE. Britain, France, Ottoman Empire, Sardinia vs Russia. Fought over declining Ottoman Empire ('Sick Man of Europe') and Russian ambitions in the Balkans and Black Sea.

KEY EVENTS:
• Charge of the Light Brigade (October 25, 1854): 673 British cavalry charge Russian artillery — 118 killed, 127 wounded. Alfred Lord Tennyson: 'Theirs not to reason why, theirs but to do and die.'
• FLORENCE NIGHTINGALE: Reduces death rate at Scutari hospital from 42% to 2% through sanitation and organization. Invents modern nursing profession.
• MARY SEACOLE: Jamaican nurse who traveled to Crimea at own expense — set up 'British Hotel' behind the lines.

TREATY OF PARIS (1856): Russia loses access to Black Sea fleet. Neutral status of Black Sea. First use of international arbitration.

HENRY DUNANT (1828–1910): Witnessing Battle of Solferino (1859) between France and Austria — 40,000 casualties, many dying untended. Writes 'A Memory of Solferino' (1862). Proposes permanent relief organizations.

FOUNDING OF RED CROSS (1863): First Geneva Convention (1864) — protection of wounded soldiers. Foundation of International Humanitarian Law (IHL). Nobel Peace Prize #1 (1901) — Dunant.`,
tags:["crimean war","1856","nightingale","red cross","geneva convention","humanitarian law","crimea","treaty","napoleon III"]},

{y:1919,r:"Geopolitics & Diplomacy",t:"Treaty of Versailles & League of Nations",s:"Paris, France",type:"treaty",
d:`June 28, 1919 CE. End of World War I. Negotiated at Paris Peace Conference.

TREATY OF VERSAILLES (Germany):
• Article 231 — 'War Guilt Clause': Germany accepts full responsibility for the war and all damages. Humiliating.
• Reparations: 132 billion gold marks (~$440 billion today). Germany paying until 2010.
• Territory: Lost 13% of territory — Alsace-Lorraine to France, Posen to Poland, all colonies.
• Military: Army limited to 100,000; no air force; navy limited.
• Rhineland: Demilitarized and occupied by Allies for 15 years.

OTHER TREATIES: Neuilly (Bulgaria), St. Germain (Austria), Trianon (Hungary — lost 2/3 of territory), Sèvres/Lausanne (Ottoman Empire — see below).

LEAGUE OF NATIONS: First international organization for collective security (Article 10 of Versailles). US Senate REFUSED to join (Isolationism — Wilson's own Congress defeated him). Result: League had no teeth.

FAILURES OF VERSAILLES: John Maynard Keynes ('The Economic Consequences of the Peace') predicted it would cause another war. He was right. Hitler's rise was directly fueled by Versailles humiliation.

MANDATE SYSTEM: Former German and Ottoman colonies given to France and Britain as 'League of Nations Mandates' — essentially colonialism with new branding.`,
tags:["versailles","1919","league of nations","ww1 peace","reparations","germany","wilson","paris","diplomacy"]},

{y:1945,r:"Geopolitics & Diplomacy",t:"United Nations — Founded — 1364 AH",s:"San Francisco, USA",type:"institution",
d:`June 26, 1945 CE (1364 AH). UN Charter signed in San Francisco by 50 nations. October 24, 1945: enters into force — UN Day.

FOUNDED TO: Maintain international peace and security, develop friendly relations among nations, achieve international cooperation on global problems, be a centre for harmonizing national actions.

STRUCTURE:
• GENERAL ASSEMBLY: All 193 member states. One nation, one vote. Resolutions not legally binding.
• SECURITY COUNCIL: 15 members — 5 permanent (P5: USA, UK, France, Russia, China) with VETO POWER; 10 elected for 2-year terms. Legally binding resolutions under Chapter VII.
• SECRETARIAT: Administrative body. Secretary-General (current: António Guterres, since 2017).
• INTERNATIONAL COURT OF JUSTICE (ICJ): Hague. Primary judicial organ.
• ECOSOC, Trusteeship Council (inactive).

KEY UN BODIES: UNESCO (1945), WHO (1948), UNICEF (1946), UNHCR (1950), WFP (1961), UNDP (1965), UNFPA (1969).

UNIVERSAL DECLARATION OF HUMAN RIGHTS (December 10, 1948): Eleanor Roosevelt (USA) led drafting committee. 30 articles. Not legally binding but foundation of international human rights law.`,
tags:["united nations","1945","1364 AH","san francisco","security council","veto","charter","udhr","diplomacy","institution"]},

{y:1944,r:"Geopolitics & Diplomacy",t:"Bretton Woods — IMF, World Bank & Dollar Standard",s:"New Hampshire, USA",type:"institution",
d:`July 1–22, 1944 CE. UN Monetary and Financial Conference, Bretton Woods Hotel, New Hampshire. 44 nations. Designed by John Maynard Keynes (UK) and Harry Dexter White (USA) to prevent the economic chaos that caused the Great Depression and WW2.

OUTCOMES:
• INTERNATIONAL MONETARY FUND (IMF): Founded 1944, operational 1945. Provides emergency loans to countries with balance of payments crises. 190 member states. Headquarters: Washington DC.
• WORLD BANK GROUP: International Bank for Reconstruction and Development (IBRD). Initially rebuilt war-ravaged Europe; shifted to developing world. Now 189 members.
• DOLLAR STANDARD: All currencies pegged to US dollar; dollar pegged to gold ($35/oz). US becomes global financial hegemon. Nixon ends gold convertibility ('Nixon Shock') August 15, 1971 — floating exchange rates begin.
• GATT (General Agreement on Tariffs and Trade, 1947): Framework for international trade. Became World Trade Organization (WTO, 1995) — 164 members.

MARSHALL PLAN (1948): US gives $13.3 billion to rebuild Western Europe. Both humanitarian and strategic — prevent communist spread. European economies recover by 1952.

WORLD BANK: Largest multilateral development bank. Lends $50+ billion annually.`,
tags:["bretton woods","IMF","world bank","1944","dollar","keynesian","marshall plan","trade","institution","diplomacy"]},

{y:1949,r:"Geopolitics & Diplomacy",t:"NATO — North Atlantic Treaty Organization",s:"Washington DC",type:"institution",
d:`April 4, 1949 CE. North Atlantic Treaty signed in Washington DC. Collective defense alliance.

ARTICLE 5: An attack on one member is an attack on all. The cornerstone of the alliance. Invoked ONCE in history — by the US after September 11, 2001 (NATO allies joined Afghanistan campaign).

FOUNDING 12 MEMBERS: USA, Canada, UK, France, Belgium, Netherlands, Luxembourg, Denmark, Norway, Iceland, Italy, Portugal.

COLD WAR ROLE: Primary deterrent against Soviet invasion of Western Europe. NATO's strategy: 'Flexible response' — conventional forces + nuclear deterrence. Confronted the Warsaw Pact (Soviet-led alliance, 1955).

EXPANSION: Germany (1955), Spain (1982), Czech Republic/Hungary/Poland (1999), Baltic states (2004), and others. Current: 32 members (Sweden joined 2024).

POST-COLD WAR: Intervention in Bosnia (1995), Kosovo (1999), Afghanistan (2001–2021), Libya (2011). Enlargement controversy — Russia's objection to NATO expansion toward its borders is cited as key cause of Ukraine invasion (2022).

UKRAINE: Not a member — but receives massive military support since 2022 invasion. NATO solidarity tested.`,
tags:["NATO","1949","atlantic","collective defense","article 5","cold war","warsaw pact","ukraine","institution","diplomacy"]},

{y:1948,r:"Geopolitics & Diplomacy",t:"Universal Declaration of Human Rights",s:"Paris, France",type:"institution",
d:`December 10, 1948 CE. Proclaimed by UN General Assembly Resolution 217A. Eleanor Roosevelt chairs drafting committee.

30 ARTICLES covering:
• Civil rights: Life, liberty, security; prohibition of torture and slavery; fair trial; presumption of innocence; privacy
• Political rights: Freedom of opinion, expression, peaceful assembly, religion; right to vote; asylum
• Economic/social rights: Work, fair wages, education, adequate standard of living, social security

NOT LEGALLY BINDING originally — but has inspired 80+ international treaties and been incorporated into many national constitutions.

CRITICISM: Western-centric (drafted primarily by Western nations); Soviet bloc abstained; Saudi Arabia abstained (on religious freedom and equality in marriage provisions).

SUBSEQUENT TREATIES:
• International Covenant on Civil and Political Rights (ICCPR, 1966)
• International Covenant on Economic, Social and Cultural Rights (ICESCR, 1966)
• Convention Against Torture (CAT, 1984)
• Convention on the Rights of the Child (CRC, 1989) — most widely ratified human rights treaty
• Convention on the Elimination of Discrimination Against Women (CEDAW, 1979)`,
tags:["UDHR","1948","human rights","eleanor roosevelt","UN","declaration","universal","institution","diplomacy"]},

{y:1945,r:"Geopolitics & Diplomacy",t:"Yalta & Potsdam — Cold War Architecture",s:"Crimea & Germany",type:"treaty",
d:`YALTA CONFERENCE (February 4–11, 1945): Roosevelt, Churchill, Stalin. Agreed: UN formation, free elections in liberated Europe, Soviet entry into Pacific War, Germany divided into occupation zones.

LEGACY: Stalin violated free elections clause immediately — Eastern Europe falls to Soviet-backed communist governments. Churchill: 'We have suffered a total and unmitigated defeat.' The Iron Curtain.

POTSDAM CONFERENCE (July 17–August 2, 1945): Truman (Roosevelt died April 12), Churchill/Attlee, Stalin. Germany divided into 4 zones (US, UK, France, USSR). War crimes trials agreed (Nuremberg). Stalin informed of American atomic bomb test. Korean peninsula divided at 38th parallel.

NUREMBERG TRIALS (1945–46): International Military Tribunal. 24 senior Nazi officials tried. 12 executed (including Göring — suicide night before). Established: 'following orders' not a defense. Created concept of 'crimes against humanity.' Foundation of International Criminal Law.

IRON CURTAIN: Churchill's speech (March 5, 1946, Fulton, Missouri): 'From Stettin in the Baltic to Trieste in the Adriatic, an iron curtain has descended across the Continent.' Cold War officially named.`,
tags:["yalta","potsdam","1945","cold war","stalin","churchill","roosevelt","truman","nuremberg","iron curtain"]},

{y:1955,r:"Geopolitics & Diplomacy",t:"Non-Aligned Movement & Bandung Conference",s:"Bandung, Indonesia",type:"institution",
d:`April 18–24, 1955 CE. Bandung Conference — 29 Asian and African nations. First major post-colonial gathering. Called by: Indonesia (Sukarno), India (Nehru), Egypt (Nasser), Pakistan (Mohammad Ali Bogra), Burma (U Nu).

AIMS: Oppose colonialism, oppose both Soviet and American blocs, promote Afro-Asian solidarity, support national self-determination.

NON-ALIGNED MOVEMENT (NAM) formally founded: Belgrade Conference (1961). Key leaders: Nehru (India), Nasser (Egypt), Tito (Yugoslavia), Sukarno (Indonesia), Nkrumah (Ghana).

'Ten Principles of Bandung': Respect for sovereignty, non-aggression, non-interference, equality, peaceful coexistence.

GROUP OF 77 (G77, 1964): 77 developing nations at UN — now 134 members. South-South cooperation.

IMPACT: Moral pressure against colonialism. Accelerated decolonization. Created space for developing nations to assert interests independent of superpower blocs. China's 'peaceful rise' concept draws on Five Principles of Peaceful Coexistence first articulated at Bandung.`,
tags:["bandung","non-aligned","1955","nehru","nasser","sukarno","tito","decolonization","cold war","developing world"]},

{y:1975,r:"Geopolitics & Diplomacy",t:"Helsinki Accords & Human Rights Diplomacy",s:"Helsinki, Finland",type:"treaty",
d:`August 1, 1975 CE. Conference on Security and Co-operation in Europe (CSCE). 35 nations including USSR and USA.

THREE 'BASKETS':
1. Security (borders): Recognition of post-WWII European borders — USSR's key demand. Effectively legitimized Soviet control of Eastern Europe.
2. Economic cooperation: Science, technology, environment
3. HUMAN RIGHTS ('Basket Three'): Freedom of movement, contacts between people, freedom of information, human rights.

IMPACT ON COLD WAR: Soviet citizens and Eastern Europeans used 'Basket Three' to create human rights monitoring groups — Helsinki Groups. In USSR: Andrei Sakharov's group. In Czechoslovakia: Charter 77 (Václav Havel). These became the organizing networks of the democratic revolutions of 1989.

Zbigniew Brzezinski: 'The Helsinki Accords were the beginning of the end of the Soviet system.'

ORGANIZATION FOR SECURITY AND CO-OPERATION IN EUROPE (OSCE): Evolved from CSCE. 57 member states. Election monitoring, human rights, conflict prevention. Most inclusive security organization in the world.`,
tags:["helsinki","1975","CSCE","OSCE","human rights","cold war","eastern europe","USSR","diplomacy","treaty"]},

{y:1991,r:"Geopolitics & Diplomacy",t:"End of Cold War — Soviet Collapse — 1411 AH",s:"Moscow/Global",type:"geopolitics",
d:`1989–1991 CE (1409–1412 AH). The most consequential geopolitical transformation since World War II.

TIMELINE:
• 1989: Gorbachev introduces glasnost (openness) and perestroika (restructuring)
• June 4, 1989: Solidarity wins elections in Poland — first free elections in Eastern Bloc
• June 4, 1989: Tiananmen Square massacre (China) — different path
• November 9, 1989: BERLIN WALL FALLS — spontaneous crowds tear it down
• 1989–90: 'Velvet Revolutions' in Czechoslovakia, Hungary, Bulgaria, Romania (violent — Ceaușescu executed Christmas Day 1989)
• October 3, 1990: German reunification
• August 19, 1991: Hard-line Communist coup attempt against Gorbachev — fails when Boris Yeltsin stands on a tank
• December 25, 1991: Gorbachev resigns. USSR formally dissolved into 15 independent states.

FRANCIS FUKUYAMA: 'The End of History' — liberal democracy as the final form of human governance. Proved premature.

'UNIPOLAR MOMENT': USA as sole superpower, 1991–2008. NATO expands eastward. Russian resentment builds. Putin's 2007 Munich speech: 'The unipolar world order is unacceptable.'`,
tags:["cold war end","1991","berlin wall","soviet collapse","1411 AH","gorbachev","yeltsin","1989","revolutions","unipolar"]},

{y:2002,r:"Geopolitics & Diplomacy",t:"International Criminal Court — ICC Founded",s:"The Hague, Netherlands",type:"institution",
d:`July 1, 2002 CE. Rome Statute (1998) enters into force. International Criminal Court established at The Hague.

JURISDICTION: Genocide, crimes against humanity, war crimes, crime of aggression (added 2010).

COMPLEMENTARITY PRINCIPLE: ICC only acts when national courts are unwilling or unable to prosecute. A court of last resort.

CASES: Ugandan LRA commanders, Darfur Sudan (Omar al-Bashir indicted 2009 — first sitting head of state), Congo warlords, Libya, Kenya, CAR, Mali, Ivory Coast, and others.

ARREST WARRANT: Vladimir Putin issued arrest warrant (March 2023) for deportation of Ukrainian children.

NON-MEMBERS: USA (withdrew signature under Bush), China, Russia, India (representing ~50% of world population). USA: American Service Members' Protection Act — authorized military force to free any American detained by ICC.

AFRICAN UNION CRITICISM: 'ICC is hunting Africans' — 40 of first 50 investigations were in Africa. Fair point about power imbalance, though African nations themselves referred many cases.

123 member states as of 2024.`,
tags:["ICC","2002","hague","genocide","war crimes","rome statute","putin","international law","institution","justice"]},

{y:2015,r:"Geopolitics & Diplomacy",t:"Paris Climate Agreement & SDGs",s:"Paris, France",type:"treaty",
d:`December 12, 2015 CE. COP21. Paris Agreement on Climate Change. 196 parties.

GOALS:
• Limit global temperature increase to well below 2°C above pre-industrial levels
• Pursue efforts to limit increase to 1.5°C
• Enhance ability to adapt to climate impacts
• Make finance flows consistent with low-carbon development

MECHANISM: Nationally Determined Contributions (NDCs) — each country sets its own targets. NOT legally binding on emissions — only reporting is mandatory. Bottom-up approach.

WITHDRAWAL AND REJOINING: Trump withdrew USA (2019); Biden rejoined (2021 — first day in office).

CURRENT STATUS: World is on track for 2.5–3°C warming. 2023: Earth's hottest year on record. Sea levels rising 3.7mm/year. Arctic warming 4x faster than global average.

SUSTAINABLE DEVELOPMENT GOALS (SDGs, 2015): 17 goals, 169 targets, 232 indicators. Replace Millennium Development Goals. Include: end poverty, zero hunger, gender equality, clean water, climate action, peace and justice. Target date: 2030.

CLIMATE FINANCE: Developing nations demand $100 billion/year (not met). COP28 (Dubai, 2023): 'loss and damage' fund established.`,
tags:["paris agreement","2015","climate change","SDGs","COP21","sustainability","carbon","diplomacy","treaty","environment"]},

{y:2020,r:"Geopolitics & Diplomacy",t:"COVID-19 Pandemic — 1441 AH",s:"Wuhan, China → Global",type:"geopolitics",
d:`December 2019 / Rabi al-Thani 1441 AH: Novel coronavirus (SARS-CoV-2) detected in Wuhan, China. January 23, 2020: Wuhan lockdown (11 million people). March 11, 2020: WHO declares pandemic.

GLOBAL IMPACT:
• 7+ million official deaths (WHO); actual excess deaths: 15–20 million
• 200+ countries affected
• Global GDP contracted 3.1% in 2020 (worst since Great Depression)
• $10+ trillion in fiscal stimulus globally
• 1.8 billion students out of school simultaneously

VACCINES: mRNA vaccines (Pfizer-BioNTech, Moderna) developed and authorized within 12 months of virus identification — previous record: 4 years (mumps). 13 billion doses administered globally.

GEOPOLITICAL IMPACT:
• US-China tensions over virus origins (Wuhan Institute of Virology debate)
• Supply chain vulnerabilities exposed — semiconductor shortage, PPE scarcity
• Remote work revolution — 40% of US workers remote at peak
• Digital acceleration equivalent to 5-7 years compressed into 2

INEQUALITY: Rich countries secured 80% of early vaccines. Africa vaccinated ~20% while wealthy nations administered boosters. 'Vaccine nationalism.'

LONG COVID: 10% of infected develop persistent symptoms — 65 million+ people globally.`,
tags:["COVID","pandemic","2020","1441 AH","wuhan","vaccine","mRNA","global","china","WHO"]},

{y:2022,r:"Geopolitics & Diplomacy",t:"Russia-Ukraine War — 1443 AH",s:"Ukraine",type:"battle",
d:`February 24, 2022 CE / 23 Rajab 1443 AH. Russia launches full-scale invasion of Ukraine — largest European land war since World War II.

BACKGROUND: Russia annexed Crimea (2014). Donbas conflict (2014–ongoing). NATO expansion as stated Russian grievance. Putin's essay (July 2021): 'On the Historical Unity of Russians and Ukrainians' — questioning Ukraine's right to exist as a separate nation.

INVASION: 3-pronged attack: north (Kyiv), east (Kharkiv), south (Kherson/Zaporizhzhia). Kyiv offensive fails within 1 month — Ukrainian resistance fiercer than anticipated. Russia withdraws from north, consolidates on Donbas.

KEY BATTLES: Mariupol (steel plant siege, 82 days), Kherson (liberated November 2022), Bakhmut (longest battle — Wagner Group, 9 months), Zaporizhzhia (nuclear plant risks).

INTERNATIONAL RESPONSE: Western sanctions on Russia ($300+ billion reserves frozen). NATO members supply weapons: HIMARS, Leopard tanks, F-16 jets. $100 billion+ in US military aid to Ukraine.

NUCLEAR RHETORIC: Putin repeatedly implies nuclear weapons use. Creates most dangerous nuclear tension since 1962 Cuban Missile Crisis.

HUMANITARIAN: 10+ million Ukrainians displaced (6 million outside Ukraine). Estimated 500,000+ total casualties (military, both sides). 2024: front lines largely static.`,
tags:["ukraine","russia","2022","1443 AH","war","NATO","nuclear","invasion","europe","zelensky","putin"]},

// ═══ AFRICA ═══
{y:-900,r:"Africa & Egypt",t:"Nubia & Kush — African Empires",s:"Sudan/Nubia",type:"dynasty",
d:`KINGDOM OF KUSH (1070 BCE–350 CE): Arose in what is today northern Sudan, south of Egypt. Capital: Napata then Meroe.

THE 25TH DYNASTY: Kushite pharaohs ruled all of Egypt 747–656 BCE. 'Black Pharaohs.' Taharqa most famous — mentioned in the Bible (Isaiah 37:9) as ally of Hezekiah against Assyria. Built more pyramids than Egypt (200+ Nubian pyramids still standing, most smaller and steeper than Egyptian ones).

MEROE (300 BCE–350 CE): Capital of the Meroitic Kingdom. Iron smelting center. Script developed — still partially undeciphered. Extensive trade with Rome, Arabia, India. Fell to Kingdom of Aksum (Ethiopia).

KINGDOM OF AKSUM (100–940 CE): Based in modern Ethiopia and Eritrea. One of the four great powers of the ancient world (alongside Rome, Persia, and China). Minted own coins. Adopted Christianity 330 CE — before Rome. Ark of the Covenant — claimed to be in Aksum (St. Mary of Zion church). 

GREAT ZIMBABWE (1100–1450 CE): Stone city without mortar, capital of Kingdom of Zimbabwe. Population: 18,000. Gold trade. European colonists initially refused to believe Africans built it — now confirmed.`,
tags:["kush","nubia","aksum","25th dynasty","africa","pyramid","egypt","ethiopia","zimbabwe"]},

{y:300,r:"Africa & Egypt",t:"Kingdom of Ghana, Mali, Songhai — West African Empires",s:"West Africa",type:"empire",
d:`GHANA EMPIRE (300–1100 CE): First major West African empire. Based in modern Mauritania/Mali. Called 'Land of Gold' by Arab traders. Al-Bakri (1067 CE) describes capital Kumbi Saleh — one half Muslim, one half traditional religion. Controlled Trans-Saharan gold trade. Fell to Almoravid invasion (1076 CE).

MALI EMPIRE (1235–1600 CE): Founded by Sundiata Keita after defeating the Sosso kingdom. Epic of Sundiata — founding narrative. Mansa Musa I (1312–1337): pilgrimage to Mecca with 60,000-person entourage + 12 tons of gold — caused inflation in Egypt for 12 years. Timbuktu: 25,000 students at Sankore University.

SONGHAI EMPIRE (1430–1591 CE): Largest empire in African history at its peak. Sunni Ali Ber (1464–1492): conquers Timbuktu and Djenné. Askia Muhammad (1493–1528): administrative genius, replaced tribal chiefs with officials, standardized weights. 700,000 manuscripts at Timbuktu. Fell to Moroccan musket-armed invasion (Battle of Tondibi, 1591).

KONGO KINGDOM (1390–1914 CE): Central Africa. Sophisticated bureaucracy. Converted to Christianity 1491. Population: 3 million at peak. Portuguese slave trade devastated it.

ZULU NATION (founded 1816 by Shaka Zulu): Battle of Isandlwana (1879) — greatest British military defeat in Africa. Eventually incorporated into South Africa 1887.`,
tags:["ghana","mali","songhai","west africa","timbuktu","mansa musa","sundiata","gold","empire","africa"]},

{y:1884,r:"Africa & Egypt",t:"Berlin Conference — Scramble for Africa",s:"Berlin, Germany",type:"geopolitics",
d:`November 15, 1884–February 26, 1885 CE. Berlin Conference called by Bismarck. 14 European nations. NO African representative present.

'PARTITION OF AFRICA': Established rules for European powers to colonize Africa:
1. 'Effective occupation' required to claim territory
2. Free navigation of major rivers
3. Notification to other powers of claims
4. Free trade in the Congo Basin

RESULTS: Africa divided into 50 European colonies. 10,000 African political units reduced to 50. Borders drawn straight lines across ethnic and linguistic groups — deliberately or carelessly separating peoples.

WITHIN 30 YEARS: 90% of Africa under European control.

MAJOR COLONIAL POWERS AND TERRITORIES:
• Britain: Egypt, Sudan, Kenya, Uganda, Nigeria, Gold Coast, Rhodesia, South Africa, Sierra Leone
• France: Algeria, Morocco, Tunisia, Senegal, Mali, Ivory Coast, Congo, Madagascar
• Belgium: Belgian Congo (now DRC) — King Leopold II's private colony — 10 million killed
• Portugal: Angola, Mozambique, Guinea-Bissau, Cape Verde
• Germany: Tanganyika, Cameroon, Togo, Namibia (Herero genocide 1904–08: 65,000–100,000 killed — first genocide of 20th century)
• Italy: Libya, Somalia, Eritrea`,
tags:["berlin conference","1884","scramble for africa","colonialism","partition","bismarck","europe","africa","genocide"]},

// ═══ AMERICAS ═══
{y:1492,r:"Americas & Pacific",t:"Columbus & European Conquest of Americas",s:"Caribbean → Americas",type:"empire",
d:`October 12, 1492 CE. Christopher Columbus (funded by Spain) reaches Guanahani (Bahamas). Believes he has reached the Indies — calls inhabitants 'Indians.' 

CONSEQUENCES — THE GREATEST DEMOGRAPHIC CATASTROPHE IN HISTORY:
• Up to 90% of indigenous American population dies within 100 years
• Cause: primarily smallpox, measles, typhus (no immunity), plus warfare and slavery
• Population: ~60 million in 1492 → ~6 million by 1600
• Aztec Empire: Hernán Cortés with 508 soldiers defeats empire of millions (1519–1521) — smallpox, indigenous allies, and steel weapons
• Inca Empire: Francisco Pizarro with 168 men captures Emperor Atahualpa (1532) — executed despite paying his weight in gold

COLUMBIAN EXCHANGE: Potatoes, tomatoes, corn/maize, chocolate, tobacco, chili peppers go to Europe. Horses, cattle, wheat, smallpox, measles go to Americas. Europe's diet transformed. Potato enables European population explosion.

TRANS-ATLANTIC SLAVE TRADE: 12.5 million enslaved Africans transported to Americas (1500–1900). 1.8 million died in transit (Middle Passage). Largest forced migration in history.

AMERIGO VESPUCCI (1454–1512): First to identify Americas as a new continent ('New World'). Americas named after him (1507, by German cartographer Waldseemüller).`,
tags:["columbus","1492","americas","aztec","inca","smallpox","columbian exchange","cortés","pizarro","slave trade"]},

{y:1776,r:"Americas & Pacific",t:"American Revolution & Constitution",s:"USA",type:"dynasty",
d:`1775–1783 CE. AMERICAN REVOLUTION. 13 British colonies seeking independence.

CAUSES: Taxation without representation, Proclamation of 1763, Intolerable Acts.

KEY EVENTS:
• Lexington and Concord (April 19, 1775): 'Shot heard round the world'
• George Washington appointed Commander-in-Chief (June 1775)
• July 4, 1776: Declaration of Independence — Jefferson's draft. 'All men are created equal, endowed with unalienable Rights — Life, Liberty, Pursuit of Happiness'
• Valley Forge (1777–78): 2,500 die from cold — army nearly collapses
• France enters war (1778): decisive French naval support (Admiral de Grasse)
• Yorktown (October 1781): Cornwallis surrenders — war effectively over
• Treaty of Paris (September 3, 1783)

CONSTITUTION (September 17, 1787): Federalism, separation of powers (legislative, executive, judicial), checks and balances. 4,543 words — world's shortest and oldest national constitution still in use. First 10 Amendments = Bill of Rights (1791).

PRESIDENTS: Washington, Adams, Jefferson, Madison, Monroe... Lincoln (1861–65, Civil War, Emancipation Proclamation), FDR (1933–45, New Deal + WWII), Truman (atomic bomb), Eisenhower, Kennedy, Nixon, Reagan, Clinton, Bush, Obama, Trump, Biden, Trump again (2025–).`,
tags:["american revolution","1776","declaration","constitution","washington","jefferson","independence","USA","democracy"]},

{y:1861,r:"Americas & Pacific",t:"American Civil War & Abolition of Slavery",s:"USA",type:"battle",
d:`April 12, 1861–April 9, 1865 CE. AMERICAN CIVIL WAR. Union (North) vs Confederate States of America (South).

CAUSE: SLAVERY. Secession of 11 southern states after Lincoln's election. Confederate Constitution explicitly protected slavery.

KEY BATTLES:
• Bull Run (1861): Shocking Confederate victory — not a quick Union war
• Antietam (September 17, 1862): Bloodiest single day in American history — 22,717 casualties
• Gettysburg (July 1–3, 1863): Turning point. 51,000 casualties. Pickett's Charge. Gettysburg Address.
• Sherman's March to the Sea (1864): Total war against Confederate infrastructure

LINCOLN: 'A house divided against itself cannot stand.' Emancipation Proclamation (January 1, 1863) — freed enslaved people in Confederate states. 13th Amendment (1865) — abolishes slavery throughout USA.

LINCOLN ASSASSINATED: April 14, 1865 (Ford's Theatre, John Wilkes Booth). 5 days after Confederate surrender.

CASUALTIES: 620,000–850,000 dead — more than all other American wars combined.

AFTERMATH: Reconstruction (1865–1877) — brief period of Black political participation → Jim Crow laws (segregation) → Civil Rights Movement (1950s–60s) → still unresolved racial inequality.`,
tags:["civil war","1861","lincoln","slavery","emancipation","gettysburg","confederacy","union","abolition","USA"]},

{y:1823,r:"Americas & Pacific",t:"Monroe Doctrine & US Hemispheric Power",s:"USA",type:"geopolitics",
d:`December 2, 1823 CE. President James Monroe's annual message to Congress. Written primarily by Secretary of State John Quincy Adams.

CORE PRINCIPLES:
1. Western Hemisphere closed to future European colonization
2. European intervention in Western Hemisphere is a threat to US security
3. US will not interfere in European affairs

HISTORICAL CONTEXT: Latin American independence movements (1810–1826) — 18 new nations. Spain seeking to reconquer. Russia expanding from Alaska southward.

THEODORE ROOSEVELT COROLLARY (1904): USA can intervene in Latin American countries to stabilize their affairs if they cannot manage themselves. Justified 30+ US military interventions in the region.

US INTERVENTIONS (partial): Mexico (1914, 1916), Haiti (1915–34), Nicaragua (1912–33), Dominican Republic (1916–24, 1965), Cuba (Bay of Pigs 1961, Missile Crisis 1962), Guatemala (CIA coup 1954), Chile (CIA coup 1973, Pinochet), Nicaragua (Contras, 1980s), Panama (1989), Colombia (Plan Colombia).

LATIN AMERICAN INDEPENDENCE SUMMARY:
• Haiti: 1804 (Toussaint L'Ouverture — first Black republic, first successful slave revolt)
• Venezuela, Colombia, Ecuador: Simón Bolívar (1811–1822)
• Argentina: 1816 (San Martín)
• Mexico: 1821 (Iturbide)
• Brazil: 1822 (peaceful — Pedro I declares independence from Portugal)`,
tags:["monroe doctrine","1823","usa","latin america","independence","interventionism","hemispheric","roosevelt corollary"]},

{y:1776,r:"Geopolitics & Diplomacy",t:"American Independence — July 4, 1776",s:"USA",type:"independence",
d:`July 4, 1776: 13 British colonies declare independence. First successful colonial independence in modern history. Template for all subsequent independence movements.`,tags:["independence","usa","1776","colonial"]},
{y:1804,r:"Americas & Pacific",t:"Haitian Independence — First Black Republic",s:"Haiti",type:"independence",
d:`January 1, 1804 CE. Haiti becomes the first Black independent republic and the first country founded by formerly enslaved people. Led by Jean-Jacques Dessalines after Toussaint L'Ouverture's capture (1802).

The Haitian Revolution (1791–1804): only successful slave revolt in history. Napoleon sent 40,000 troops — decimated by yellow fever and guerrilla warfare. 

PUNISHMENT: France forced Haiti to pay 150 million francs in 'reparations' to former slave owners (1825) — equivalent to $21 billion today. Haiti paid until 1947. Explains Haiti's perpetual poverty.`,
tags:["haiti","1804","independence","black republic","slavery revolt","toussaint","dessalines","americas"]},
{y:1816,r:"Americas & Pacific",t:"Latin American Independence Wave — 1810–1826",s:"South America",type:"independence",
d:`SIMÓN BOLÍVAR ('El Libertador', 1783–1830): Liberated Venezuela (1821), Colombia, Ecuador, Peru, and Bolivia. Dreamed of a united South America — his failure to achieve this haunts Latin America to today.

SAN MARTÍN (1778–1850): Liberated Argentina (1816), Chile (1817), Peru (1821). Cross of the Andes (1817) — 5,200 soldiers over 3,800m passes.

KEY DATES:
• Venezuela: 1811, re-independence 1821 (Battle of Carabobo)
• Argentina: July 9, 1816

• Mexico: September 27, 1821

• Bolivia: August 6, 1825 (named after Bolívar)
• Paraguay: 1811; Uruguay: 1825`,
tags:["latin america","independence","bolivar","san martin","1816","venezuela","argentina","chile","peru"]},
{y:1947,r:"Indian Subcontinent",t:"India & Pakistan Independence — August 1947",s:"South Asia",type:"independence",
d:`August 14–15, 1947 CE (1366–1367 AH). Pakistan (August 14) and India (August 15) gain independence from Britain.

LEADERS: Jinnah (Pakistan) and Nehru (India). Partition along religious lines. 12–17 million displaced. 200,000–2 million killed in communal violence. First Kashmir War begins immediately.

SUBSEQUENT SOUTH ASIAN INDEPENDENCE:
• Ceylon (Sri Lanka): February 4, 1948
• Burma (Myanmar): January 4, 1948

{y:1957,r:"Africa & Egypt",t:"African Independence Wave — 1957–1975",s:"Africa",type:"independence",

{y:1948,r:"Middle East & Levant",t:"Arab-Israeli Wars — 1948 to 1973",s:"Middle East",type:"battle",
d:`FIRST ARAB-ISRAELI WAR (1948–49): Egypt, Jordan, Syria, Iraq, Lebanon declare war on Israel. Israel wins, expands beyond UN partition plan borders. 700,000+ Palestinians displaced (Nakba). Armistice agreements 1949.

SUEZ CRISIS (1956): Egypt nationalizes Suez Canal (Nasser). Britain, France, Israel invade. USA and USSR both pressure withdrawal. Britain and France humiliated — end of their great power status. USA emerges as undisputed Western leader.

SIX DAY WAR (June 5–10, 1967): Israel pre-emptively attacks Egypt, Jordan, Syria. Captures: Sinai Peninsula, Gaza Strip, West Bank, East Jerusalem, Golan Heights. Israel trebles its territory in 6 days. Arabs: 'the Naksa' (setback). UN Security Council Resolution 242: 'land for peace' formula — never fully implemented.

YOM KIPPUR WAR (October 6–25, 1973): Egypt and Syria surprise-attack Israel on the holy day. Initial Arab gains. Israel recovers with massive US airlift. Ceasefire.

CAMP DAVID ACCORDS (1978): Carter brokers Egypt-Israel peace. Sadat and Begin win Nobel Peace Prize. Sadat assassinated by Egyptian Islamists 1981.

OSLO ACCORDS (1993): Yasser Arafat (PLO) and Rabin recognize each other. Palestinian Authority created. 'Land for peace.' Never fully implemented. Rabin assassinated by Israeli extremist 1995.`,
tags:["arab-israeli war","1948","1967","1973","suez","six day war","yom kippur","oslo","camp david","middle east","palestine"]},

{y:1979,r:"Middle East & Levant",t:"Iranian Revolution & Iran-Iraq War",s:"Iran/Iraq",type:"geopolitics",
d:`IRANIAN REVOLUTION (February 1979 / 1399 AH): Shah Mohammad Reza Pahlavi overthrown after mass protests. Ayatollah Ruhollah Khomeini returns from Paris exile. Islamic Republic of Iran — Velayat-e-Faqih (Rule of the Jurist). Iran-US hostage crisis: 52 Americans held 444 days.

IRAN-IRAQ WAR (1980–1988 / 1400–1408 AH): Saddam Hussein invades Iran (September 22, 1980). Longest conventional war of the 20th century. 500,000–1,000,000 dead. Chemical weapons used by Iraq (Western powers looked away). Both sides exhausted. UN Resolution 598 ceasefire.

US supports Iraq throughout: weapons, intelligence, agricultural credits. Rumsfeld-Saddam handshake (1983).

GULF WAR (1990–91): Iraq invades Kuwait August 2, 1990. UN authorizes coalition. Operation Desert Storm (January 17 – February 28, 1991): 34-country coalition; Iraq expelled. Saddam survives. UN sanctions on Iraq until 2003 — UNICEF estimates 500,000 Iraqi children die from sanctions.

IRAQ WAR (2003): USA/UK invade claiming WMD. None found. Saddam captured December 2003, executed December 30, 2006. Insurgency, sectarian civil war. ISIS emerges from power vacuum. American withdrawal 2011 and 2021 (from Afghanistan).`,
tags:["iran revolution","1979","1399 AH","iran-iraq war","gulf war","saddam","iraq","kuwait","1990","desert storm"]},

{y:2010,r:"Middle East & Levant",t:"Arab Spring — 2010–2012",s:"Middle East/North Africa",type:"geopolitics",
d:`December 17, 2010: Mohamed Bouazizi, 26-year-old fruit vendor in Sidi Bouzid, Tunisia, self-immolates after police confiscate his cart and slap him. Dies January 4, 2011. Protests ignite across Arab world — the 'Arab Spring.'

COUNTRY OUTCOMES:
• TUNISIA: Ben Ali flees January 14, 2011. Transition to democracy. Only successful Arab Spring democracy — Nobel Peace Prize 2015 to National Dialogue Quartet. Democratic backslide under Saied (2021).
• EGYPT: Mubarak resigns February 11, 2011 after 18 days of Tahrir Square protests. Muslim Brotherhood's Morsi elected (June 2012) — military coup by Sisi (July 2013). ~1,000 killed (Rabaa massacre). Return to authoritarianism.
• LIBYA: NATO airstrikes help rebels. Gaddafi killed October 20, 2011. State collapse — civil war continues 2024.
• YEMEN: Saleh resigns 2012. Civil war — Houthis take Sanaa 2014. Saudi-led coalition intervenes 2015. World's worst humanitarian crisis.
• SYRIA: Assad regime responds with military force. Civil war 2011–present. 500,000+ dead, 12 million displaced. Chemical weapons attacks (Ghouta 2013). ISIS takes large territory (2013–19).
• BAHRAIN: Shia majority protests. Saudi Arabia sends forces. Crushed.

BROADER: Jordan, Morocco offered constitutional reforms. Gulf states largely unaffected (oil wealth).`,
tags:["arab spring","2010","bouazizi","tunisia","egypt","libya","syria","yemen","mubarak","gaddafi","middle east"]},
